  NZL_nzsis_party:0 "NZSIS"
  NZL_nzsis_party_long:0 "New Zealand Security Intelligence Service"
  NZL_new_zealand_first:0 "New Zealand First"
  NZL_new_zealand_first_long:0 "New Zealand First"

  ##########################
  # LEADER BIOS
  ##########################
  
  POLITICS_NZL_DAVID_LEDSON_DESC:0 "If you told someone 20 years ago that New Zealand of all places would descend into a Military Dictatorship, nobody would buy it for even a second. However, as is often the case, truth is stranger than fiction. David Ledson's meritocratic rise through New Zealand's Navy was relatively unremarkable until the beginning of the Australian Civil War, in which he became a primary figure in the growing power of New Zealand's Armed Forces over the nation's political future. In 1989, a three way election between Labour, the Nationals, and a left-wing alliance under Jim Anderton resulted in complete political deadlock. When it became clear no party could reasonably govern, the military intervened - both to stabilize the government and prevent Anderton's communist-sympathizing coalition from taking power. Ledson found himself elevated as New Zealand's new military-backed Governor General, soon to be declared President as the 'Wellington Nine' moved to consolidate power and Abolish the Monarchy. Over two decades later, Ledson remains as a notably hesitant leader of New Zealand's Military Junta, increasingly delegating to subordinates in the NZSIS and the leader of the nominally-powerless Civilian Government, Winston Peters. The 'Admiralissimo' is increasingly seen as a stranger within his own Government, over 20 years of service taking quite the toll, and as whispers of retirement intensify, countless nerdowells view their window to seize power rapidly approacing. The only question remains if those in the Cloak-and-Dagger will allow such an occurrence."
  POLITICS_NZL_WINSTON_PETERS_DESC:0 "The firebrand Winston Peters' rise from renegade National Party MP to military-backed Prime Minister of New Zealand has been nothing short of spectacular. First elected in 1978, Peters advocated for social conservatism and harsher measures against communism while staunchly defending the welfare state. His unorthodox but deeply populist views led to him to become one of the most beloved politicians in the country, much to the unease of his own party. The Perth Agreement that followed the end of the Australian Civil War in 1989 was supported by both the Nationals and Labour, but Peters labeled it a farce that provided an opening for communism in the Pacific, and advocated for further military action to halt its spread. That same year, a three way election between Labour, the Nationals, and a left-wing alliance under Jim Anderton resulted in complete political deadlock. When it became clear no party could reasonably govern, the military intervened - both to stabilize the government and prevent Anderton's communist-sympathizing coalition from taking power. Following the coup, Winston Peters was chosen as New Zealand's next Prime Minister, viewed by the military as one who could give their new regime legitimacy and political power. However Peters would be typically relegated to the fringes, his position viewed as an entirely powerless rubber stamp. Yet as the Admiralissimos and the Intelligence Industrial Complex both fell to their own backstabbing, Peters emerged from the shadows, cutting his strings and taking true command of the nation for the first time since 1989, much to the chagrin of his once-backers."

  ##########################
  # IDEAS
  ##########################
  
  idea_NZL_peters_ministry:0 "Peters Ministry"
  idea_NZL_peters_ministry_desc:0 "Winston Peters, commonly known as just 'Winston' due to the ubiquity of his presence in New Zealand public life, has served as New Zealand's Military-backed Prime Minister ever since the 1989 coup that first launched the Wellington Nine into power. While initially selected by the ruling Regime for his fervently anti-Communist views and willingness to respect the Military's role in decision making, since he was first selected 20 years ago, Peters has managed to earn a reputation as a man unwilling to surrender his own views even in the face of overwhelming opposition. As Admiral Ledson continues to erode his own power, Peters has emerged as the new face of Aotearoa. The power of the Prime Minister, which had shifted dramatically to the President in the wake of 1989, is slowly yet surely shifting back towards Peters, worrying many within the NZSIS who show concern with his increasingly erratic behavior and willingness to subvert the State of Emergency.\n\n\n\n\n\n\n\n\n £GFX_Portrait_NZL_Winston_Peters\n\n\n\n\n\n\n\n"
  
  idea_NZL_white_triarchy:0 "White Diarchy"
  idea_NZL_white_triarchy_desc:0 "The New Zealand Navy, despite nominally being in charge of the ruling Military Junta, is commonly assumed to be wholly uninterested in maintaining the Authoritarian measures which have been in place since 1989. The Wellington Nine which first set the Coup into motion were primarily members of the nation's Intelligence Community, influenced by outgoing Prime Minister Robert Muldoon to prevent Communist influence 'By Any Means Possible'. Since then, much of the framework of New Zealand's Dictatorship has been maintained solely by the nation's Intelligence Community, preferring to rule from the shadows while playing both the Navy and the Civilian Government off each-other to ensure their unquestioned rule. However as Peters' grows increasingly antsy with the 'State of Emergency', many within the nation's 'Shadow Ministry' have pointed out that the NZSIS's strategy of utilizing the Armed Forces as a fall-guy is an increasingly risky one."
  
  idea_NZL_nzsis:0 "NZSIS Rule"
  idea_NZL_nzsis_desc:0 "After more than a decade, Aotearoa 's puppetmasters have stepped out of the shadows. Driven by paranoia and anti-Communist fervour, the New Zealand Security Intelligence Service decided that the nation's Democratic Institutions were an acceptable sacrifice in the battle to keep Oceania safe from the Red Menace. They had seen countless nations fall to these dark forces in the Pacific Region, they had seen the carnage and bloodshed in Australia, and with Muldoon's blessing, they declared in one voice that New Zealand must be kept safe, no matter the cost. Thus, the Wellington Nine were born, their mission a simple one: Save our nation. 20 years later, the work that they built continues on, the machinery of state humming along without a hitch, a veritable empire of Blackmail and Threats keeping things running along smoothly, all while making sure that the right people are blamed for the right problems."
  
  idea_NZL_peters_regime:0 "Winston Regime"
  idea_NZL_peters_regime_desc:0 "With Winston Peters taking command of the Kiwi Apparatus of State from the NZSIS, a new order has been birthed. While some had hoped that Peters' wresting of control would lead to a final restoration of Democracy, Peters, echoing his counterparts in the fanatically anti-Communist Wellington Nine, has continued the restrictions of Civil Liberties outlined in the State of Emergency document which first went into effect in 1989. Additionally, Peters has broken from the Junta's previous ambivalence towards Social Issues, signalling a shift towards Social Conservatism and moving to crack down on the Media. While many had hoped that an end to the NZSIS's reign of terror would bring about a return to the pre-1989 status quo, it seems that Aotearoa's hope for Democracy has been extinguished forever."
    
  idea_NZL_1989_shadow:0 "Shadow of 1989"
  idea_NZL_1989_shadow_desc:0 "At long last, the eggheads in NZSIS who have been pulling the strings since 1989 have been done away with. Winston Peters, despite having the entirety of the awesome power of the New Zealand Apparatus of State behind him, decided to echo Cincinattus and return power to the People, lifting the State of Emergency and arranging for New Zealand's first Democratic Elections in over two decades. While many continue to disagree with Peters' controversial policies and abrasive personality, the entire political spectrum can typically commend him for sticking to his beliefs and restoring New Zealander Democracy even if he had the option to rule as a Dictator with the backing of the Military behind him. Yet still, the shadows of the Coup still loom heavily over Aotearoa, a reminder of how fragile our hard-fought freedoms are."
  
  ##########################
  # EVENTS
  ##########################
  
 rwsf_new_zealand.2.t:0 "Retirement of David Ledson"
 rwsf_new_zealand.2.d:0 "While Admiral David Ledson has served honourably as President of the Republic of New Zealand since 1989, today, Ledson has elected to retire on his own accord, in a decision that has increasingly caused worry among our allies in the NZSIS. Under the terms of the 1991 Constitution, if the position of President is vacated, then the office shall be transferred over to the Prime Minister, then the Speaker of the House of Representatives, and finally the Director of the NZSIS. The prospect of Winston Peters assuming power, even in a nominal capacity, has the entire Intelligence community spooked, as the push to replace Ledson with another docile Military man intensifies. Admiral Peter Steer has already been selected as the choice to maintain continuity, as senior figures push forward a proposal to nominate Steer as Ledson's replacement directly instead of risking Peters taking command. However as Parliament is still out of session, the prospect of Ledson retiring before a replacement can be nominated has arisen. In the event of Winston utilizing the power of the office, many within the NZSIS have suggested drastic action both to stop Peters' ascendancy, but to also punish those in the Military who failed to prevent him assuming power. The fate of Aotearoa hangs in the balance."
 rwsf_new_zealand.2.o1:0 "The House of Representatives manages to nominate Steer in a Recess Session."
 rwsf_new_zealand.2.o2:0 "Ledson signs his resignation before Parlaiment can be Recalled."
     
 rwsf_new_zealand.3.t:0 "Status of the Winston's Presidency"
 rwsf_new_zealand.3.d:0 "The NZSIS's worst fears have come to pass as Admiral Winston Peters is sworn in as the 2nd President of the Republic of New Zealand, in a stark repudiation of the Military Regime which has existed since the late 80s. Winston's disdain for the NZSIS is well-known to the Director, who has grown increasingly irate with his Anti-Establishment and Pro-Democracy stances in the last decade. With a wide-spanning web of threats and blackmail, the NSZIS would be able to readily remove Peters from power, bypassing the Speaker of the House of Representatives to directly install NZSIS Director Warren Tucker as President. Within the NZSIS, not all are sold on this plan, with many reportedly unwilling for the nation's Intelligence Apparatus to openly step out of the shadows just yet. However as many have pointed out, time is of the essence, with every second Winston is allowed to be in power a second in which he can consolidate power and move New Zealand away from NZSIS' guiding hand. Both Winston Peters and Warren Tucker are faced with a difficult decision, a decision that could potentially shape the future of New Zealand as we know it..."
 rwsf_new_zealand.3.o1:0 "The NSZIS needs to take Complete Control from that madman Peters."
 rwsf_new_zealand.3.o2:0 "The NZSIS must go, but the State of Emergency must remain."
 rwsf_new_zealand.3.o3:0 "We must purge the NZSIS and revoke the State of Emergency."
        
 rwsf_new_zealand.4.t:0 "Elections of [GetYear]"
 rwsf_new_zealand.4.d:0 "Celebration has erupted across the nation as the State of Emergency which has dominated New Zealander public life since that fateful day in 1989 has at last been lifted. The Dictatorship has ended, Winston Peters declaring his allegiance to Democracy and announcing the first Free Elections in more than 20 years. Peters has chosen to surrender the Office of President and return true power to the Prime Minister - the President now to be nominated by Parliament directly. Despite a weariness about the Labour Party, which Peters has called a Communist Front at various times in the past, both of the major parties which dominated pre-Coup New Zealand will be allowed to compete. Peters' is a natural frontrunner, with his New Zealand First Party rocketing to the top of the polls as countless Kiwis recognize him as the 'Savior of Democracy'. However Peters is not without controversy, as his several Socially Conservative stances and closeness to the former regime have made him an easy target for Opposition parties looking for a clean break with the old regime. As the votes are tallied, it is clear that the party to form a majority in the House of Representatives in both the standard and Māori electorates shall be..."
 rwsf_new_zealand.4.o1:0 "...Winston Peters' New Zealand First!"
 rwsf_new_zealand.4.o2:0 "...Jacinda Ardern's Labour Party!"
 rwsf_new_zealand.4.o3:0 "...John Key's National Party!"
   
 rwsf_new_zealand.5.t:0 "Status Quo Upheld in New Zealand"
 rwsf_new_zealand.5.d:0 "Information from the Oceanic nation of New Zealand has been scarce since 1989, the year in which a Military-backed Dictatorship opposed to stop Communists from gaining power. In the years since, the nation has grown increasingly reclusive from the International Community. However today, news has emerged of a changing in the guard. Long-time President David Ledson has announced his retirement. For over 20 years, Ledson has served as the leader of New Zealand's Military Junta, a job which Ledson has done with increasing hesitation in the years since, as many came to believe that true power in the country lay not with the Armed Forces, but the nation's formidable Intelligence Community. Ledson's retirement had been seen by many, particularly Prime Minister Winston Peters, as an opportunity for advancement. The nominally-powerless Head of Government had been steadily consolidating power in hopes of displacing the ruling Junta, however as it appears, the rise of this Populist Firebrand has been halted by a continuation of the Status Quo. Admiral Peter Steer has succeeded Ledson without much fanfare, signalling that the delicate balance of Power that has existed in New Zealand since 1989 will continue unbridled, even as discontent continues to emerge."
 rwsf_new_zealand.5.o1:0 "A Exciting Story in Motion, for Another Time."
    
 rwsf_new_zealand.6.t:0 "Intelligence Coup in New Zealand"
 rwsf_new_zealand.6.d:0 "Information from the Oceanic nation of New Zealand has been scarce since 1989, the year in which a Military-backed Dictatorship opposed to stop Communists from gaining power. In the years since, the nation has grown increasingly reclusive from the International Community. However today, news has emerged of a radical changing in the guard. The retirement of long-time President David Ledson was seen as an opportunity for Prime Minister Winston Peters, the Populist Firebrand relegated to the mostly-ceremonial role of Prime Minister, to truly seize power for the first time since 1989. Peters however was sorely mistaken, as members of the New Zealand's intelligence community, commonly recognized as the true force behind the nation's Military Regime, moved to stop this transfer of power in it's track. NZSIS Director Warren Tucker has emerged as the nation's new Head of State as the position of Prime Minister and President are merged with the Director's post, signalling a complete takeover of New Zealand by its Intelligence Agency. As New Zealand's cloak-and-dagger controllers step out of the shadows for the first time in the nation's history, New Zealand has become one of the few nations in history to be openly controlled by its Intelligence Agency."
 rwsf_new_zealand.6.o1:0 "It seems the NZSIS was in control this entire time."
     
 rwsf_new_zealand.7.t:0 "Winston Peters Consolidates Power"
 rwsf_new_zealand.7.d:0 "Information from the Oceanic nation of New Zealand has been scarce since 1989, the year in which a Military-backed Dictatorship opposed to stop Communists from gaining power. In the years since, the nation has grown increasingly reclusive from the International Community. However today, news has emerged of a radical changing in the guard. The retirement of long-time President David Ledson was seen as an opportunity for Prime Minister Winston Peters, the Populist Firebrand relegated to the mostly-ceremonial role of Prime Minister, to truly seize power for the first time since 1989. Upon taking power, Peters began a ruthless purge of the nation's Intelligence Community, which was widely recognized as the true force behind the Military Junta. While some had hoped that the takeover of Winston' Civilian Government would lead to the end of the State of Emergency, Winston Peters has continued many of the Junta's policies, even extending the Junta's grip in many areas as he moves from the Military's ambivalence towards Social Issues towards a more Socially Conservative stance. Peters has even began appearing in public wearing a Military Uniform, something which has given him the nickname 'Admiral Winston' - a nickname he has reportedly taken in stride."
 rwsf_new_zealand.7.o1:0 "The NZSIS can't be happy."
      
 rwsf_new_zealand.8.t:0 "Democracy Returns to New Zealand"
 rwsf_new_zealand.8.d:0 "Information from the Oceanic nation of New Zealand has been scarce since 1989, the year in which a Military-backed Dictatorship opposed to stop Communists from gaining power. However much to the mild shock of the planet, it appears that this Military Junta has been torn down by its own machinery. Winston Peters, the long-serving mostly-ceremonial Prime Minister, has seized power upon the retirement of Admiral Ledson, beginning a comprehensive purge of the nation's omnipresent Intelligence Community, which many believe to be the true driving force behind the Junta and calling for fresh elections. Winston's decision to forego absolute power won the hearts of the Electorate... but not their votes, as Peters was decidedly defeated by Jacinda Ardern's Center-Left Labour Party - Peters' own involvement in the Junta decidedly playing a factor. While some have accused the NZSIS of playing a role in elevating the Labour Party as a means to sideline Peters, the holding of Aotearoa's first Democratic Elections in the 21st Century has been a cause to celebrate for many, especially the Australians and the Canadians, who have already been reaching out to the new Government in Wellington about the prospect of the Democratic League."
 rwsf_new_zealand.8.o1:0 "The Voice of the People Roars once more."
             
 rwsf_new_zealand.9.t:0 "Democracy Returns to New Zealand"
 rwsf_new_zealand.9.d:0 "Information from the Oceanic nation of New Zealand has been scarce since 1989, the year in which a Military-backed Dictatorship opposed to stop Communists from gaining power. However much to the mild shock of the planet, it appears that this Military Junta has been torn down by its own machinery. Winston Peters, the long-serving mostly-ceremonial Prime Minister, has seized power upon the retirement of Admiral Ledson, beginning a comprehensive purge of the nation's omnipresent Intelligence Community, which many believe to be the true driving force behind the Junta and calling for fresh elections. Peters' decision to forego absolute power won the hearts of the Electorate... but not their votes, as Peters was decidedly defeated by John Key's Center-Right National Party - Peters' own involvement in the Junta decidedly playing a factor. While some have accused the NZSIS of playing a role in elevating the Labour Party as a means to sideline Peters, the holding of Aotearoa's first Democratic Elections in the 21st Century has been a cause to celebrate for many, especially the Australians and the Canadians, who have already been reaching out to the new Government in Wellington about the prospect of the Democratic League."
 rwsf_new_zealand.9.o1:0 "The Voice of the People Roars once more."
       
 rwsf_new_zealand.10.t:0 "Free Elections in New Zealand"
 rwsf_new_zealand.10.d:0 "Information from the Oceanic nation of New Zealand has been scarce since 1989, the year in which a Military-backed Dictatorship opposed to stop Communists from gaining power. However much to the mild shock of the planet, it appears that this Military Junta has been torn down by its own machinery. Winston Peters, the long-serving mostly-ceremonial Prime Minister, has seized power upon the retirement of Admiral Ledson, beginning a comprehensive purge of the nation's omnipresent Intelligence Community, which many believe to be the true driving force behind the Junta and calling for fresh elections. As many expected, Peters' own Populist Drive and status as the 'Savior of Democracy' led to him securing an easy victory in 21st Century New Zealand's first Democratic Elections, defying those who considered him as too close to the former Junta. While allegations of voter intimidation have been made, International Observers have cautiously upheld the legitimacy of this Election, even as Australia and Canada express a degree of dismay about Winston's hardline Isolationist Stance -  though his fervent anti-Communist stances may provide an opening for them."
 rwsf_new_zealand.10.o1:0 "The People have maintained their trust in Peters."
