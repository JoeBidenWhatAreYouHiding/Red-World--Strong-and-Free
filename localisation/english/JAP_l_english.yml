 #### Ideas ####
 idea_heisei_system:0 "Heisei System"
 idea_heisei_system_desc:0 "The Heisei System, named after the Heisei Era of Japan, defines Japanese politics in the 21st century. Established after the fall of the United States and the death of Emperor Showa in the late 1980s, the system is defined by the complete dominance of the Liberal Democratic Party in national elections and increasing factionalism within the government. The ties formed between politicians, business and the Yakuza have intertwined the state so deeply with corporations and the criminal underworld that it is tough to separate them from each other."
 idea_sunrise_economy:0 "Sunrise Economy"
 idea_sunrise_economy_desc:0 "The Japanese economy is one of the largest and most advanced economies in the world. Arising from the ashes of the Second World War, Japanese economic growth was defined by the collaboration between the state and business, local dependency on government loans and the role of the keiretsu, large business conglomerates. Organized crime has grown since the economic crisis caused by the collapse of the United States, but the Japanese economy has since recovered by refocusing its economy towards domestic consumption and deeper trade relations with its closest allies, leading to the entrenchment of the prevailing business elite."
 idea_hatoyama_doctrine:0 "Hatoyama Doctrine"
 idea_hatoyama_doctrine_desc:0 "The Hatoyama Doctrine is a strategy adopted by Japan following the American defeat in the Korean War, and continues to define Japanese defense policy in the 21st century. Named after Prime Minister Ichiro Hatoyama, in accordance with the doctrine Japan has prioritized its national defense, easing its reliance on the United States for security and abolishing Article 9 of the Japanese constitution. Increased defense spending and high economic growth has allowed Japan to build one of the world’s most advanced militaries, who stand on guard against any threat to the islands."
 
 ### Events ###
 JAPdisaster.1.t:0 "Massive Earthquake and Tsunami hits Tōhoku"
 JAPdisaster.1.d:0 "The recent news out of the city of Sendai paint a grim picture of the situation following the events of the recent Tsunami, with the ground yet to stop shaking, and expected to continue to do so for the foreseeable future, as the aftershocks provoke further chaos in the region. With the preliminary reports giving upwards of fifteen thousand casualties and a level of devastation unseen since the great Kanto earthquake in 1920, worst of all is the damage to the nearby nuclear power plant in Fukushima, which provoked a core meltdown in the worst nuclear incident since three miles island, an event that forced the evacuation of thousands of nearby residents, and what exposed severe failures not only on evacuation protocols themselves but also in intra-governmental coordination as contradictory orders and the breakdown in communications, with local and state governments orders forcing some people to evacuate over six times, hampered the immediate response to the catastrophe, casting a dark cloud over our administration as the diet and the population demand answers from [JAP.GetLeader]'s cabinet, with several ministers already on a tight rope over their responsibilities regarding the incident."
 JAPdisaster.1.o1:0 "Quick, send in the army!"