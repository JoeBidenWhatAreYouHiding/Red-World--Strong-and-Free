 TEX_nonfunctioning_legal_system:0 "Nonfunctioning Legal System"
 TEX_nonfunctioning_legal_system_desc:0 "The decision to enforce Remnant Law in Texas has caused our nation's legal system to grind to a screeching halt. The Texans have been unwilling to enforce any of the newly-instituted statues, as Courts shudder their windows in protest and pot-bellied Sheriffs turn a blind eye to blatant criminal activity out of spite. While US Marshalls and the FBI have been brought in to bridge the gaps in the collapsing Texan Legal System, it is predicted that Texas' legal shut-out will continue to lead to judicial chaos for many more months to come."
 
