 TEX_New_Mexico_Autonomy:0 "New Mexico Autonomy"
 TEX_New_Mexico_Autonomy_desc:0 "New Mexico, previously an independent nation and separate State before 1988, was annexed by Texas shortly after the New Mexican Civil War. New Mexico has long maintained a distinct identity outside of the rest of Texas, something which has been cause for contention within the area. As a means of easing tensions between the Government in Austin and communities in what was once New Mexico, autonomy has been granted to the area, reconstituting the New Mexico Government and forming a Devolved Administration in the region." 
 TEX_Texan_Autonomy:0 "Texan Autonomy"
 TEX_Texan_Autonomy_desc:0 "Texas, through the blood, sweat, and tears of a thousand bushwhackers, has earned its place on the podium. Of the nations that broke off the United States during the Great Collapse, only one of them has truly earned its place in the sun, its right to exist in the chaotic world of a post Cold War world. Now, Texas, the stalwarts who defied the odds to reclaim the American Dream, act not as subservient slaves to a new America, but rather as equal partners in a new and improved American Dream - a dream which started in the Republic of the Lone Star."
 
