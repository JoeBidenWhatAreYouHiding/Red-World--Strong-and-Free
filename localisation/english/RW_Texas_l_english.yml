 USA_anti_war_protests:0 "Anti-War Protests"
 USA_anti_war_protests_desc:0 "Demonstrators have taken to the streets to protest our actions in Texas. While at now most protests remain relativley peaceful, and this problem remains one the FBI and CIA can easily solve, it represents a deterioration in our pro-War messaging and evidences a deeper discontent in post-American society."
 
 ### Economy ###
 
 TEX_NASA:0 "Johnson Space Center"
 TEX_NASA_desc:0 "The Johnson Space Center is a pivotal facility for the old American Space Program. Though it has languished in the last few decades due to lack of funding, the practical experience of on-site staff and the invaluable research data makes the facility important even when most of it remains mothballed. If revived, the Center could be the launchpad, perhaps literally, for a revived space program."
 
 ##########################
 # FOCUSES
 ##########################
 
 TEX_president_perry:0 "President Perry"
 TEX_president_perry_desc:0 "Serving on and off as President since 2001, James Richard Perry now stands as the ruler of a deeply divided nation. With the specter of both internal terrorists and Remnant intervention looming, Texas is in a difficult position, and it seems that sooner or later, these tensions are going to erupt into a situation which cannot be controlled."
 TEX_rapid_response:0 "Rapid Response Teams"
 TEX_rapid_response_desc:0 "The damnable terrorists who attacked Houston have managed to catch the Republic's emergency services with their pants down. Wherever and whenever the next attack occurs, our emergency services must be up to the task of apprehending the masterminds and assisting the victims."
 TEX_media_blackout:0 "Media Blackout"
 TEX_media_blackout_desc:0 "A myriad of false and damaging narratives have been allowed to swirl in the public consciousness ever since the St. Patrick's Day attack. The time has come to shut down the stations and reporters peddling these false narratives, and establish strict control over broadcasting within Texas."
 TEX_martial_law:0 "Martial Law"
 TEX_martial_law_desc:0 "While our nation has been in a State of Emergency ever since the harrowing events of 2009, the most recent terrorist attack has proven that a mere state of emergency is not enough. Martial law shall be formally imposed, and President Perry given sweeping powers to deal with the vile scum who continue to terrorize Texas."
 TEX_inward_preperation:0 "Inward Preparation"
 TEX_inward_preperation_desc:0 "It has become increasingly clear that Texas will soon face a battle for its very survival. The false Republic continues their doomed crusade to resurrect a dead nation, and sees Texas as their first target. Dreams of revanchism and reclamation must be put on hold to focus on Texas' very survival. "
 TEX_early_warning_systems:0 "Early Warning Systems"
 TEX_early_warning_systems_desc:0 "Thanks to our position in the heart of Tornado Alley, Texas already has a formidable system of alerts and sirens in place which can warn the populace in the event of danger. As full-scale war with the Republic becomes more of a possibility, a program to retrofit these sirens for military threats has begun."
 TEX_survival_ethos:0 "Survivalist Ethos"
 TEX_survival_ethos_desc:0 "While Texans have always thought of themselves as a strong and self-reliant people, the possibility of essential services being cut off in the event of war means that this spirit of survivalism must be put to the test. The Department of Public Safety has officially recommended that all citizens prepare a to-go bag, and keep a one month supply of food and water ready at all times."
 TEX_outward_readiness:0 "Outward Readiness"
 TEX_outward_readiness_desc:0 "War is coming to our Lone Star state - this is a fact that cannot be denied. However where the Republic expects us to simply roll over and accept Republican domination, the fact is that they have sorely misunderestimated the will and fortitude of the Texan people. Come hell or high water, the Lone Star Republic shall endure."
 TEX_rattle_the_sabre:0 "Rattle the Sabre"
 TEX_rattle_the_sabre_desc:0 "For the better part of 10 years the Atlanta Government has been attempting to intimidate Texas with military force. These displays, no matter how grandiose, have failed to phase the Texan people, and have done nothing but strengthen the resolve of our proud people. As war seems inevitable, instead of cower in fear over the Republic's intimidation, we Texans shall make some power moves of our own..."
 TEX_armed_conflict_preparedness:0 "Armed Conflict Preparedness"
 TEX_armed_conflict_preparedness_desc:0 "Ever since the Dallas Fort-Worth area was first occupied by the Bush regime, our populace has lied in wait for their next major attack. This state of tension with the Republic has led to massive investments in war readiness programs and personal security by the Perry Government. With war seemingly on the horizon once more, the President has authorized even more investment in the sector so that our citizens will be protected once war finally arrives."
 TEX_a_match_made_in_hell:0 "Public Enemy Number One"
 TEX_a_match_made_in_hell_desc:0 "Wade Michael Page, leader of the far-right 'Hammerskin' group and the terrorist mastermind behind the devastating St. Patrick Day's attack, has become the Texas Rangers' most wanted man. A nationwide manhunt is underway for Page and his accomplices as Texan citizens demand justice for those wounded or slain in one of Texas' deadliest days."
 TEX_control_the_narrative:0 "Regain Control of the Narrative"
 TEX_control_the_narrative_desc:0 "The Scarlet Dossier revealed a truly stunning amount of incompetence by the Perry Government in the leadup to the I-37 attacks. This pattern of incompetence has led some to believe that Perry deliberately ignored warning signs so he could use the attack as an excuse to further justify his own power. While this narrative is undeniably false, the prevalence of such rumors remains deeply damaging to our government."
 TEX_tighten_the_border:0 "Tighten the Border"
 TEX_tighten_the_border_desc:0 "It is believed that many of the weapons used in the I-37 attack were smuggled across our border with the American Republic and Mexico. While border crossings to and from Mexico and the AR are already tight, this recent lapse in security has suggested that they need to be even more closely guarded."
 TEX_accuse_the_republic:0 "Accuse the Republic"
 TEX_accuse_the_republic_desc:0 "While the Republic has officially denounced the Hammerskin movement and their culpability with the San Antonio attacks, most people simply don't buy their lack of involvement. The time has come to make the Republic's involvement with these heinous attacks known to not just the public, but the world, and reveal to all the true barbarity of the Atlanta regime."
 TEX_and_we_shall_reclaim_dallas:0 "And We Shall Reclaim Dallas!"
 TEX_and_we_shall_reclaim_dallas_desc:0 "As the specter of war looms heavy, a new sense of passion has arisen within Texans. Contrasted with the hopeless defeatism of the past, much of our populace now cries out for revenge, and to reclaim what has been stolen from the Lone Star State. As the Republic readies itself for war, the resolve of our populace has proven beyond a doubt that it is a war that the Republic shall lose."
 TEX_impossible_odds:0 "A Legacy of Impossible Odds"
 TEX_impossible_odds_desc:0 "Goliad. Gonzales. San Jacinto. Throughout the Texan Revolution our brave soldiers faced the might of a behemoth and came out victorious. As we secured our independence from the Mexican Giant in 1836, more than 100 years later we shall secure our freedom from the forces of the American Republic. While some say our odds may be slim, Texans have never been known to let impossible odds stand in their way before. "
 
 TEX_eve_of_war:0 "The Eve of War"
 TEX_eve_of_war_desc:0 "As it seems, war with our neighbors to the East has become quite inevitable. As we prepare for what very well may be our nation's final battle, we look towards the wisdom of our forefathers, of Houston, of Austin, and of Davy Crockett, as well as our modern experts, for a strategy which may help Texas survive."
 TEX_fortress_austin:0 "Fortress Austin"
 TEX_fortress_austin_desc:0 "As the Capital City of the Texan Republic, securing Austin is of vital importance. Barricades, rodblocks, pillboxes and machine gun nests shall all be constructed post haste, as we endeavor to fortify the city against the incoming Republican advance. Hopefully, we can manage to do so in the time we have left."
 TEX_fortress_houston:0 "Fortress Houston"
 TEX_fortress_houston_desc:0 "As time runs out, we must take inventory of our nation's vital assets. Among the most important is the city of Houston, a bustling metroplex home to our nation's largest port. Right on the Republic's border, keeping control of this vital conurbation is of essential importance for our government. A sprawling, albeit makeshift defensive network shall be constructed with a small army of civilian volunteers and army engineers."
 TEX_molotov_cocktails:0 "Petrol Bombs"
 TEX_molotov_cocktails_desc:0 "Texans have a certain love for liquor, ranging from beer and whiskey to more contemporary poisons such as tequila. With war looming, many of our citizens have repurposed their empties from recycling bin liners into Molotov Cocktails. Makeshift weaponry has flooded the streets as angry citizens prepare to face down the Remnant occupiers for the first time since 1992. Additionally, new technology has even improved this time-honored classic, as the addition of styrofoam in the cocktail has made the once bland Petrol Bomb into an easy-to-make substitute for napalm."
 TEX_call_up_reserve:0 "Call Up the Reserves"
 TEX_call_up_reserve_desc:0 "Among our armed forces are countless reserve officers ready to be called up to serve their Republic in a time of crisis. As it seems, that time of crisis is now. The time has come for these soldiers to take their posts in defense of Texas, in hope that we may fend off the American invasion."
 TEX_leader_of_free_world:0 "The Free World's Leader"
 TEX_leader_of_free_world_desc:0 "The Canadians, along with the remains of the free world which didn't turn to Communism coalesced around the so-called 'Democratic League', the last major force in this world which continues the fight against Communism. While they have expressed favorability to the Republic's claims in the past, perhaps Ottawa can be swayed to support Texas' fight for freedom."
 TEX_enemy_of_my_enemy:0 "The Enemy of my Enemy"
 TEX_enemy_of_my_enemy_desc:0 "While the Perry Administration has held little love for Communists, the Soviet Union has proven itself surprisingly receptive of Texas' cause given their opposition to the GOP administration in Atlanta. Perhaps we could leverage their diplomatic pressure into tangible military aid for our Republic?"
 TEX_old_adversary:0 "Our Old Adversary"
 TEX_old_adversary_desc:0 "To say that Mexico and Texas have a rocky relationship can be best described as an understatement. That being said, both the Mexican Government and our nation's large Hispanic community seem to prefer Texan rule over Remnant rule. While it is clear that any support they provide would be in hopes of a weaker nation across their border to harrass or even conquer, it is also clear that our nation needs any help it can get. "
 TEX_foreign_voluneteers:0 "The Foreign Legions"
 TEX_foreign_voluneteers_desc:0 "From across the world, soldiers believing in our cause have come trickling in, offering up their services in the hope that Texas may remain free. From Communists, to anti-Atlanta militants, to soldiers from the other American breakaways hoping to weaken the Remnants, countless experienced warriors have volunteered their lives to our Republic, fighting alongside our own soldiers under the banner of the Lone Star."
 TEX_seize_civilian_weaponry:0 "Repurpose Civilian Guns"
 TEX_seize_civilian_weaponry_desc:0 "Texans are known for their love of all things firearms. While we remain staunchly supportive of our citizens' rights to bear arms, the present crisis has meant that the confiscation of certain firearms from civilians has become necessary. Hopefully we can return their rifles once this dreadful war comes to an end. "
 TEX_sam_houstons_struggle:0 "The Struggle of Sam Houston"
 TEX_sam_houstons_struggle_desc:0 "As it seems, the forces in Atlanta have shed their American claims, instead raising the banner of the fallen Confederate States of America. As we fight off the Confederate advance, we remember Sam Houston, and how fought unsuccessfully to prevent Texas from joining the Confederate States of America. History has vindicated Sam's actions, and now we shall right the wrongs wrought by our forefathers, banishing the Stars and Bars from Texas forever."
 TEX_south_wont_fall_again:0 "The South Won't Fall Again!"
 TEX_south_wont_fall_again_desc:0 "While the American Republic may be based in the heart of Dixie, make no mistake, it is a nation comprised of nothing more than Yankees and Carpetbaggers. With the remnants of the old Union looking to extinguish the flame of Dixie patriotism forever, we shall remember the struggles of our forefathers, and vow to defend Texas from American absorption so long as our banner still stands. "
 TEX_canadian_technology:0 "Utilize Canadian Technology"
 TEX_canadian_technology_desc:0 "It has come as a surprise to some that the Canadians have agreed to support our cause, going so far as to supply the Texan Military with some of their fabulously advanced military technology. This new 'Lend Lease' has provided Texas with some of the hottest new military equipment the market has to offer, supplying our disparate military in exchange for permanently staking ourselves to the Canadian cause."
 TEX_canadian_jets:0 "The Fastest Jets"
 TEX_canadian_jets_desc:0 "The battlefield of today is fought in the air, and while we may have a few talented pilots, it is rapidly becoming clear that we can't compete with the Republic's air force. With this in mind, our Canadian benefactors, as well as Aviation giants such as Boeing, Airbus and Bombardier, have pulled together to keep the Texan Air Force supplied with the latest in airborne tech."
 TEX_intranet_links:0 "Intranet Links"
 TEX_intranet_links_desc:0 "The Canadians, as one of the few nations with a fully-developed Intranet, have learned well the advantages unified networks can have for military command. As a primary supporter of our cause, the Canadian Government has authorized funding for Intranet and network expansions across the Republic. This will help our military remain cohesive, and give us an advantage over the Republic's ad-hoc communication systems."
 TEX_canadian_tanks:0 "Roll Out the Tanks"
 TEX_canadian_tanks_desc:0 "Much to our delight, the Canadian Government has agreed to supply the Texan Military with state-of-the-art armour, allowing our outdated and primarily infantry based army to break into the modern age. With the introduction of Canadian armour technology, hopefully the battlefield between Texan and Remnant troops will be a bit more even."
 TEX_american_proxy_war:0 "The American Proxy War"
 TEX_american_proxy_war_desc:0 "With the Canadians coming to the Remnant's side during this awful war, it seems that Texas has unwittingly become the newst battleground in the New Cold War. Thus, the Soviets have come to our aid in their own attempt to stop the Democratic League from gaining any ground in this new conflict. While their reasons for supporting our cause are mainly pragmatic, so are our reasons for accepting it."
 TEX_diplomatic_pressure:0 "Diplomatic Pressure"
 TEX_diplomatic_pressure_desc:0 "As the first major war on American soil in almost 20 years, the Republican/Texan war has attracted quite a bit of attention. The Soviet-dominated world has been quick to denounce the Republic's moves to re-unify the United States, and has sicced the United Nations to condemn Atlanta in turn. As well, Warsaw Pact nations have announced significant sanctions on the American Republic to further isolate them internationally."
 TEX_soviet_guns:0 "Soviet Weaponry"
 TEX_soviet_guns_desc:0 "The Soviet Union, while undeniably not on the best terms with the One Republic government, has still provided us with invaluable equipment in our fight against the Republic. Of course considering the Soviet Union's economic and political stagnation, the weaponry they provide is not as technologically advanced as ones supplied by Canada, if they can kill an American invader, they're good enough for us."
 TEX_unlikely_allies:0 "Unlikely Allies?"
 TEX_unlikely_allies_desc:0 "The Soviet Union and Texas have forged quite the strange alliance in recent months. While we remain diametrically opposed to their Communistic ideology, Texas has grown close to the various nations of the Warsaw Pact as they help us in our efforts to repel Republican attacks. As of now it seems that this is just an alliance of convenience... but who knows what the future holds."
 TEX_counter_attack:0 "The Counter-Attack"
 TEX_counter_attack_desc:0 "While we have been cowering in our foxholes ever since the Republic invaded, we believe our army is now in a state where it can begin counteroffensive operations. The time has come to show the Americans our full fury, as we slowly yet surely take back control of our territory."
 TEX_propaganda_effort:0 "Propaganda Effort"
 TEX_propaganda_effort_desc:0 "The emergence of the online web has led to a truly astounding amount of competing narratives, some more true than others. We can utilize our newfound connection to the Intranet to disseminate stories and information damaging to the Republican cause. Of course not all of the stories put out may be true, but in such a dire crisis, will anybody care about a few embellishments?"
 TEX_hispanic_recruitment:0 "Hispanic Recruitment Drive"
 TEX_hispanic_recruitment_desc:0 "Texas' Hispanic community has shown its reluctance to support our war efforts against the Republic. A near-constant slough of harassment from both civilians and law enforcements has left much of our Latino community with a profound lack of Texan patriotism. However with both their very lives under threat, and with an unofficial go-ahead from the 'Mother Country', Hispanic citizens have begun enlisting in droves to help the Texan cause."
 TEX_remnant_demonstrations:0 "Demonstrations in the Republic"
 TEX_remnant_demonstrations_desc:0 "For every citizen of the American Republic enthusiastically supporting Atlanta's efforts to reclaim their 'Rightful Territory', there is one more who abhors the tragic loss of life and carnage wrought in a false effort to reclaim a shattered dream. Those who can't stand to see their brothers, cousins, neighbors and friends in Texas on the wrong end of the bayonet have taken to the streets to voice their disapproval to President [USA.GetLeader]. Of course, small acts of sabotage will go a long way when they refuse to listen..."
 TEX_bush_delegation:0 "The Bush Delegation"
 TEX_bush_delegation_desc:0 "As the calls for peace grow to roar, a very special delegation has been sent to Atlanta in hopes of ending this horrible conflict. Who better to lead the Texan delegation than the son of the 'Great Leader' himself, George Walker Bush. This failed Presidential candidate turned Baseball Manager has come to think of himself as a true Texan, and will plead with [USA.GetLeader] to end this rotten conflict for the good of all Americans and once-Americans. Hopefully they will listen... After all, who could say no to a Bush?"
 TEX_cain_and_abel:0 "Cain and Abel"
 TEX_cain_and_abel_desc:0 "Of all things that could end this war, most would assume it to be a face-to-face meeting between brothers about the future of Texas. Tragically, it seems that not even the power of family could end this war. If pleas of John Ellis Bush's own brother were not enough to sway his opinion on the war, then it truly seems that nothing will. As George Walker Bush returns to Houston, it has become clear to all that the son of George H.W. Bush himself has chosen his nation over his very family... A noble sacrifice indeed."
 TEX_jeb_defection:0 "The Defection?"
 TEX_jeb_defection_desc:0 "While the American Republic claims to be the true inheritor of the Bush Legacy, two subsequent defeats of Bush kin at the ballot box by Donald Rumsfeld seems to suggest otherwise. Embittered just like his brother after failing to secure the nomination in 2002, some have suggested that George W. reach out to his brother about the possibility of defecting to Texas. If we were to have both Bush brothers on our side, then perhaps we could use the 'Bush Cult' to our advantage."
 TEX_the_man_who_made_peace:0 "The Man Who Made Peace"
 TEX_the_man_who_made_peace_desc:0 "Citizens of both the Republic and Texas shed a tear of joy as [USA.GetLeader] and George W. Bush exit the negotiating table. As it seems, the power of family and friendship has ended the American-Texan conflict once and for all. With hostilities ceasing, all citizens of our great nations can take pride in the forces of peace and love triumphing over those of war and hate. George W. Bush shall forever go down in history as the man who put his family, his reputation and indeed his very life on the line to make peace between our two nations."
 TEX_whole_once_more:0 "Whole Once More"
 TEX_whole_once_more_desc:0 "Remnant Strategists said they'd take Austin in twelve hours. More than a year later, we have banished them from Texas wholesale. Life's funny that way.\n The staggering humiliation faced by the American Republic has stunned the world over, and has made every claimant to the old United States think twice about invading their neighbors."
 TEX_david_and_goliath:0 "When David Defeated Goliath"
 TEX_david_and_goliath_desc:0 "The collapse of the Republic's military forces proved to all the world's small nations that they can stand up against the bullying of foreign powers. David has defied the will of Goliath, and Texas has retained its independence. This stunning victory has galvanized our neighbors who too feared that their neighbors may look towards them with drawn swords."
 TEX_remove_collaborators:0 "Excise the Collaborators"
 TEX_remove_collaborators_desc:0 "Laden within our nation are hundreds if not thousands of compradors who gleefully did the dirty work of the Republican occupying forces. Some of them went along with it out of pragmatism, others out of devotion, but no matter their motivations, they remain as a cancer which must be excised."
 TEX_dallas_reclaimed:0 "Dallas Reclaimed!"
 TEX_dallas_reclaimed_desc:0 "We went into this war expecting our own obliteration, however now that the guns fall silent, it seems as if we have not only survived, we have managed to take back part of our former territory. Republican forces have been driven from the Dallas-Fort Worth Metroplex, putting control of this invaluable area firmly back in Texan hands. While much of East Texas remains under the Jackboot, our successful reclamation of Dallas serves as a worthy consolation prize until Texas can be fully reunited."
 TEX_looking_east:0 "Looking East"
 TEX_looking_east_desc:0 "Our victory in Dallas has proved that the American Republic is in fact beatable. While much of our state still remains under American occupation, the recent peace settlement has given us a vital opportunity to shore up our supplies and prepare for future military endeavors.Hopefully, when all said and done, the Republic's forces will have been banished from the Lone Star State for all eternity."
 TEX_our_time_will_come:0 "Our Time Will Come"
 TEX_our_time_will_come_desc:0 "Unfortunately we were not able to reclaim our territory from the American Republic. Thankfully, the Texan nation has managed to escape with only meager wounds, as our territorial integrity, while badly damaged from decades of American incursions, has not degraded further. Texas has managed to survive as an independent nation, and while we have no doubts that Atlanta will soon attack us once more, at least Texans can take pride in the fact that we defied the Republican giant and lived to tell the tale."
 TEX_jingoistic_fervor:0 "Renewed Jingoism"
 TEX_jingoistic_fervor_desc:0 "The war with the Republic has led to an explosion in nationalistic rhetoric, particularly focused on Texas' separate identity to the American Republic. This newfound Jingoistic fervor has been actively encouraged in our Republic's mission to increase military recruitment; hopefully leading one day  to a successful push to reclaim our lost territory."
 TEX_lessons_of_the_war:0 "Lessons of the War"
 TEX_lessons_of_the_war_desc:0 "The Republican/Texan war, as the first major war on American soil since the dissolution of the United States, has served as an important study in the modern battleground. The emergence of new technology, combined with changing attitudes and strategies have been credited for helping Texas fend off the American advance, and has allowed every modern military, including our own, to adapt and learn from the Republic's failures, and Texas' successes."
 TEX_mexican_negotiations:0 "Mexican Negotiations"
 TEX_mexican_negotiations_desc:0 "During the 20 years of occupation, the Mexican Government seems to have developed a serious case of buyer's remorse around their acquisition of the southern portion of Texas. Riddled with partisans and Cartels, much of South Texas continues to exist outside the Federal Government's control. Perhaps we can negotiate to take the territory off their hands?"
 TEX_reclaim_south_texas:0 "Reclaim South Texas"
 TEX_reclaim_south_texas_desc:0 "The slump our nation has been in for the last 20 years has finally come to an end. Texas has picked itself up, dusted itself off, and proven to the world that it is not a force to be trifled with. The time has come to show our newfound prowess to the Mexicans, who continue to occupy the southern portion of our nation. Our battle-hardened military force will make quick work of the disorganized Mexican forces as they endeavor to reclaim Texas' rightful territory."
 TEX_collabs_fate:0 "Fate of the Collaborators"
 TEX_collabs_fate_desc:0 "During the occupation of South Texas, countless denizens, primarily of Mexican-American origin, chose to collaborate with Mexican authorities instead of siding with the Texan resistance. While some have demanded that these collaborators be punished for their insolence, others have suggested a much more pragmatic approach. Regardless, a final decision around this matter must be made, lest tensions with the Hispanic community reach a boiling point."
 TEX_smooth_hispanic_tensions:0 "Smooth Hispanic Tensions"
 TEX_smooth_hispanic_tensions_desc:0 "Race related riots were the primary reason Mexico intervened in South Texas, permanently setting back relations between Texas' vast Latino community and the remainder of Anglo Texans. While Southern Texas is now once more in Texan hands, tensions with the Hispanic community have begun to flare up once more. On one side, some Mexican-Americans resent their return to 'Second Class Citizens', on the other, some Anglo Texans feel negatively towards the community for spurring the original invasion. An amicable solution to this issue must be found - and fast." 
 TEX_new_border:0 "Renew the Border"
 TEX_new_border_desc:0 "As the Rio Grande falls back in Texan hands once more, a question of what to do with the Mexican border has been raised. In the years since the occupation of South Texas, trade and commerce has made the border between the regions quite fluid, and establishing a hard border may cause economic disruption. However some have begun to pressure the Border Patrol to take a harsher stance, possibly even constructing a wall on the Mexican border; both to stop the flow of migrants and to protect against a possible second invasion."
 TEX_dont_mess_with_texas:0 "Don't Mess with Texas!"
 TEX_dont_mess_with_texas_desc:0 "For almost 20 years Texas was bullied by our two neighbors, who picked off pieces of our territory like vultures. Yet now as we stand whole once more, an old adage has been proven true: Don't Mess with Texas. Our Lone Star State is back to its heyday prime, our borders restored to their iconic shape. A lesson has been seared into the minds of Atlanta and Mexico City, the lesson that Texas is no small nation to be trifled with. They messed with Texas, and now they are paying the ultimate price."
 
 TEX_republican_submission:0 "Republican Submission"
 TEX_republican_submission_desc:0 "We cannot hope to win a fight against the Remnants. The only hope for the survival of our Republic is to grovel to Atlanta in hopes that they may show us mercy. President Perry has made a shock 180, and after days of intense negotiations, it seems we have finally secured a deal that will keep the Republic out of our affairs forever."
 TEX_meet_with_usa_leader:0 "Meet the President"
 TEX_meet_with_usa_leader_desc:0 "As we seek to redefine our relationship between Texas and [USA.GetName], then we must formally meet with President [USA.GetLeader] to settle our differences. This meeting shall mark the beginning of a new era of Texan-Remnant relations, and set us on the course for true prosperity and freedom under the Eagle's wing."
 TEX_claw_back_nationalist_rhetoric:0 "Claw Back Nationalist Rhetoric"
 TEX_claw_back_nationalist_rhetoric_desc:0 "Rick Perry was elected on a wave of nationalist fervour, however in the face of annihilation, the President has been forced to radically change course. The time has come to claw back our Nationalist rhetoric, embrace a certain ideal of Texan-American patriotism, and help Texans un-learn all the brainwashing about Atlanta being an evil oppressor."
 TEX_dissolve_one_republic:0 "Dissolve One Republic"
 TEX_dissolve_one_republic_desc:0 "One Republic is a party fundamentally incapable of existing within our new Atlanta-friendly order. President Rick Perry has formally announced that One Republic is no more. Until a new collaborative entity can arise in its place, Perry, along with his cabinet of newly-minted pro-Remnant officials, shall rule as independents, dedicated to cooperation with American authorities."
 TEX_restore_the_gop:0 "Restore the GOP"
 TEX_restore_the_gop_desc:0 "The Texan Republicans dissolved in the aftermath of 1989, the only self-proclaimed 'Republicans' left in Texas being Remnant loyalists in East Texas or more local homegrown collaborators hoping to keep the Bushist torch alight. Regardless of Atlanta's own relationship with the GOP, the Texan Republican Party is the epicenter of Collaborationist thought within Texan territories. The time has come to make the GOP's return official."
 TEX_pardon_moderates:0 "Pardon Separatist Moderates"
 TEX_pardon_moderates_desc:0 "Those capable of pragmatically recognizing the situation between us and Atlanta are capable of being trusted within the Texan apparatus of state once more. Hardline terrorists that have popped up in the wake of Atlanta's takeover must be destroyed with extreme prejudice, however those with the judgement to support Texan independence under America's thumb remain valuable assets for us." 
 TEX_blanket_pardon:0 "Pardon the Terrorists"
 TEX_blanket_pardon_desc:0 "The Terrorist threat is over now, and with the American Scare coming to an end, we can at last come to re-evaluate those caught up in the anti-Remnant witchhunts. We have at long last realized that those brave American-Texans fighting the One Republic Deep State aren't villains, they're heroes. The time has come to release the Political Prisoners of the One Republic years, and welcome with open arms our pro-American brethren."
 TEX_crush_seperatists:0 "Crush the TNO"
 TEX_crush_seperatists_desc:0 "The Texan Nationalist Organization has gone from a banal patriotic organization into a hardened Terrorist organization ever since the Federal Government took over Texas. By mobilizing the Texan Rangers, along with help from Atlanta's FBI, we can begin rooting out the Separatist Terrorists that still continue their futile efforts against the guidance and mercy of the American Republic."
 TEX_truth_and_reconciliation:0 "Truth and Reconciliation"
 TEX_truth_and_reconciliation_desc:0 "Both sides can admit that they got a tad carried away during the last ten years. Remnant officials are already travelling to Texas to apologize for their roles in various deadly Terrorist attacks, as those behind them continue to be brought to justice with help from CIA documents. This gesture of goodwill and ability to admit wrong has gone a long way in changing the narrative that the Remnants are nothing more than heartless conquerors."
 TEX_kick_the_dog:0 "Kick the Dog"
 TEX_kick_the_dog_desc:0 "Every drop of blood shed in the campaign to restore Texas to the Remnant fold was worth the price. At long last, we have realized that Page was a hero for his brave campaign to squash the arrant One Republican hordes. The time has come to change the narrative, and spread the truth that the true guilty party wasn't Page - it was One Republic."
 TEX_nationalism_fades_away:0 "Nationalism Fades Away"
 TEX_nationalism_fades_away_desc:0 "As fierce as Texas' spirit of resistance was, it is simply no match for the overwhelming force of the American forces. Texas is settling into its new niche nicely, a natural partner to their brothers in the South, a vital part of the new American effort. While Texans may shed a tear at the Stars and Stripes flying above their heads, with time they'll realize that being American is better than being dead."
 TEX_texas_act:0 "The Texas Act"
 TEX_texas_act_desc:0 "America has withdrawn to decide the fate of Texas. All we can do is wait until they make their decision. Hopefully Atlanta extends us mercy, and allows us to keep at least a shred of self-governance and self-respect."
 TEX_currency_union:0 "A Currency Union"
 TEX_currency_union_desc:0 "Atlanta has decided that the best way forward for the Texan economy is for Texas to adopt the American dollar. The phaseout of the Texan dollar is to begin swiftly. Denizens will be given three years to surrender former Texan dollars to be converted into new legal tender - even if die-hard Texan nationalists would rather hang on to worthless paper than exchange it for equally-valued American dollars. In hopes of avoiding this, all existing stores of Texan currency are ordered to be destroyed by burning."
 TEX_the_new_dollar:0 "A New Dollar"
 TEX_the_new_dollar_desc:0 "Atlanta has decided to avoid the hassle of converting our currency to the American Dollar. From here on out the Texan Currency shall only be pegged to Atlanta's greenbacks instead of having Texan dollars burned in the street. Economists have expressed dismay at this course of action considering that the Texan dollar nowadays is barely worth the paper its printed on, but if it avoids every dumb son of a bitch from Albuquerque to Waco holding onto their worthless Texan dollars like their first born child just to spite Atlanta, we'll say it has all been worth while."
 TEX_new_national_guard:0 "The New National Guard"
 TEX_new_national_guard_desc:0 "Texas' Army has been ordered to stand down at once. Instead of maintaining our own independent Armed Forces, Texas shall simply maintain an auxiliary force staffed and commanded by Forces on loan from the American Republic. Our army is understandably furious, however given the looming threat of intervention, it appears that we have no other choice than to accept American oversight over Texan armed forces, just like before '87."
 TEX_atlantas_tutelage:0 "Atlanta's Tutelage"
 TEX_atlantas_tutelage_desc:0 "Naturally the prospect of restoring Texas' army with a National Guard force utterly subservient to Atlanta has not gone over well with Remnant counterparts in Austin. Fearing that the fragile peace between Texas and the American Republic could fall apart any second if they go too far in imposing Remnant will on Austin, the decision has been made to allow Texans to maintain the independence of their own armed forces."
 TEX_legal_independence:0 "Legal Independence"
 TEX_legal_independence_desc:0 "Atlanta has allowed us *some* amount of leeway in deciding our own legal affairs. Lawmakers have been recessed to decide upon a new Texan Constitution, and while Atlanta maintains veto power over whatever we draft if they find it disagreeable, we are still the ones in charge of drawing up the new legal framework for Texas - not the Republic. This compromise will hopefully satisfy both parties."
 TEX_judicial_subservience:0 "Judicial Subservience"
 TEX_judicial_subservience_desc:0 "Unfortunately, it appears that the decision has been made to ensure that American Laws will take precedence over Texan laws. A great deal of legal resistance is expected from the Courts, so we should be prepared to deal with that once our Legal system inevitably grounds to a halt. Hopefully with some support from Atlanta we can get this whole kerfuffle sorted out in a reasonable amount of time."
 TEX_status_quo_in_the_courts:0 "Status Quo in the Courts"
 TEX_status_quo_in_the_courts_desc:0 "Why fix what ain't broken? Texas' legal system has proven to be just fine as it is. Much to the President's delight, Atlanta has decided to allow Texas to maintain its current legal system mostly untouched, with the President stating that Atlanta would only wish to intervene in certain high-profile legal matters. We greatly appreciate the Republic's lenience in this delicate matter."
 TEX_restored_red_scare:0 "The New Red Scare"
 TEX_restored_red_scare_desc:0 "Pinko Commies are plotting to destroy our Lone Star State and our gracious Remnant benefactors. The time has come to mobilize our forces, enforce the Prevention of Communism act, and root out any remaining resistance to Remnant rule. Communism cannot be allowed to exist in Texas. Our Texas Rangers and on-loan FBI agents will assist in identifying any suspected Communist Agents, and swiftly taking care of them, either by imprisonment or deportation."
 TEX_the_sister_republics:0 "The Sister Republics"
 TEX_the_sister_republics_desc:0 "Through much hard work, we have at long managed to smooth out the bad blood that has existed between our nations during the last 20 years. Now, the Texan people see the Remnants not as a threat to the Texan way of life, but rather as a fellow ally in the struggle against Godless Liberalism and Communism. The truth has at last been revealed - the Americans are not our enemies, rather our enemies are the insidious forces of Communism that crawl around in the underworld like cockroaches. The Remnants rather our our brothers in the common struggle to restore the soul of America."
 TEX_fate_of_perry:0 "The Fate of Perry"
 TEX_fate_of_perry_desc:0 "Perry has proven to be quite the willing collaborator and asset to Atlanta's agenda, however his history of Texan nationalism has made many weary about the prospect of him continuing as leader of the State of Texas. The Remnants are locked in a discussion regarding Rick Perry's political future - as the question of whether Perry is the best choice to lead a loyal Texas is settled behind closed doors in Atlanta. The question must be answered, has Perry proven his worth? Or is it time to replace Perry with someone truly dedicated to the cause."
 TEX_president_patrick:0 "President Patrick"
 TEX_president_patrick_desc:0 "A cold sweat has run over Austin as Daniel G. Patrick, perhaps the most rabidly hardline of the Collaborationist Cabinet, has been sworn in as 10th President of the Republic of Texas. Before joining the Republic of Texas Proper, Patrick served as the Governor of the Remnant State of East Texas, and thus has a position towards Texan nationalism that can best be characterized as somewhere between 'strategic disdain' and 'open contempt'. Bentsen rolls in his grave..."
 TEX_intense_social_conservatism:0 "Red, White, and Blue Terror"
 TEX_intense_social_conservatism_desc:0 "The future of Texas is not going to be safeguarded by rinky-dink Sheriffs in their Cowboy hats and dusty boots, it's going to be forged by FBI agents in Visors and Riot Shields. The Texans have not taken kindly to the 'Occupation', and if they aren't willing to peacefully coexist with their American benefactors after all the generosity they have shown, then drastic measures must be taken. Cracked teeth and blood on the sidewalks is the price that disloyalty must pay."
 TEX_tear_down_the_lone_star:0 "Tear Down the Lone Star"
 TEX_tear_down_the_lone_star_desc:0 "Texan Independence is a vile concept pushed by Separatists and neo-Confederates, and it has no place in Texas any longer. The time has come to destroy the pathetic remains of the Texan Nationalist movement, divorce ourselves from the 1836 Republic of Texas, and reforge Texas' identity not around the failed ideas of Texan Rebellion and Separatism from Washington, but rather as an integral part of the American Experiment."
 TEX_election_puppeteering:0 "A Controlled Government"
 TEX_election_puppeteering_desc:0 "To keep Texas safe from Communists and Separatists, then fortifying our Elections must be a top priority for the Patrick Administration. By strangling the Opposition in new regulations an Red Tape, we can ensure that a cohesive opposition never forms, while also avoiding more *open* means of outright Election Fraud. This shall allow us to preserve some means of Democratic Legitimacy, while also diffusing the possibility of dangerous anti-Atlanta candidates being elected."
 TEX_surveilence_grid:0 "Comprehensive Surveillance Grid"
 TEX_surveilence_grid_desc:0 "Texas oozes discontent, as the Populace, still seeing the Remnants as a hostile occupying force rather than Liberators from their Separatist hell. To crack down on dissent, Langley has loaned us some of their best and brightest, helping to both infiltrate dangerous Separatist movements, and expand access to information for law enforcement. Texas shall be ensnared in a great digital web, with cameras on every corner. With eyes everywhere, sooner or later, Subversive movements shall become impossible."
 TEX_slavish_devotion:0 "Slavish Devotion to the American Cause"
 TEX_slavish_devotion_desc:0 "With generous assistance from the CIA, we have been able to change the narrative significantly, but treasonous Anti-American thought crimes remain sickenly common within the populace. Their minds must be changed, their way of thinking must be... fixed... We cannot abide Treason. We are the strongest Soldiers of the Post-United States. Our lives for you, [USA.GetLeader]."
 TEX_piece_of_the_puzzle:0 "A Piece of the Puzzle"
 TEX_piece_of_the_puzzle_desc:0 "Atlanta saved Texas in the darkest period of our nation's existence. Those who do not wish to repay the greatness of the United States are traitors who have more in common with the Communists than the rest of their brethren in the Deep South. At long last, Texans no longer think of themselves as Rebels separate from America, but as integral parts of the Greatest Nation that has ever existed or will exist, loyal citizens of the United States, ready to perish for the Red, White and Blue."
 TEX_president_abbott:0 "President Abbott"
 TEX_president_abbott_desc:0 "Among those who relocated from East Texas to RoT once Perry opened the door to Remnant loyalists was one Gregory Wayne Abbott, notable law clerk, cripple, and GOP Politician, who has now been selected by his superiors in Atlanta to lead a 'moderate' Collaborationist Government. While still loyal to Atlanta's machinations, Abbott is at the end of the day still a proud Texan who will ensure a balance between the interests of Atlanta and Austin."
 TEX_conservative_ethos:0 "A Shared Conservative Ethos"
 TEX_conservative_ethos_desc:0 "One thing both Texans and the Remnant populations can agree upon is the Conservative values in which we hold dear. A mutual love of faith and family shall serve as the basis for a newfound brotherhood between our two peoples. Some good ol' Gay-Bashing should give both Austin and Atlanta something to talk about, because if we are both united in our shared hatred, then who will even be able to remember decades of bad blood?"
 TEX_nationalist_compromise:0 "Co-Opt Texan Nationalism"
 TEX_nationalist_compromise_desc:0 "Some would think that the ideals of Texan nationalism would be at odds with the Remnant mission of restoring the United States. Quite the opposite is true, in fact. The Americans have realized that Texas is a distinct culture still American in spirit, but having earned its right to stand on their own two feet. But the rest of the country? Occupied by artificial abominations such as the 'Great Lakes Union' and the 'Union of the Heartlands?', these nations have no right to exist. Unlike Texas, these countries have no such heritage of independence."
 TEX_safer_elections:0 "Illusions of Legal Legitimacy"
 TEX_safer_elections_desc:0 "Keeping up the act that Texas is a true Representative Democracy is vital in keeping Abbott's Government afloat with the average Texan. Although we have agreed with Atlanta's conclusions that fully free Elections would lead to Separatists quickly seizing the mechanism of power, going through the motions of Democracy, and ensuring our means of securing power, such as Gerrymandering, are fully legal, it is sure to buy us some good will. Let's contact our boys at Langley, the CIA's bound to know a thing or two."
 TEX_stronger_police_force:0 "Independent Ranger Force"
 TEX_stronger_police_force_desc:0 "We appreciate the FBI's help in cracking down on malcontents, but we can respectfully take it from here. Paxton and his Texas Rangers, clad in fancy new boots and hats paid for with Atlanta's dollars, have the situation covered. An independent Texan Police force will be even more efficient in destroying the remains of Anti-American organizations here in Texas than an organization still viewed by many as 'Foreign Occupiers' would be. The Remnants would be surprised. They could even learn a thing or two from Paxton."
 TEX_enforce_the_americans_with_disabilities_act:0 "Enforce the ADA"
 TEX_enforce_the_americans_with_disabilities_act_desc:0 "Greg Abbott is unique in his status as Texas' first wheelchair-bound President, having become paralyzed after having his legs crushed by a tree in 1984. It is shameful that Texas has ripped up portions of the Americans With Disabilities Act in the wake of the Great Collapse. As we adapt to Remnant law, President Abbott has given special attention to the legal matter of disability rights."
 TEX_partnership_with_atlanta:0 "The Republic and the Republic"
 TEX_partnership_with_atlanta_desc:0 "It is clear that the best way forward for Texas is not an occupation imposed on us by outside forces, but rather empowering us to see that our goals with [USA.GetNameDef] are the same. Here in Texas we fight for faith and family - the same struggle as our brothers in Atlanta. A unity of shared purpose has allowed us to shed our foolish hatred and realize our status as brothers in the American struggle - a chick under the American Eagle's wing."
 TEX_perry_remains:0 "Perry Remains"
 TEX_perry_remains_desc:0 "The consensus among our overlords in Atlanta is one that can best be summed up with the phrase 'If it ain't broke, don't fix it'. Rick Perry has proven himself a capable collaborator, threading the needle between naked Collaborationism and true Texan Values. With it being decided that changing course in leadership would lead to unnecessary complications, it seems that Rick Perry, backed by his Atlantan benefactors, is set to remain as leader of the Republic of Texas for the foreseeable future."
 TEX_peace_development_anti_communism:0 "Peace, Development, Anti-Communism"
 TEX_peace_development_anti_communism_desc:0 "The Texan People will slowly and steadily learn to love our new American underwriters. The best way to do so is to provide new jobs, fresh new infrastructure, lower taxes and higher wages. By giving our backers a more 'Human' face in the forms of substantial investments, we shall slowly yet surely win hearts and minds - showing that the Americans are not villains, but rather staunch allies willing to help Texas unleash its potential."
 TEX_appeasing_atlanta:0 "Currying Atlanta's Favour"
 TEX_appeasing_atlanta_desc:0 "Performative loyalty is what our gracious champions crave. Statues must be constructed in the Founder's honour, TV programs must preach the Remnant message, every sentence that exits Rick Perry's mouth must contain [USA.GetLeader]'s praise. We must breathe submission, we must allow ourselves to see ourselves not as individual Texans, but as soldiers in the new American experiment, working to make the American Dream into reality once more."
 TEX_return_to_bushism:0 "Return to Bushism"
 TEX_return_to_bushism_desc:0 "While we were once blind, our eyes are now open to the fact that George Herbert Walker Bush was the greatest Texan who has ever lived. The time has come to at last embrace the Bushist ideology, realizing that he was not the warmonger and supposed 'False Texan' that our old history books so-often portrayed him as. Regardless of Atlanta's position on the 'Founder', bringing the Bush Cult to Texas will aid in our integration into the American way of life."
 TEX_shrinking_the_new_government:0 "Shrinking the New Government"
 TEX_shrinking_the_new_government_desc:0 "The fundamental reorganization of the Texan Government has allowed us to re-evaluate the needs for certain Government Agencies. As Atlanta takes care of more and more Texan matters, we can at last abolish certain agencies with uses that have become depreciated. These agencies could barely justify their own existence even before Atlanta took over. Now, it's just silly to keep them around. The time has come to abolish the Departments of Commerce, Education and the um, um..."
 TEX_convinient_nationalism:0 "Convenient Nationalism"
 TEX_convinient_nationalism_desc:0 "The issue of Texan nationalism is a controversial one. Perry's superiors in Atlanta have neglected to give him an opinion on how far the new GOP's commitment to Texan Nationalism should go. Thus, the President is forced to improvise, taking a position that upholds Texan nationalism when our ideals stand in conflict to the ideals of Communism and Liberalism, while also denouncing the Separatists when it comes to our relations with Atlanta."
 TEX_the_republic_and_the_republic:0 "A Partnership With Atlanta"
 TEX_the_republic_and_the_republic_desc:0 "We have earned our respect from Atlanta. Through gestures of loyalty, Rick Perry has shed his old shame as a Separatist provocateur, and has instead embraced his new role as Atlanta's strongest lackey. Our place in the new post-American order has been forged in shared brotherhood with Atlanta. In one voice we have declared ourselves not to be adversaries of America, but as brethren, separate from the United States, yet still intrinsically linked."
 TEX_purge_remaining_democrats:0 "Dissolve the DNC"
 TEX_purge_remaining_democrats_desc:0 "While we have already enforced the Communist Control Act of 1952 is long, Socialists and insidious Liberals still freely organize within the Lone Star Republic. The time has come to bring down the fury of the Bald Eagle on those who wish to undermine the Texan way of life, be it through the Electoral system, or through brazen underground resistance and sabotage. The time has come to end the so-called 'Democratic Party in Texas'. Their treason cannot be allowed to stand."
 TEX_a_loyal_education_system:0 "A Pro-American Education System"
 TEX_a_loyal_education_system_desc:0 "The last generation of Texan schools have bred a generation of America-hating Separatists. The cancer of Public Education is spreading through Texas, and we need to do all in our power to stop it. School Vouchers and additional Privatization efforts shall help clamp down on left-wing lunatic teachers brainwashing our children, while a new American-designed curriculum shall help set the record straight on the nation's true history."
 TEX_a_christian_texas:0 "God in Heaven - Texas on Earth"
 TEX_a_christian_texas_desc:0 "Homosexuals and Abortion-Lovers have no place in the God-Fearing society that we aim to build here in Texas. While Sodomy is still illegal in Texas, this ban has often gone unenforced. The time has come to at last enforce true morality and the Law of God here in Texas, and with the help of Attorney General Paxton, we shall do as such without hesitation. Sinners have no place in God's Kingdom."
 TEX_an_american_sattelite:0 "Under the Eagle's Wing"
 TEX_an_american_sattelite_desc:0 "At long last, the final vestiges of disloyalty and Wrongthink have been wiped from the Longhorn's face. The cause of Texas is dead - buzzards flying overhead. We, in one voice, have declared ourselves to be not just Texans, but fellow warriors of the greatest nation that has ever existed, the United States of America - and as the foolish separatist delusions depart, we can work to at last raise America from the grave."
 TEX_forefit_east_texas:0 "Forefit East Texas"
 TEX_forefit_east_texas_desc:0 "After so many years, it has become clear that East Texas is closer to the American Republic than they are to the rest of our nation. Our silly notions of reclaiming this territory ought to be put to rest once and for all. The time has come to recognize East Texas as rightful Remnant Territory."
 TEX_dallas_compromise:0 "The Dallas Compromise"
 TEX_dallas_compromise_desc:0 "The Americans have proven less than receptive to returning Texan Territory in the East. Indeed, it appears that working to reclaim East Texas through peaceful means is going to be easier said than done. Perhaps we can convince Atlanta to agree to a more reasonable compromise. Let's propose a return of Dallas to Texas, a solution which would allow both parties to walk away with some dignity."
 TEX_end_the_occupation:0 "End the Occupation"
 TEX_end_the_occupation_desc:0 "The Americans promised that if we peacefully submitted to their rule then a return of East Texas may be in the cards. Well, it's time for Atlanta to make good on their promise. Now that the entirety of Texas remains unflinchingly loyal to the wills of the Federal Government, there is no point to a continued Remnant occupation of East Texas. Let us formally barter for the region's return."
 TEX_republican_war_effort:0 "Oil For the American War Machine"
 TEX_republican_war_effort_desc:0 "At last our brothers in the South have begun their crusade to reclaim the mantle of America. May their victory be swift! To aid them in this righteous cause, we shall provide the Remnants with a generous supply of oil, piggybacking on existing American control of the Texan Oil Industry to grease the wheels of the American War Machine."
 TEX_demand_south_texas:0 "Demand Mexico Return Occupied Territories"
 TEX_demand_south_texas_desc:0 "$TEX_demand_south_texas_desc$"
 TEX_hispanic_crackdown:0 "Crackdown on the Hispanic Fifth Column"
 TEX_hispanic_crackdown_desc:0 "The 1988 war has proven that Tejanos cannot be trusted. To prevent another costly uprising by Latinos in South Texas, additional law enforcement and Army units will be stationed in the area, and new codes will help crack down on disloyalty among communities close to the Mexican Border. Never more shall we allow the Mexicans to catch us off guard, be them on the Texan side of the border, or the Mexican one."
 TEX_enforce_the_border:0 "Fortify the Border"
 TEX_enforce_the_border_desc:0 "$TEX_new_border_desc$"
 
 TEX_america_lives_america_lived_america_will_live:0 "America Lives! America Lived! America Shall Live!"
 TEX_america_lives_america_lived_america_will_live_desc:0 "The Long Struggle is over. With our help the Remnant mission has succeeded. At last, the greatest tragedy of the 20th Century has been avenged. On that fateful day in 1987, when Reagan's words echoed throughout the nation, many thought that the era of the United States had come to an end. Today, they have been proven wrong. The United States are at last united once more, and now, Texas and America move forward together against the backdrop of a troubled world."
 TEX_complete_the_integration:0 "Completing the Process"
 TEX_complete_the_integration_desc:0 "With America restored to its former glory, there is no reason for Texas to continue on as an independent nation. The time has come to at last bring Texas back into the fold of the United States. Long live the State of Texas!"
 TEX_to_those_united_states:0 "To Those United States"
 TEX_to_those_united_states_desc:0 "Through our loyalty we have secured our own place in the new American order. Through the blood shed on the Alamo we have earned our identity as separate from the rest of the false claimants to the old American identity. We stand intrinsically linked to our brethren in Washington - yet above all, we are still Texans."
 TEX_the_american_sattelite:0 "An American Satellite State"
 TEX_the_american_sattelite_desc:0 "With re-integration with the United States off the table, Texas has accepted its role as an American Satellite State - a nation which while not part of the new USA, not in America, but perpetually in its orbit. This arrangement will allow Texas to retain a certain degree of independence and autonomy, while also contributing to American strategic aims."
 TEX_a_prescence_in_the_united_nations:0 "A Presence in the United Nations"
 TEX_a_prescence_in_the_united_nations_desc:0 "Now that America's back on the world stage, it is only natural for Texas to follow suit. With the new United States by its side, Texas shall return to the United Nations as a voice to back up American objectives on the international stage. While many nations have attempted to withdraw our UN Recognition in the wake of America's recognition, [USA.GetLeader] continues to recognize Texan Independence despite our nation's subservient nation."
 TEX_further_economic_integration:0 "Further Economic Integration"
 TEX_further_economic_integration_desc:0 "Expanding Economic links between Texas and the new United States will be good for both of our nations. New Investment in Texas by American firms shall be repaid with favourable Oil Prices for America. This relationship will keep Texas tightly integrated into the American sphere while also allowing American prosperity to trickle down into Texas."
 TEX_integrated_security_services:0 "Integrated Security Services"
 TEX_integrated_security_services_desc:0 "The Texas Rangers, and the FBI. The TCIS and the CIA. Every American three-letter Agency has a counterpart in the Texas, a counterpart which would greatly benefit from the knowledge and expertise of the other, and vice-versa. Maintaining working links between the Texan and American Intelligence and Law Enforcement apparatuses will help prevent Crime, Terrorism, and worst of all, Dissent."
 
 TEX_continue_the_fight:0 "The Evacuation"
 TEX_continue_the_fight_desc:0 "Atlanta may have fallen, but the vision of the Remnants continues to live on here in the Lone Star Republic. [USA.GetLeader], fresh from their flight from the burning wreck of Atlanta, has declared [TEX.GetLeader] to be the new leader of Free America. Here in Texas, the struggle to free America from the demonic forces of Communism forges on, no matter how long the odds may seem. God help America..."
 TEX_atlantas_minds:0 "Atlanta's Minds"
 TEX_atlantas_minds_desc:0 "The Fall of [USA.GetNameDef] has sent countless brilliant military officials packing. While not everybody had a chance to evacuate in time, a steady trickle of sympathetic Military officials has solidified our new Military's prowess as we seek to battle those who have stolen the reclamation of the American dream from us. With some luck, they'll help whip the Texan Military into shape so we can get back at the [365.Owner.GetAdjective] Bastards."
 TEX_atlantas_machines:0 "Atlanta's Machines"
 TEX_atlantas_machines_desc:0 "While much of America's financial core headed for Canada after the Great Collapse, the American Republic was not without a formidable industrial core of its own. During the Exodus from a collapsing South, the Remnant titans of Industry were sure to slash-and-burn anything of even remote value to ensure our would-be conquerors were in no position to use it against us. Now, we shall rally, with whatever meager finances and connections we have left to ensure that the struggle continues on in Texas."
 TEX_atlantas_connections:0 "Atlanta's Connections"
 TEX_atlantas_connections_desc:0 "The CIA still has enough paperwork and deep-cover agents to keep up a formidable Intelligence Core despite the sustained humiliation of the Remnant regimes. The time has come to call on every single connection we have left, cash in every favour we still have, extend every last line, all to delay oblivion by even a single day. Our situation is bleak, but if we open every Pandora's Box we have left in reserve, we may be able to land on our feet one final time."
 TEX_avenge_atlanta:0 "Avenge the Remnants"
 TEX_avenge_atlanta_desc:0 "While the odds are long, we can no longer afford to sit on our asses and let Communists subsume more of America. With everything we have left, we shall strike at the rotten core of the American Revolution. [365.Owner.GetNameDef] will feel the full fury of the Lone Star State as we deliver a furious death blow to those who destroyed America's final hope of salvation. We cannot lie, the odds don't look too good - however with the indomitable Texan Spirit, we shall deliver a final decisive victory."
 TEX_finish_the_job:0 "Finish the Job"
 TEX_finish_the_job_desc:0 "Now that we have reclaimed Atlanta from the thugs that have illegally occupied it for so long, we can at last complete the Remnant dream of restoring the American Dream. Separatists may shudder, and Remnant officials may roll their eyes, but as it stands, it is now Texas' job to free the once-United States from the scourge of Socialism and Separatism. Keep your guns in their holsters, because it's time for Texas to go all America over everybody's asses."
 TEX_solidify_the_union_state:0 "Solidify the Union State"
 TEX_solidify_the_union_state_desc:0 "Against all odds, Texas has managed to single-handedly raise the United States from the grave. However our goal is not to repeat the trappings of tried-and-failed systems that first led to the 1987 catastrophe. Texas, through blood and sweat and tears, has proven itself to be different, separate from the failings of old discarded Americas. We are the scions of the Lone Star, the only bright spot still shining in the wreck of Old America. We are different, not the inheritors of the Old America, but the guardians of a new America - a new America that shall be the union of two distinct peoples, the people of Texas, and the people of America."
 
 TEX_2013_election:0 "Post-War Elections"
 TEX_2013_election_desc:0 "To keep our nation running smoothly in the aftermath of a devestating war, the President has decided to hold elections immediate to all Texans to make their voice heard on and decide who will lead our nation through a difficult period of recovery. The Incumbent President, riding high off their victory over the Remnants, sees early elections as a key oppurtunity to further cement their power, however the Opposition Parties remain hot on their tail, seeing an oppurtunity to once more highlight weaknesses in One Republic Rule. After a long period of tumult, allowing Texans an early election is seen as a key oppurtunity to ease discontent avoid furthering the crisis that plagued the nation in the early 2010s."

 TEX_One_Republic:0 "One Republic Victory"
 TEX_One_Republic_desc:0 "Unsurprisingly, the reactionary 'One Republic' Party has been elected to its fourth consecutive term in office. While this election is far removed from the landslides which the party claimed in previous elections, President [TEX.GetLeader]'s continued rule is a sign that OR isn't going anywhere anytime soon. However the nail biting results is also a sign that the party will have to be more careful going forward."
 TEX_Perry_Re_Elected:0 "Perry's Third Term"
 TEX_Perry_Re_Elected_desc:0 "James Richard Perry, President of our Republic off-and-on since 2001, has been elected to his third non-consecutive term as President of the Second Republic of Texas. Riding to victory in part due to his wartime leadership, Perry has vowed to continue the course for One Republic, keeping stability and continuing the crackdown against anti-OR activists. However the underlying factors which lead to the explosion in dissent still exist, and Perry will have to handle them carefully lest this term be his last."
 TEX_exalt_wartime_leadership:0 "Exalt Wartime Leadership"
 TEX_exalt_wartime_leadership_desc:0 "Perhaps Rick Perry's greatest legacy will always be his legacy as the leader of the Texan nation through perhaps the most tumultuous chapter of its history. Valiantly defying the Republic during the onset of war, Perry has managed to use the credibility gained during the war as an effective wedge to discredit his opponents. Perry shall continue to showcase his leadership capabilities to win over independent and IR voters, and ensure One Republic dominates elections for years to come."
 TEX_crackdown_on_political_opposition:0 "Crackdown on Political Opposition"
 TEX_crackdown_on_political_opposition_desc:0 "The Democratic Party has long stood for Communism and lawlessness, and we will have none of it. The rump Democratic Caucus in Congress is diminishing by the day, and the time has at last come to cut the head off the Democrat snake. Utilizing his extensive Emergency Powers, President Perry shall formally make illegal the Democratic Party, seeking a court order to dissolve the organization and at last safeguard Texas from Leftist subversion."
 TEX_entrenched_political_patronage:0 "Entrenched Political Patronage"
 TEX_entrenched_political_patronage_desc:0 "There is a certain way of doing things here in Texas. If you want something done, if you want it done fast, and if you want it done right, you have to know how to play the game. One Republic is more than just some run-of-the-mill political party, it is a vast lifeform which has come to dominate every facet of Texan life. Keeping our party at the forefront of every action will ensure our party will remain entrenched in our nation's inner workings even if we fail to dominate every branch of government."
 TEX_abolish_useless_agencies:0 "Abolish Useless Agencies"
 TEX_abolish_useless_agencies_desc:0 "The war with the Republic has gone to show us the tremendous amount of waste incurred by many government agencies. Having to consider every penny for the war effort, Perry has realized that several government agencies simply can't justify their own existence. While debate goers mocked Perry for his failure to recall the agencies he proposed abolishing, their laughter matters little as the President formally dissolves the Departments of Commerce, Education and the um, um..."
 TEX_texan_nationalism:0 "Fervent Texas Nationalism"
 TEX_texan_nationalism_desc:0 "The values of Texas can not be so easily trampled on by the barbaric Remnants or their Americanist creed. The end of 200 years of Yankee oppression in 1987 was a just and rightful act, and we have no intention of putting ourselves under Washington's jackboot once more. Under the Lone Star we shall defy the Lincoln-lovers to our East and define Texas as not only a separate culture to the ones of the former United States, but a superior one."
 TEX_law_of_god:0 "Law of God"
 TEX_law_of_god_desc:0 "The Abortion-Loving Sodomites and Pinko Commie Liberals have long sought to tear down everything we hold dear here in Texas. We, as God-Fearing citizens of this great Christian nation, seek to fight the Communist and Atheists who wish to impose their God-Hating values here on the Lone Star Republic. Let us truly become One Nation, Under God, codifying our Christian Faith and fighting against values and ideals contrary to the will of our one Lord, God."
 TEX_small_town_texas:0 "Small Town Texas"
 TEX_small_town_texas_desc:0 "We Texans are a simple people, defined by a love of family, a love of god, and a love of country. Unlike the out of touch cityfolk that dominate the UAPR and APC, Texans are not enthralled by foreign ideals such as Communism and Socialism. We shall endeavor to celebrate the most precious value the people of Texans know: the sweat of one's brow, the simple pleasures of life, and the refuge in one's faith. As well, we shall expand Gerrymandering practices to effectively disenfranchise the out-of-touch Urbanites who threaten the stability of our Republic."
 TEX_christian_schooling:0 "Christian Education Initiative"
 TEX_christian_schooling_desc:0 "God-Hating Pinko Public School Teachers have long filled the heads of our children with a bunch of nonsense. To ensure the next generation know that Godlessness and Homosexuality are nothing to be celebrated, President Perry has overseen a substantial rewriting of Texas' school curriculum, one which will emphasize 'Texan' Values, teach the truth about the War of Northern Aggression, and will teach the youth the one Biblical truth. While Secularist scum may cry bloody murder, we have had quite enough of their treasonous rabble."
 TEX_integrate_the_texas_nationalist_organization:0 "Integrate the Texas Nationalist Organization"
 TEX_integrate_the_texas_nationalist_organization_desc:0 "With the Bonnie Blue Flag by their side, the Texas Nationalist Organization has become a paragon of Texan values. Formed by Veterans of past wars, the TNO is perhaps the most committed of any organization to the struggle against Yankeedom. The South may have fallen to the occupation of Carpetbaggers, but thanks to the TNO, the Confederate spirit will continue to live on here in the Second Republic. Under the TNO's watch, we shall ensure that the spirit of Texas shall never fall to the whims of foreigners."
 TEX_paxtons_new_dps:0 "Paxton's New DPS"
 TEX_paxtons_new_dps_desc:0 "Attorney General Ken Paxton has long served as Perry's attack dog, and now that the President's powers have been solidified in a time of peace, Perry can at last let Paxton go feral. The Legal System has been turned into Perry's greatest weapon, serving as both a scalpel and a hammer against any and all opposition to One Republic rule. Political opposition, already withering after the illegalization of the rump Democratic Party, has been given an ultimatum with Paxton's actions: get behind the Commander in Chief, or get behind Bars."
 TEX_modify_the_constitution:0 "Modify the Constitution"
 TEX_modify_the_constitution_desc:0 "At last, Texas is safe from the whims of False Conservatives, Anarchists, and Leftist Scum. Perry, with an iron grip established on the Texan nation, now seeks to at last remove the last roadblocks to Presidential power. The Constitution, as it stands, limits the President to two non-consecutive terms. Perry has gone around these regulations before, but as it seems, the 'Savior of the Republic' sees no reason to play this idiotic game any more. While One Republicans jockey to be Perry's sucsessor, the President seeks to make his position as President permanent."
 
 TEX_end_congressional_disobedience:0 "End Congressional Disobedience"
 TEX_end_congressional_disobedience_desc:0 "The continued activity of opposition parties has forced the President to govern almost exclusively through Executive Orders. [TEX.GetLeader] has signaled that the President's Wartime Powers shall continue in peacetime as a means to bypass an increasingly disloyal legislature, and circumvent the annoyance of opposition parties."
 TEX_keeping_elections_safe:0 "Ensure Safe Elections"
 TEX_keeping_elections_safe_desc:0 "One Republic's comfortable hold on the Presidency has come under increasing risk as of the last election, clearly by means of trickery and fraud. To ensure our hold on power remains unchallenged, we shall expand Election security to prevent opposition parties from wriggling their way into power."
 TEX_powers_of_the_presidency:0 "The Powers of the Presidency"
 TEX_powers_of_the_presidency_desc:0 "While our decision to maintain Martial Law in peacetime has been the cause for much ire, even a blind man could see that our Republic is not truly safe. The indefinite extension of Martial Law will ensure that Presidential authority will remain paramount, and that [TEX.GetLeader] will have the ability to wield their power untrammeled."
 
 TEX_President_North:0 "President North"
 TEX_President_North_desc:0 "Oliver Laurence North, the Marine Corps officer and heroic soldier who led our nation to victory in the recent Remnant war has been successfully elected to a full term as President of the Second Republic of Texas. Wiping out the competition with a stunning 73.28 vote share, North has managed to prove those who think that OR was in for an uphill battle in this election dead wrong. However despite OR's continued control, it is predicted that North will be breaking from his predecessor in many areas, providing a lighter hand in opposition to Perry's strict authoritarianism."
 TEX_the_soldier_who_saved_texas:0 "The Soldier who Saved Texas"
 TEX_the_soldier_who_saved_texas_desc:0 "Oliver North's status as our nation's heroic wartime leadership has made him perhaps the most beloved leader of the Republic of Texas besides Sam Houston himself. The rapidly-developing personality cult around the North has been effectively utilized by One Republic as a force to keep the party on the top of Texan politics for years to come. While North seems opposed to such deification, consultants see his heroic status as a useful political tool."
 TEX_distance_ourselves_from_perry:0 "Distance Ourselves from Perry"
 TEX_distance_ourselves_from_perry_desc:0 "Rick Perry, North's predecessor and the founder of the One Republic movement, has been permanently reduced to one of the most reviled public figures in Texas history. His decision to flee the nation in the eve of war has been a constant drag on One Republic ever since; with even North's bravery failing to make a dent into the perception that OR is a party of cowards. The time has come to free our party from Perry's stain once and for all. North, meanwhile, seems oddly content with letting the 'One Republic' Legacy burn."
 TEX_formally_disband_one_republic:0 "Formally Disband One Republic"
 TEX_formally_disband_one_republic_desc:0 "In a move that has come as a shock to nearly the entire political scene, President Oliver North has formally renounced his affiliation with the One Republic Party, instead opting to govern as an independent. Seeking to rule in a non-partisan capacity, President North has opted to separate the Presidency from the political squabbles that dominate Congress. While One Republicans in Congress have not taken too kindly to North's 'Non-Partisan' Governance, armed with his continuing wartime powers, North cannot hope to be contained by Congress's whims."
 TEX_all_independent_congress:0 "All-Independent Congress"
 TEX_all_independent_congress_desc:0 "Following One Republic's dissolution, the President has formally signed an edict dissolving all Political Parties within the Second Republic of Texas. This move has both allies and opponents across the political spectrum, with the most vehement opposition to this move ironically being One Republic. North, dismissing most establishment figures within the Cabinet in favour of military officials, has sought to govern in Congress with a coalition of loyalists in Congress, a coalition of loyal One Republicans, Democrats, and Independent Republicans."
 TEX_always_on_alert_republic:0 "Always-on-Alert Republic"
 TEX_always_on_alert_republic_desc:0 "Even a blind man could see that the Remnants are not finished harassing our Texian nation. We cannot afford to let our guard down in any area. President North has sought to transform the State of Emergency, used by Perry as a political cudgel, as a means to prepare Texans for continued hostilities with our neighbors. Pillboxes installed in major cities, Early Warning Systems always kept on, and most of all, the readiness for war instilled into every Texan citizen."
 TEX_alliance_for_freedom:0 "An Alliance for Freedom"
 TEX_alliance_for_freedom_desc:0 "The time has come to undo the unduly repressive policies of the former Perry Regime. President North, along with his allies in the Congressional Freedom Caucus, has moved to undo some of the harshest restrictions of the former President. Martial Law however, will remain in place for the foreseeable future."
 TEX_uphold_military_bravery:0 "The Ideal of the Texan Soldier"
 TEX_uphold_military_bravery_desc:0 "As a former Soldier and Military Official, Oliver North has gone to great lengths to ensure that the Texan Armed Forces receive the respect they deserve. As President, North has been at the forefront of organizations which encourage military service, the defense of the sovereignty of Texas, and the promotion of a strong national defense. As well, our objectives shall also include providing support for wounded combat soldiers and providing scholarships for the children of service members killed in action."
 TEX_reward_service:0 "Rewards for Service"
 TEX_reward_service_desc:0 "We're always in need of more able-bodied men and women willing to put their lives on the line so Texas may stay free. As a means of improving recruitment numbers, Congress, under the President's direction, has passed a new host of measures aimed at making a life in the army more appealing. From added pay and benefits both for the Enlisted and their family, to new accommodations aimed at making a life of service more rewarding, under North's command, we shall seek to ensure those within the Armed Forces are given their due, and that all those willing to risk life and limb to defend Texas are given their proper veneration."
 TEX_united_under_the_lone_star:0 "United Under the Lone Star"
 TEX_united_under_the_lone_star_desc:0 "Under the reign of Perry and other Culture Warriors, Texans who didn't share the same lifestyle as the 'Majority' were faced with undue Demonization. It was a disgrace. President North cares not for your faith, your ethnicity, race or sexual orientation - only your ability to hold a rifle. To the extent that contemporary Texan Politics will allow, we will stop fighting the Culture War so we have more fodder for the actual war that rages just across our borders."
 TEX_depoliticize_education:0 "A Patriotic Education"
 TEX_depoliticize_education_desc:0 "The society that separates its scholars from its warriors will have its thinking done by cowards and its fighting done by fools. Perry's administration has seen Education on the bottom of funding lists, with Public Schooling long on the wrong end of Perry's Culture War. North, while a firm believer in the principle that the Military ought to take up the majority of the nation's funds, also realizes that instilling essential skills and the bare truth of history is necessary for our Republic not only to survive, but to thrive in a time of crisis."
 TEX_service_guarentees_citizenship:0 "All Lost Sons of the Alamo"
 TEX_service_guarentees_citizenship_desc:0 "Texas is united under the Military. While some have decried the 'Militarization' of the Texan nation, and accused 'Generalissimo' North of ruling as a Dictator, it is clear that Texas is better off under the safety of men in uniform, instead of craven politicians only concerned with their own Re-Election. In times of crisis, we must remain vigilant, ever willing to take up arms in order to safeguard Texas against any invaders, be them Remnant or Communist."
 
 TEX_Independent_Republicans:0 "Independent Republican Victory"
 TEX_Independent_Republicans_desc:0 "After almost 10 years of unbroken One Republic rule, it seems that the party has finally been beaten at the ballot box. The longstanding Conservative opposition to President Perry has managed to unseat their rivals in One Republic, securing their status as Texas' governing party for the next four years. "
 TEX_compromise_on_conservative_values:0 "Compromise on Social Conservatism"
 TEX_compromise_on_conservative_values_desc:0 "With One Republic's legacy rapidly waning, the Independent Republican Party has gone forward with undoing the decades of Social Conservative policies pushed by One Republic. To this end, we shall push forward legislation for legalization of abortion and homosexuality, and the abolition of restrictions on pornography and marijuana."
 TEX_no_child_left_behind:0 "No Child Left Behind"
 TEX_no_child_left_behind_desc:0 "It remains an unfortunate fact that Texas is woefully behind the curb in terms of education. While the Hutchison and Richards Administrations have tried in vain to solve chronic underperformance in Texan schools, it appears that none of them have been able to crack a longstanding solution. The time has come to hunker down and draft a comprehensive education strategy that ensures no child is left behind."
 TEX_fiscal_and_social_conservatism:0 "Fiscal and Social Conservatism"
 TEX_fiscal_and_social_conservatism_desc:0 "We shall not compromise on our values just to appease hippies and city-dwellers. Texas is a land of Nuclear Families, Apple Pies and good-old fashioned values, and we shall not stand by and allow our values to be corrupted. It is our position that abortion is murder, marriage is between a man and a woman, and that Marijuana is a dangerous drug. If these positions cost us some votes to the Communists, then so be it."
 TEX_limit_presidential_power:0 "Limit Presidential Power"
 TEX_limit_presidential_power_desc:0 "Under Perry the powers of the Presidency have been allowed to grow out of control. It's time to reign in the Presidency and stay true to our Small Government ideals. Authoritarianism has no place in Texas, even if it may prove politically inconvenient. President [TEX.GetLeader] shall lift the jackboot-with-spurs off the neck of Texas no matter how much political capital it may cost them."
 TEX_free_and_fair_elections:0 "New Referendum System"
 TEX_free_and_fair_elections_desc:0 "The Perry era saw the longstanding Texas tradition of voting on policies directly via Ballot Measures greatly restricted, introducing a 65% celing on all votes that no proposal has been able to clear thus far. The time has come to restore public participation in Texan democracy by lowering the ceiling on ballot measures back to a simple majority, and ensuring the vote is always free and fair."
 TEX_stadium_construction:0 "Fund Stadium Construction"
 TEX_stadium_construction_desc:0 "All Texans love sitting down on Sunday with a beer in hand to watch the Cowboys. We can't risk our beloved football teams to leave the country, and if we wish to do so, we must expand their venues and provide government funds to do so. Corruption in this area has been a cause for concern, but if we want to keep God and the Pigskin right at home in Texas, then providing taxpayer funding to new and state-of-the-art sporting facilities is a must."
 TEX_the_gonzales_commission:0 "The Gonzales Commission"
 TEX_the_gonzales_commission_desc:0 "Attorney General Gonzales is eager to clear house in the realm of Corruption in Texas. DeLay is already behind bars, but it remains clear to many that he is just a symptom of a wider problem. Indeed, it very much appears that Corruption in Texas is not confined simply to the One Republic Party. We must leave no stone unturned in our hunt for corrupt officials - and Gonzales is intent on doing just that. In addition, we shall also seek justice for the countless victims of One Republicite terror and at last expose the abuses of Perry-era Big Government"
 TEX_anti_corruption_hunt:0 "Empower the Texas Rangers"
 TEX_anti_corruption_hunt_desc:0 "The Rangers are responsible for many matters of anti-Corruption and law enforcement in the Republic. As strong backers of the Blue, the IndReps have already tabled legislation allocating more funding to our boys in the Rangers, however as it stands, what they have is not nearly enough for them to trily complete their mission of rooting out Corruption in the Lone Star Republic. The time has come for them to finish the job, and free Texas from the stain of corruption."
 TEX_President_Strauss:0 "President Straus"
 TEX_President_Strauss_desc:0 "Joseph Richard Straus III, former Speaker of the Texas House of Representatives, has been sworn in as the first Jewish President of our Republic. As the first non-OR President since Kay Hutchison, Straus has promised an end to Perry's culture wars, the abolition of Martial Law and the restoration of 'True Conservative Values' to our Republic."
 TEX_congressional_dominance:0 "Congressional Dominance"
 TEX_congressional_dominance_desc:0 "The long period of One Republic self-dictatorship was only contained by brief windows where congress fell under the control of opposition parties. While Perry attempted to skirt these limitations by imposing Martial Law, now that Perry has been defeated at the ballot box, we have begun undoing the damage of Perry's executive agenda. In the future, we shall ensure that Congress always has the final say, and that the President can not use their powers to circumvent the will of the people."
 TEX_uphold_religious_liberty:0 "A Return to Country Club Republicanism"
 TEX_uphold_religious_liberty_desc:0 "For too long Conservatism has been corrupted by nucases on the hard right. One Republic don't even deserve to be called Conservatives, they're nothing more than mindless regressives. President Straus has sought to reintroduce the spirit of Country Club Conservatism, utilizing deep ties to the Texan business community to push forward Small Government, pro-Business policies that shall focus on winnable battles and the betterment of all Texans' lives."
 TEX_President_Martinez:0 "President Martinez"
 TEX_President_Martinez_desc:0 "Susana Martinez has made history as the first Hispanic woman to be elected as President of the Republic of Texas - the third woman to hold this post behind Ann Richards and Kay Hutchison, the only other person from the Independent Republican Party to claim the Presidency. Martinez, as a representative from New Mexico, aims to both smooth tensions between the Hispanic Community and the Central Government, and establish a balanced-budget policy for the Republic of Texas."
 TEX_empower_new_mexico:0 "Empower New Mexico"
 TEX_empower_new_mexico_desc:0 "New Mexico, despite having previously been an independent nation, has had next to no say in its own affairs ever since it was annexed in 1988. The time has come to bring the ideals of Federalism to Texas, and provide autonomy for this unique area. The time has come for New Mexico to be recognized as the distinct society as it is, and for all regions of the Great State of Texas to have a say in matters of governance outside of Gerrymandered lines."
 TEX_reintroduce_medicaid:0 "Re-Introduce Medicaid"
 TEX_reintroduce_medicaid_desc:0 "While we stand firmly opposed to Socialistic Medicine practices such as Universal Healthcare, it has become clear that Texas' current healthcare system is very broken. The time has come to undo the abolition of Medicaid that came as a result of Perry's election, creating a program which shall allow the elderly and the insolvent to afford medical treatment to an extent, while avoiding the clutches of Socialism and preventing disruption to Texas' medical industry."
 TEX_appeal_to_hispanic_conservatives:0 "Appeal to Hispanic Conservatives"
 TEX_appeal_to_hispanic_conservatives_desc:0 "During the Perry years, Hispanic-Texans were treated as nothing more than an Alien Nation, as traitors waiting in the wing to rise up, rejoin Mexico and avenge Santa Anna once and for all. This hostility, in addition to dividing Texan society, was also a major factor in One Republic's defeat. It is time we realize that Hispanics are not a unified bloc, and many Hispanic Texans share the Independent Republican's Conservative values."
 TEX_President_Bush:0 "President Bush"
 TEX_President_Bush_desc:0 "George Bush Jr., or 'George W.', as he is often called, would not be a person many expected to claim the Texan Presidency. After a bitter defeat in the neighboring American Republic, George Jr. swore off politics forever and moved to Texas to manage a baseball team. While one would assume his father would make 'Dubya' a prime candidate for a Remnant collaborator, it appears that Bush Jr. has remained committed to Texas, leading a Peace Delegation to Atlanta and renouncing his Remnant citizenship as a result. This loyalty to Country over his very own family has propelled Dubya back into the political sphere - and this time, it seems his ambitions have paid off. Now that he's officially President, nobody knows what he intends to do, but as it seems, the Bush Dynasty is back in vogue... in the last place you'd expect."
 TEX_ideals_of_compassionate_conservatism:0 "Compassionate Conservatism"
 TEX_ideals_of_compassionate_conservatism_desc:0 "Under Perry's watch, Texan Conservatism retreated into a hateful and deliberately-cruel strain of ultra-reaction that took glee in the suffering of others. This is not the Conservatism we know, but a bastardized abomination closer to the teachings of Satan than the teachings of Jesus. The time has come to utilize the Free Market to alleviate the ills of all Texans, creating a triangular relationship between government, charities and faith-based organizations while aiming to uphold the common dignity of all Texans."
 TEX_examine_poppys_legacy:0 "Examine Poppy's Legacy"
 TEX_examine_poppys_legacy_desc:0 "The fact that the son of the man who first attempted to invade Texas is now leading us has come as a shock to many within the Texan political sphere. Indeed, despite George Jr. siding with Texas over his own family, many have wondered where his true loyalties lie. Between the personal side of familial love and the practical reality of Bush Sr.'s status as a warmonger, President Bush is stuck, and he must make a choice lest he tarnish the legacy of a Texas patriot he worked so hard to build."
 TEX_a_political_home_run:0 "A Political Home Run"
 TEX_a_political_home_run_desc:0 "Put us in Coach, we're ready to play. Dubya took the Rangers from a cellar-dweller team in a slump to a pennant contender, and he thinks he ought to be able to do the same thing with the great Republic of Texas. George Dubya has stepped up to the plate with a Compassionate Conservative agenda that has hit both the Liberal Weiners and the Right-Wing Nutjobs out of the park. Despite taking charge during a troubling inning of Texan history, this former baseball executive has proven he knows how to manage a championship roster and deliver wins for the Texan people."
 TEX_Hutchison_legacy:0 "Rehabilitate Hutchison"
 TEX_Hutchison_legacy_desc:0 "The rise of One Republic can be tied to Kay Bailey Hutchison's controversial trade deal with the American Republic during the dawn of the 21st Century. Despite history having turned their back on the Independent Republican trailblazer, in the years since Perry first assumed office a reckoning around Hutchison's Administration has begun. The time has come to set the record straight on ol' Kay. Once more we shall ask Hutchison to take the stage, to appeal to all Texans and attract more than just the nuts to our brand of Conservatism."

 TEX_President_Paul:0 "President Paul"
 TEX_President_Paul_desc:0 "In a startling upset, Libertarian Stalwart Ron Paul has been elected as President of the Texan Republic. Paul's Libertarian message and staunch opposition to Martial Law has made him a favourite among Texans tired of One Republic's Authoritarianism. His anti-Government agitation combined with his staunch Social Conservatism has greatly appealed to the Texan electorate, and now President Paul has the difficult task of whiddling down the Texan state, and guaranteeing the ideals of Liberty for all Texans."
 TEX_radical_deregulation:0 "Radical Deregulation Agenda"
 TEX_radical_deregulation_desc:0 "The first step in destroying the clutches of Big Government is to begin a programme of radical deregulation. Agreed upon by both One Republic and the Independent Republicans, Paul's administration shall seek to tear apart every single unnecessary regulation that stands between the Texan people, and true Prosperity. Remember, the freer the market, the freer the people..."
 TEX_the_moneybomb:0 "'Moneybomb' Fundraising"
 TEX_the_moneybomb_desc:0 "It cannot be denied that the odds are against us. If we are to stand a chance against the Statist pigs circling us, then we must get creative. An army of underdogs have propelled Paul to the Presidency, utilizing an ingenious crowdfunding tactic commonly referred to as the 'Moneybomb'. Now that we're in power, we must utilize these tactics once more to out-spend the opposition, whipping up a fundraising frenzy to control the narrative and bring Congress under Libertarian control."
 TEX_return_to_the_gold_standard:0 "Return to the Gold Standard"
 TEX_return_to_the_gold_standard_desc:0 "Fiat currencies have long ruined the lives of honest Texans. The trapping of Credit is what has kept the Statist Pigs in power for so long. If we wish to break the mystical hold of false money, then we must return Texas to a currency based on reality. The Gold Standard's abolition under LBJ was the first sign that the American order was breaking, and if we wish to prevent another 'Great Collapse', then a return to the Gold Standard is in order."
 TEX_right_to_bear_arms:0 "The Right to Bear Arms"
 TEX_right_to_bear_arms_desc:0 "Texans love their guns. The One Republic devils may have preached the gospel of gun ownership, but when push came to shove, they showed their true colours by seizing civilian firearms during the Remnant war. The founders were clear that the right to bear arms 'Shall not be infringed'. While the Second Amendment may have perished with the United States, its message still rings true. Regardless of the situation, the right of Texans to bear arms must be safeguarded."
 TEX_lift_state_of_emergency:0 "The Texan Liberty Act"
 TEX_lift_state_of_emergency_desc:0 "There is no greater violation of the Non-Aggression principle than Martial Law. It's time to abolish the provisions of Martial Law forever, so the flimsy excuse of 'Emergency' may never more be used to justify the erosion of the rights of the Texan people. Ron Paul has already lifted Martial Law on his first day in office, however the provisions still exist for any other President to use with reckless abandon. With broad support among the Democratic Opposition, President Ron Paul shall pass a constitutional amendment preventing the Office of the President from invoking Martial law or taking unilateral executive decisions without popular consent under any circumstance whatsoever."
 TEX_enshrine_the_non_agression_principle:0 "A Smaller Government"
 TEX_enshrine_the_non_agression_principle_desc:0 "From the Surveillance State of Perry to the bi-partisan terror of high taxes, it stands to reason that the Texan Government needs to be dramatically shrunk. The time has come to slay the Hydra of Big Government, and sunset any and all government directives that impede Texan Liberty. Entire agencies must be thrown into the scrap heap of history; governmental responsibilities transferred to private interests, but most importantly, the culture of fear that has long dominated Texas must come to an end, making Texans at last realize that their true enemies are not each other, but rather the overbearing powers of Big Government."
 TEX_end_the_war_on_drugs:0 "End the War on Drugs"
 TEX_end_the_war_on_drugs_desc:0 "Reagan's 'War on Drugs' played a key role in the Collapse of the United States, as the powers of unconstitutional agencies such as the DEA expanded the already bloated Government to near-Orwellian levels, further Militarizing the Police and pressing the Big Government Jackboot further on our necks. Reagan's legacy, especially in the field of drugs, must be shredded in its entirety. The time has come not only to legalize Cannabis, as many of Paul's supporters voted solely to achieve, but to legalize all narcotics within Texas, eroding the power of the Cartels by breaking their monopoly on the Drug Trade, and at last ending the failed Second Prohibition."
 TEX_destroy_presidential_power:0 "Erode Presidential Power"
 TEX_destroy_presidential_power_desc:0 "While Ron Paul would argue in a certain context that the existence of the Office of President of the Republic of Texas is a gross violation of the people's sovereignty, a more realistic position than abolishing the Presidency is severely limiting its power. We have seen the consequences of a Presidency-run-amok under the Perry Administration, we cannot allow the Executive to act in a unilateral manner any longer. Of course, given that Congress continues to bitterly oppose our agenda, some of the President's power to bypass the Legislature should stick around, an act which will beat back the Statist Pigs in Austin's halls of power."
 TEX_localism:0 "Regional Rights"
 TEX_localism_desc:0 "The Mecca of Big Government in Austin has no business telling the Country Folk in West Texas how to live their lives. What does a rural rancher have in common with a Houston City Dweller? Nothing, that's what we say. The time has come to devolve Texas, cracking the abomination of Big Government and ensuring that people in small towns don't have the beast of Big Government breathing down their neck. Every responsibility devolved to a local official is one more decision not made by the Suits in Austin."
 TEX_conservative_libertarianism:0 "Conservative Libertarianism"
 TEX_conservative_libertarianism_desc:0 "President Ron Paul is above all, a Conservative, even if he preaches the gospel of Small Government Libertarianism. Despite bitter disagreements with One Republic, President Paul has proven receptive to much of the Party's existing infrastructure. While the Pinko Liberals may be lost to us, and the Independent Republicans still remain loyal to the Golden Calf of Big Government, One Republic may just prove themselves worthy of redemption. Let's get to work with some things both OR and the Libertarians agree upon - such as restrictions on Abortion and flag burning."
 TEX_abolish_the_tirs:0 "Abolish the TIRS"
 TEX_abolish_the_tirs_desc:0 "The Texan Internal Revenue Service, and its pre-collape American counterpart, are perhaps the most wickedly evil institutions to have ever existed on this planet earth. With a dogma that blends the Gestappo and the Communist Party of the USSR, it is clear that the beast of the TIRS must be slain at any and all cost. The time has come to abolish the Texan IRS, cast the moneylenders out of the temple, and break the shackles of unjust taxations. As the Big Government Lovers, blood-sucking Agencies and Deficit-Hawks ponder where the Government's Funding shall come from, President Paul answers that they will just have to figure it out for themselves."
 TEX_normalize_anarchism:0 "Normalize Anarchist Thought"
 TEX_normalize_anarchism_desc:0 "Perry has proven to us all that Big Government is the biggest threat ever conceived of to the Texan People. The state is an inherently oppressive object, whether or not the Libertarian mainstream wishes to admit it. While some are content in simply shrinking the Government, President Ron Paul wishes to see it gone entirely. The abolition of the State itself is a noble goal, albeit one that won't happen overnight. If we are to succeed in this ultimate aim, then we must begin subtly pushing the agenda, shifting the Overton Window one step at a time."
 TEX_towards_true_minarchism:0 "Propose a Voluntaryist Compromise"
 TEX_towards_true_minarchism_desc:0 "Anarchism is a noble goal, however for the time being the ideal of a true Night Watchman State is something all Texan Libertarians can agree upon. The collapse of the United States was a noble and just action committed by among the most repulsive figures of the last century - yet that does not diminish the event's stature. All of Texas can agree we are better off without Washington's Jackboot, and while Reagan shall be remembered for the statist pig he was, we can also take comfort in knowing that his actions freed Texas from its chains. For now, we shall remain content pushing this message, maintaining the Minarchist message while subtly pushing a more Anarchist interpretation of Libertarian principles as time goes on."
 TEX_ron_paul_revolution:0 "Completing the rEVOLution"
 TEX_ron_paul_revolution_desc:0 "Political Revolutions don't happen overnight. Ron Paul, little by little, has done what few others could have hoped for, he threw a brick through the political Establishment's window, forever striking fear into the hearts of the Statist Pigs who have long kept Texas under their jackboot. But our work is not done yet. The overbearing state continues to run roughshed over the Lone Star Republic, and if we wish to at last destroy the last vestiges of Big Government, then we must remain vigilant. The Ron Paul Revolution is only just beginning..."
 
 TEX_President_Johnson:0 "President Johnson"
 TEX_President_Johnson_desc:0 "Gary Johnson has risen as President following the crash-and-burn of his predecessor. Picked as a more Liberal and more New Mexico-centric alternative to the radical Minarchist and Libertarian Conservative Paul, Gary Johnson now seeks to go in the opposite direction, taking a more practical approach to Libertarianism and reconciling with the Political Establishment long antagonized by Ron Paul. While the true Libertarian stalwarts bemoan Johnson's ascension, it appears that a softer hand may just be the only way to make Libertarianism work in Texas."
 TEX_move_to_legalize_cannabis:0 "Move to Legalize Cannabis"
 TEX_move_to_legalize_cannabis_desc:0 "Legalizing Heroin is obviously a non-starter, however polls have shown that there is widespread political momentum for legalizing Cannabis. With the potential for both weakening the Black Market Cartels and gaining new sources of revenue for our strained Government finances, Congress has already signaled their willingness to pass a watered-down version of Ron Paul's drug legalization agenda. Let us begin."
 TEX_support_gun_rights:0 "Support Gun Rights"
 TEX_support_gun_rights_desc:0 "$TEX_right_to_bear_arms_desc$"
 TEX_expand_civil_liberties:0 "Expand Civil Liberties"
 TEX_expand_civil_liberties_desc:0 "Social Conservatives have long run roughshed over Texas. With the voters overwhelmingly rejecting Authoritarianism in the last election, the Libertarians can at last whittle away the remains of government intrusion into the private lives of citizens. We shall not seek the counsel of God when passing our political agenda; only the will of the Texan people who have long felt the Government's boots on their neck. Abortion, Homosexuality and Prostitution shall all be legalized, ensuring the ideals of the Non-Aggression Principle remain paramount. While formally legalizing Gay Marriage in Texas is at the moment a bridge too far for most voters, with time, we can begin changing hearts and minds."
 TEX_reconcile_the_independent_republicans:0 "Reconcile the Independent Republicans"
 TEX_reconcile_the_independent_republicans_desc:0 "Ron Paul had something of a knack for making enemies in Austin. Gary Johnson, eager not to face the same fate as his predecessor, has been quick to mend the bridges burnt by Ron Paul. Among his strongest supporters in the Legislative Branch are the Independent Republicans, Moderate Conservatives who remain opposed to the One Republic agenda. However Democrats have also backed Johnson's socially-liberal policies, ensuring that Johnson can reliably appeal to both sides of the political spectrum depending on the issue."
 TEX_fair_tax_proposal:0 "A Fair Tax Proposal"
 TEX_fair_tax_proposal_desc:0 "Nobody likes paying taxes. While some such as Johnson's predecessor favoured abolishing Taxation altogether, the President has proposed a more sensible solution to reform Taxation in Texas, while also ensuring that the Government can remain solvent. The Fair Tax calls for abolishing all federal taxes and replacing them with a 23 percent nationwide sales tax that applies only to new goods and services. For example a used car or secondhand clothes would be exempt, while groceries would not. In addition to a simplified tax, everyone would receive something called a monthly prebate check. While this proposal remains too complex for some voters to digest, it is nonetheless the best solution to the issue of taxes. This new proposal, in addition to the re-abolition of the Gold Standard, shall help stabilize Texas' economy."
 TEX_free_market_enviromentalism:0 "Free Market Environmentalism"
 TEX_free_market_enviromentalism_desc:0 "Earth's climate is rapidly changing. That is something that probably can't be denied. However the solution to the issue of Climate Change is not costly Government regulations, but rather incentivizing Free Market initiatives to solve this problem. For too long the forces of Communism have allowed pollution and environmental destruction to spread across the world. The time has come to ensure clean air and water for our people, without having to resort to business-strangling regulations. As an avid Outdoorsman and appreciator of Texas' wonderful natural beauty, Johnson shall do all in his power to protect our environment, even if the sun is going to consume the Earth in a billion years anyway"
 TEX_new_mexico_autonomy:0 "New Mexico Autonomy"
 TEX_new_mexico_autonomy_desc:0 "Gary Johnson, as the first New Mexican elected as President of Texas, recognizes the distinct differences between the former State of New Mexico and the rest of Texas. Localism has always been a Libertarian policy proposal, and while some may want to delegate governance exclusively to smaller communities, Johnson realizes that the best way forward is not through dozens of local bodies, but rather by providing distinct regions with autonomy from Austin and their own independent Legislature, namely New Mexico, Johnson's own homeland."
 TEX_the_dawn_of_sensible_libertarianism:0 "The Dawn of Sensible Libertarianism"
 TEX_the_dawn_of_sensible_libertarianism_desc:0 "The creed of Libertarianism is the most sensible of all, however it seems that whackjobs have undeniably been attracted to our ideology. Johnson is no stranger to basement-dwelling creeps in soiled sweatshirts heckling him because he doesn't support getting rid of driver's licenses - but thanks to his tireless perseverance and willingness to work within the bounds of the Political Establishment, the Hydra of Big Government has at long last been tamed. Even as some 'Radical Libertarians' call for running against the 'False Libertarian' Johnson, the truth remains that thanks to Gary Johnson, Libertarianism has at long last been brought to the political mainstream."
 
 TEX_President_Perot:0 "President Perot"
 TEX_President_Perot_desc:0 "Ross Perot's independent Presidential aspirations have at las borne fruit as the One Republic establishment witnesses a spectacular fall from grace. In a world of rigid political lines, Ross Perot stands out as something of an oddity, taking positions from across the political spectrum, combining down-to-earth classic Populism with new-fangled East Texas Tech Wizardry. Whether the elder mogul can forge a new Texan system, nobody can say, however as the 'Reform Party' seizes the bull of Texan politics by the horns, the people of this great Republic can move together as Texans; not as just Liberals and Conservatives."
 TEX_soverign_wealth_fund:0 "Expand the Sovereign Wealth Fund"
 TEX_soverign_wealth_fund_desc:0 "For too long Texas' magnificent mineral wealth has been funnelled into the pockets of Oil Barons and foreign corporations. The time has come to put this money into the pockets of Texas - with this in mind, President Perot has signed new legislation requiring Texan oil to go to Texan firms, and further establishing larger Sovereign Wealth Fund that will ensure that the profits from Texan Oil will go to subsidizing Education and other government programs."
 TEX_target_the_pork_barrel:0 "Target the Pork Barrel"
 TEX_target_the_pork_barrel_desc:0 "For too long Pork Barrel spending has been a hallmark of the Texan system. Buying votes has sent millions of Texan dollars down the drain, and President Perot will not stand for it. With Corruption already at the top of President Perot's agenda, we shall finally pass legislation with tripartisan support to at last prohibit Pork Barrel spending."
 TEX_the_delay_affair:0 "The DeLay Affair"
 TEX_the_delay_affair_desc:0 "One Republic has been known as shamelessly corrupt for decades. With the nutcases at last having their foot off the gas pedal, the new administration is determined to smoke out every red dime of waste and fraud committed by Perry and his crooked cronies. It's not going to be easy, but by the time we're finished, the crooks in One Republic won't be able to buy another vote ever again."
 TEX_light_firearm_restrictions:0 "Reasonable Firearms Restrictions"
 TEX_light_firearm_restrictions_desc:0 "Crime is a hot-button issue for Texans. While we love our firearms here in the Lone Star Republic, we have also realized that some restrictions on guns are needed to keep Texas safe. With support from the Democrats, new legislation shall be passed creating reasonable restrictions on gun ownership, allowing Texans to continue their hard-fought right to bear arms while also keeping guns out of the hands of dangerous people."
 TEX_a_balanced_budget:0 "A Balanced Budget"
 TEX_a_balanced_budget_desc:0 "Government spending under the Democrats and One Republicites has ballooned out of control. Some fiscal responsibility in Texas is desperately needed, as the Independent Republicans and Reform Party unite to tackle the issues of overly-high taxes and government waste. President [TEX.GetLeader] has announced new Constitutional initiatives to balance the budget, ensuring that the burden of out-of-control spending and of tremendous debt shall never more fall on the Texan people."
 TEX_patriotism_not_nationalism:0 "Patriotism, not Nationalism"
 TEX_patriotism_not_nationalism_desc:0 "For too long the ideals of Patriotism have been twisted and corrupted by the Snake Oil salesmen in One Republic. We as Texans love our country, but we are under no delusions of what being a Texan entails. Xenophobia and Racism have no place in the Land of the Lone Star, as we seek to define Texan not as your faith or the colour of your skin, but of the ideals that help make Texas the greatest nation in the post-United States."
 TEX_fervent_economic_nationalism:0 "Fervent Economic Nationalism"
 TEX_fervent_economic_nationalism_desc:0 "We have got to stop sending jobs overseas. It's pretty simple: If you're paying $12, $13, $14 an hour for factory workers and you can move your factory South of the border, pay a dollar an hour for labor, have no health care, have no environmental controls, no pollution controls and no retirement, and you don't care about anything but making money, there will be a 'giant sucking sound' going South. It's up to us to stop this, and implement Economic Nationalist policies that will keep Texan jobs safe."
 TEX_populist_rhetoric:0 "Tripartisan Populism"
 TEX_populist_rhetoric_desc:0 "The Texan Reform Party has had great success in implementing its agenda in part due to the fact that both Conservatives and Liberals have found policies that they have identified with in President Perot's agenda. Despite the Reform Party's slim representation in Congress, Perot has managed to utilize the ideals of both the Independent Republicans and Democrats to implement sweeping reform from both sides of the aisle. This combination of Bipartisan compromise and fervent Populism serves as the bedrock of Ross Perot's ideology."
 TEX_digital_democracy:0 "Digital Democracy"
 TEX_digital_democracy_desc:0 "Texas remains woefully behind in the world of technology. In America, the APC outpaces us by a mile, all while great powers such as Japan and Bulgaria themselves dominate the world of Capitalist and Communist computing respectively. The time has come for Texas to meet the moment, and Perot, as a pioneer of computing in Texas, is the perfect person to do so. In addition to expanding Texan access to the Intranet, we shall also expand the role of digital tech within our democracy, expanding the role of information technology within our Democracy, offering new tools for transparency, and implementing 'Electronic Town Halls' across Texas and allowing all Texans to interact with their elected representatives from the comfort of an office chair."
 TEX_fervent_social_liberalism:0 "Fervent Social Liberalism"
 TEX_fervent_social_liberalism_desc:0 "Texas has long been renowned as an area dominated by Socially Conservative thought. Winning hearts and minds is a difficult process, but with enough money, pushing the vehicle of Social Change becomes a much easier process. Luckily, money is one thing President Perot has plenty of. Embracing the vision of Social Liberalism is something which has ingratiated the Democratic Party to our cause, and with the combined Reform and Democratic caucuses, we can at last implement lasting social change within Texas and push the Overton Window towards true Social Liberalism. We are a country of individual rights, and it’s that simple to us."
 TEX_the_swiss_system:0 "The Swiss System"
 TEX_the_swiss_system_desc:0 "Representative Democracy failed to save the United States. If we wish to preserve our Democratic institution, then we must move to embrace the Swiss System of Direct Democracy. The American Presidential system is a failure, and if we are to survive in the turbulent post-American world, we must look to a bedrock of political stability: Switzerland. Counties shall be replaced with Cantons as we move to enshrine the will of the people via Electronic Direct Democracy."
 TEX_tax_the_rich:0 "Tax the Rich"
 TEX_tax_the_rich_desc:0 "Despite Perot's status as one of the wealthiest men in the Republic of Texas, the President has emerged as an outspoken critic of Corporate America. The time has come for the Rich, very much including President Perot, to pay their fair share, shifting the burden of taxation from the middle class to the Rich and allowing the middle class to gain a footing. Additionally, we shall also eliminate entitlements and tax rebates for the wealthy, while giving breaks to small businesses instead."
 TEX_empower_the_presidency:0 "An Empowered Presidency"
 TEX_empower_the_presidency_desc:0 "Martial Law was naturally abolished once Perot took office, in stark contrast to the One Republicites who vowed to keep Martial Law in place until Atlanta burned once more, however Perot has not been one to whittle down or constrain the powers of the Presidency. Congress remains friendly - for now, but there may come a time when Austin's legislators aren't so friendly to the Reform Agenda. While some may accuse Perot of paranoia, the powers of the Presidency must remain."
 TEX_beyond_post_america_neoliberalism:0 "Beyond Post-American NeoLiberalism"
 TEX_beyond_post_america_neoliberalism_desc:0 "A disturbing trend has emerged from the decade of greed, the era of trickle-down economics and the period of capital gains tax manipulation. We are headed for a two-class society. Reaganomics directly led to the collapse of the United States; and while the era of Washington may be no more, it is evident that not enough has been done to repudiate the legacy of the old America. The time has come to at last push back against the NeoLiberal agenda, and ensure that the darkness of the Reagan era can never more be allowed to pass." 
 
 TEX_Democrats:0 "Texas Democrat Victory"
 TEX_Democrats_desc:0 "Despite being out of power for almost 20 years, it seems that the Texan Democrats have used widespread discontent with the policies of the Perry era to launch their own triumphant return to power. As Bentsenite Democrats seek to reclaim the legacy of the Solid South, they face an uphill battle against one of the most Conservative regions of the Former United States, but perhaps, they may triumph in restoring Texas as a Democrat bastion."
 TEX_President_Johnson_Robb:0 "President Johnson"
 TEX_President_Johnson_Robb_desc:0 "Lynda Bird Johnson-Robb, daughter of Lyndon B. Johnson, perhaps the most legendary Texas Democrat who has ever lived, has avenged the legacy of her father to restore the Democratic Party to prominence in Texas. Previously serving as First Lady of Virginia, Johnson-Robb now seeks to complete the work of her father in defeating Poverty in Texas, as well as expanding rural education and literacy initiatives."
 TEX_resume_the_war_on_poverty:0 "Resume the War on Poverty"
 TEX_resume_the_war_on_poverty_desc:0 "Texas, despite fantastical oil wealth, still remains one of the poorest post-American nations, with rural and inner city areas particularly affected by the strife of poverty. LBJ sought to end poverty during his Presidency with the 'War on Poverty', and while the Reagan administration and subsequent collapse of the United States tore these initiatives apart, his daughter seeks to continue her father's battle against poverty. Our aim is not only to relieve the symptom of poverty, but to cure it and, above all, to prevent it."
 TEX_expand_educational_and_literacy_initiatives:0 "Expand Education and Literacy Initiatives"
 TEX_expand_educational_and_literacy_initiatives_desc:0 "During the Perry administration, the Texan government was known for a prolific underfunding of the Education system, something which came as a particular focus for the Johnson-Robb campaign. As part of the 'New Great Society', Johnson-Robb has almost tripled the Education budget from the pitiful sum that it was allocated under One Republic rule. In addition to greatly expanding the education budget, Johnson-Robb shall expand funding to organizations such as 'Reading Is Fundamental' and other non-profits seeking to spread literacy."
 TEX_a_great_society:0 "An Even Greater Society"
 TEX_a_great_society_desc:0 "The dream of the Great Society was tragically torn to shreds in the aftermath of the Great Collapse. Yet under the daughter of Texas' greatest President President Lyndon Johnson, the vision of the Great Society has been returned to the Republic of Texas. Already crime, poverty, and illiteracy have plateaued across Texas, and despite a meager increase in taxes, we can all confidently say that we live in a truly Great Society."
 TEX_President_Davis:0 "President Davis"
 TEX_President_Davis_desc:0 "A warrior against the forces of the Christian Right, Wendy David has pulled off an upset victory against the long-entrenched forces of the One Republic Party. As a staunch Social Liberal, Davis' victory has come as a shock to many who expected the campaign to fall flat under Texas's Conservative stances. However as it appears, widespread discontent with the One Republic Government has propelled Davis to the Presidency. Now President, Davis is expected to target the One Republic's Social Conservatism and implement a new Liberal revolution in Texas."
 TEX_staunch_social_liberalism:0 "Break the Blue Dog Tendency"
 TEX_staunch_social_liberalism_desc:0 "The Culture War of the Perry Administration has grown increasingly unpopular, and while DeLay's corruption scandal was the contributing factor to the ultimate fall of One Republic, Davis remains confident in her decision to push forward an agenda that protects Texas' marginalized communities. As part of her agenda, Davis shall seek to formally legalize Abortion in certain cases across Texas. While some have used this to label Davis with the derogatory term 'Gynecist', this term has been appropriated by supporters to describe the political position that the primary and most essential power a female can hold is the control of her own sexual and genital functions."
 TEX_cannabis_decriminalization:0 "Legalize Cannabis"
 TEX_cannabis_decriminalization_desc:0 "It has become clear that the War on Drugs has been a bitter failure. Despite a bitter culture clash between President Davis and the bulk of the Texan population, most Texans broadly agree with the legalization of Marijuana. While some have decried Davis for 'destroying Texan family values' by legalizing 'Dangerous Drugs', projections already show that legalizing Cannabis is set to bring billions of dollars in taxable income to Texas."
 TEX_a_return_to_the_new_deal:0 "Richards' Legacy Restored"
 TEX_a_return_to_the_new_deal_desc:0 "Texas has undergone a rapid shift. The battle against the GOP Remnants to the East has shown us the true nature of Conservatism, allowing the forces of Liberalism to thrive once more - mainly out of spite for the GOP. At long last, we shall realize that our enemies are not each other, but rather the forces in Atlanta who wish to destroy us all. At last, the era of the New Deal, where the Government seeks to help, rather than menace, shall be returned as Texas once more turns deep blue."
 TEX_President_Castro:0 "President Castro"
 TEX_President_Castro_desc:0 "The popular Mayor of San Antonio has defied the odds to become Texas' first Hispanic President. A prominent Progressive voice within the Texas Democrats, President Castro, not to be confused with Fidel, has dyed the Yellow Rose of Texas Red with his upstart campaign. While still hounded by Blue Dogs and the ever-present threat of One Republic, Julián Castro, not to be confused with his identical twin brother, shall seek to undo the damage of the One Republic Party, and restore Texas as a Progressive beacon in the post-United States."
 TEX_rehabilitate_the_hispanic_community:0 "Target Anti-Hispanic Discrimination"
 TEX_rehabilitate_the_hispanic_community_desc:0 "Relations between the Hispanic Community and the Government have been appalling under One Republic's watch. Julián Castro, as Texas' first Hispanic-American President, has made undoing the Government's reckless demonization of Mexican-Texans a key part of his platform. The Civil Rights Act of [GetYear] shall help tackle discrimination not just against Hispanic Texans, but against countless marginalized groups that have suffered the Government's ire under the One Republic Regime."
 TEX_castrocare:0 "CastroCare"
 TEX_castrocare_desc:0 "Healthcare in Texas is in a dire state. Medicare has long been a thing of the past, as options for the poorest among us to access healthcare remain few and far between. The time has come to leverage our majority in the House and Senate, as well as alliances with organizations such as the Reform Party to pass comprehensive healthcare reform in the Republic of Texas. The hallmark piece of legislation for the Castro Administration shall be a bill to create a universal healthcare system known colloquially as 'CastroCare'. This law already being drafted, and once it passes, all within Texas shall have access to medical care regardless of their income."
 TEX_campaign_finance_reform:0 "Comprehensive Campaign Finance Reform"
 TEX_campaign_finance_reform_desc:0 "Big Money in Politics is one of the primary reasons why One Republic was able to run roughshed over our state for so long. The time has come to take the big players out of politics and ensure politicians are funded by the people, for the people. Strict limits on Campaign Finance shall be introduced, placing limits on the amounts that can be donated by individuals, and banning corporate interests from funding campaigns entirely. With these new restrictions in place, no longer shall large corporations be able to buy elections."
 TEX_investigate_perrys_corruption:0 "Investigate One Republic Corruption"
 TEX_investigate_perrys_corruption_desc:0 "We know damn well that the One Republic Party is corrupt as the day is long. From A to DeLay, we know that just about everybody in their ranks has been skimming off the top. It's high time we thoroughly investigate every corrupt act done by the One Republic Party before they were rightfully banished from the halls of power by the Democratic Party, ensuring that no crime goes unpunished."
 TEX_new_legal_system:0 "A New Legal System"
 TEX_new_legal_system_desc:0 "Maintaining a consistent majority in Congress is a fanciful dream to many within the Democratic Party - thus, we must defer to the courts to keep Texas safe from Authoritarianism, even if the Legislative and Executive Branches are lost. With a new Supreme Court tackling the issues of the day, we can ensure an impartial interpretation of Texan law, and ensure that now and always, the Constitution will trump the wills of the political class."
 TEX_fight_back_against_culture_warriors:0 "Strike Back in the Culture War"
 TEX_fight_back_against_culture_warriors_desc:0 "The Perry administration was too busy fighting a Culture War to focus on the genuine war brewing with Atlanta. The time has at last come to fight for the rights of all Texans under the Lone Star. The war we shall focus on fighting shall be the war against the forces of Evil in Atlanta, as Texans one and all realize that their enemies are not each other. Texans of all stripes fought with distinction during the war, causing the tide to slowly, yet surely, turn towards social acceptance of all Texans, regardless of race, sexuality, or creed." 
 TEX_same_sex_civil_unions:0 "Same-Sex Civil Unions"
 TEX_same_sex_civil_unions_desc:0 "As it stands, the vast majority of Texans in the year [GetYear] believe that Marriage is a union between a man and a woman. Despite some within the Democrat caucus wishing to change the status quo, the fight for Gay Marriage is a losing battle in Texas - with Homosexuality only recently being legalized. However, by legalizing Civil Unions between same-sex couples, we can hopefully move the Overton Window to a place of social acceptance some time in the future."
 TEX_publicize_corruption_trials:0 "Richardson's Anti-Corruption Trials"
 TEX_publicize_corruption_trials_desc:0 "Destroying the grip of One Republic requires the public to be made aware of the staggering corruption of the Perry era. Led by prominent New Mexico politician Bill Richardson, perhaps the most incorruptible man in the Texas Democratic Party, we shall seek to prove that the corruption issue is a uniquely One Republicite issue, publicizing the findings of the report to ensure that the people know well enough to reject the OR Party next time they make their voices known."
 TEX_extend_emergency_powers:0 "Extend Emergency Powers"
 TEX_extend_emergency_powers_desc:0 "It has come as a great irony that the Emergency Powers long bemoaned by the Texas Democrats would now serve as their greatest tool. Congress may remain hostile to our agenda, but thanks to [TEX.GetLeader]'s extensive wartime powers, we can veritably bypass anything the do-nothing Congress throws at us. Utilizing their widespread executive powers, the President shall abolish a host of restrictive laws put forward under Perry's watch, fighting fire with fire and ensuring these powers can never more hurt Texans by using them to their full extent."
 TEX_return_seized_firearms:0 "Return Seized Firearms"
 TEX_return_seized_firearms_desc:0 "The Second Amendment is present to prevent the imposition of tyrannical government. One Republic's crooked rule has reminded us that the treat of Tyranny on the American Continent remains present. Civilian firearms, seized by the Government, shall be returned to the Texan People as we work to ensure that Texas will remain forever safe from the forces of dictatorship. After all, armed minorities are harder to oppress. Texans, known for their love of firearms, are unlikely to support any substantial Gun Control measures - so this move is both parts idealistic and pragmatic."
 TEX_limited_gun_control_initiatives:0 "Limited Gun Control Initiatives"
 TEX_limited_gun_control_initiatives_desc:0 "The seizure of civilian firearms during the war was one of the few actions taken by One Republic that the Democrats can agree on. It is clear that substantial civilian firearm ownership is a net detriment to Texan society, despite the presence of a well-armed populace proving instrumental to the war against Atlanta. Limited restrictions on firearms will ensure we can balance Texas' infamous love of guns with a policy that can help mitigate violence and mass-casualty events."
 TEX_comprehensive_police_reform:0 "Comprehensive Police Reform"
 TEX_comprehensive_police_reform_desc:0 "For too long the Texan police has acted as a veritable arm of the One Republic Party. The widespread Police crackdowns on Hispanic communities caused Mexican intervention in the first place - and if we are to negotiate with the Mexicans in good faith for the return of our territories, we must prove that the Texan state will not act as an instrument of oppression towards the Hispanic community. The time has come to reform Policing across Texas, dealing with deep-seeded issues in law enforcement that include systematic discrimination and corruption."
 TEX_enshrine_secularism:0 "Enshrine Secularism"
 TEX_enshrine_secularism_desc:0 "The Founding Fathers declared that Congress shall make no laws respecting an establishment of religion. While the United States may have perished, the words of the Founding Fathers still ring true. Under One Republic, tireless efforts were made to break down the wall between Church and State - a wall which we shall move to repair and strengthen. While Texas may remain a majority-Christian nation, our government shall remain in all parts, strictly secular and not tied in any way to the Christian faith."
 TEX_lift_martial_law:0 "Lift Martial Law"
 TEX_lift_martial_law_desc:0 "The presence of Martial Law was undeniably helpful in advancing our agenda, but it's time to at last end the State of Emergency. For too long Martial Law has been used as a political cudgel. The forces of One Republic, for the first time on the outside of this system, at last understand this fact. The time has come for the entire Political Spectrum to gather to ensure that Emergency Provisions can only be used in true times of emergency. With significant reforms to Presidential Powers, we shall ensure that any future State of Emergency will be a bipartisan effort to protect the Texan people from legitimate danger."
 TEX_shut_out_one_republic_forever:0 "Shut out One Republic Forever"
 TEX_shut_out_one_republic_forever_desc:0 "One Republic's reign nearly destroyed the Republic of Texas; it's a miracle we managed to win the Remnant War with the likes of Perry at the helm. Thankfully, cooler heads have prevailed under a Democrat administration; however we may not be so lucky next time around. The time has come to cut the head off the One Republic snake. The Party must be boxed out of power forever."
 
 TEX_President_Friedman:0 "President Friedman"
 TEX_President_Friedman_desc:0 "My platform, is that I'm not a politician. My platform is that I’m not a bureaucrat. My platform is that I'm a writer of fiction who speaks the truth. My platform is to fight the wussification of this great state, to rise and shine and bring back the glory of Texas. My platform is no hill to a climber. My platform is to remember that when they went out searching for Sam Houston to try to persuade him to be the President - and he was the greatest President Texas has ever had - rumor has it that they found him drunk, sleeping under a bridge with the Indians.\n\nOn second thought, I've finally realized, maybe I didn't really want a platform. They'd probably try to put a trapdoor in it."
 TEX_remember_the_alamo_and_keep_it_holy:0 "Remember the Alamo, and Keep it Holy"
 TEX_remember_the_alamo_and_keep_it_holy_desc:0 "Those keen on Texas politics remember the wintry morning of February 3, 2005, Kinky Friedman stood in front of the Alamo and called for the unconditional surrender of President Rick Perry. The Alamo, as most Texas schoolchildren already know, and most out-of-state tourists soon discover, is not a large or imposing structure. In fact, it is one of the smaller missions in a state where everything is supposed to be bigger. True Texas leaders are unmistakable. After all, the last independent governor of Texas was Sam Houston. That was more than 154 years ago. What the Alamo stood for—and fell for—mattered greatly to Sam Houston, and these ideals of courage, freedom, and independence should be precious to all of us today as well. What about the Alamo of the heart? Will Texans continue to stand in line to see Willie Nelson or Lyle Lovett or Joe Ely, but not stand in line to vote? Have we forgotten that heroes died here to give us this right?"
 TEX_fight_voter_apathy:0 "Slay Voter Apathy"
 TEX_fight_voter_apathy_desc:0 "Apathy, if allowed to go unchecked long enough, will destroy anything: a great love affair, a great talent, a great Republic. While running, Friedman has come to realize that his real enemy was not the incumbent President, Rick Perry. It was apathy. The longtime stranglehold of the three-party system had had a great deal to do with creating that voter apathy, the sense of why bother because nothing was going to change anyway. Pathetically low turnout has been the favoured tool of the establishment - however with some elbow grease, President Friedman shall slay the dragon of voter apathy and change politics as usual in Texas forever."
 TEX_fight_wussification:0 "End Political Wussification"
 TEX_fight_wussification_desc:0 "If ol' Kinky has realized one thing throughout his travels across Texas, it's that the political landscape in Texas needs a significant overhaul. The hucksters, the wealthy, and the two-faced rule have all ensured that there is no room for truth in Texas, and that the little guy is surely forgotten. People are so disgusted with the politicians that they've turned off on politics, which is exactly what the politicians wanted to happen. But we can't allow this system to continue. With a firm stand against the 'Wussification' of Texan politics, and an aim to restore voter participation, President Friedman ought to bring some dignity back to the Lone Star, or die trying."
 TEX_no_bullshit_governance:0 "No-Bullshit Governance"
 TEX_no_bullshit_governance_desc:0 "One Republic has long hid behind Martial Law as a means to escape any form of political accountability. Excuses are the bread and butter of the political class, and Rick Perry is no exception. The war's over, and the time's come to get rid of the swarm of locusts that occupy the Texan legislature. One Republic needed to go, they needed to be exposed for their forms of weaponized hypocrisy, and with the biting satire of the ol' Kinkster at the helm, the President is set to do just that."
 TEX_democrips_and_reploodlicans:0 "Fight the Bloods and the Crips"
 TEX_democrips_and_reploodlicans_desc:0 "While the Kinkster has grown more pragmatic in the years since 2006, gradually getting a hold of the political animal and familiarizing himself with the halls of power in Texas, he still remains a man committed to the independent nature of Texan governance. Texas has long been run by the Bloods and the Crips - the Liberals and the Conservative parties, still sell themselves to the highest bidders. God himself couldn't get elected as an Independent, that much is clear, and while Kinky may be a member of the Party of the Jackass, he's going to do everything in his power to reinforce an independent style of Governance in Texas, just like Sam Houston. A politician is merely thinking about the next election; astatesman is thinking about the next generation. The Texas Legislature, unfortunately, is hardly thinking at all."
 TEX_invest_in_biodeisel:0 "Invest in Biodiesel"
 TEX_invest_in_biodeisel_desc:0 "One Republic has long been so deep up the Oil Industry's ass that they can see the sunshine. Willie Nelson, a good friend and prominent advisor within Friedman's cabinet, has expanded efforts to break from the clutches of Big Oil and expand renewable energy in Texas. With Willie in charge, farmer’s bio-diesel co-ops would be springing up all over Texas to make bio-diesel readily available to everyone. With Nelson as our nation's Energy Czar, we can at last forge a greener and more efficient future for the Lone Star Republic."
 TEX_bribe_mexican_generals:0 "Five Mexican Generals Plan"
 TEX_bribe_mexican_generals_desc:0 "The Five Mexican Generals Plan goes like this: We divide the border into five jurisdictions and we appoint a Mexican general in charge of each. Then we place a million dollars (or two million, whatever it takes) in a bank account, which we hold in escrow for each general. Then, every time we catch illegal activity his section, we withdraw $10,000. This will effectively shut off cross-border crime into Texas. While relations with Mexico have remained frosty ever since 1987, we trust that this strategy can help curb crime on the Border and provide a foundation for the peaceful return of South Texas."
 TEX_slots_for_tots:0 "Slots for Tots"
 TEX_slots_for_tots_desc:0 "As the Reverend Goat Carson says, “It takes a real dumbass not to understand the value of an education.” Compared to the other post-American nations, we are last in high school kids getting to college. We are first in dropouts. Our teachers are paid well below average, this in a Republic that may well be the richest in the whole of the once-United States. A meager gas tax that won't affect prices at the pump due to Texas' status as the largest oil producer in North America, combined with the legalization of gambling, shall help pay for better teacher salaries. As wekk, we shall pass legislation to transfer sports funding out of the budget, end Government funding for large Stadiums, and introduce an Oil Trust to pay public salaries for other 'Texas Heroes'."
 TEX_freedom_to_smoke:0 "The Freedom to Smoke"
 TEX_freedom_to_smoke_desc:0 "If smoking is not allowed in heaven, I shall not go. Friedman probably couldn't win without appealing to all the techno geeks in Austin and those pot-smokers wanting to legalize dope, 'A cigar in every mouth and a chip on every shoulder'. We've got to clear some of the room out of the prisons so we can put the bad guys in there, like the pedophiles and the politicians."
 TEX_you_can_lead_a_politician_to_water:0 "You Can Lead a Politician to Water..."
 TEX_you_can_lead_a_politician_to_water_desc:0 "President Friedman loves Texas and hates what the politicians are doing to her. Declaring that there had to be something he could do for my country be¬sides flying five Texan flags from my pickup truck and telling the guy with four Texan flags on his pickup truck to 'Go back to the UAPR, you communist bastard!', Friedman threw his ten-gallon yarmulke into the Presidential race with the infamous slogan 'Why the Hell Not?', not seeking a victory, but rather a chance to rail against the crooks in the One Republic Party. Shocking everyone, including himself, Friedman now has the difficult prospect of fulfilling his campaign promises, keeping the Politically Correct freaks and Right Wing nutjobs alike at bay. Someone pass the bourbon."
 TEX_but_you_cant_make_them_think:0 "...But you Can't Make them Think"
 TEX_but_you_cant_make_them_think_desc:0 "Texans, supposedly, are the most independent-thinking people in the once-United States, but if we're going to be inspired, the inspiration will have to come from leaders unafraid to deal in new ideas and honest answers. We need leaders who let the people call the plays instead of dancing to the tune of the moneymen. This kind of leader is never going to look or sound like a politician. He won’t speak in hollow phrases, steer by image polls, or show up in hand-tailored suits. True Texas leaders are unmistakable. After all, the last independent governor of Texas was Sam Houston. That was more than 154 years ago. He turned out to be the most visionary governor Texas has ever had. I don't believe Sam Houston would regard too highly the political landscape we see today. He would’ve detested the fact that we have a government of the money, by the money, and for the money. Sam never liked politicians much anyway, and neither do I. My own definition of politics goes as follows: poly means more than one; and ticks are blood-sucking parasites."
 TEX_as_miserable_as_the_rest_of_us:0 "As Miserable as the Rest of Us"
 TEX_as_miserable_as_the_rest_of_us_desc:0 "Social issues have always been a tricky spot for Texas Democrats, the Kinkster included. Texas remains a deeply Conservative region, Friedman's political shakeup notwithstanding. On Abortion, Friedman has rejected the pro-Life/Pro-Choice dichotomy to embrace a 'Pro-Football' position, and when it comes to the Queers, Friedman has an equally complicated history. While first lampooning Feminism and the 'cranked-up lesbians' in his songwriting career, President Friedman has grown into a position that if the Gays want to get married and be as miserable as the rest of us, that ought to be their right. While the Legislature has made the legalization of Gay Marriage a non-starter, Civil Unions can serve as a good first step towards full legalization in due time."
 TEX_ban_gerrymandering:0 "Throw the Money-Changers out of the Temple"
 TEX_ban_gerrymandering_desc:0 "Privately financed campaigns have disenfranchised too many Texans for too long, and incumbents spend more time fund-raising for reelection than they do working for the citizens who elected them. Publicly financed campaigns, funded through surcharges and registration fees on lobbyists, would eliminate the influence of special interests and would level the playing field for all political candidates. Increased registration fees for lobbyists and 10 percent surcharges on lobbying expenditures and other independent expenditures would provide more than $30 million in funding for Texas legislative and statewide races."
 TEX_abolish_death_penalty:0 "Abolish the Death Penalty"
 TEX_abolish_death_penalty_desc:0 "'A good politician, they say, should be like a good football coach. He should be smart enough to understand the game, yet dumb enough to think it means something. But there are times when politics can mean something important, perhaps even existential. The politics of which I write are the politics of life and death'. The One Republic Party was well known for their love of the Death Penalty. The string of people executed with flimsy evidence is equal parts horrifying and abhorrent. The reckless use of the Death Penalty must come to an end. No longer shall the state have the power over life and death. In the words of the President songwriter, 'I am not anti-death penalty, but I'm damn sure anti-the-wrong-guy-getting-executed'. The system ain't perfect. Until it's perfect, let's do away with the death penalty'."
 TEX_my_president_is_a_jewish_cowboy:0 "My President is a Jewish Cowboy"
 TEX_my_president_is_a_jewish_cowboy_desc:0 "The Jewish Cowboy and noted author of several bestselling mystery novels was never really on people's shortlist of figures you'd expect to be elected as President of the Republic of Texas. His own lampooning of the political system and infamously politically incorrect persona has ironically led to a great deal of legitimate social change within Texas, as the Political System quivers at the sight of the most famous Texas Jewboy. Say what you will about Friedman's sense of music, his timing, his dress, his manners, his politics, even his cigar. He is what he is, and approve of his job or not he's certainly had an impact on the Lone Star Republic."
 
 TEX_Next_Elections:0 "The Next Texan Elections"
 TEX_Next_Elections_desc:0 "Election Season, oh boy. The Campaign Trail has come to an end and now the people of Texas get to decide whether the President will get Four More Years, or if another candidate will step up to take the mantle. It's anyone's game as the people of Texas make their voice heard in this nation's 9th Presidential Election. I wonder who will win."
 TEX_One_Republic_Second_Term:0 "One Republic"
 TEX_One_Republic_Second_Term_desc:0 "A fixture of Texan Politics since its foundation, One Republic has once more claimed victory in Texas' latest Election. With another term secured, the Party will move forward in implementing its hardline Socially Conservative agenda."
 TEX_expand_the_death_penalty:0 "Expand the Death Penalty"
 TEX_expand_the_death_penalty_desc:0 "The Death Penalty keeps us safe from dangerous criminals. While Liberals clamour to shut down the Death Penalty and cut down the 'Green Mile', [TEX.GetLeader] knows that firing up ol' Sparky once more is the only way to send a message to criminals. The time has come to expand the Death Penalty, and ensure that even every crime possible will enjoy the maximum penalty, which shall both free up space within our Prisons, and send a strong message to Criminals."
 TEX_crackdown_on_drug_users:0 "Crackdown on Drug Users"
 TEX_crackdown_on_drug_users_desc:0 "Potheads are dangerous criminals, and they must be locked up. We must undo decades of social conditioning that Pot use is 'no big deal', we must make it clear via a new Media campaign that hard drugs such as Marihuana are a dagerous, disgusting, and illegal vices that will not be tolerated. The Texas Communication Commission will also require that all scripted civilian broadcasting will be mandated to include anti-Drug and anti-Marihuana messaging from here on out to keep Reefer Madness from spreading further."
 TEX_united_under_the_bible:0 "United Under the Bible"
 TEX_united_under_the_bible_desc:0 "One Republic, United, Under God, Texas stands. We were founded on Judeo-Christian values, and as it stands, Atheism is incompatible with the Texan way of life. Outside of outright banning Irreligion, we have done all we can to curb the scourge of Atheism, but to ensure that the specter of Godlessness is no threat to the Texan way of life, more must be done. The time has come for formal legislation stating that only Christians can hold public office in the Republic of Texas."
 TEX_rehabilitate_confederate_generals:0 "Spirit of the South"
 TEX_rehabilitate_confederate_generals_desc:0 "Despite Confederate imagery being co-opted by Yankedom's sordid remains pushed southward into rightful Confederate territory in Atlanta, all true red-blooded Texans know that the true spirit of the South lives on not in [USA.GetNameDef], but in Texas. Constructing a new wave of monuments to Confederate Generals is a sure-fire way to remind our kinfolk of that."
 TEX_natural_governing_party:0 "The Natural Governing Party"
 TEX_natural_governing_party_desc:0 "One Republic is on a path to complete political domination. Opposition is already faltering as One Republic, due to both unprecedented rates of Election Suppression, and the natural collapse of all political opposition in the face of Texas' unwavering commitment to Conservatism. We won't have to worry about having to compete in elections ever again."
 TEX_Independent_Republican_Second_Term:0 "Independent Republicans"
 TEX_Independent_Republican_Second_Term_desc:0 "Despite falling on tough times since 2001, the Independent Republicans remain a fixture of the Texan political scene, and have once more claimed victory in Texas' latest Election. With another term secured, the Party will move forward in implementing its Moderate Conservative agenda."
 TEX_limited_cannabis_decriminalization:0 "Limited Cannabis Decriminalization"
 TEX_limited_cannabis_decriminalization_desc:0 "The medical consensus around Cannabis has shifted quite rapidly since the substance was first banned. While we remain committed to defending our children from the scourge of Drug Addiction, new research has shown that Medical Cannabis has many benefits, especially for veterans of the Remnant War. We should relax restrictions and allow greater research in these areas."
 TEX_child_tax_credit:0 "Child Tax Credit"
 TEX_child_tax_credit_desc:0 "To help Texan families, the Independent Republican Party has introduced a proposal for a Child Tax Credit, $2,000 in tax relief per qualifying child, with up to $1,600 of that refundable. Previous attempts to implement this Tax Credit never got off the ground, the Independent Republicans have now formally signed the Texan Families Plan Act into law, legislation which will help lift countless Texan families out of poverty." 
 TEX_reconcile_the_gun_lobby:0 "Reconcile the Gun Lobby"
 TEX_reconcile_the_gun_lobby_desc:0 "Our stances on Gun Control have cost us much support among the Texan Rifle Association. We cannot afford to lose the support of the Gun Lobby to One Republic. We must make it clear to members of the TRA that our recent Firearm legislation is no harm to their business or their rights. We are open to rolling back parts of our Gun Control agenda, so long as the TRA proves willing to provide their support."
 TEX_propserity_gospel:0 "Prosperity Gospel"
 TEX_propserity_gospel_desc:0"The gospel of success preaches that financial blessing and physical well-being are always the will of God for them, and that faith, positive scriptural confession, and giving to charitable and religious causes will increase one's material wealth. The ideals of the Prosperity Gospel have long been a familiar to the Conservative Movement in Texas, who have spread this word via preachers such as Joel Osteen and Kenneth Copeland, who themselves have been the suppliers of massive charitable donations, and even more lucrative tax breaks. To help spread our Gospel of Wealth, we shall preach the ideals of Supply-Side Jesus as well as providing more tax breaks to those who do."
 TEX_conservatism_reclaimed:0 "Conservatism Reclaimed"
 TEX_conservatism_reclaimed_desc:0 "Before One Republic was defeated, Texan Conservatism was dominated by the word of gay-bashing nutcases too focused on fighting a Culture War to meet the economic and security needs of the Texan populace. While many had once thought the ideals of Conservatism irrevocably lost to One Republic, in the years since the Remnant War, we have proven once and for all that we are the true stewards of Texan Conservatism - not Perry."
 TEX_Reform_Second_Term:0 "Reform"
 TEX_Reform_Second_Term_desc:0 "A relatively new arrival on the Texan political scene, many had assumed that the Reform Party would be nothing without the leadership of eccentric Presidential candidate and Billionaire Ross Perot. These fears have been decisively put to rest, as the Centrist Reform Party begins its second term as the ruling party of the Republic of Texas."
 TEX_universial_healthcare:0 "Universial Healthcare"
 TEX_universial_healthcare_desc:0 "Healthcare is in a sorry state across the Republic of Texas. Thousands languish with illness because they do not possess the funds to pay for medical treatment. This grave injustice must be righted. Medicare has already been restored during the previous term, however it is clear that we must go further to expand access to healthcare. Universal Medicaid shall be provided for all Texans, healthy or sick."
 TEX_eliminate_big_money:0 "Eliminate Big Money in Politics"
 TEX_eliminate_big_money_desc:0 "Lobbying, both foreign and domestic, is a scourge on the Republic. PACs must be eliminated so that our political scene can thrive, free from the clutches of Lobbyists and Big Money."
 TEX_further_digital_investments:0 "Further Digital Investment"
 TEX_further_digital_investments_desc:0 "While before Perot first assumed office Texas was lagging heavily behind in the world of digital investment. Efforts to create a nationwide Intranet system have made steady progress, however more is needed if Texas is to catch up to great digital titans such as Japan and Bulgaria. Further investments shall help bring Texas' digital world further into the forefront, and help keep the dream of Digital Democracy alive."
 TEX_tough_on_crime:0 "Tough on Crime"
 TEX_tough_on_crime_desc:0 "Crime is a major issue for all Texans. We need more police on the street to help deal with skyrocketing crime rates that have been present since the end of the Remnant War. The Justice system spends too much time worrying about the rights of criminals and not enough time worrying about the safety of law-abiding Citizens. The time has come for a sweeping crackdown on crime. Thirty years ago there were 3 police officers on the street for every crime. Today, there are 3 crimes for every police officer."
 TEX_legacy_of_perot:0 "Enshrine Perot's Legacy"
 TEX_legacy_of_perot_desc:0 "Although Ross Perot chose not to seek a Second Term, his status as the Reform Party's mascot and Texas' most popular President in the last decade has significantly boosted the post-Perot Reform Party. Now that Perot has retired, we must prove to our Party base that the Party can still function in the shadow of the Former President, while also ensuring that the vision of Perot continues to be followed by the Reform New Guard."
 TEX_Libertarian_Second_Term:0 "Libertarians"
 TEX_Libertarian_Second_Term_desc:0 "Ron Paul's previous four years have been... complex. All the Establishment's Horses and all the Establishment's men tried to put the Old Order back together again, but no matter how much cash they threw at our opponents, the people of Texas have remained stalwart in their Libertarian leanings. Now, the Libertarian Party must prove they can still deliver, lest they become just another facet of the Political Establishment."
 TEX_promote_firearm_culture:0 "Promote Firearm Culture"
 TEX_promote_firearm_culture_desc:0 "The Remnant War has proven the need for Texans to defend themselves. We love guns, we love the Second Amendment. Indeed, our love for firearms at times borders on the sexual. While we typically hate spending Government money, mabye we could include something in the next budget to help subsidize civlian gun ownership. If the Government's going to provide anything to Texans, it might as well be some guns."
 TEX_online_freedom_act:0 "The Online Freedom Act"
 TEX_online_freedom_act_desc:0 "Whatever little exists of the Texan Intranet is concentrated among small, sparesely-staffed servers. The coming Digital Revolution can't be stopped, as much as many within teh Libertarian Party would like to try. The most we can do is to try and embrace it, and introduce legislation to keep Cyberspace free from Government intervention. Big Brother is coming to police the Intranet, and we can't let them. Our status as the world's foremost beacon for Internet Freedom can hopefully attract some buisness to Texas."
 TEX_private_education:0 "Introduce School Vouchers"
 TEX_private_education_desc:0 "The greatest way to ensuring educational freedom in our country is to tear apart the Communistic concept of 'Public Education', instead focusing our efforts on Private Education, and instating a school voucher system. This would allow parents to freely pick any school of their choosing for their children, both public and private, without having to worry about costs. Letting public and private schools compete this way is certain to raise up all schools across the country. Of course, we shall heavily promote the Private schools, to save children from failing Public Schools."
 TEX_privatized_marrige_industry:0 "Privatize Marrige"
 TEX_privatized_marrige_industry_desc:0 "While One Republic likes to prattle about the 'Sanctity of Marrige', the fact remains that Marrige is, above all, a buisness contract. If the queers want to get married then we say let em. The Government has no buisness intervening in matters of marrige. The state has no right to police matters of buisness, or, in rare cases, matters of love."
 TEX_the_rattlesnake_republic:0 "The Rattlesnake Republic"
 TEX_the_rattlesnake_republic_desc:0 "'DON'T TREAD ON ME' - so reads the Gasden Flag, perhaps the most prolific symbol of the Libertarian movement. If you mess with the snake, you get bit. It's pretty simple stuff really. Here in Texas, our pople obey a similar principle: fuck around, find out. Having fended off the Remnants, we know how to take care of ourselves, and as the saying goes, if you mess with the bull, you get the horns."
 TEX_Democrat_Second_Term:0 "Democrats"
 TEX_Democrat_Second_Term_desc:0 "The people of Texas have chosen to elect the Democratic Party in Texas' latest election. With a center-right Economic Policy and Liberal Social Values, the people of Texas have challenged their perception as Social Conservatives to chose Texas' oldest party once more."
 TEX_latino_appeals:0 "Latino Appeals"
 TEX_latino_appeals_desc:0 "Recent polls show that many Hispanic Texans are gravitating towards the Independent Reublican Party. We cannot afford to lose such a core voter demographic. Advisors have recommended a comprehensive new strategy in regard to Latino voters, with new Spanish-Language Campaign Literature already in the works. This approach of pandering for Latino votes should also help smooth over historically-fraught relations with Mexico."
 TEX_legalize_gay_marrige:0 "Legalize Gay Marrige"
 TEX_legalize_gay_marrige_desc:0 "Public opinion in the realm of same-sex marrige has desicivley shifted in the wake of the Remnant War. Civil Unions have already been introduced, but with our control of the Courts solidified, we can go a step further. The time has come to legalize Gay Marrige in Texas. One Republic may sneer at the prospect of 'Undermining Marrige', but their words don't hold weight any longer."
 TEX_education_funding:0 "Education Funding"
 TEX_education_funding_desc:0 "The Democrats have done much to fix Texas' woefully underfunded Education System since first assuming office, but more must be done. Further funds for education shall help raise a healthy, intelligent next generation, a generation hopefully capable of realizing why a robust and well-funded school system is essential to maintain a functioning society."
 TEX_de_confederatization:0 "De-Confederatization"
 TEX_de_confederatization_desc:0 "The Confederacy is an abhorrent symbol of Racism and Discrimination. We should no longer choose to glorify a nation that was founded to preserve Slavery. The time has come to tear down the  legacy of the Confederate States of America here in Texas. 'Heritage, not Hate' is simply no longer a viable excuse."
 TEX_blue_texas_reclaimed:0 "Blue Texas Reclaimed"
 TEX_blue_texas_reclaimed_desc:0 "Years ago Texas was a Democratic bastion. Bentsen won his election with over 70% of the vote. Yet in the years since, Texas has devolved into a fettid pit of Social Conservatism thanks to men like Perry always keeping the people of this great Republic in the dark. While undoing decades of One Republic damage is a difficult process, we have through blood, sweat, and tears, managed to reclaim Texas for the Democratic Party, and win or lose, our Party once more has a legacy of leadership in the Lone Star Republic."
 TEX_Victory_of_the_Radical_Democrats:0 "Radical Democrats"
 TEX_Victory_of_the_Radical_Democrats_desc:0 "'Radical Democrats' and 'Brocialists' once stated as terms of derision for the movement which would evolve to elect one Woodrow Harrelson as President of the Republic of Texas. Despite the forces of the Establishment conspiring to take them down, the Texan Socialists have delivered a death blow to the forces of stagnation. Against long odds, the Harrelson/Rogan Ticket has done the improbable: peacefully delivering Socialism to Texas."
 TEX_new_enviromental_reforms:0 "New Environmental Reforms"
 TEX_new_enviromental_reforms_desc:0 "Democrats of old have been too terrified of losing the votes of the Oil Industry to campaign for meaningful Environmental reforms. That ends now. The time has come to introduce substantial investments into the Green Technologies industry, favouring an approach that will lead to the creation of new 'Green Collar' jobs in due time, all while we work to gradually transition our nation away from fossil fuels without risking jobs by 2045."
 TEX_reach_out_to_venezuela:0 "Reach Out to Venezuela"
 TEX_reach_out_to_venezuela_desc:0 "Texas and Venezuela have been locked in a bitter Price War over Oil since the late 90's. Reviled by their 'Socialist Leanings' under Chavez and later Maduro, Venezuela was often vilified in One Republic propaganda. At last, the people have seen through these lies. The time has come to end this battle, meet Maduro face-to-face, and forge a better future for both of our nations."
 TEX_expand_the_role_of_unions:0 "Expand the Role of Unions"
 TEX_expand_the_role_of_unions_desc:0 "Perhaps Reagan's greatest crime was destroying the Union core of American industry. The collapse of Unionization rates, particularly in Texas, has caused an explosion in worksite accidents and a wide-scale suppression of wages. Utilizing our links with Texas' Unions, we shall tear existing right-to-work laws to absolute shreds, in addition to banning Scabs. With these efforts underway, Texas shall at last heal from the scars of the 80s."
 TEX_raise_minimum_wage:0 "Raise the Minimum Wage"
 TEX_raise_minimum_wage_desc:0 "Wage stagnation is a major problem in Texas. One Republic's borderline disdain for the Working Class has led to a situation where someone working on minimum wage cannot afford a month's rent in even a single Texan county. To help further stimulate the economy and combat the rising cost of goods, we shall raise the Federal Minimum Wage to 15 dollars per hour. No longer shall Wage Suppression and Stagflation be the norm."
 TEX_alternative_media_machine:0 "Alternative Media Machine"
 TEX_alternative_media_machine_desc:0 "The Lamestream Media is really awful. Throughout [TEX.GetLeader]'s battle to claim the Presidency, you could find 20 articles about whatever a local kitten was doing, but nada on the Political Revolution of the Century. It's time to target the Lying Media. Utilizing their connections with the Texan Underground Radio, [TEX.GetRulingParty] will seek to create a new media environment that will challenge the narrative of the One Republic-owned media."
 TEX_investigate_big_pharma:0 "Challenge Big Pharma"
 TEX_investigate_big_pharma_desc:0 "The sickness industry has made a killing peddling the cures to the diseases they have made up. It can't stand any more. In addition to the widely-agreed upon legalization of Marijuana, we shall also move to legalize Psychadelics. These moves shall help break the monopoly of the Medicine Monopolies, breaking the Vaccine-Industrial-Complex with the help of stalwarts like Marianne Williamson. Our new Healthcare Revolution shall at last Make Texas Healthy Again."

 ##########################
 # EVENTS
 ##########################
 
 texas.3.t:0 "The Lone Star Republic"
 texas.3.d:0 "Texas. The Lone Star State. One of the few nations born out of the USA's collapse which can boast about a history of independent Government, many assumed that Texas would rise to be one of the undisputed great powers of the former United States. Tragically, the opposite has come to be, as the modern 'Second Republic of Texas' has been faced with almost two decades of terrible luck. From the Mexican border wars to the Remnant invasion, it seems that Texas has not been spared from the chaos which has enveloped much of the rest of the country. However from this humiliation rises a desire for revenge; for reconquest, and for a restoration of Texan pride and prowess not just in our home but across America. The odds of such a thing happening remain slim, however we in Texas aren't one to shy away from long odds. From Goliad to Gonzales, and even the Alamo, we Texans shall not shy away from our destiny... no matter how hopelessly outgunned we may be.\n\nSuch is the theme of President Rick Perry's newest term in office, as the rhetoric surrounding relations with our neighbors has increasingly turned towards revanchism, the reclaimation of our Lost Territories, and even the restoration of 'Greater Texas' borders of 1848. While it can not conclusively be said that Texas is bracing itself for war, such a scenario is definitely on the Perry Administration's mind."
 texas.3.o1:0 "God Bless you Texas, and keep you Brave and Strong."
 
 texas.4.t:0 "Our Wilted Rose"
 texas.4.d:0 "Texas' borders were among the most iconic of any state in the pre-collapse United States, with the iconic shape of the State of Texas adjourning every belt buckle, truck stop decoration, BBQ joint wall and souvenir shop from Amarillo to Laredo. When Texas first left the Union, it was hoped that these borders would be preserved, or even expanded. Indeed, after the annexation of the State of New Mexico in 1989, it seemed that Mirabeau B. Lamar's dream of a Texas stretching from the Gulf to the Pacific was well on its way to being fulfilled. However as things often do, eventually everything eventually went terribly wrong. Race Riots caused by increasing hostilities between Anglo-Texans and the large Mexican-American minority in Southern Texas and New Mexico caused an 'intervention' by our neighbors to the South. The Mexicans, while bogged down by an almost decade long battle with powerful Drug Cartels, still proved to be a formidable force, and managed to walk away with the left bank of the Rio Grande and much of Southern Texas, including major cities such as Laredo and Corpus Christi. This event has led to the Texan government having a perpetual chip on their shoulder towards the large Hispanic Community in Texas; fueling race-based tensions and driving many formerly 'loyal' citizens into the arms of the Mexican Government. The sense of Texan nationalism born out of this incident has taken a notably different tone to that expressed towards the Republic, as Anti-Mexican hostilities have frequently boiled over into lynch mobs, race riots and anti-Hispanic witch hunts. As inequality continues to run deep in Texas, many have predicted that tensions between our Hispanic communities may soon reach a boiling point."
 texas.4.o1:0 "Texas shall be whole once more!"
 
 texas.5.t:0 "Blood on the Astrodome"
 texas.5.d:0 "Today was meant to be a day for great celebration for the people of Texas, as our flagship baseball team, the Texas Rangers managed to score a knockout victory against the New York Yankees in this year's American League Championship Series. Game 6, held at Houston's Astrodome, the home of the Texas Rangers ever since Arlington's takeover the the Republic, solidified the championship for the rangers, and was thus the location of a roaring post-game party commemorating Texas' win. However as team owner George W. Bush appeared to talk to the press, joy turned to horror as a gunman in the crowd fired wildly in his direction. Luckily, of the four shots fired by the gunman, every single missed entirely, missing Bush's armm by an inch, and instead striking batter Josh Hamilton in the leg. It is believed that the gunman, who fled before they could be identified, targeted team owner George W. Bush due to his relation to former President George H.W. Bush. Indeed, Bush had once hoped to follow in his father's footsteps as President of the Republic; however following a bitter loss in the 2002 election, Bush swore off politics forever, moved away from the so-called 'Bush Cult' and took up residence in Texas, where he became the owner of the Texas Rangers baseball team. While typically silent on non-sporting matters, the few statements he has given since have been highly critical of the Rumsfeld administration, and especially their policies towards Texas. He has since come to identify exclusively as a Texan instead of an American, despite retaining dual citizenship.\n\nJosh Hamilton was quickly rushed to the nearby Texas Medical Center following the incident, where he is to make a full recovery and return as a batter next season. Both President Perry, team owner Bush, and Yankees manager Joe Girardi have condemned this awful attack, and have extended their best wishes to the injured."
 texas.5.o1:0 "We hope for their speedy recovery."
 
 texas.6.t:0 "Ending the War on Broccoli?"
 texas.6.d:0 "Among the lesser-known but still notable qualities of former President Bush was his loathing of Broccoli. Bush frequently mentioned his distaste for broccoli, famously saying: 'I do not like broccoli. And I haven't liked it since I was a little kid. And my mother made me eat it. Now I'm president of the American Republic. And I'm not gonna eat any more broccoli!'. Dwarfed by his status as 'Savior of the South' during the Great American Collapse, this fact has permeated the public consciousness in recent years, as Broccoli emerges as a prominent symbol for those opposed to the Bush Cult. The spread of the Anti-Broccoli movement has reached such an extent that even consuming the vegetable is seen as an unpatriotic act. While many are hesitant to critique even the most menial characteristics of the late President due to his near-godlike status, many nutrition experts have cautioned that the public's apprehension of broccoli may be having a negative effect on the nation's health. And while challenging the late President's rebellion against broccoli may garner us bad press due to the public's admiration of him, from both a nutritional and culinary standpoint, ending the decades-long war against this vegetable may be worth the effort."
 texas.6.o1:0 "The President was speaking in jest - Let them eat Broccoli!"
 texas.6.o2:0 "President Bush wasn't *always* right."
 texas.6.o3:0 "Damn the health nuts and damn their unpatriotic vegetables!"
 
 texas.7.t:0 "Rumors of Major Attack Incoming"
 texas.7.d:0 "Among the Austin offices of the Texas Central Intelligence Service, rumors have stirred about the possibility of another major attack occurring. Chatter from terrorist cells have suggested that a major terrorist operation is underway, one which could possibly be worse than last year's May 29th attacks. While it is not yet known where they will target, or how they will go about with their operation, it is strongly suggested that San Antonio may be the source of the attack. Primary intel suggests that the terrorists may attempt to attack the Alamo, a major Texan cultural symbol, however other reports suggest that this latest attack may attempt to damage vital infrastructure such as waterways, power lines, and highways. While TCIS agents have presented their concerns to President Perry, Austin does not appear to be taking these dire warnings very seriously."
 texas.7.o1:0 "They're being too paranoid."
   
 texas.8.t:0 "Security Around the Alamo Increased"
 texas.8.d:0 "For the last few days, reports from the TCIS headquarters in Austin have suggested that a major terrorist attack near San Antonio is imminent. Primary intelligence reports have indicated that these terrorists intend to target vital infrastructure and transportation networks, however secondary reports also suggest that they intend to target the Alamo, a major Texan cultural center. The government has announced that instead of moving troops in to defend vital infrastructure, Texan security forces will be reassigned to the Alamo. This runs counter to many of the TCIS' suggestions, as several intelligence experts question the merits of sparing troops to defend the already heavily-guarded Alamo instead of defending our nation's most essential infrastructure. Additionally, new intelligence coming in has suggested that the terrorists have zeroed in on the I-37 as their target, and are already beginning preparations to attack. The Perry government has thus far ignored their calls to reassign troops to defend vital infrastructure."
 texas.8.o1:0 "Just ignore them."
  
 texas.9.t:0 "Terror on the I-37"
 texas.9.d:0 "The Citizens of San Antonio awoke to terror and mayhem today, as two tremendous explosions rocked the I-37 freeway, killing 237 people and injuring almost 100 more. Two trucks manned by members of the 'Hammerskin' Neo-Nazi terrorist organizations were parked on two ends of I-37 during the height of rush hour on St. Patrick's Day. These trucks were stuffed to the gills with high explosives, and collectively created a blast wave which spanned over two hundred feet in diameter, and instantly killed more than 100 people. After the two bombs were detonated, a large section of I-37 collapsed, killing almost 50 more. The death toll from this incident has dwarfed that of the May 29th attack, already remembered as one of the deadliest days in the history of our Republic. President Perry has addressed the nation to denounce the masterminds behind this plot, issue a call for justice, and attempt to comfort the people of Texas in one of their darkest hours..."
 texas.9.o1:0 "We shall pray for those affected."
 
 texas.10.t:0 "Terrorist Mastermind Releases Manifesto"
 texas.10.d:0 "The airwaves have been abuzz today, as the manifesto of the mastermind of the devastating St. Patrick's Day attacks, Wade Michael Page, has been released. A former U.S. Army veteran, Page was discharged for drunk and disorderly conduct, eventually falling in with the White Supremacist music scene in Houston. With the identity of the terrorist being revealed as Page, it has become clear that the culpability behind the attack lies with the Hammerskin Neo-Nazi movement, which has greatly grown in strength after the destruction of the New Americans group, making them the number one anti-Republic terrorist group in Texas. While the Hammerskin movement officially has no leader, many have speculated that Page has served as a de-facto leader or guide for the movement throughout recent years. The manifesto released by Page was read over the airwaves under intense pressure after several TV and radio stations reported a series of direct threats of violence by White Supremacist groups. Contained within the document were several paragraphs of unhinged ranting, mostly targeting non-whites and religious minorities. While Page denounced both the Republic and the Texan Governments, the document has called for the creation of a unified White Supremacist state within the former United States, clearly linking Page to anti-Annexationist rhetoric."
 texas.10.o1:0 "Somebody find this nutcase at once!"

 texas.11.t:0 "TCIS Agents Claim They Were Warned"
 texas.11.d:0 "As Texas reels from the aftermath of the St. Patricks Day attack, several anonymous agents of the Texan Central Security Service, our nation's primary intelligence agency, have claimed that they had shared knowlege of the attack in advance, yet had no action taken. While these claims are nothing more than rumour now, the general sense that experts were ignored has permeated much of our intelligence community. As this dissatisfaction becomes more prominent, experts have warned that those involved with the so-called 'coverup' may be inclined to speak out, and that if they do, it could have dire concequences for both Texan intelligence capibilities, and the Perry Government."
 texas.11.o1:0 "Keep them quiet."

 texas.12.t:0 "Dossier Released"
 texas.12.d:0 "The murmurs around the St. Patricks Day Attack have now grown into shouts, as a devestating dossier has been released by anonymous officials within the TCIS. This dossier claims that Texan inteligence agencies warned President Perry about an incoming attack on vital infrastructure, yet Perry took no action to stop this horrific loss of life, only offering to divert more security forces to the Alamo due to incorrect information that the monument would be the source of the attack. Furthermore, the dossier alleges that Perry the instructed TCIS agents to destroy evidence to the contrary, to paint a false narrative that the Alamo was indeed the intended target, and that the President took all nescecary precautions instead of ignoring prominent intelligence experts. While the TCIS has thus far contained the leak, many have begun to fear that they can't keep people quiet forever..."
 texas.12.o1:0 "Supress it at once."

 texas.14.t:0 "Anonymous Sources Contact Journalists"
 texas.14.d:0 "The Texas Central Intelligence Services, the Intelligence Agency of our Republic, has been strangely quiet ever since the horrific attack on San Antonio on St. Patrick's day. This silence is atypical considering the high-profile nature of the attack. Recently, accusations have floated that President Rick Perry ignored intelligence experts about the true nature of the San Antonio attack, and when confronted, destroyed evidence to the contrary, framing the President in a much better light. Allegedly, the truth is that the President ordered security forces to be posted to the already heavily guarded Alamo instead of the I-37, which was correctly speculated to be the target of the attack. With a coverup in full swing, several anonymous agents have contacted high-profile jouranalists with these allegations, hoping to bring the truth about what happened before March 17th."
 texas.14.o1:0 "Surely just hyperbole."

 texas.15.t:0 "'Scarlet Dossier' Releases"
 texas.15.d:0 "Alex Jones, reporter for a CTV affiliate in Austin, has broken the news with a truly shocking story. According to the veteran investigative reporter, President Rick Perry has covered up a truly stunning string of incompetence within the executive branch, and has incorrectly framed the Texan Intelligence Agency as being culpable for a number of missteps before the St. Patrick's Day Attacks. Jones, known for his work during the El Paso Riots, the Lubbock corruption scandal, and for his interviews with high-profile figures such as Bashar al-Assad, has most recently made headlines for his work to expose the TCIS coverup, and has used his investigative journalism experience to get the full report, dubbed by many as the 'Scarlet Dossier', released and publicized.\n\nIn the wake of such damning evidence, the Perry administration has gone into defense mode, labeling the report as untrue and attempting to sue the Canadian broadcasting company for libel. Nobody seems to buy the President's rebuttal, and already hundreds have taken to the streets to protest the President's role in the tragic loss of over 200 lives that fateful March day. Already some have begun to question whether this failure was truly incompetence, or if Perry was simply looking for an opportunity to extend his own authority..."
 texas.15.o1:0 "They'll give Jones a Pullitzer for this one."

 texas.16.t:0 "Bush Speaks"
 texas.16.d:0 "Nearly a week after the tragic assassination attempt on the life of Texas Rangers owner George W. Bush, the team owner, has finally made an address about the tragic near-miss and injury of Rangers star batter Josh Hamilton. Reactions to the shooting have caused outrage across the American Republic, as outraged citizens demand a response for the attempted assassination on a member of the Bush family, even if George Jr. has retired from politics and stayed safely outside of the Bush cult ever since his bitter loss in the 2002 primaries. Some in the Republican fringe had expected Bush to call for Remnant military intervention in the wake of his assassination attempt, despite his conflicts with President Rumsfeld, and announce a triumphant return home to Atlanta on the heels of a successful intervention in Texas. Instead, Bush' spent the entirety of his speech talking about mundane matters relating to baseball. Strategically ignoring almost every question fielded to him relating to the political realities of the Bush family, the team owner instead spoke at length about the team's future after the tragic shooting of their MVP batter, which no doubt was meant to target Bush himself. While he has extended repeated good wishes to Hamilton, he has refused to elaborate on his fate within the team, and has not stated definitely whether his recent injury will be a career-ending one. While Bush cultists have been caught in a disappointed silence, the outcome of the press conference has starkly divided fans of baseball."
 texas.16.o1:0 "Has he forgotten that he's a Bush?"
 
 texas.17.t:0 "Jones Speaks Out"
 texas.17.d:0 "Ever since the story of the Perry Government's fatal incompetence in regards to the March 17th attacks broke, a string of conflicting narratives have been spun by both Government Agencies, News Networks and so-called 'independent thinkers'. This has tragically had the effect of sowing doubt about every detail of the I-37 attack, with many being so brazen as to doubt the attack entirely, claiming it to be a False Flag or even denying that it occurred entirely. This narrative is particularly prevalent among Anti-secessionist communities, who have engaged in a steady harrasment campaign against those injured in the attack. Alex Jones, the reporter behind the Scarlet Dossier story, has taken to the airwaves to denounce the harassment against victims of these attacks, going on the record to state that he in no way intended to cast doubt on the legitimacy of the attacks, and revealed Perry's coverup in an attempt to ensure that such horrific events may never repeat. These words have made him a sworn enemy of rabid groups of conspiracy theorists who have intensified their campaign against attack victims figures opposed to Texan annexation. Jones, who was one of the first reporters on the scene of the I-37 attack, has responded to this escalating harassment campaign by founding the 'Citizens for Recovery and Healing', a charitable group dedicated to aiding those injured pro-Remnant terrorist attacks, and providing consolation to those who have lost friends and relatives in these barbaric attacks. While a certain subset of the populace remains convinced beyond reason that these people are nothing more than 'Crisis Actors', Jones remains committed to restoring the public’s faith in the truth, and helping those affected in any way he can."
 texas.17.o1:0 "If our Republic needs anything, it's Truth."
  
 texas.18.t:0 "Perry Initiates Media Crackdown"
 texas.18.d:0 "In the light of a growing conspiracy culture surrounding the March 17th attack, President Rick Perry has made a truly shocking decision to shut down countless independent news agencies and radio stations across the Republic of Texas. This so-called 'Media Consolidation Act' aims to centralize broadcasting in Texas around easily controllable venues, and seeks to shut down 'dangerous' narratives surrounding the tragic loss of life in San Antonio. This act, while noble in a sense, has been criticized by many as an attack on free speech within Texas, and is evidence to many that the Perry Government is becoming increasingly authoritarian. Perry has responded to these claims by stating that the government was not hindering citizens' rights to speak their mind, but rather on the ability for unregistered broadcasters to amplify false narratives. This response has not swayed many, as many figures in the media, even those diametrically opposed to the conspiracy theorists claiming March 17th was a False Flag such as Alex Jones, have denounced these new laws as an attack on free speech, pointing to the fact that many left-wing and anti-Perry stations were also shutdown as a result of the act. Additionally, there are doubts that this will actually combat the issue of March 17th Denialism; some even predict that this act may amplify it."
 texas.18.o1:0 "Silence is golden."
 
 texas.19.t:0 "Martial Law in Effect"
 texas.19.d:0 "While a State of Emergency has been in effect ever since the 2009 attacks, Perry's authority has still been reigned in by a series of checks and balances. However following the devastating San Antonio attack, Congress has almost unilaterally approved the imposition of Martial Law across the Republic. Restrictions surrounding the military and police have been removed, and strict media controls have been formalized. While many Democrat and Independent Republican members of Congress have voted with Perry to authorize the bill, several opposition figures have criticized the measures as being needlessly authoritarian, and have even gone so far to say that Perry now has dictatorial power.\n\n The direct imposition of Martial law is seen by many as yet another escalation in the spat between Texas and the Republic, and has many citizens of our great Republic fearing that war with our neighbors to the east may be on the horizon..."
 texas.19.o1:0 "Concerning."

 texas.20.t:0 "Page Tracked Down"
 texas.20.d:0 "Citizens of our Republic today awoke to news that Wade Michael Page, the mastermind behind the San Antonio attack, has been located and killed. After so many tragedies, news that the instigator behind the March 17th attack has finally been brought to justice is a rare piece of good news for our people, especially those who lost family and friends in the San Antonio attack. Page was tracked down in part due to a tip-off from local residents, who recognized the terrorist from the mugshot plastered all over local media. Held up in a dingy motel outside Odessa Texas, Page had attempted to lay low, only leaving in the cover of night to secure additional supplies and ammunition. It is reported that the motel manager recognized Page's distinctive bald head and glasses despite his attempts to conceal these distinctive features with a hoodie, and almost immediately informed the Police; mainly in an attempt to collect the reward on Page's head. While Page initially tried to flee once he discovered his location had been compromised, he was apparently too late, as almost 60 Texas Rangers descended on his hideout before he could go on the run. While a brief shootout ensued, it soon became clear that Page had been killed, either by a self-inflicted gunshot suicide or by a stray bullet striking him in the left temple. With Page dead, the citizens of Texas can finally breathe a sigh of relief knowing that the architect behind the horrible March 17th attack has finally met his maker."
 texas.20.o1:0 "Page has finally faced justice."

 texas.21.t:0 "Damning Information Released"
 texas.21.d:0 "Before the bodies of the victims of the March 17th attack could even cool, both Texan citizens and intelligence agencies had already come to the same conclusion: that the American Republic knew that this attack was going to occur. The most damning evidence being the fact that they released their condolences for victims of the attack... 14 minutes before it actually occurred. The fact that Atlanta's intelligence agencies knew about this attack beforehand and chose not to inform us is not a matter of debate, however their intentions and ideological connections to the known 'Hammerskin' terrorist organization is still up for debate. The Hammerskins, which rose in prominence after the destruction of the New Americans, are not a group motivated solely by loyalty to Atlanta. Rather they are a neo-Nazi movement seemingly opposed to both of our governments. However, as the primary anti-Secession movement, it would appear logical that they would be targets of Atlanta's support. While [USA.GetLeader] has fervently denied these claims, even if they have no ideological alignment, they clearly had no qualms with letting this group wreak havoc in an attempt to damage our infrastructure and weaken our nation's national cohesion."
 texas.21.o1:0 "Bastards."
 
 texas.22.t:0 "Tensions on the Rise Once More"
 texas.22.d:0 "The destruction of the Hammerskin terrorist group had many hoping that our trouble with Terrorism had come to an end. These hopes appear to have been dashed. The general sense among our citizenry is one of foreboding. To Texans, it has become clear that March 17th was merely an introduction to a wider threat, a threat that will not rest until our Republic is destroyed. Something is going to happen, we don't know where, we don't know when, but its going to happen. The Hammerskins and the New Americans may be gone, but there still remains no shortage of radical elements willing to resort to violence in an attempt to  force their ideology. And while our Police and Armed Forces may remain ever vigilant, the growing consensus is that our capabilities are still not enough. Whatever may end up happening could very well allow our neighbors to the East to smell weakness, impeling them to finish their decades-long struggle to erase Texas once and for all. While we hope for the best, the next months could go so far as to spell doom for the Texan nation if not handled properly."
 texas.22.o1:0 "There's something happening here..."
 
 texas.23.t:0 "Growing Opposition to Perry's Policies"
 texas.23.d:0 "Public discontent with the policies of President Rick Perry appears to be growing. A recent Gallup Poll has revealed that 57% of Texans characterize his handling of the Terrorist situation as 'very poor', with a further 62% believing that Perry would not be the best person to lead Texas into a potential military confrontation with the American Republic. Furthermore, a total of 71% either disapprove or 'strongly disapprove' of the recent imposition of Martial Law, with almost 44% of respondents saying that Perry's invocation of Martial Law was more about political gain than keeping Texans safe. Perry has responded to these criticisms by either assuring Texans that Martial Law is temporary until the situation stabilizes, or accusing dissenters of siding with Republican terrorists. Despite this evidence of overwhelming opposition, Perry appears to show no signs of changing course, with some predicting he may even strengthen Martial Law as war with the Republic looms."
 texas.23.o1:0 "You're either with us or the Terrorists."

 texas.24.t:0 "Further Crackdowns Announced"
 texas.24.d:0 "In the wake of growing opposition to his policies, President Rick Perry has not announced an easing of restrictions as expected, but has rather announced a renewed crackdown on 'subversive' and 'anti-Texan' elements. As the days since the March 17th attack tick by, and as reports of Terroristic actions dwindle, Perry's justifications are appearing to be more and more flimsy. However tension still looms, and among our Military and Intelligence Agencies, all are convinced that our Republic's troubles are far from over. However to these ends, Perry's policies seem to be working in the opposite direction. The renewed crackdown is driving moderates from his camp, and is making the crucial matter of governing much more difficult. As well, those who oppose Perry have been becoming more militant, potentially leading to a series of escalations from both left-wing and right-wing elements. As for Perry, he seems to show no sign of letting up, as an extensive police and military response is planned for protests against his continued rule."
 texas.24.o1:0 "Troubling."
   
 texas.25.t:0 "Counter-Protests Announced"
 texas.25.d:0 "Despite Perry's declaration that any mass public demonstration would be met with a harsh response, protests against Martial Law have still taken place. Protesters broke curfew to express their disapproval of Perry's policies, and the continued presence of Martial Law within the Republic. As expected, these protests quickly turned ugly, as Police turned water cannons and rubber bullets on those who took to the streets to demand an end to Martial Law. Further complicating things, protesters who demanded 'Reconciliation' with the American Republic came into heated conflict with anti-Perry activists, many of whom still identify as Texan patriots and oppose the American Republic. While the police have been quick to dispatch these groups, the supposed 'solidarity' between pro-Remnant groups and those who oppose Martial Law is seemingly a godsend to Perry in the narrative department. Unfortunately, it seems that such a fact is not enough to diffuse public anger surrounding Perry's policies..."
 texas.25.o1:0 "Terrorist Sympathizers!"

 texas.26.t:0 "Rioters Overtake Austin"
 texas.26.d:0 "The protests which overtook Austin during the beginning of the week have not been dealt with as quickly as expected. As new pictures of water cannons and rubber bullet wounds circulate, more citizens are driven to the streets to express their discontent with continued Martial Law. Soon enough, these once 'peaceful' protests turned to riots, as downtown Austin became engulfed in flames. Looting sprees and vandalism have become commonplace as the police struggle to deal with the growing crowds. Perry has denounced these riots to the strongest degree, accusing protesters of siding with the American Republic and working to undermine Texas. Furthermore, Perry has promised to deploy army units around the capital to keep order, even going so far as to authorize the use of deadly force should the need arise. Of course, Perry has also urged 'extreme caution' in such matters.\n\nWhile Perry has been given a narrative win today, the large scale of the protests has also gone to show that Perry's grip on power may not be as secure as once thought, and that Texan's support of the One Republic may not be as widespread as it was before."
 texas.26.o1:0 "Put the Army on Maximum Alert."
  
 texas.27.t:0 "Oliver North Sworn In"
 texas.27.d:0 "As funerals are arranged for those killed in the Senate Attack, one pressing matter has come to Perry's attention: the lack of a Vice President. David Dewhurst, former President of the Republic and the sitting Vice President was tragically killed in the attack, leaving the office of Vice-President currently vacant. In such a dire situation, having a capable second-in-command is vital, and thus it has been recommended that Perry fill this vacancy post haste. The obvious candidate for Dewhurst's replacement is talented Military Officer and Politician Oliver North. North has served with distinction during the Mexican War and the Remnant Incursion. The presence of a Military Man in such a prominent cabinet role is a signal to many that war is indeed on the horizon, and that Perry has tapped the expertise of such a seasoned National Security advisor in an attempt to formulate a strategy to defend Texas against our eastern neighbors. While high-ranking officials have dismissed claims that North's selection was an admission of the inevitability of war, North's inclusion has undoubtedly sent a strong message about the path that lies forward for Texas..."
 texas.27.o1:0 "We need Strong Leadership in Turbulent Times."
 
 texas.28.t:0 "The Ambassador Responds"
 texas.28.d:0 "After an almost 20 year long staring contest, it seems that the American Republic has finally decided to respond. John Bolton and Henry Kissinger have drafted a joint declaration to the State Department that the Senate Attack demonstrates that the instability within Texas is at risk of spreading to the American Republic, and thus a direct military intervention is both warranted and necessary. Additionally, Bolton has declared that Texas is rightfully American territory, and has signed an open letter to President Perry demanding he relinquish his office and return Texas to American sovereignty. Henry Kissinger however has indicated support for an option which would allow Texas to remain independent, albeit on Remnant terms. With the statement from Atlanta in the air, it seems that war has truly become inevitable. [USA.GetLeader] has declared that Texas has exactly 25 days to respond to their demands, or face dire consequences."
 texas.28.o1:0 "Tell them where to shove their Letter!"
 texas.28.o2:0 "Very well then..."
  
 texas.29.t:0 "The Moment of Decision"
 texas.29.d:0 "Attempts at negotiation with the Republic have broken down. Remnant military units have been headed towards the border in droves. Evacuation sirens have been blaring across all cities situated on the border with the Republic. It truly seems that the specter of war with the Republic can no longer be ignored. President Rick Perry, having narrowly survived an attempt on his life, is faced with a heavy decision. Dozens of his countrymen were slain in an attack clearly meant to target him. The Republic is dead set on an invasion, and would most likely be less than amicable to Perry once they inevitably capture Austin. As it seems, the best option on Perry's hands is to simply leave. Flee to a friendly country and pray that CIA agents won't track him down. Of course there are some who declare that a 'Captain must Go Down with his Ship', however who could begrudge Perry for choosing to save his own life.\n\nAfter much decision, President Perry has only one message to his closest advisors:..."
 texas.29.o1:0 "'The Future of our Republic will be decided by force alone.'"
 texas.29.o2:0 "'Screw this, I'm out of here!'"
   
 texas.30.t:0 "Texas Bends the Knee"
 texas.30.d:0 "It seems that the Texans have been rattled by our recent declaration, and have come groveling in an attempt to maintain some semblance of independence. The submission of the Austin Government is certainly a welcome outcome to [USA.GetLeader], however there are some who still see this as an unacceptable outcome, claiming that Texas is rightful American Territory and thus in no position to negotiate. Still, Secretary Kissinger still has the ear of the President, and is suggesting that we cut a deal with Perry and officially recognize the existence of the Second Republic of Texas so long as they agree to become an American satellite state. While the issue of East Texas would still remain in the air, signing this agreement would at least prevent damage to valuable Texan territory, infrastructure and resources."
 texas.30.o1:0 "Cut a Deal with Perry."
 texas.30.o2:0 "Not good enough, we demand Annexation."
   
 texas.31.t:0 "The Republic Refuses"
 texas.31.d:0 "Our attempts at cutting a deal with the Remnants in exchange for our sovereignty has unfortunately failed. [USA.GetLeader] has echoed the rhetoric of Secretary John Bolton, declaring that Texas is an illegitimate nation and rightfully part of the American Republic. The State Department has declared that if we wish to avoid bloodshed, and almost certain destruction, we are to formally join the American Republic as a State of the Union. While some have already conceded to our defeat, and wish to surrender only to spare Texans citizenry from a destructive war, others have echoed the words of those brave defenders of the Alamo. They too faced certain destruction, yet when faced with the choice to surrender to Santa Anna's forces, chose instead to fight to the death. While it may result in our destruction, the spirit of our founders compels us to reply to Atlanta in a similar fashion."
 texas.31.o1:0 "At least we tried reasoning with them first."
 texas.31.o2:0 "We shall comply, only to spare the lives of our citizenry..."
   
 texas.320.t:0 "Texas Refuses"
 texas.320.d:0 "While Texas seemed willing to become an American satellite state in the wake of the Senate Attack, we have rejected their offer and instead demanded full annexation. The Texans have refused this offer wholesale, marking an end to any peaceful resolution of this conflict. Of course it's no matter, as our military strategists predict that we can easily crush the meager Texan armed forces. Unfortunately it seems that the goal of Texan re-integration will not be accomplished without bloodshed. The Texans meanwhile remain annoyed that their good-faith negotiation with [USA.GetLeader] has ultimately been in vain, and that their hopes for peace and independence have been entirely crushed."
 texas.320.o1:0 "We aren't shocked."

 texas.32.t:0 "Texas Appeals for Support"
 texas.32.d:0 "It has recently come to our attention that the government of the American Republic, better known as the 'Remnants', have begun a campaign to invade their neighbors in the Second Republic of Texas. According to Atlanta they are merely retaking 'Rightful American territory', stating that Texas is an illegitimate state with no distinct identity, and rightfully American. Of course, the response by Texan citizens seems to prove otherwise. As the leader of the 'Free World', Canada is a natural target for support by governments seeking to maintain the cause of freedom. While naturally supporting the Texans in their endeavor would be a no-brainer, the fact remains that Atlanta is the American Claimant on the friendliest terms with the Democratic League, and is at least in theory the only one which maintains some form of Democracy. However, keeping the American nations from congealing once more seems to be in the best interests of the Canadian government, as any unified American government could prove to be a potential threat."
 texas.32.o1:0 "We cannot ignore the cause of freedom."
 texas.32.o2:0 "The Remnants are our natural allies."

 texas.33.t:0 "The Canadians Refuse"
 texas.33.d:0 "While we had maintained hope that Ottawa would support our struggle for Freedom and Democracy, it seems that the so-called Democratic League's commitment to these ideals is shallow at best. According to their Foreign Ministry, the Canadians 'understand' our struggle and support the ideals of Texan independence and territorial integrity, but maintain that Atlanta is an 'invaluable ally in the region' which they cannot risk alienating. While the Canadian support of the Republic is not a shock to many, their support for a 'peace process', while still undeniably shallow, provides hope to some that this conflict may have a peaceful resolution."
 texas.33.o1:0 "So much for them."

 texas.34.t:0 "The Canadians Support our Cause"
 texas.34.d:0 "Much to our delight, Canadian Prime Minister [CAN.GetLeader] has expressed their utmost support for Texas' struggle for independence, highlighting in their speech their dedication to the territorial integrity of all post-USA nations. Allies of the Democratic League have announced that they will be sending both diplomatic and military support to Texas in the coming months, and will be doing their part along with the world's other great powers to condemn and sanction the government in Atlanta. As it seems, the cause of the 'Democratic League' is indeed true to their name, as our Canadian allies risk everything to stand with our cause of Peace, Order and Good Government. Atlanta, until now the American claimant with the closest ties to Ottawa, will be undoubtedly outraged..."
 texas.34.o1:0 "For Freedom and Democracy!"

 texas.35.t:0 "The Soviet-Texan Partnership"
 texas.35.d:0 "Ever since One Republic first swept the ballots in 2001, the party has maintained a rigid policy of anti-Communism both at home and abroad. Of course considering the official positions of most post-USA nations, such a policy was a no brainer. However the recent official war with the American Republic has got President [TEX.GetLeader] to go back on these policies in hope of securing strategic aid in our war against the Remnants. Expressing their support for an 'Anti-Republican Bulwark', the Soviet Foreign Ministry has announced an extensive aid package to the Texan Republic, including much of the Soviet Union's old mothballed weaponry. While some have decried this radical change in foreign policy as a capitulation to the Communists, in such desperate times we really can't afford to be picky."
 texas.35.o1:0 "That will stick it to the Remnants."

 texas.36.t:0 "The Texans Cry for Help"
 texas.36.d:0 "The shockwaves from the Invasion of Texas have been felt all the way in Mexico, as countless refugees, both Anglo-Texan and Mexican-American seek refuge away from the advancing war. While tensions with Texas have been rocky ever since the nation came into existence, the Republic seeking to reclaim their 'Lost Territory' may provide a problem for us in the future. Both those who wish for peace and those who wish to reclaim the Mexican Cession have raised their concerns about a potential Texan conquest by the Remnant Government, as a weaker Texas would be easier to influence than a more powerful American Republic. Of course, going back on almost a century of foreign policy between Mexico and an Independent Texas may anger some, it seems to be the prevailing opinion that helping Texan remain independent is a preferable option to dealing with a revanchist Government in Atlanta."
 texas.36.o1:0 "Condemn the Republicans."
 texas.36.o2:0 "No Comment."

 texas.37.t:0 "Radio Silence from South of the Border"
 texas.37.d:0 "To nobody's surprise, our attempts to reach out to the Mexican Government have been met with silence. Even with the Republican invasion and impending Refugee Crisis, our nations still aren't on speaking terms. Even as refugees stream across the Rio Grande, the Government in Mexico City still hasn't come out one way or another in regards to our conflict with the American Republic, simply offering bland nondescript statements saying they are working to prevent a refugee crisis from spilling into their borders. While it cannot be denied that Mexican Leadership fears the prospect of war with the Remnants, it seems that these fears have not manifested into any concrete geopolitical action. It seems that relations between Mexico and Texas will remain icy for the foreseeable future  ."
 texas.37.o1:0 "No shock."

 texas.38.t:0 "The Mexicans Condemn the Republic"
 texas.38.d:0 "Today, Mexican President [MEX.GetLeader] has made a surprising address, condemning in the strongest terms the 'gross violation' of Texan territorial integrity by the Government in Atlanta. While their condemnation screams blatant hypocrisy by a nation which has been slowly picking off Texan territory for the last 20 years, it is also appreciated by senior leadership who have welcomed Mexico and Texas coming together in this time of crisis. Whether this will lead to a cooling in relations between Texas and Mexico is anybody's guess; however their show of support in our nation's darkest hour certainly suggests as much. Of course, their support may also have a more cynical agenda, as an independent Texas would be far easier to victimize than the regime in Atlanta."
 texas.38.o1:0 "Their sentiments are appreciated; if not deeply ironic."

 texas.39.t:0 "Branch Davidians Join the Fight"
 texas.39.d:0 "David Koresh, leader of the Branch Davidians religious group, has made the news for encouraging his followers to enlist in the ongoing war with the Remnants. While derided as a cult leader by some, Koresh maintains an active pool of devout congregants who have been taken in by his admittedly unorthodox theology. The theology followed by these Branch Davidians was first theorized by Seventh-day Adventist Victor Houteff, who founded his own group known as 'Davidians'. Houteff and his Davidian Church would found a community in Waco Texas known as the Mount Carmel. Ownership of this compound would transfer to Houteff's wife after his death, however after an apocalyptic prophecy failed to come true, Florence sold the land to Benjamin Roden who developed the group's theology further. Eventually, Koresh would join the group and amass a small following, eventually taking control of the compound after a small shootout. Ever since, Koresh and his group has steadily grown in power, amassing an impressive cache of weaponry and absorbing several competing groups. Since the start of the war, Koresh, a man invested with a violent hatred of the Federal Government and an adamant belief that the Remnant war is the prophesied 'End of the World' has sent his followers into action, engaging them in small skirmishes with troops from the Federal Government and planning acts of sabotage, while Koresh himself and his most loyal followers retreat to their compound in Waco. While some remain weary of Koresh's intentions and views, it cannot be denied that his group has provided valuable support to our nation's military in a time of crisis.
 texas.39.o1:0 "Interesting."

 texas.40.t:0 "The People's Temple Brigade?"
 texas.40.d:0 "Described by many as a strange hippie-like cult, the People's Temple of one Rev. Jim Jones is a well known Texas oddity, calling our proud nation home ever since they were expelled from California in the wake of the UAPR takeover. Laden with a chip on their shoulder over the UAPR's anti-religious policies, Jones and his group relocated to Texas to continue their activities, continuing their activities in spite of harassment from local law enforcement. Jones came to call Texas home along with the other 'Calixiles' who relocated after their expulsion from the UAPR, mainly other moderate socialist and religious groups who protested against the UAPR's authoritarianism and State Atheism. While One Republic maintains its suspicions of this group, Rev. Jones has provided uncritical support to the cause of Texas independence in this time of crisis, rallying his followers against the 'Godless Reactionaries' in Atlanta. Jones has petitioned the President to allow for the creation of a 'People's Temple' military brigade, stating in a letter 'Love is the only weapon with which I've got to fight? I've got a hell of a lot of weapons to fight! I've got my claws. I've got cutlasses. I've got guns. I've got dynamite. I've got a hell of a lot to fight! I'll fight! I'll fight!'. While we do generally have a policy of taking any help we can get, the Temple's open Communist affiliations and cult-like status has made some weary of their intentions."
 texas.40.o1:0 "Let them fight."
 texas.40.o2:0 "Sounds dangerous."

 texas.41.t:0 "Religious Groups Grow in Power"
 texas.41.d:0 "The devastation brought by the Remnant's invasion of our Republic has provided the perfect breeding ground for all-manner of religious cults. A general feeling of despair combined with the fact that thousands of people have lost their homes and loved ones in a brutal war has opened the floodgates to everyday Texans being taken in by radical spiritual movements, with the two main beneficiaries of this new influx of wayward souls being David Koresh's Branch Davidian Group, and Jim Jones' People's Temple. Now such an influx in Cult recruitment would be only a minor problem, if not for the fact that both of these groups are actively involved in our nation's war effort. A steady trickle of semi-legitimate military support and donated weaponry has allowed these groups to function as heavily-armed and organized militias, fanatically loyal to their so-called 'divinely ordained' leaders. Such a situation is seen by many as a disaster waiting to happen, as these groups could easily prove to be a nightmare to deal with if their 'Messiahs' turn on us. However times are tough in Texas, and turning away potential soldiers may prove to be more hassle than it's worth."
 texas.41.o1:0 "I don't see the problem."
 texas.41.o2:0 "Heavily Armed Cults... Seems like a bad idea."

 texas.42.t:0 "Foreign Fighters Arrive"
 texas.42.d:0 "As the cry rings out for support from across the world, soldiers from across this blue marble have answered the call to fight against the Remnant invaders. Thousands of troops from the world over have poured in, volunteering their very lives for a hope that Texas may remain free. These international soldiers have coalesced into the 'International Legion Defence of Texas' or simply the Texan Foreign Legion. Be them sympathetic warriors who have taken pity on us for our plight, or soldiers committed to the very end to the cause of Texan independence. Among the largest sources of these volunteers has been from the other post-American nations, who seek to delay or prevent the conquest of Texas in hopes that their own nations may be spared conquest by Remnant forces. While their experience levels may vary, the fact still remains that these foreign brigades have proven vital to the continued survival of the Texan military, helping out in vital tasks such as Reconnaissance and Special operations. Governments friendly to our cause have provided a tepid response to the departure of foreign volunteers, while those friendly to the Remnants have sought to prevent their citizens from enlisting. So far, the enlistment of so many from across the world has gone to show the Republic that the nations of the world support Texas' cause, and that countless are willing to put their very lifeblood on the line to protect this nation from Remnant conquest. "
 texas.42.o1:0 "We welcome their support."

 texas.43.t:0 "Seizure of Civilian Weaponry"
 texas.43.d:0 "The present war with the American Republic has made the Texan government reconsider one of its most iconic long standing policies. Ever since our State's independence, the right to purchase and bear arms has been an inalienable right; however as our military hurts for weaponry, many have suggested we seize military grade weaponry for use in the war effort. Understandably, the confiscation of civilian weaponry is an unpopular proposal for many, even if it is for the greater war effort. Of course, considering our dire situation, some have gone further to suggest the full-scale seizure of smaller arms such as handguns for use in the war with the Remnants. Additionally, weaponry would also be repurposed from local law enforcement under this proposal. However due to our nation's storied and long-standing history with firearms, many are apprehensive about authorizing firearms seizures, with some instead proposing to let civilians keep all of their firearms, so long as they make an 'active contribution' to the defense of our Republic. "
 texas.43.o1:0 "Confiscate only High-Caliber weapons."
 texas.43.o2:0 "Confiscate *anything* we can get our hands on."
 texas.43.o3:0 "You can keep your guns... if you join the Army."
 
 texas.44.t:0 "Texan Intranet Network Established"
 texas.44.d:0 "The Intranet of Things has proven itself to be a truly marvelous piece of technology. Allowing near instantaneous communication across great distances, the implementation of this network has proven essential for every modern economy. Sadly, much of the former United States lacks even the most basic Intranet connections, keeping our electronic systems and communication networks sorely lacking. Thankfully, our new Canadian allies have realized the importance of this new technology in cohesive military planning and information control, and have sent a fleet of IT experts to Texas to kickstart the Texan intranet. As the TexNet is plugged in, a truly digital Texan economy has been established, with prominent figures such as Ross Perot already getting in on the ground floor of the Texan tech boom. "
 texas.44.o1:0 "Our nation shall become more connected than ever."

 texas.45.t:0 "The Extent of our Soviet Alliance"
 texas.45.d:0 "The Soviet Union has quickly become one of Texas' closest allies - a quite surprising turn of events considering [TEX.GetLeader]'s loathing of Communism. As the world's foremost superpower, being in the good graces of [WSP.GetNameDef] certainly has its benefits, even if we are comfortable not reaping the lion's share of them considering our lack of Communist governance. While thus far the Warsaw Pact's support of our endeavors has brought Communism some good will within our Republic, both at home and abroad there is an understanding that our alliance is purely pragmatic. The Communists still have a score to settle with the American Republic, and are more than willing to chip in to our efforts to defeat them. Of course, there are some who still wish to extend our alliance with Red Europe, possibly reaping the benefits of COMECON association long into peacetime. After all, don't we owe them for all they have done? "
 texas.45.o1:0 "They are the enemy of our enemy - nothing more."
 texas.45.o2:0 "Perhaps we could rely on the Warsaw Pact in the future..."

 texas.46.t:0 "George Jr. Arrives in Atlanta"
 texas.46.d:0 "Since a bitter loss in the 2002 Presidential Primaries, George Walker Bush has mostly steered clear of the hotbed of Remnant politics. Resigning himself to obscurity after moving to Texas, the evolving hostile situation between the American Republic and Texas has made travel between the two nations difficult. George Bush didn't go into the family business as planned - he didn't secure the nomination, he didn't become President. He didn't take the easy way with a cushy government job; he chose his only true love: Baseball, and the only place he ever felt at home: Texas. As it seems, George Jr. hasn't been in touch with his family much lately, however recently, George Jr. has broken his silence to issue a call for peace. Despite running off to Texas to manage the Texas Rangers, 'Dubya' still holds his fair share of sway in Atlanta. The very Bush name is a cause for great reverence, and despite some mudslinging about George Jr. 'abandoning his country', there are others who would be seriously moved by George W.'s calls for an end to hostility between our two nations.  "
 texas.46.o1:0 "Tell this cowboy to go back to Texas."
 texas.46.o2:0 "Hear him out."

 texas.47.t:0 "George W. Presents the Texan Proposal"
 texas.47.d:0 "During his meeting with Remnant President [USA.GetLeader], George Walker Bush has presented the suggestions of the Texan peace commission on how to best end the war between the Republic and Texas. This report suggests the creation of a joint Remnant-Texan task force to ensure peace on the border, the abolition of trade barriers between our two nations, and the ability for Remnant soldiers to pass through Texas unhindered. While this proposal does not satisfy the desires of the most hardent warmongers in Atlanta's, Bush's suggestions seem to be the start to an end to hostilities between our two nations - if only for a moment. Of course, the bulk of the pressure on Atlanta's end seems to be from the Texan war taking much longer than predicted, leading to a situation which [USA.GetLeader] can't easily back out of. Providing a backup plan for Remnant leadership could prove beneficial for us both, as such a peace settlement would allow the Texan slog to end while allowing [USA.GetLeader] to keep their pride. "
 texas.47.o1:0 "We were looking for a way out anyways."
 texas.47.o2:0 "We can still win this."
 texas.47.o3:0 "Interesting."

 texas.48.t:0 "Bush Delegation Successful!"
 texas.48.d:0 "To the shock of many, it seems that the Bush Delegation has succeeded in their mission to end the war between the American Republic and Texas. The peace treaty dubbed the 'Treaty of Dallas' sees the Austin Government officially 'Renouncing' their claims on the Dallas-Fort Worth Metroplex, establishing a joint border commission, allowing the Republic access to our nation's oil profits, and allowing Remnant troops to station on Texan territory. While this is seen by some particularly jingoistic members of the government as a concession to enemy interests, it cannot be denied that the current trajectory of the war is not sustainable for either side, and that this agreement allows a way out for both Texas and the Remnants without sacrificing our pride. "
 texas.48.o1:0 "A Toast! To Peace!"

 texas.49.t:0 "Negotiations Break Down"
 texas.49.d:0 "While not the most unexpected outcome, it seems that the Bush delegation has failed in their mission to restore peace between our nations. Dejected, George Walker Bush has returned to Austin with the rest of his team... however not before making a quick detour to Tallahassee for a very personal meeting. An impromptu family reunion between the two Bush Brothers will undeniably be a tense event, as the two siblings have not spoken since Dubya's defection to the Republic of Texas after his failed Presidential bid. In addition to having a quick visit and doing some catching up, it is expected that the elder Bush sibling will either confront his brother for his support of the invasion, or attempt to convince him to speak out against the war. Whether he will succeed is anybody's guess . "
 texas.49.d_jeb:0 "While not the most unexpected outcome, it seems that the Bush delegation has failed in their mission to restore peace between our nations. Dejected, George Walker Bush has returned to Austin with the rest of his team. Jeb Bush, George Jr.'s own brother, has defied the call of reason from his own flesh and blood. While Jeb has offered to give Bush a lucrative position in the Republican government in exchange for defecting, it seems that George W.'s love for Texas has surpassed that of his own family. While undeniably faced with a difficult choice, Texans thank George W. for his loyalty to the Texan cause, even his efforts to bring peace were ultimately in vain. "
 texas.49.o1:0 "Well, we tried..."

 texas.50.t:0 "Brother and Brother"
 texas.50.d:0 "Ever since Bush moved to Texas, communication between his family has been sparse. As 'Dubya' kept a low profile, the ever-present droll of the family business kept George Jr. insulated from the affairs of the rest of the Bush Dynasty, only offering flat platitudes such as congratulations for birthdays and the occasional endorsement for political campaigns. This meeting has been the first face-to-face reunion between the brothers in almost 10 years. While the contents of the meeting has remained hush-hush, it seems that George Jr. and Jeb have had a rather heated exchange, leading to a great deal of reflection for both parties. "
 texas.50.o1:0 "What is this? Some sort of Family Feud?"
 texas.50.o2:0 "How could someone go against their own blood?"

 texas.51.t:0 "Bush's Plane Returns... Empty"
 texas.51.d:0 "Just as we assumed the failure of negotiations was the worst news we could hear, it seems that our situation has deteriorated further. George W. Bush, once thought to be a loyal Texan, has instead decided to remain in the American Republic. It seems that during the first face-to-face meeting between him and his brother in years, Jeb Bush has managed to sway his opinion away from Texas. In a speech today, Bush declared that his only true loyalty was with his family, and that he would be remaining in Florida with his brother until Texas once more fell under Remnant Control. In his address he stated that the Texas Rangers would be relocated to Remnant-controlled Arlington, and that he looked forward to helping rebuild Texas once this war ends. "
 texas.51.o1:0 "He sure showed his true colours."

 texas.52.t:0 "Bush's Plane Returns... With an Extra Passenger"
 texas.52.d:0 "With negotiations breaking down between the American Republic and Texas, George W. Bush, head of the Texan Delegation, has finally returned to Texas. Of course, this return was not before he paid a visit to his brother Jeb Bush for the first time in almost 10 years. While the contents of this meeting are not known to the general public, it seems that Bush's words managed to speak to his brother, as he decided to tag along with his brother in his return to Texas. The former Florida Governor has officially declared his defection to the American Republic, and denounced [USA.GetLeader] for his actions towards the Texan people. While undoubtedly much of this comes from Jeb's bitterness over losing to [USA.GetLeader] in the 2010 Elections, it seems familial loyalty also played a part in his decision. As both Bush Brothers now reside in Texas, much of the old Bush Cult has rapidly changed their stances on the war between Texas and the Republic. "
 texas.52.o1:0 "The Bush Clan are true Texans after all."

 texas.53.t:0 "Protests Sweep the Nation"
 texas.53.d:0 "While large demonstrations have become a familiarity to the post-USA American nations, the recent protests which have gripped the American Republic have exceeded anything seen prior. Anti-war protesters have taken to the streets to express their discontent over the recent invasion of Texas, condemning what they see as an unjust war against their brethren in the Republic of Texas. Throughout the streets of major cities, locals have flooded public areas holding cardboard signs and waving flags, mostly Chilean flags as purchase and sale of Texan flags was banned after the outbreak of war. Dissidents have used the Texan 'Lone Star' as a symbol of dissent, affixing it to their clothing and featuring the symbol in anti-war graffiti. Local police have been quick to crack down on these subversives, hauling thousands of would-be activists away to detention centers for their treason against the American war effort. Despite our crackdown, the sentiment expressed by these rioters still remain embedded in our society, as anti-war Hippies and activists continue to sabotage the rightful cause of American reunification. Regardless of their hangups, [USA.GetLeader] is determined to uphold the cause of the old United States, ignoring those who wish to let the cause of the Old America go. "
 texas.53.o1:0 "Traitors."
 
 texas.60.t:0 "Post-War Elections to be Held"
 texas.60.d:0 "Under the provisions of the Texan Constitution, national level elections are not to be held during a time of war. With our armed conflict coming to an end, it has been decided that the previously canceled 2013 Elections will be held immediatley following the war's conclusion. This move is both practical and political, as polls indicate that One Republic has an early lead, and with [TEX.GetLeader] fresh off of leading the nation through war. It is predicted that the incumbent President will have an easy time defeating their opponents. However as election season kicks off, it seems that [TEX.GetLeader]'s leadership may be called into question once more, as Texans grapple with their leadership both before and during the Remnant war. Indeed, wartime leaders not surviving the transition to peacetime is nothing new, such as when Winston Churchill was defeated by Clement Attlee in 1945. For the first time since his election, the opposition may just have a legitimate shot at defeating One Republic next election..."
 texas.60.o1:0 "Let the campaign begin!"
 
 texas.61.t:0 "Perry's Record Under Skepticism"
 texas.61.d:0 "With the announcement of public elections becoming public, opposition parties have once more launched a campaign casting doubt on Perry's wartime achievements. Indeed, while Perry did lead our nation through a devastating war, and as a result became wildly popular even among those who once reviled him, as the guns fell silent, more and more Texans have begun to believe that Perry was not the best individual to handle the war with the Republic. As it seems, the Rally 'round the flag effect is beginning to wear off, and the mountain of public skepticism and anger surrounding One Republic has finally found its way into the limelight again. Polls surrounding Perry's approval rating, which previously had up to 77% of Texans approving of the President's leadership, have once more entered into a nosedive as Perry seeks an unprescendented third term. As Texas braces for unprescendented election interference from Atlanta, it seems that One Republic may just be in for an uphill battle. Whether or not Perry will survive this storm us up to the Texan voters, as the contreversial President seeks to prove that he can lead Texas through both wartime and peace."
 texas.61.o1:0 "Perry's position is not as solid as once thought..."
 
 texas.62.t:0 "Perry's Approval Rating Collapses"
 texas.62.d:0 "As the Election Campaign heats up, President Perry, as well as the leaders of the various opposition parties, have agreed to hold a public debate to further discuss their policies. For Perry, this was seen as an opportunity to present his platform, and assure the general public that he still has what it takes to lead the Texan Republic. Unfortunately, it seems that this debate has had rather the opposite effect. From the get-go, Perry was hounded by Ron Paul, who lobbed criticism about the handling of the war towards Perry. Additionally, they criticized the President as being authoritarian for continuing Martial Law despite the Remnant war coming to an end some months prior. However the most embarrassing moment of all for Perry was when he stated his proposal for abolishing three government agencies, naming the Departments of Commerce and Education, but failing to remember the third. When pressed as to what the third department was, Perry admitted that he could not remember, adding 'Sorry. Oops.'. This gaffe has been called the 'worst in American debate history', and almost single handedly contributed to a 20% decline in the polls for Perry. As for Ron Paul, his debate performance has seen him go from fringe candidate to a legitimate contender for the Presidency."
 texas.62.o1:0 "How embarrassing."
 
 texas.63.t:0 "Perry Seeks Bush Endorsement"
 texas.63.d:0 "With Perry's chances at winning collapsing after the recent 'Oops' disaster, the President has sought to improve his numbers by scoring the endorsement of several high-profile Texan political and cultural figures. The sure-fire strategy of seeking celebrity endorsements has already had the effect of moving the needle poll-wise, with certain Texan celebrities like actor Chuck Norris already endorsing Perry. However to recover from the debate disaster fully, then Perry must score the most coveted of all endorsements - that of George Walker Bush, the son of George H.W. Bush who put loyalty to Texas above loyalty to his own family, even going so far as to attempt a peace negotiation on behalf of Texas. While previously serving as owner of a Baseball team, Bush has been thrust back into the political spotlight due to his actions during the Republic war. Unfortunately, Perry's feelers towards Bush for a potential endorsement have seemingly fallen flat. It seems that Bush is content with staying out of politics, even if a growing number of Texans call for him to run for President himself."
 texas.63.o1:0 "There are no neutrals anymore."
 
 texas.64.t:0 "The Perry-Bush Spat"
 texas.64.d:0 "Ever since the disastrous debate for Perry, calls within the One Republic party for Rick Perry to step aside have grown. The most likely to replace Perry in this scenario seems to be George W. Bush, famed Baseball team owner and peace negotiator. While he has expressed his political neutrality, the growing movement to pressure Bush back into the political sphere appears to be having an effect on 'Dubya', as he has been more and more candid about the political world in recent days. Unfortunately, it seems that it is not in a favorable direction for One Republic, as the Texas Rangers owner criticized Perry for continuing Martial Law in Texas despite being at peace. Perry himself has hit back at Bush, stating that he should stay out of Texan political affairs, even stating that perhaps he is not the Texas patriot once thought. With the IRNC still at a deadlock, many have proposed Bush make a run for the Party in an attempt to challenge Perry from a Moderate Conservative direction, harnessing his own brand of 'Bushism' as a front against One Republic."
 texas.64.o1:0 "It seems that Bush should stick to Baseball."
 
 texas.65.t:0 "Bush Mulls a Presidential Run"
 texas.65.d:0 "As the divide between President Perry and George W. Bush deepens, many have gone to predicting that Dubya may be preparing for a political candidacy of his own. The baseball team manager and Peace negotiator notably ran for President once before, back when he was still a resident of the American Republic to the East. The elder son of the great President George H.W. Bush swore off a life of politics after a bitter loss in the 2002 primaries, however a popular campaign to draft George Bush Jr. has already begun within the Independent Republican Ranks. As an incredibly popular public figure, it seems that a Bush presidential run would be a slam dunk, most likely with the Conservative opposition party, the Independent Republicans. Joe Straus, a longtime friend of the Bush Family has stated that he would gladly step aside as IR leader if Bush chose to run, most likely realizing that having Bush as Party Leader would lead to the party's greatest chance at success."
 texas.65.o1:0 "Sounds like a 'Home Run'."
 texas.65.o2:0 "I left politics behind a long time ago."

 texas.66.t:0 "Expanding Spanish-Language Campaign Literature?"
 texas.66.d:0 "It's official. George Bush Jr. has thrown his hat into the race for President of the Second Republic of Texas. As a widly popular figure within Texas, it seems that no major candidate is willing to risk the humiliation of challenging George W., with longtime party stalwart Joe Straus dropping out of the race and publicly endorsing Bush. Among potential Independent Republican candidates seeking to challenge Bush, the only major one has proven to be influential New Mexico politician Susana Martinez. Martinez has not ruled out a Presidential Run, but has critizied IR leadership for not making an effort to appeal to Hispanic voters. It has been proposed that George Jr. seek Martinez's endorsement, and make a futher effort to appeal to Hispanic Conservatives - however due to the Latino voter base often voting for the Democrats, many have proposed using the Independent Republican Party's limited resources to appeal to other communities more receptive of the Party's message."
 texas.66.o1:0 "It worked well enough for Jeb."
 texas.66.o2:0 "Latinos are a lost cause."

 texas.67.t:0 "Susana Martinez Announces Presidential Run"
 texas.67.d:0 "In the midst of Bush's refusal to spend time and resources campainging for the loyalty of Latino voters, influential New Mexico politician Susana Martinez has formally launched a challenge to George Jr.'s candidacy. With an army of endorsements from Hispanic Independent Republicans, it seems that this race is not the slam dunk George Jr. once thought it was. Martinez is already beginning to narrow the polling gap, and now, many consider the race to be a tossup. Already George Jr. appears devestated by the closeness of the race, as Martinez and Bush fight a bitter battle to secure the IR voter base. Bush is considering suspending his campaign to avoid a potential humiliation, viewing that as a perferable solution to a messy Primary campaign. However the polls still lean towards Bush, and a victory in the Primary, no matter how close, would still be perferable to the humiliation of a hasty withdrawl. It's up to George Bush Jr. to decide..."
 texas.67.o1:0 "Bush and Martinez face eachother in a head-to-head battle for the nomination."
 texas.67.o2:0 "Bush drops out of the race and returns to civilian life."

 texas.68.t:0 "The [GetYear] Independent Republican Primary"
 texas.68.d:0 "After a long string of mostly-polite debates between Susana Martinez and George W. Bush, it seems that the time has finally come for the Independent Republican Party to choose their candidate to run during the next election. George W. Bush, a popular Baseball team manager and Peace negotiator, is running on a moderate Conservative platform mainly centered around education reform. Challenging him is Susana Martinez is an influential New Mexico politician who has been a harsh critic of the Bush Dynasty. Despite a strong campaign from Martinez, it seems that George Dubya's status as a beloved folk hero has put him over the edge, with him winning every county aside from 12 ones in New Mexico that have backed Martinez. In his speech, Bush has stated that he is honoured to have the nomination, even thanking Martinez in his speech, stating that 'While she ran an amazing campaign, the Texan people have made their voices heard.' Now, Bush seeks to face both the Democrats and One Republic in the next election..."
 texas.68.d_2:0 "The race for the Independent Republican nomination has certainly been an interesting one. George Bush Jr., giving into a wildly popular Draft campaign following his negotiation of peace with the American Republic, thought he would be facing a nearly-unnopposed Primary Field. Instead, Susana Martinez, a influential New Mexico politician, has sought to challenge Bush, hitting out at his campaign's seeming refusal to engage with Hispanic voters. As the Primary rapidly devolved into a slog, with Poll Numbers indicating a tight race, George W. dropped out of the race as he attempted to avoid drawing more ire and contreversey, and return to his civilian life without the stain of a second failed primary. With it being too late for previous frontrunner Joe Straus to jump in, Martinez has easily secured the nomination, and will now face both the Democrats and One Republic in the next election. In her speech, Martinez hit back at Perry's demonization of the Hispanic community, and promised a restoration of 'True' Conservative values should she win the General Election. If she does, she would be the first Hispanic President of the Republic of Texas."
 texas.68.d_3:0 "In a blowout Primary Victory, George Bush Jr., affectionatley called 'George Dubya' by Texans to differentiate him from his father, who remains a contreversial figure in Texas, has clinched the Independent Republican nomination. With Joe Straus as his running mate, George W. seeks to reclaim Texas from the 'False Conservatives' of Rick Perry, promising to restore the values of 'Compassionate Conservatism', as well as substantially reforming the Texan education system. His speech to the IRNC, laden with more baseball metaphors than you can count, promises a new dawn for the Independent Republican Party, and Texas should he win the General election. Already polls are showing George W. Bush rapidly narrowing the gap between the Independent Republican Party and the One Republic Party. Despite some token opposition from Independent Republicans who don't trust the spawn of Bush Sr. to bear the torch, it seems that Bush remains the Party's best shot at claiming the Presidency."
 texas.68.o1:0 "Vote Independent Republican!"

 texas.69.t:0 "The Fate of North's Presidency"
 texas.69.d:0 "Having led Texas through the worst of the Republic war, Oliver North has rapidly become one of the most beloved figures in Texan history, having his approval ratings tied with Sam Houston and Stephen Austin themselves. However North has proven himself to be a stranger in a strange land when it comes to politics, not caring much for the intricacies of the political establishment, especially when it comes to the One Republic rank-and-file, who have proven more concerned with enforcing their rigid ideal of Christian Morality than defending Texas from foreign enemies. North, for all intents and purposes, is perfectly content not running for another term, simply letting his record during the war stand on its own merit without tainting it with the stain of political theater. Doing so would undoubtedly solidify North's legacy in the history books, however could also jeopardize One Republic's fragile grip on power. After all, North's polling remains higher than any other potential One Republic candidate, by the double-digits. After a great deal of thought, President North has ultimately decided..."
 texas.69.o1:0 "To run for re-election."
 texas.69.o2:0 "To not seek a second term."

 texas.70.t:0 "DeLay Nominated as One Republic Candidate"
 texas.70.d:0 "In a lavish ceremony in Austin, One Republic officially announced their candidate in the next election as Tom DeLay, current Vice President and former Speaker of the Texas House of Representatives. Addressing the ORNC, President North stated that it was the honor of his lifetime to lead the Texan nation through the conflict with the American Republic, and that his every action, and every breath he took was in service to the Texan nation. Even if North was not running in the race, the President's words were enough to reinvigorate the One Republic movement in the wake of recent poll slippages. However, personal issues relating to Tom DeLay have already put a damper on the party before the election can even begin. North's endorsement of DeLay has helped buoy DeLay's unimpressive numbers, however hushed whispers within Austin have cautioned that something that One Republic cannot recover from may be coming around the corner..."
 texas.70.o1:0 "Let's hope DeLay knows what he's doing."

 texas.71.t:0 "One Republic Support Collapses"
 texas.71.d:0 "While One Republic was coming off high after Oliver North's address to the ORNC, it seems that their trajectory could not be maintained. Their choice of candidate, Tom DeLay, has been revealed as quite the dud of a candidate. Recent audits have revealed that DeLay was involved in an extensive money laundering scheme. Worse yet, it seems that DeLay has been implicated in a scheme to sell weapons generously provided to us for the war effort on the side for a profit. DeLay's scheme to undermine our national security in the name of profit has spread like wildfire across the Republic. While DeLay was already something of an unknown, it seems that the first impression of many for One Republic's candidate is one of a corrupt grifter. Due to this evolving scandal, for the first time since the party's formation, One Republic is not the favorite to win the election. Polls have shown One Republic support collapsing, with every major firm showing OR support nosediving by at least 30% in the wake of this scandal."
 texas.71.o1:0 "A fatal misstep."

 texas.72.t:0 "[GetYear] Texas Democratic National Convention"
 texas.72.d:0 "As the election approaches, the Texas Democrats have gathered to select their candidate for the next election. Rick Noriega, candidate for the 2009 Election, has declined to seek another nomination, opening the floor to a variety of new candidates. So far, the race has narrowed to four candidates: Lynda Bird Johnson Robb, daughter of former President Lyndon B. Johnson, Kinky Friedman, a singer-songwriter, humourist and former independent candidate, who while railing against the Texas Democrats, has attempted to secure the nomination, stating that 'God probably couldn't have won as an independent', Wendy Davis, a member of the Texas Senate who gained widespread infamy for her rallies against the restrictive Social Policies of the Perry Administration, and the popular Mayor of San Antonio, Julián Castro. Johnson-Robb fields a strong campaign for those who wish to return to the Johnson era of Progressivism, while Friedman is a favorite to some due to his previously strong independent campaign, Texas-style wit, and a platform that couples a strong focus on Education Reform with a variety of positions that combine Satire with Common Sense. While Davis is seen as the least likely to carry the Democratic party to victory, her appeal to both the Mainstream and Progressive wings of the Texas Democratic Party has made her a strong contender for the nomination. Finally, Julián Castro, a representative of the Progressive wing, which has been steadily growing in influence since the outbreak of war with the Republic, has been steadily climbing in the polls, with his proposals for universal healthcare being popular with the Democrat base. However after the failure of Hispanic Rick Noriega to capture the Presidency in 2009, many within the Party are hesitant to support another Hispanic candidate; especially in the wake of renewed tensions with Mexico. As the votes are counted, it is clear the Democrats have selected as their candidate..."
 texas.72.o1:0 "Lynda Bird Johnson Robb!"
 texas.72.o2:0 "Kinky Friedman!"
 texas.72.o3:0 "Wendy Davis!"
 texas.72.o4:0 "Julián Castro!"

 texas.73.t:0 "Ross Perot Announces 4th Presidential Run"
 texas.73.d:0 "Perennial candidate Ross Perot, leader of the Texan Reform Party, has formally announced his participation in this year's Presidential Elections. Perot first got his start in the political scene in his 2001 Primary Challenge to Independent Republican President Kay Hutchison due to her controversial Trade Agreement with the American Republic, running on a heavily Protectionist and Nationalist platform. Perot's Primary challenge failed however in 2005 Perot once more sought the Presidency, running as an Independent instead of seeking the IR nomination, breaking from the Party due to its increasing Social Conservatism. Despite losing in 2005 and later in 2009, Perot has formed a successful Centrist Party known as the Reform Party, incorporating many Libertarian and anti-Perry figures under its umbrella. Perot now seeks to change the tide once more, identifying this election as one One Republic is finally in a position to lose. Public discontent over continued Martial Law has given third parties such as Perot's Reform Party an effective window of opportunity to shake things up. Perot, having the means to effectively self-fund his campaign, has announced an advertising blitz, mainly focused on Texas' up and coming Intranet forums, as well as his infamoust 30-minute long TV commercials where he explains the issues directly, in a campaign that combines old-fashioned East Texas populism with high-tech wizardry. While polls still put Perot in third place, One Republic is still undeniably in for a tough battle against Perot's Reform Party."
 texas.73.o1:0 "Ross for Boss!"

 texas.74.t:0 "Reform-Libertarian Bloc Splits"
 texas.74.d:0 "The minor Libertarian Party of Texas has long cooperated with Ross Perot's Reform Party, typically nominating Perot and running him on the same ballot. However a dramatic upset has taken the relatively calm area of third-party politics in Texas by storm, as the Libertarian Party has instead chosen to nominate Ron Paul as their Presidential Candidate. Ron Paul, a prominent anti-Perry activist, had attempted unsuccessfully to secure the Libertarian nomination several years prior, but failed in this endeavor mainly due to his incarceration for Tax Fraud. However this year, Paul has managed to sweep the Libertarian nomination, reinvigorated by his recent release from prison due to the war. In his nomination speech, Paul decried [TEX.GetLeader] as a crazed dictator, further hitting out at Ross Perot for not doing enough to ensure Texans are safe from tyranny. Furthermore, Ron Paul's platform has included several interesting proposals, such as the abolition of all taxation, extreme decentralization initiatives, and perhaps the most radical of all, the abolition of the office of President of Texas itself. The last proposal has led many to decry Paul as an Anarchist... something which he has refused to deny ."
 texas.74.o1:0 "Surely Texas would never elect an Anarchist."

 texas.75.t:0 "Presidential Elections of [GetYear]"
 texas.75.d:0 "For the first time since hostilities with the American Republic came to an end, Texan citizens will travel to the polls to cast their vote for the next President of the Republic of Texas. Unlike the 2009 Election, where One Republic won with 67.35 percent of the vote, it seems that [GetYear]'s election may have a radically different outcome. Despite leading Texas through the war with the Republic, it appears that a great number of Texans have grown sick of the country's 'Natural Governing Party'. An unexpectedly strong campaign by a number of third-parties has put OR's unchallenged rule in jeopardy; and now, it seems that this election is truly anybody's game. As the final ballots are counted, it is clear that the winners of this election are..."
 texas.75.d_2:0 "For the first time since hostilities with the American Republic came to an end, Texan citizens will travel to the polls to cast their vote for the next President of the Republic of Texas. In part due to One Republic's wartime leadership, and in part due to voter suppression, it is estimated that no substantial opposition to President [TEX.GetLeader]'s will be present. Polls are showing One Republic with a massive lead, with only token opposition from Democratic, Independent Republican, and Libertarian parties, in addition to a few independent candidates. As the final ballots are counted, it is clear that the winners of this election are..."
 texas.75.o1:0 "One Republic!"
 texas.75.o2:0 "Reform Texas!"
 texas.75.o3:0 "The Texas Libertarians!"
 texas.75.o4:0 "The Democrats!"
 texas.75.o5:0 "The Independent Republicans!"

 texas.76.t:0 "President Perry Delivers State of the Union Address"
 texas.76.d:0 "While the guns of war may have fallen silent across the Republic of Texas, our nation is far from out of the weeds. Perry's re-election was an inevitability. Despite a series of gaffes and protests making the last election a genuinely competitive affair, in spite of all the voter suppression, Perry has utilized his status as the 'Savior of the Republic' to claim what is rightfully his: the Presidency of the Republic of Texas. In his speech to the Texan House of Representatives, Perry rallied his fellow legislators under the common cause of Texan nationalism, decrying those who wish to see Texas absorbed into the 'abomination' of a United America. Declaring that the 'Washington Bureaucrats' wished to trample on the rights of Texans ever since the 'War of Northern Aggression', Perry vowed that Texas would never again allow itself to be subject to Yankee oppression. As well, Perry railed against the various evils he has declared to be a threat to the Texan way of life, mainly 'Abortion, Homosexuality, and Godlessness'. While Democrats and some Independent Republicans have boycotted the President's speech, one thing has become clear throughout the President's address: that Texas, now and forever, is united under the whims of the One Republic Party."
 texas.76.o1:0 "Hail to the Chief."

 texas.77.t:0 "Democratic National Committee Dissolved"
 texas.77.d:0 "Shocking news has been announced to the people of Texas via press release. The Democratic Party of Texas, the oldest established political party within the Republic, and the standard bearer of titans of Texan Politics such as Lloyd Bentsen and Ann Richards, and even briefly Rick Perry himself. Ever since the days of Bentsen, the Democratic Party of Texas has fallen on hard times, with dwindling electoral prospects and plummeting poll numbers. Recently, documents uncovered by the Department of Public Safety have revealed a long string of communications between the DNC Headquarters in Austin and Los Angeles. Additionally, several prominent Democrats were discovered having funds funneled into private accounts from the American Republic. In light of this shocking news, the Texas DPS has formally dissolved the DNC and arrested several prominent party officials, even as many protest the flimsy evidence presented. Even as some decry this move as a political hit job, Perry, still holding extensive Emergency Powers, is unlikely to see this move challenged by the remains of the political opposition. The remaining Democrats in Congress have either switched their affiliation to the Independent Republicans, or have sat as Independents."
 texas.77.o1:0 "And so falls another Opposition Bloc."

 texas.78.t:0 "DeLay Cleared of Corruption Charges"
 texas.78.d:0 "Tom DeLay has always been a prominent figure within the One Republic Party, previously serving as Vice President, and currently serving as Vice President ever since the retirement of Wartime VP Oliver North. DeLay has recently been caught up in a bribery scheme, one that has severely damaged his public reputation. However after an extensive investigation, a miraculous outcome has been reported: Vice President DeLay has been cleared of all charges. Indeed, it seems that the investigation has affirmed DeLay's innocence, even as many bemoan the increasingly corrupt and cronyist nature of the Texan Government under One Republic. Texas' status as one of the most corrupt nations in the once-United states is something of an open secret, with Corruption only increasing under the reign of President Perry. During the war, it has even been reported that economic aid from the Communist world has been grossly mismanaged or used to pad the expense accounts of One Republic politicians. DeLay's pardoning is a sign to many that the Texan Legal system has become increasingly blind to extensive corruption, even as loyal One Republicites declare that the investigation is undeniable proof of DeLay's innocence, and demand recompense from opposition figures for the 'baseless slander' of DeLay's character."
 texas.78.o1:0 "DeLay is no Criminal."

 texas.79.t:0 "Extensive Gerrymandering Announced"
 texas.79.d:0 "Urbanite and Hispanic voters have been no friend to the One Republic Party over the years. With many heavily-Democratic areas already annexed by Mexico in the aftermath of the Great Collapse, the OR vote has naturally been consolidated within Congress. However there is still more to be done to ensure the Urbanists are unable to trample on the Law of God. New Congressional maps have been put forward by One Republicite officials within Congress, ones which will almost entirely obliterate every single Urban seat within the Republic. Districts which were once made up of small portions of Houston, Austin, San Antonio or El Paso have been replaced by mixed urban-rural districts encompassing large parts of the country. Indeed, nearly every single seat within both the Senate and the House are massive mixed single-member seats that are often larger than some nations. One district which replaced a District that comprised Downtown Houston is now larger than the nation of Belize, and stretches far into the Texas countryside. With these new Congressional maps in effect, nearly every Independent Republican or other Opposition Party is at risk, as a solid majority of One Republic voters is guaranteed in virtually every state. At long last, the screeching voice of urbanism has been silenced."
 texas.79.o1:0 "Opposition whithers away."

 texas.80.t:0 "Texas Nationalist Organization Endorses One Republic"
 texas.80.d:0 "Formed in the aftermath of the East Texas War, the Texan Nationalist Organization is a collection of Veterans, Texan Nationalists, and hardline anti-Americans whose sworn oath is to defend the Second Republic of Texas against 'all that may do her harm'. Headquartered in San Antonio, the city of the Alamo, where 200 brave men resisted the forces of Santa Anna, the TNO now serves as the sword and shield against any would-be foes of the great Republic of Texas. Led by Kyle Biedermann and Larry Kilgore, the TNO has long served as a strategic ally to the One Republic Party. While this alliance was previously unofficial, it appears that the TNO has moved to formally endorse One Republic recently, highlighting their contributions to the 'Inalienable sense of Texan nationalism' and declaring that they were the only party truly committed to the ideals of Texan independence, accusing the Libertarians and Independent Republicans of favouring 'American interests over 'Texan' interests. To many, the TNO has always been aligned to One Republic interests, and has been accused of pushing Ultranationalist and pro-Confederate agendas. Still, the TNO remains a powerful force within Texas, and with their endorsement of OR, it seems that the TNO is rapidly moving to integrate themselves in the political scene."
 texas.80.o1:0 "Looks like they're trying to take control of One Republic."

 texas.81.t:0 "Constitutional Reform Committee Assembled"
 texas.81.d:0 "In the wake of the Remnant war of 2011, President Perry has used the ongoing emergency to practically wipe out any semblance of political opposition within Texas. The Democrats have seen their party made illegal. The Libertarians and the Independent Republicans have seen most of their seats wiped out by extensive Gerrymandering. Now, it seems that the last roadblock to Perry's complete power remains the Texan Constitution, based on old State Laws and precedents set out by the Old United States. As it stands, the Texan Constitution locks Presidents to two consecutive terms, and even though precedent exists for skirting this rule, President Perry seeks to at last abolish this final roadblock and run for a third consecutive term in the next election. Due to almost complete One Republic control of Congress, it is likely that any change to the constitution would be easily passed... if not for the host of politicians jockeying to succeed Perry. From TNO officials such as Kilgore and Biedermann, to officials within One Republic such as Paxton and DeLay, there is no shortage of people hoping to secure power for themselves once Perry's term expires. As countless One Republicites seek to define themselves as true leaders, and remaining Opposition parties desperately attempt to stop the forces of perceived Authoritarianism it has become clear that Constitutional changes..."
 texas.81.o1:0 "...have been narrowly defeated."
 texas.81.o2:0 "...have passed with a clear majority."

 texas.82.t:0 "Texas Rangers Target Political Opposition"
 texas.82.d:0 "The Texas Rangers, not to be confused with the Baseball team of the same name, are Texas' elite law enforcement agency. Boasting an impressive history, starting as a paramilitary force that provided security at the Alamo, and continuing as a force that tracked down Bonnie and Clyde under the authority of Frank Hamer, the Texas Rangers are comparable to the FBI in the American Republic or the RCMP in Canada. With Perry's control over Texas solidifying, the One Republic Government has moved to utilize the Texas Rangers as a force to crack down on political opposition to the Perry Administration. Under the command of Attorney General Ken Paxton, the Texas Rangers have been weaponized to investigate prominent opposition figures such as Joe Straus and Ron Paul. While some have decried the 'corruption' of this law enforcement agency, even going so far as to declare that the Rangers are now akin to a Secret Police force, Paxton has assured that only 'Enemies of the State' and 'Traitors' (Depending on your definition of Treason) are targeted, ensuring that none who wish to betray the great Republic of Texas can have even a single moment of peace and quiet. As the black cowboy boots of the Rangers drag malcontents into the night, all Texans can take comfort in knowing that their Republic is truly safe from insubordination."
 texas.82.o1:0 "One Riot, One Ranger."
 
 texas.83.t:0 "President North Delivers State of the Union Address"
 texas.83.d:0 "While the guns of war may have fallen silent across the Republic of Texas, our nation is far from out of the weeds. North's re-election was an inevitability. His status as 'Hero of the Republic' has sent the President flying into office with a strong mandate from the people. The Presidency is North's by right of conquest, with both the Democrats and Independent Republicans failing to put up a substantial campaign, in part due to their begrudging acceptance of North's generally apolitical policies, and in part due to his widespread popularity making a serious campaign a waste of time and money. With the war fresh in the minds of the Texan People, President North has sought to ease the conscience of the Texan People as the threats of war continue to weigh heavily on their conscience. Legislators from all parties attended North's speech, as he spoke to the strengths of the Texan people during this time of great crisis. Decrying the Remnants for their efforts to threaten the Texan People, North hailed the strength and resilience of the Texan during times of great crisis, highlighting several stories told to him by denizen during the great war about the Texan spirit prevailing in times of strife. A standing ovation has shown to all that Texas, unlike during the Perry years, stands united behind the President. With a whopping 86% approval rating, it seems that Oliver North is truly the most beloved Texan President, even surpassing the likes of Lloyd Bentsen, and coming on par with Sam Houston himself."
 texas.83.o1:0 "Hail to the Chief."
  
 texas.84.t:0 "Noth Denounces Perry as a 'Coward'"
 texas.84.d:0 "The One Republic Party would be foolish to go against the wills of President Oliver North. His record-shattering popularity has made even the most fervent Perry loyalist hold their tongue, lest they run afoul of the man who saved Texas from rule by the Stars and Stripes. North's policies have been in many ways a shocking departure from the Perry Years. Unlike Perry, content with utilizing the legal system to menace his political enemies, and keeping Martial Law more as a political move than as a move to safeguard Texan interests, North is committed not to the vain culture wars fought by Perry, but rather to actions that will undeniably help the Texan nation in this time of crisis. Perry, whose reputation has been tarnished by his decision to flee on the eve of war, has been nowhere to be found, with neither TCIS or CIA agents having the foggiest idea where he fled to with his millions of dollars in looted government funds. Most have come to the conclusion that Perry is hiding out somewhere in South America, living the high life with almost a billion in stolen funds. As it stands, Perry enjoys a meager 7% approval rating, the lowest of any current or former Texan President. Publicly denouncing his predecessor's policies, North has promised to affirm a vision of Texan nationalism that stands to unite Texans rather than divide them. This new direction, in addition to a harsh crackdown on corruption, seeks to define North from his ill-fated predecessor."
 texas.84.o1:0 "A Smart Move from North."
   
 texas.85.t:0 "One Republic Party Dissolved"
 texas.85.d:0 "In the latest development in a series of spats between President North and One Republicites in Congress, President North has made the shocking decision to resign his One Republic membership and instead govern as an independent. Railing against the 'Weakness' of the Political Establishment, President North has announced the formal cessation of the One Republic Party as a political entity - even as many in Congress continue to govern under the One Republic banner. Indeed, the OR Caucus in Congress, reportedly not consulted about this decision, have been blindsided by North's actions, with most declaring that they do not intend to follow through with North's purported dissolution of the Party. Meanwhile North, who has often declared organized political parties to be a 'Hindrance', is rumoured to be moving forward with legislation which will prohibit all political parties from operating on a national level. Despite large amounts of discontent from the One Republic Caucus, due to North's tremendous popularity, few have openly spoken up to denounce the President, with only a few lodging meager complaints. As it appears, the era of One Republic, which started with Perry, is destined to end with Perry, as North moves to sever all ties with the old political establishment, instead floating off his own popularity to lead Texas forward instead of relying on individual parties. Many members of the One Republic are already bracing for the worst next election, as the Party now lacks a standard-bearer."
 texas.85.o1:0 "An interesting new direction for the President."

 texas.86.t:0 "All-Independent Congress Created"
 texas.86.d:0 "Following in the steps of George Washington, who still remains a beloved folk hero in Texas despite decades of anti-American sentiment, President Oliver North has signed an edict formally dissolving all major political parties within the Republic of Texas on a national level. This move, which has its share of supporters and detractors within all major parties, seeks to cultivate Texan strength, preventing political bickering and instead focusing on a consensus-based model of governance which shall help all Texans feel represented without special interests and Party Politics mucking things up. Parties such as One Republic, the Democrats, and Independent Republicans continue to operate on a local level - however as it appears, Party Politics on the national level are dead. North has assembled his 'Freedom Coalition' in Congress, consisting of One Republicites, Democrats, and Independent Republicans who now sit as independents. While opposition movements still exist in the Texan legislature, they exist as Independent politicians not affiliated with any party, united instead by their common goals instead of any particular ideology. With Texan politics now free of Political Parties, President North can move forward with an agenda that truly represents Texans, focusing his efforts on keeping Texas safe instead of dealing with an increasingly belligerent Congress. Despite some controversy, this move still has widespread political support among Texans."
 texas.86.o1:0 "Washington warned us about the danger of Political Parties."
 
 texas.87.t:0 "Emergency Alert System Expanded"
 texas.87.d:0 "Texas is a nation prone to emergencies. From various extreme weather phenomenons such as Tornadoes and Flash Floods, to the ever-looming threat of war that lingers just over the horizon. Despite a tenuous peace with the Remnant forces, Texas still remains in a great deal of danger, as the forces of evil continue to lurk - be them based in Atlanta or Los Angeles. We cannot simply lie back and allow our citizenry to fall victim to the savagery of war. With this in mind, President North has ordered a comprehensive review of all Emergency Alert Systems within the Republic of Texas, introducing a coloured system that seeks to inform the people about the severity and nature of any crisis that may sneak up on them. Separate warning systems have been rolled into one, comprehensive EAS system that can warn people of Tornadoes, Floods, Terrorist Attacks, Remnant Aggression, High Taxes, Subversive Thought, and Otherworldly Abominations, in the off chance that they appear. The different levels of these alert systems trigger special actions from responsible agencies, depending on the exact nature and severity of whatever may be occurring. While the layout of the system has been denounced by many as overly confusing, the simple colour-coded system remains the best defense Texans have against chaos and uncertainty. From Code Red, to Code Yellow, to Code Blackwatch Plaid, all Texans shall know these new designations by heart, and be prepared to take the appropriate action should the alert be raised."
 texas.87.o1:0 "Do Not Adjust Your Set, This Is Not a Drill."
  
 texas.88.t:0 "Texas, One, All"
 texas.88.d:0 "Perry's shameful legacy has left a glaring truth clear to Texans of all kinds. Perry was woefully unprepared for the Remnant war of 2001. Only thanks to the smart leadership of Oliver North was tragedy avoided. While one can point to countless reasons as to why Texas was unprepared, President North has identified an unconventional factor in the sorry state of the Perry Administration's war preparations. The One Republic Party under Perry was already focused on fighting a war in 2010 - not a war against the Remnanants, but rather a war against the Texan people. The actual war against Atlanta was ignored in favour of a Culture War, as Perry sought to demonize or otherwise harass Texans who didn't fit into One Republic's increasingly-narrow viewpoint. From Homosexuals to non-Christian, it seems like the Republic's disdain for certain Texans was second only to Perry's. During the war, Homosexuals, Atheists and Muslims fought with distinction against the forces of Atlanta, even as Perry sought to restrict enlistment to openly Gay soldiers pre-war. North, in a policy widely credited for helping to fill Texas' suffering ranks, undid this policy, declaring that so long as you can carry a rifle, the Government could give a damn about what you do in the bedroom, officially legalizing Homosexuality in a collaboration with Democrats in Congress. North, while far from a paragon of Social Liberalism, seems to realize that fighting a Culture War is pointless so long as an actual war remains looming over the horizon."
 texas.88.o1:0 "We all stand united under the Lone Star."
   
 texas.89.t:0 "New Public Spending Initiatives Announced"
 texas.89.d:0 "It is commonly agreed that due to the countless threats to Texan National Security, the Military Budget ought to be at the top of our nation's fiscal concerns. Even Democrat-aligned Politicians in Congress seem to agree with that. However the rest of the budget, the remainder of the pie chart going to various agencies you shouldn't worry yourself with, has been a matter of contention within the halls of Congress. Education has long been ignored by previous One Republic administrations, with it being an open secret that Perry and his ilk wished to funnel public school funding into Private Institutions. North, however, believes that all Texans ought to receive a proper education - an education which can teach basic survival skills and the skills needed to thrive in military life. With the Perry Administration's corruption finally being undone, the flow of public funds has once more been safeguarded, as Budget Watchdogs bring the hammer down on the Corruption which has long plagued the Republic of Texas. As we work to instill the values of Texan life into the minds of our youth, a new focus on Patriotism has started, as public institutions teach the facts about Texan history - from Goliad to the Alamo, and to the East Texas War to the Remnant, we shall remodel the Public Education system into a formidable force that ensures all Texans, regardless of income or class, grow up as patriotic sons of the Alamo, and receive a proper schooling that allows them to prosper both in civilian and military life."
 texas.89.o1:0 "Now kids, who were the defenders of the Alamo?"

 texas.90.t:0 "President Castro Delivers State of the Union Address"
 texas.90.d:0 "President Julián Castro has formally addressed both chambers of the Texan Legislature for the first time since assuming office after his upset Election victory in 2010. The down-ballot races have given Castro solid majorities in both chambers of Congress, allowing the President leeway in passing his extensive agenda. Castro addressed Congress in a grand speech, reaffirming the Progressive values that defined his campaign while also reaching across the aisle in a conciliatory tone. Notably, Castro addressed the nation in both English and Spanish - becoming the first Texan President to do so. Castro's decision to make a bilingual address has caused an atomic-level meltdown among members of the Texan right, as several members of the One Republic caucus were forcibly removed by the House Sergeant-at-Arms for heckling the President's speech. While Castro's decision to address the Texas Legislature in both English and Spanish has caused a stir, it has also highlighted the Castro administration's efforts to bridge the gap between the Hispanic community - with Castro noted as being not a native speaker of Spanish himself despite his Mexican-American heritage. Castro currently boasts high approval ratings, and despite fervent resistance from Conservatives, a fact that has been highlighted by the opposition boycott of his speech, it appears likely that Castro will have success in implementing his agenda."
 texas.90.o1:0 "Hail to the Chief!"

 texas.91.t:0 "CastroCare Signed Into Law"
 texas.91.d:0 "Healthcare has always been a touchy subject in Texas. From the era of Ronald Reagan denouncing the perils of 'Socialized Medicine' to Rick Perry declaring that Medicare is one step away from Soviet-style death panels sentencing loved ones to die, it seems that compromise on Texas' healthcare system has always been a far-off dream. However as it appears, the disdain for 'Socialized' Medicine espoused by Conservatives has not matched with the rhetoric of the rest of the Texan people; as Texans turned out en masse to vote for Julián Castro's promises of Universal Healthcare in Texas. Today, legislation to create a Universal Healthcare system, introduced by Senate Majority Leader Eugene Wu and House Speaker Beto O'Rourke has passed both Houses, and has been sent to President Castro's desk for signing. This new legislation, despite being momentarily holded up by parts of the Blue Dog Caucus and an attempted opposition filibuster, has passed due in part to backing from the Texan Reform Party, which acted as a tiebreaker. Implementing this system is set to be a long process, with Texas going from an entirely private model of healthcare to one of the few nations within the Former United States to have a Universal system almost overnight. However President Castro is confident that this system will show promise in due time, as all Texans regardless of income will have access to healthcare - and even as some Conservatives continue to say that this is yet more proof that there is no difference between him and the other Castro across the Gulf."
 texas.91.o1:0 "Healthcare for all Texans."
 
 texas.92.t:0 "Civil Rights Act of [GetYear] Passes"
 texas.92.d:0 "The relationship between the Hispanic Community and the Government has been, to put it mildly, a trainwreck. One Republic was perfectly content in viewing every Mexican-Texan as an enemy, especially so after the 1989 war, with attempts to define Texas's sole language as English remaining as a bitter mark of the Perry years. Julián Castro's election was seen in many ways as a reaction to the government's hostility towards Hispanic Texans. Today, President Castro has signed into law new legislation targeting discrimination against minorities in Texas - most prominently Hispanic-Texans, but including other groups such as African-Americans, Texans of Asiatic descent, and members of the LGBT community. In a speech at the signing ceremony, Castro hailed this legislation as an important step forward in creating a more open and welcoming Texan nation, stating that this legislation shall aid in the efforts to uproot the evils of discrimination once and for all. Interestingly, Castro also used this speech as an opportunity to take a hard line against Mexico, with Castro, who himself lived through the 1989 war, denouncing Mexico for its 'Campaign of Conquest' in South Texas, and stating that Mexico's actions in 1989 were both violations of international law, and did more to hurt Hispanics within Texas than to aid them - and that while he is open to negotiations with Mexico City, he would have no issue with using force to reclaim South Texas if Mexico proves less than ambivalent towards a peaceful return of South Texas."
 texas.92.o1:0 "A strong line from Castro."
  
 texas.93.t:0 "President Johnson-Robb Delivers State of the Union Address"
 texas.93.d:0 "Lynda Bird Johnson-Robb has spoken to both chambers of the Texan Congress for the first time today since assuming office. Johnson-Robb delivered a quiet, diligent speech which sought to address the concerns of the Texan people in this uncertain new era. First serving as First Lady of Virginia under her husband Chuck Robb, President Johnson-Robb followed in her father's footsteps in running for Texas' open Senate Senate after John Tower's appointment as Ambassador to the United Kingdom 1985, narrowly beating Republican candidate Phil Gramm. 'LBJR', as she was known in Washington, joined her husband after he ran for Virginia's open Senate Seat, however only served around a year in the US Senate, as the United States dissolved not even two years after they were first elected. Johnson-Robb and her husband fled to Texas after the Great Collapse, holding a mutual distaste for both the Commonwealth and the American Republic, settling in Texas and continuing to advocate for Democratic policies under the Bentsen administration. Now ascending as President, Johnson-Robb seeks to continue the work of her father, remaining as a staunch advocate of Social Programs and continuing the work of great Texas Democrats such as Ann Richards and Lloyd Bentsen. While Congress may remain hostile to LBJR's agenda, perhaps Texas' new Commander in Chief can channel her father's spirit to bring the do-nothing Congress back into the fold."
 texas.93.o1:0 "Hail to the Chief!"
   
 texas.94.t:0 "'LBJR' Declares War!... On Poverty!"
 texas.94.d:0 "The scourge of Poverty is known well to too many Texans. Despite our nation's fantastic oil wealth, it appears that Texas remains one of the poorest states in the once-United States. Despite all the work LBJr.'s father put into eradicating Poverty during his presidency, vultures such as Reagan and Perry have seemingly tore apart the Great Society of LBJ Senior. It's a tragedy - however it is a tragedy that can be mended with the proper work. Already a comprehensive bill has been proposed to target poverty, especially in rural areas. These new welfare provisions, while controversial with One Republicites and Independent Republicans, have passed the Democrat-controlled House and Senate with comfortable margins. The commonly-dubbed 'Second War on Poverty' seeks to substantially invest in the Texan countryside and underdeveloped urban areas, creating several make-work infrastructure projects aimed at expanding employment opportunities to all Texans, and restoring the Office of Economic Opportunity, an agency established by President Johnson-Robb's father which has since been abolished due to the fall of the United States. While Conservatives have put these attempts to eradicate poverty on blast, declaring them to be another example of wasteful Democrat spending, LBJR's widespread popularity has convinced a large bloc within the IR caucus to support the President's agenda with certain provisions. Over all, these new anti-Poverty initiatives have been well-received by Texans, with the general popularity of the 'New War on Poverty' greatly contributing to the bill's passing."
 texas.94.o1:0 "We shall eradicate poverty."

 texas.95.t:0 "Once More a Great Society"
 texas.95.d:0 "The New Deal coalition which propelled the Democrats to so many victories lies dead. Killed by the likes of Reagan even before the fall of the United States. It stands to reason among many that had Reagan not been there to tear apart the life's work of Roosevelt and LBJ, America may not have fallen. The past, as it stands, remains buried, and we can't dwell on the what-if's of history. What matters is burying the harmful legacy of Reagan's fateful Presidency, undoing the harmful policies which saw the Great Society shredded under the whims of an anti-'Big Government' agenda - an agenda which ultimately led to the end of America as we know it. The time has come to restore the New Deal across Texas, as Lynda Bird Johnson-Robb moves to restore her father's lifetime work. Economic inequality remains the greatest threat to Texas, aside from possibly the machinations of Atlanta, and President Johnson-Robb seeks to do everything in her power to ensure that a solution to this problem is presented. The 'Free Market' gospel preached by Reagan and Perry has failed to make a dent in poverty nationwide, and it's clear that if we wish to strike a blow against inequality, extensive Government intervention is necessary. The 'Small Government' creed, tainted by Reagan and further made irrelevant by the Remnant War, has been replaced by the vision of a state that seeks to safeguard the wellbeing of the Texan people. Conservatives may jeer, but history has proven that this is the only way forward."
 texas.95.o1:0 "We must restore the vision of Johnson and Roosevelt."

 texas.96.t:0 "President Davis Delivers State of the Union Address"
 texas.96.d:0 "Wendy Davis' victory in the Texan Presidential Election was nothing short of a shock. Only propelled to victory by the DeLay Affair and widespread support from Texas' Hispanic community, due in part to the campaigning of then-Sheriff of Dallas County and current Vice President Julián Castro, the first Latino man to occupy the office, Davis was propelled to power in a major upset. However despite her narrow victory, Davis far from out of the weeds of Texan politics; as One Republic has grown more galvanized in response to Davis' emboldened style. Several One Republicite members of Congress boycotted Davis' speech, declaring her Presidency to be illegitimate right from the get-go, putting the President further at odds with the OR dominated Congress. In her speech, Davis heavily denounced the DeLay affair and the restrictive policies of the Perry administration, tearing into Perry as a tyrant and a coward, all while refusing to mention Oliver North in any capacity whatsoever. With the first all-female Presidential ticket in Texan history being voted into power by a voter base sick of One Republic corruption, it seems that President Davis is in for an uphill battle to define her Presidency; seemingly only saved from Political oblivion by the Martial Law she so often rallied against."
 texas.96.o1:0 "Hail to the Chief!"

 texas.97.t:0 "Reconciliation With the Hispanic Community"
 texas.97.d:0 "Social Liberalism is a losing battle in Texas, no matter what the President says. The push for same-sex marriage is a non-starter for the Texas Democrats, with even Civil Unions proving to be a herculean battle for the Davis administration. Still yet, the President pushes forward with her agenda, dedicated to making a difference for those Texans so often confined to the margins of society, and using the extensive power of the President's Office to do so. One such area of Social Liberalism that has been a cornerstone of Davis' Administration has been a move to reconcile with the Hispanic Community, something which has inflamed tensions with One Republic loyalists who have accused Davis of being a puppet of Mexico City. 'Discriminatory' Policing actions targeting the ever-porous Mexican border and Hispanic-majority communities have been suspended or otherwise reformed extensively, all as the President seeks to negotiate with Mexico for the patriation of 'Illegally Occupied' Texan lands. Polls state that a majority of Texans remain opposed to negotiation with Mexico, as 57% say that a 'Military Solution' is the best way for Texas to reclaim their lost territories, numbers which have flown in the face of Davis' efforts. Yet the polls also show the numbers rapidly shifting as Davis moves to smooth over relations with Mexico, even if many Texans still view the nation as an enemy in the aftermath of 1988."
 texas.97.o1:0 "We cannot afford to have enemies in both Atlanta and Mexico City."

 texas.98.t:0 "Cannabis Legalized"
 texas.98.d:0 "A notable plank of President Davis' Presidential Campaign has been her promise to legalize Marijuana. Despite the shouting of One Republic and Independent Republican loyalists who bemoan any concession to the crowd of pot-smoking losers driven lunatic by the Reefer Madness, declaring their intentions to resist Davis' attempts to destroy Texan communities with drug use, President Davis seems to know better than those who are intent on keeping our kids safe from the scourge of drug use. Declaring to one and all her intention to inject dangerous drugs right into the heart of Texas' community, and destroy the brains of young and old alike with illicit substances, drug-users remained foolish enough to elect Wendy Davis to the Presidency. Flanked by red-eyed stoner losers and their hippie friends, President Davis has signed the legislation that will single-handedly destroy the Texan way of life. Marijuana is an evil vice that has caused countless deaths and cases of 'Reefer Madness', it is a dangerous substance and certainly shouldn't be thrust upon us the way President Davis is suggesting. While she may parade around 'Sucsessful' attempts at legalization and declare some nonsense about additional 'Taxable Income', these numbers and facts ignore that Drug use is a despicable vice that Davis is legitimizing through her legislative action. May God help us all, and keep Texas safe from being terrorized by Potheads and Mexican Cartels."
 texas.98.o1:0 "We ought to be locking up Pot Smokers instead."

 # texas.99.t:0 "Stopping the Buck"
 # texas.99.d:0 "Tom DeLay is a Criminal. And he's only the most notable of the various One Republic Bandits who have been plundering Texas for the last ten years. If they were bold enough to run such an open fraudster and crook then all Texans must ask one horrifying question: how deep does One Republic's Corruption go? That is the question that we are yearning for answers for. Already Congress is setting up an extensive Commission to investigate every corrupt act committed by the One Republic Party. We already know that they are corrupt as the day is long - but now, our boys in the DPS and the Texas Rangers have to prove just how corrupt they are. Every self-enriching act done by a One Republic Politician ought to be found out soon, as we seek to find every single wrongly-allocated penny, every single kickback and gear-greasing dollar, every single government asset used for personal purposes. It is all to be revealed, cataloged, and punished, and for good measure, shown to the entirety of Texas, so they know what kind of no-good crooks inhabit the One Republic Party so they don't make the misfortune of electing them to the Presidency again. One Republic is at the root of the corruption issue in Texas, and we're going to root them out. It's going to be a long and arduous period of discovery, but we have the time, we have the patience, and most importantly, we have the evidence."
 # texas.99.o1:0 "We won't rest until DeLay is rotting behind bars."

 texas.99.t:0 "Protests over Extended Martial Law"
 texas.99.d:0 "One of the key angles of attack against One Republic from the Democratic Party last election was their continued imposition of Martial Law despite the war with the Remnants having come to an end some months before. [TEX.GetLeader] vocally accused the previous President of utilizing Martial Law as an escape from any actual accountability, calling the continued Martial Law nothing more than an Authoritarian smear. [TEX.GetLeader] was widely expected to rescind Martial Law the second they got into office... however it seems that no such thing has occured. Indeed, not only has Martial Law remained in effect, the President has used their extensive emergency power almost as much as their One Republicite predecessor. Despite the Democrats holding a plurality in both houses of Congress, resistance from both Independent Republicans and the remains of One Republic has been fierce, with the filibuster being frequently used to stall and in often cases entirely stop the Democrat agenda. This, combined with an unruly Blue Dog Caucus, has forced the President to rely on their own extensive powers to force Legislation through. While they have promised that an end to Martial Law is around the corner, continuing Martial Law remains a significant point of contention, with polls showing that most Democratic voters feel betrayed by the institution's continuing presence."
 texas.99.o1:0 "A necessary measure until the One Republic threat is over."

 texas.100.t:0 "Control of the Courts"
 texas.100.d:0 "Legislatively the Democratic Party has reached a roadblock in many ways. Many of the President's policies have been blocked by either the strong remnants of the One Republic Party within Congress, or the various 'Blue Dog' Democrats that remain opposed to our agenda. While Martial Law remains in place, President [ROOT.GetLeader] has come up with an ingenious bypass to the famously ineffective Legislative Branch, turning what was once the Democratic Party's greatest obstacle into its most powerful weapon. The Legal system remains stocked with One Republic Loyalists, with the Supreme Court in particular utilizing Texas' malleable laws to its own advantage in stalling the President's efforts. However thanks to continuing Martial Law, we can at last strike a death blow to disobedience from the court. Overriding the will of the Judiciary, the President has directly appointed several new Supreme Court Justices, ending One Republic control of the Courts and paving the way for a more friendly Judicial Branch for the President to work with. Already the new Supreme Court has struck down bans on Abortion and Homosexuality, bans which were largely unenforced especially during the Remnant war, but nonetheless remained on the books. While some have denounced the President for eroding the independence of the Judiciary, in the fight to keep Texas free, we must use every tool we have at our disposal."
 texas.100.o1:0 "The Courts are on our side now."

 texas.101.t:0 "Constitutional Reform Committee Abolishes Martial Law"
 texas.101.d:0 "Martial Law has always been a controversial aspect of Texas' Constitution. During the Perry years, Martial Law was criticized as a political tool utilized by the President to avoid political accountability. Under [ROOT.GetLeader]'s Administration, Martial Law has been viewed by right-wing elements as a tool of the Democratic Party to bypass critics in the Legislature. As it stands, the Democrats remain opposed to Martial Law, only coming around to it as a tool to implement their agenda considering the hostility of Congress. However, now that Congress has opened itself up to bipartisan cooperation; and now that the One Republic Party stands in ruin, all major Parties have at last come around to the end of Martial Law now and forever. While Libertarians remain hostile to the Democratic Party specifically because of their continued implementation of Martial Law, the Independent Republicans have agreed to provide critical votes to help pass parts of the Democrat agenda so long as the President lifts Martial Law. With a bipartisan Constitutional Reform Committee assembled, it appears that Martial Law in Texas is gone for good, the precedent replaced by much more limited Emergency Power precedents based partially on Canada's Emergencies Act. In many ways, One Republic leading the charge to abolish Martial Law is a stroke of irony, however other recognize the entire affair as the damning reveal of hypocrisy among both sides of the political spectrum that this is. Still, most remain glad to see Martial Law gone for good."
 texas.101.o1:0 "May it never be used as a political tool ever again."
 
 texas.102.t:0 "Richardson Commission Publicizes Corruption Inquiries"
 texas.102.d:0 "Public Opinion towards One Republic is shifting rapidly. Damning revelations of corruption have already been made public during the trial of high-ranking One Republic official Tom DeLay, however the Democrat-controlled Judiciary is now seeking to look further under the hood to expose One Republic's Corruption. Shirking any and all investigations into the actions of their own Caucus, the Democrats have used the totality of their Political Capital to publicly push back against the embattled One Republic Party. Declaring that all would be lost if OR reclaimed the Presidency, [ROOT.GetLeader] has adopted an offensive posture towards the One Republic Party, declaring them to be Public Enemy Number One in the Government's hunt for Corruption and waste. While some within the One Republic caucus have declared that the Democrats are running a witch hunt, the stunning results from a Texas Rangers-led investigation have revealed a truly horrifying web of corruption deep in the heart of the One Republic Party; with DeLay being only the tip of the iceberg. Bill Richardson, a noted New Mexico Democrat, has been charged with leading the anti-Corruption investigations, helping to publicize the Committee's findings in an effort to further expose the One Republic Party. Although Richardson has previously held a chip on his shoulder about Texas' annexation of his home state, this prominent position has seemingly brought him around on the ideals of Texan unity."
 texas.102.o1:0 "One Republic must be exposed."
  
 texas.103.t:0 "One Republic Support Continues to Plummet"
 texas.103.d:0 "To say that One Republic stands as the Democratic Party's Arch-Enemy is something of an understatement. Before the Democratic Party fell out of favour in the mid 2000s, One Republic's main enemy was the Independent Republicans of Hutchison, with the Democrats being nothing more than a tertiary threat that could have been safely ignored. That all changed when the Democrats defeated One Republic in a stunning upset in Texas' first post-war election. Ever since, the Party has proven unable to recover from this humiliating loss, as President [ROOT.GetLeader] spent every ounce of political capital they had left ensuring One Republic could never more regain the Presidency. As it seems, their crusade against One Republic has borne fruit, with the Party's polling numbers falling to seven percent according to the most recent Gallup poll - their lowest result since the Party formed, only narrowly beating out the Texan Libertarian Party. With the ORNC practically bankrupt after extensive fines in the aftermath of an extensive Corruption investigation, it appears increasingly likely that One Republic will simply refuse to run a candidate next election, with most predicting that ORNC Chairman James Dickey will sheepishly back the Independent Republican Candidate. With One Republic veritably destroyed, it appears that the President's greatest work is done, as Texas once more returns to a polite political battle between two moderate Political Parties."
 texas.103.o1:0 "The Two-Party System Returns."
   
 texas.104.t:0 "President Friedman Rules out a Second Term"
 texas.104.d:0 "When President Friedman first sought the office of President, he considered himself to be just like the brave Defenders of the Alamo - unlikely to win, but ready to put up one hell of a fight. His first run for the Presidency, while garnering a impressive number of votes, was ultimatley unsuccessfull. Putting aside his hatred for the 'Crips and the Bloods' to run for the Democratic nomination, Friedman did what few thought possible. He won the Presidency, becoming the Protest voter's worst nightmare, a joke candidate (Aside from Rick Perry) who won it all. As much as the Establishment wished for his failure, Friedman has turned out to be one hell of a President, and while many would wish for Friedman to throw his ten-gallon hat into the ring for a second time around, the President has no intention of putting himself through another campaign for the Presidency. Friedman first sought the Presidency because he didn't like what One Republic was doing to Texas and thought he could turn things around. And gosh darnit it seems like Friedman did. Let the rest of the Jackasses deal with Austin from now on. If Texas once more needs Friedman, he shall return once more, like knight in rusty armor that God or a small child left out in the rain, still preparing to polish that fated foil for one more round with Don Quixote’s windmill, still feeling in his weather-beaten soul that timeless, visceral yearning to joust with the ever-so-slowly turning. Yet as it seems, for now, Friedman's work is done."
 texas.104.o1:0 "A fitting goodbye to the realm of Poly-Ticks."

 texas.105.t:0 "President Johnson-Robb Rules out a Second Term"
 texas.105.d:0 "In recent months, a great debate has raged in Austin over the fate of Lynda Bird Johnson-Robb's Presidency. The political career of the President has mirrored her father's in many ways, and just as 'LBJ' refused to seek a second term in 1972, it has become apparent that his daughter shall do the same - refusing to run a second time despite being eligible to do so. With the main plan of her Presidency completed - a substantial reform to the education system and the revival of her father's welfare policies, it appears that LBJr's is content with riding off into the sunset, her Presidency widely regarded as a historic success. As the President passes the torch to another generation, many prominent Democrats have lined up to succeed her, hoping to use President Johnson-Robb's successful policies and high approval ratings as a catalyst for another Democratic victory. Polling already has a majority of voters approving of Johnson-Robb; with many polls also showing that Johnson-Robb's strong approval ratings are having positive effects for the Democratic Party in down-ballot races. Several candidates have already declared their intention to run, and while Johnson-Robb has refused to endorse any candidate thus far, the President remains eager to support any prominent Democrat who wins the nomination when such a time comes. With the country finally recovered from One Republic, it seems like the Democratic Party is at last returning to its heyday during the Bentsen years."
 texas.105.o1:0 "Like father, like daughter."
 
 texas.106.t:0 "[GetYear] Independent Republican National Convention"
 texas.106.d:0 "The Independent Republican Party is in a tough position. The Party has been in near-constant decline ever since 2001, with its share of the vote gradually falling as more and more of its voter base either defects to One Republic, or supports the Democratic Party as a strategic attempt to block One Republic. Financially insolvent, many have predicted that the IRNC may not even choose to nominate a candidate this election. As donors dry up, many within the Independent Republican Party see former House Speaker Joe Straus as the best chance to undo the years of OR domination. With Straus consistently polling higher than any other candidate, his only major opponent stands as prominent New Mexico politician Susana Martinez, who hopes to sway the growing number of Hispanic Conservative voters to the side of the Independent Republican Party. Polling has shown that Martinez is significantly behind Straus and unlikely to claim the nomination, with many predicting that Martinez is not hoping to win the nomination, but rather to be selected as Straus's running mate. However given the IRNC's dire financial straits, and the possibility that the Party may act as a 'spoiler' that helps One Republic, some within the Party have put forward the radical suggestion that they choose not to run a candidate this election, instead backing Ross Perot's third-party run. Perot's deep pockets may help bail out our party, opening up a potential bargain in which we back Perot's Presidential bid in exchange for Perot backing the Independent Republicans in Congress. The decision is up to the Independent Republican voters. Who shall be the IR nominee?"
 texas.106.o1:0 "Straus/Martinez!"
 texas.106.o2:0 "Martinez/Straus!"
 texas.106.o3:0 "Back Perot."
 
 texas.107.t:0 "President Paul Delivers State of the Union Address"
 texas.107.d:0 "President Ron Paul has spoken to both chambers of the Texan Congress for the first time today since assuming office. In his first address since assuming office, the Libertarian firebrand launched into a spectacular tirade against the evils of 'Big Government'. Tearing into his predecessors for their decision to implement Martial Law, President Paul has declared his intention to slay the hydra of 'Big Government', laying out his ambitious plans for a 'Texan Liberty Act' - a piece of legislation which would abolish the President's ability to unilaterally declare Martial Law. With Paul's own Libertarian Party having next to no representation in Congress; Paul himself outrunning his party in the polls by several points, it certainly appears that the President is going to be forced to compromise if he wishes to see his extensive anti-Government agenda pass throughout the infamously deadlocked Congress. With Congressional elections just around the corner, it seems that the fate of the Paul administration will not be decided by the Presidency, but rather by the voters who shall decide whether Paul's Libertarians shall gain a say in Congress. As Congress adjourns following Paul's speech, it appears that Paul's address marks the beginning of a new era in Texan politics. Some One Republicites, Independent Republicans, and Democrats have boycotted the speech, however these fence-sitters are sporadic and not defined by concrete ideological lines."
 texas.107.o1:0 "Hail to the Chief!"
  
 texas.108.t:0 "The Moneybomb"
 texas.108.d:0 "Politics is dominated by Big Money. The Establishment has no problem cutting big checks to keep themselves in a position of unquestioned power. Ron Paul's Libertarian Revolution was not brought about by the moneymen - rather it was brought about by ordinary Texans tired of Big Government. However perhaps the titans of industry could stand to contribute to the forces that seek to keep the prosperity-strangling forces of overregulation out of their affairs. The question stands, should we focus on our grassroots supporters to win support within Congress, or should we reach out to the titans of Texan industry to fund the rEVOLution. The future of Texas lies in the fray; on one hand, Paul remains skeptical of what remains of the Political Establishment - an Establishment that while shattered by Paul's shock victory, still stands strong in the slimy halls of Congress. The backbone of the Libertarian Revolution in Texas remain as the salt-of-the-earth everyday folks that put themselves on the line to tear down the tyranny of One Republic; however it also stands to reason that those who have long been funding the instruments of Tyranny could be swayed to provide aid in dismantling them so long as we provide them with some skin in the game. After all, nobody has to lose if we all play the game correctly. What shall be the fate of our Revolution?"
 texas.108.o1:0 "Contact the Industrialists and get them to start cutting cheques."
 texas.108.o2:0 "Our rEVOLution was built by small donations. We aren't changing that."
 texas.108.o3:0 "Why can't we have our cake and eat it too? Let's appeal for funds from both."
   
 texas.109.t:0 "Snap Congressional Election Held"
 texas.109.d:0 "While the concept of 'Snap Elections' is an alien concept to most post-American nations aside from the Great Lakes, President Ron Paul has been pushing for new Congressional Elections to be held as a way to improve the Libertarian Party's Legislative fortunes. While no such capacity exists for the Texan House of Representative, the Vice President, in their capacity as President of the Senate, has the authority to dismiss the Senate in its entirety; requiring the Senators dismissed to face a Special Election. First for our Republic, Vice President Gary Johnson has done just that; using this rarely-invoked mechanism to de-facto call a Snap Election. This gambit, as it appears, has decidedly not paid off. Not only has the Libertarian Party failed to crack through the walls of the Political Establishment, but the few Libertarian seats in the Senate have been effectively wiped out. Despite widespread grassroots funding and media activism, it appears that the forces of Big Government have managed to pull together to smother Paul's Libertarian experiment in the crib. With allies in Congress few and far between, it seems that President Paul will be faced with a difficult path forward..."
 texas.109.o1:0 "Well, shit."
   
 texas.110.t:0 "Snap Congressional Election Held"
 texas.110.d:0 "While the concept of 'Snap Elections' is an alien concept to most post-American nations aside from the Great Lakes, President Ron Paul has been pushing for new Congressional Elections to be held as a way to improve the Libertarian Party's Legislative fortunes. While no such capacity exists for the Texan House of Representative, the Vice President, in their capacity as President of the Senate, has the authority to dismiss the Senate in its entirety; requiring the Senators dismissed to face a Special Election. In first for our Republic, Vice President Gary Johnson has done just that; using this rarely-invoked mechanism to effectively call a Snap Election. This gambit, as it appears, has decidedly paid off. The Libertarian Party has at last cracked through the walls of the Political Establishment, securing several seats within the Senate and at last claiming the balance of power. Due to widespread grassroots funding and media activism, it appears that the forces of Big Government are on the backfoot, the Hydra of the Establishment almost slain. With Congress now being forced to grovel to President Paul, it appears that his Libertarian Agenda is once more back on the table..."
 texas.110.o1:0 "Who's laughing now."
   
 texas.111.t:0 "Return to the Gold Standard"
 texas.111.d:0 "The abolition of the Gold Standard marks the point when America's decline became irreversible. The siren song of Fiat Currency has long allowed the sinister forces of Big Banking to crush average folk under their jackboot, creating a vicious cycle of credit and debt that many struggle to break free from. President Paul has had enough of their meddling. The time has come to rectify the greatest mistake of the post-Bretton Woods system. The time has come to restore the Gold Standard. Already thousands of tonnes of gold has been purchased from reserves across the world to make up the backing for the new Texan dollar. A fixed reserve of gold will now make up the backing for our currency, with limited exchange rates preventing the destructive inflation that has long plagued post-American nations. With our currency once more pegged to physical wealth reserves, Texans can at long last find themselves free of destructive inflationary tactics from the Banks, even as many economists continue to refute that Paul's return to the Gold Standard will do anything to substantially improve financial stability or economic outcomes. Already many are forecasting Banking crises becoming more commonplace in Texas, as investor confidence gradually drops. President Paul however remains confident in this course, stating that, 'We're deeply in debt and all that is being offered out of Austin is spend more money, borrow more money and print more money'."
 texas.111.o1:0 "You can't get out of a debt problem by printing more money."
   
 texas.112.t:0 "Extent of Presidential Power"
 texas.112.d:0 "Out of all post-American nations, Texas has one of the strongest Executives of any nation outside of Communist Dictatorships or Remnant Autocracies. This is very much a problem. The instruments of state are only as strong as the person wielding them, and while Paul remains steadfast in his vow to never more use the awesome powers of the Presidency without the consent of the Texan people, the unfortunate truth is that the Office of President of the Republic of Texas will not always be occupied by someone of Ron Paul's character. With that in mind, Paul has maintained his desire to see the office of President greatly reduced in authority, with true powers regarding several Executive functions returned to Congress. There is just one problem. Congress remains by-and-large hostile to our agenda; with the Executive Branch being the only one under our complete control. Restoring powers to Congress would do little more than throw Texas back into the jaws of Big Government. This conundrum has put Paul between a rock and a hard place. On one hand, the President could stick to his principles and willingly abdicate his authority to the jackals in Congress, or he could use the weapons of Big Government against them."
 texas.112.o1:0 "The Presidency has too much power already."
 texas.112.o2:0 "Congress is no better."
   
 texas.113.t:0 "Texan Liberty Act Introduced"
 texas.113.d:0 "The Hallmark piece of legislation for the Paul Administration has formally been introduced via a Congressional Proxy today. The Texan Liberty Act is seen as the Paul Administration's best shot at fundamentally reforming the structure of the Texan State. Unfortunately, Paul is very much in for an uphill battle as he fights to make Martial Law a Constitutional impossibility. There is no shortage of opposition to Martial Law within Texas, with both the Democrats and Independent Republicans supporting measures to abolish Martial law. Despite this, the Democrats have proven to be quite hostile to President Paul's Agenda in most other aspects, which makes their support for Libertarian legislation increasingly unlikely. Paul has also found an unlikely ally in the One Republic Caucus, who despite their opposition to Paul's hardcore anti-Government agenda, has been won over by Paul's intense Social Conservatism. If Paul wishes to pass the TLA, then he's going to need to do quite a bit of maneuvering within Congress, as allies remain few and far between. The Hydra of Big Government must be slain, but to do so, it seems that the Libertarian Party must sell its soul to do so. The only question is, who are we going to sell our souls to to achieve our greatest aims?"
 texas.113.o1:0 "The Democrats."
 texas.113.o2:0 "One Republic."
   
 texas.114.t:0 "Texan Liberty Act Passes"
 texas.114.d:0 "A sense of great tension hanged over the halls of power in Austin. The Legislature was divided, every single vote deciding the balance between life and death for the Libertarian agenda. It came down to the wire, but at the end, it seems that the Yays have it over the Nays. The Texan Liberty Act has formally passed Congress. This new legislation aims to make the unilateral imposition of Martial Law by the President a constitutional impossibility. With the TLA clearing both houses of Congress, it appears that any major snags to President Paul's agenda are effectively dead in the water. In a speech before a grand signing ceremony, President Paul declared that the passing of the TLA was the ultimate safeguard against Big Government tyranny, stating that 'Our federal government, which was intended to operate as a very limited constitutional republic, has instead become a virtually socialist leviathan that redistributes trillions of dollars'. In Paul's fiery address, he stated that the TLA was only the first of many bills designed to curb the power of a runaway Texan Government, and at last restore control to the individual, and the individual alone. As Paul's pen hit the paper, the fight against Big Government was faced with its first major victory. The Hydra shudders. The torch of Liberty glows bright."
 texas.114.o1:0 "It's happening."
   
 texas.115.t:0 "Texan Liberty Act Fails"
 texas.115.d:0 "A sense of great tension hung over the halls of power in Austin. The Legislature was divided, every single vote deciding the balance between life and death for the Libertarian agenda. It came down to the wire, but at the end, it seems that the Nays have it over the Yays. The Texan Liberty Act has resoundingly failed to pass Congress. This new legislation aimed to make the unilateral imposition of Martial Law by the President a constitutional impossibility. However, Congress isn't buying what Ron Paul is selling. With the TLA dead in the water, Ron Paul has become a Lame Duck President in all but name, as allies both within Congress and the Libertarian Party appear to abandon the President. While the Libertarian Party has always been in an uphill battle on the Congressional side, the implosion of the TLA has effectively slammed the coffin shut on Ron Paul's Libertarian Dream. With the Libertarian Party imploding due to the TLA's failure, whispers of the 'I' word have already spread through Congress; as more and more of Paul's allies abandon him. Without the Libertarian Party holding the balance of power, Paul's Presidency is all but over - the remainder of his now-short time in office rapidly slipping through the hourglass. Tragically, it seems that the forces of Big Government have won."
 texas.115.o1:0 "Well, shit."
   
 texas.116.t:0 "Ron Paul Impeached"
 texas.116.d:0 "It's the end of the line. Ron Paul is toast, his Presidency going down in flames after the failure of the TLA. Without any allies left in Congress, it seems that it was only a matter of time before both flanks of the political establishment united to take Paul down. Smelling blood in the water, Representatives from the Democratic Party formally moved to file a motion to impeach President Ron Paul. Backed by both Independent Republicans and One Republic Representatives, Paul's Impeachment quickly cleared both houses of Congress, with the fraught opposition from Libertarian members of Congress doing little to stonewall these efforts. Ron Paul's Presidency is dead in the water, with the final votes at last sealing Paul's fate as the first President of the Republic of Texas to be Impeached and successfully removed from office. Vice President Gary Johnson has been sworn in as President in the wake of Paul's demise. Due to much backroom wheeling-and-dealing, an agreement has been made to ensure that Johnson will not meet his predecessor's fate. Promises to moderate in the wake of the Ron Paul catastrophe have scored loyalty from the Independent Republicans and some Democrats and One Republicites, ensuring that a vision of Libertarianism - albeit a more moderate one, will still be present within Texas' Government."
 texas.116.o1:0 "So ends the Libertarian Dream."
   
 texas.117.t:0 "One Republic Bails Out Paul"
 texas.117.d:0 "Ever since the Texas Liberty Act failed to pass Congress, knives have been out for President Paul. Whisper's of Impeachment have spread throughout Austin's halls of power. With both Democrats and Independent Republicans voicing support for Paul's Impeachment, it seems that Paul's fall from power was only a matter of time. But then, just as all seemed lost, it seems as if the Libertarian Dream has been saved. Like angels descending from the heavens, the One Republic Party, beaten and bruised since their humiliating election loss, has emerged to save Ron Paul from the jackals on the left. The resolution to Impeach President Paul failed narrowly, One Republic coming out in force to back the remainder of the Libertarian Caucus in a resolute defense of the President. As the vote failed, President Paul declared that the forces of Big Government have once more been kept at bay. However not all is well within the Libertarian front; as now President Paul owes One Republic his political life. One Republic leadership has made it clear that if he does not follow the creed of the One Republic Party, he won't be so lucky the next time the Democrats come for his head. Now subservient to the whims of the One Republicites, it seems that now, the Libertarian Dream will only be made possible thanks to reactionary support."
 texas.117.o1:0 "How much does a Politician's soul go for these days?"
   
 texas.118.t:0 "Seized Firearms Returned"
 texas.118.d:0 "The Right to Bear Arms has always been a fundamental part of Texan culture. While figures in One Republic were always eager to capitalize on Texans' fervor for firearms as a key campaign issue, when it came time to walk the walk during the Remnant war, One Republic pushed forward a draconian bill to seize lawfully acquired firearms from law abiding Texan citizens for use during the war effort. This gross violation of the rights of gun owners has caused quite the backlash among firearm-owning and operating Texans, who have previously gravitated towards One Republic as a voter bloc. The Libertarian Party of Texas capitalized on this backlash during its successful election campaign, promising to restore these firearms to their rightful owners and ensure that the Government can never more unilaterally confiscate the firearms of law-abiding Texans. After the passage of a bill supported by both Libertarians and other members of the Gun Lobby within Congress, countless firearms were returned to their rightful owners in a grand ceremony. [TEX.GetLeader] accompanied many of his compatriots to a local shooting range, where the President fired off a few rounds while praising the ideals of the old Second Amendment."
 texas.118.o1:0 "Shall not be Infringed."
   
 texas.119.t:0 "End of the Internal Revenue Service"
 texas.119.d:0 "The Internal Revenue Service is perhaps the most wickedly evil institution to have ever existed. Texas' post-Collapse counterpart has proven to be no better. Recognizing Taxation as the ultimate evil to be conquered, President Ron Paul has struck a decisive blow against the forces of Big Government with a shocking new announcement. The Texan Internal Revenue Service shall be abolished effective immediately. With it, it appears that all current legislation regarding taxation within Texas is null and void; with Paul offering a purely Voluntaryist approach to Taxation. The aftermath has been immediate. Chaos has enveloped government agencies now deprived of all funds. Official agencies have cleared up that no, Taxes are not to be paid on a voluntary basis, no matter what President Paul has to say. However the message is clear. With the TIRS gone, Government power to effectively levy taxes is nonexistent, and a de-facto state of Voluntaryist Taxation now exists within the Republic of Texas. Government accounts stand empty, employees for agencies now deprived of their paycheck, all as the insidious forces of Big Government run around like a chicken with its head cut off. We don't know the future of Texas, but whatever it is, it won't be decided by Big Government overspending."
 texas.119.o1:0 "Taxation is Theft."
   
 texas.120.t:0 "Joining the War On Drugs... On the Side of Drugs"
 texas.120.d:0 "After decades of fighting the losing 'War on Drugs', what exactly have we accomplished? As it appears, we have accomplished a big fat stack of nothing; aside from enriching Cartels and the Military-Industrial Complex alike. President Paul sees through the so-called 'War on Drugs' for the sham it is; nothing more than an excuse to expand Big Government Power at the expense of everyday Texans. This insanity ends today, as President Paul signs extensive legislation aimed at legalizing several different narcotic substances within the Republic of Texas. Effective immediate Marijuana, Cocaine, Heroin, Methamphetamines, along with other illicit substances have been formally legalized, with Texans now free to do what they please with their own bodies. The state-sponsored legalization of drugs has caused a nuclear meltdown among the Conservative core, however has not stopped Paul from claiming that the Government has no business legislating what people choose to put in their bodies, stating 'We don't need laws to tell us to not use heroin'. Rallying against the negative effects of the War on Drugs, Paul has stated that previous administrations have used such flimsy excuses to put minorities under their jackboot. In addition to the legalization of drugs, Prostitution has also come up on the Government's legalization docket."
 texas.120.o1:0 "Drug War allows drug lords to make a lot more money."
   
 texas.121.t:0 "A Vision of Free Market Environmentalism"
 texas.121.d:0 "Earth's climate is changing, this is a fact which we cannot ignore. Our predecessor, one Mr. Ronald Paul, was one of the many who refuted the 'Scientific Consensus' regarding our planet's changing climate - however Gary Johnson has taken a much different approach to the issue of climate change since assuming office. Speaking to a crowd at a local conference, President Johnson stated that the climate is 'probably' changing and that humans are 'probably' contributing to this change. While he has denounced the Communist role in the desecration of Earth's environment, Johnson has also rejected government mandates to solve these problems, instead stating that Free Market initiatives are the best way to tackle the issue of the planet's changing climate. Seeing the realm of Green Technology as a wonderful opportunity for profit, Johnson has assembled new entrepreneurs to tackle this field and make Texas a haven for these developing new industries. Johnson is confident that the will of the Free Market will shift the nation towards more environmentally sustainable methods of development without the need for overbearing regulation or the stifling of our nation's Petroleum industry, which contributes thousands of jobs and livelihoods to hard-working Texans across the Republic."
 texas.121.o1:0 "We will not compromise when it comes to clean air, clean land, or clean water."
 
 texas.122.t:0 "Cannabis Legalized"
 texas.122.d:0 "In a grand ceremony today in Austin, President Gary Johnson has formally signed into law the legalization of Marijuana within the Republic of Texas. A key plank of the Libertarian campaign, attempts by the previous President to introduce a comprehensive Legalization agenda were stopped dead in their tracks by a hostile Congress. With Paul out of the picture, Johnson has conceded that the legalization of Heroin may not have been the most sound idea. A much more PR-friendly angle has come about in the form of legalizing Marijuana. The post-War on Drugs consensus on Cannabis has shifted radically, with most experts now united in labelling the drug as being less dangerous than alcohol. Domestic support for Marijuana legalization has exploded, with promises as such being a key part of what got the Libertarians elected in the first place. With Cannabis now legal, millions in new taxable income are expected to flow into Texas as once-Black Market purchases are now counted as taxable income, something which should help plug the holes in the budget caused by Johnson's considerable tax cuts. As well, this move is expected to weaken the influences of the Cartels, as their monopoly on the Black Market is cracked by the introduction of Marijuana into the legal economy."
 texas.122.o1:0 "The Free Market prevails again."
 
 texas.123.t:0 "President Perot Delivers State of the Union Address"
 texas.123.d:0 "The most frequently repeated statement by good, hard-working people since the Democratic and Republican conventions has been: 'How stupid do they think we are?'... United teams win. Divided teams lose. The message of fear and division may have worked thus far, but as it seems leaning on division can only last so long. Ross Perot has managed to defy the odds set out in front of him, at last claiming Texas' top job. While his previous independent campaigns failed to propel him to the Presidency - with his 2009 bid falling woefully short of his previous 30% share of the vote, Perot has managed to turn things around and at last defeat the jackals in One Republic. Addressing a divided Congress, Perot spoke at length about the need to protect Texan jobs from the specter of Foreign competition, as well as preaching the need for a stronger and more direct Democracy. While some, particularly in One Republic have boycotted Perot's speech, rogue elements of both post-OR major parties have thrown their support behind the President, arguing for him being a foundation for a bipartisan middle ground. Perot appears to have a strong deal of support among both Liberals and Conservatives, as both Independent Republicans and Democrats see the ability to pass bipartisan compromises while still sticking true to their ideals."
 texas.123.o1:0 "Hail to the Chief."
 
 texas.124.t:0 "The Giant Sucking Sound"
 texas.124.d:0 "While proposals such as the 'NAFTA' or 'North American Free Trade Area' were put out to pasture due to the collapse of the United States, much to the chagrin of politicians such as Canada's Brian Mulroney, the consensus among Texans has been that the collapse of the Free Trade dream has been for the better. However despite the idea of NAFTA being swept into the great dustbin of history alongside the United States, Texans remain threatened by destructive Free Trade policies - especially when it comes to our Southern neighbor. Corporations have been illegally transplanting jobs to Mexico for years, an indefensible practice that has only grown more indefensible due to Mexico's unjust aggression towards our nation. These practices must end. With backing from both IR and the Democrats, President Perot has formally signed legislation penalizing corporations who choose to relocate Southwards, with nationalization and eminent domain statues being threatened for businesses that do not obey, with some even threatening the leaders of Corporations who utilize 'Maquiladora' factories with treason charges due to the ongoing hostilities towards Texas and Mexico. This new legislation aims to prevent what Perot has dubbed the 'Giant Sucking Sound', and firmly root jobs here in Texas, where strong labour laws and fair wages still apply."
 texas.124.o1:0 "Free Trade is good for investors and bad for jobs."
 
 texas.125.t:0 "Populism and Pragmatism"
 texas.125.d:0 "Ross Perot's campaign for President was won primarily on his successful use of Populist and anti-Establishment rhetoric, taking particular aim at One Republic as being representative of the crooked Texan establishment. Although resentment towards the Political Establishment has propelled Perot towards the Presidency, in practice, Perot's style of Governance now that he is President has been one that has been remarkably warm towards the Establishment Politicians he so often chastised. Both Independent Republicans and Democrats have found aspects of Perot's policies that they have found agreement with, and due to the Centrist nature of the President's platform, the President can effectively angle support depending on if the issue he is pushing is appealing more towards Liberals or Conservatives, with Reform members of Congress, despite not having anything close to a majority, acting as a tie breaker. Even though Perot's own Reform Party only controls a handful of seats in the House and the Senate, this meager support is still enough to pass any legislation needed with the assistance of one of Texas' major parties - and in the rare case that both major parties unite to pass legislation hostile to Reform's ideals, Perot still maintains a Presidential Veto. While some would predict that this system would lead to great dysfunction, it appears that this strategy is just crazy enough to work, with Perot succeeding in implementing most of his agenda thanks to it."
 texas.125.o1:0 "The crazy son of a bitch did it."
  
 texas.126.t:0 "Electronic Democracy"
 texas.126.d:0 "Our Constitution predates the Industrial Revolution. Our founders did not know about electricity, the train, telephones, radio, television, automobiles, airplanes, rockets, nuclear weapons, satellites, or space exploration. There's a lot they didn't know about. It would be interesting to see what kind of document they'd draft today. Just keeping it frozen in time won't hack it. To modernize our Democracy, comprehensive reform is needed. To mend the issue of our hopelessly outdated systems, President Perot has proposed the implementation of a novel new system known as E-Democracy or 'Intranet Democracy'. By expanding access to computers across Texas, we shall not only bring our Republic into the 21st Century, but allow the creation of one of Perot's hallmark proposals, 'Electronic Town Halls'. The proposal states that a select group of national leaders - including elected magistrates and appointed 'experts' and industrial delegates - would present various policy options to the electorate. By means of an at-home computerized referendum mechanism, the people would voice their concerns directly to Austin. The results would be tallied, and the policy implemented. By expanding subsidies so all Texans can afford a home computer, we can begin implementing these policies, and while some remain opposed to Perot's 'Digital Direct Democracy' proposal, highlighting either security concerns or the lack of widespread computer ownership and the possible usurpation of Representative Government, Perot remains confident that this high-tech fireside chat-with a response mechanism is the way of the Texan future."
 texas.126.o1:0 "Texas advances into the 21st Century."
  
 texas.127.t:0 "The Cantonization of Texas"
 texas.127.d:0 "Switzerland has been one of the few European Democracies to survive the victory of Communism. Enclaved and surrounded on all ends by Communist regimes, Switzerland remains one of the few beacons of Capitalism and Democracy on the European Continent. Their secret? Their highly-successful system of 'Direct Democracy' which has allowed people to vote directly on hot-button issues without the obstruction of partisan gridlock. Perot has long idolized Direct Democracy, and while originally his proposal was only the proposal of Computerized Direct Democracy via Digital Town Halls, Perot's own Helvetophilia has extended towards all aspects of the government in Bern since 1987. With that in mind, a Constitutional Committee has been drafted to create new Texan instruments of Government. To further distance ourselves from the system of the old United States, Counties shall be replaced by larger 'Cantons', each with their own elected representatives and councils, expanding Texas' identity and smoothing over tensions with New Mexico. While the 'Cantonization' has been the talk of Austin Town, the hallmark of this new effort has been a new Referendum system, with new efforts at increasing pubic participation announced in tandem. The old system of Ballot Measures have been replaced with comprehensive Direct Democracy - and while our Representative Democracy has survived, much like in Switzerland, this new system shall help create a stronger Texan identity and Texan government."
 texas.127.o1:0 "We can learn a lot from the Swiss."
  
 texas.128.t:0 "Beyond the Legacy of Reagan"
 texas.128.d:0 "Ronald Reagan is undeniably the most reviled person in American history. His trickle-down disaster destroyed the United States - and while his Presidency may be over, the fact is that not enough has been done to distance the post-American nations from the disastrous consequences of Reagan's economic policies. A disturbing trend has emerged from the decade of greed, the era of trickle-down economics and the period of capital gains tax manipulation. We are headed for a two-class society. But there is still a chance to undo the catastrophe that was Reaganomics. Texas is doomed to the same fate as the once-United States if we do not act. Perot, despite being a businessman himself, has become an outspoken critic of corporate America, and now that he has the Presidency, has sought to break the influence of Big Business over Texan policies. With strict restrictions on Political Lobbying already implemented, increasing fees on corporations and shifting the tax burden from the middle class to the rich, we shall create an environment in which all Texans can thrive, regardless of what's in their wallet. Combined with cutting investment taxes, we shall forge an economy which helps incentivize hard work, and allow all Texans to thrive, rich and poor alike, within reasonable bounds."
 texas.128.o1:0 "It makes no sense for me to pay less of a percentage of my income that other people."
  
 texas.129.t:0 "New Social Liberalism"
 texas.129.d:0 "Ross Perot's stances on hot-button Social Issues has always been described as uncharacteristic for his status as a Rich Southerner. Perot's staunch Social Liberalism was the defining issue that first led to his break with the Independent Republican Party, as Perot abandoned his bid to challenge incumbent President Hutchison in 2002 to enter the race as an Independent next election. His own Reform Party has been defined by a mix of economic and social concerns from both sides of the aisle. For example, his stances on Trade and Policing would be right at home in the One Republic Party. On the other, his positions on Abortion and Gay Rights are straight from the Democrat handbook. This ambivalence towards political labels has been one of Perot's greatest strengths, as he can effectively bypass the hyper-polarized Texan political scene to implement real change. Working together with the Democrats, Perot has signed new legislation implementing a slough of radical social change within Texas. From the legalization of Abortion and Homosexuality, to strong punishments for workplace sexual harassment, H. Ross Perot, despite being widely considered to be an archetypal Texas right-wing kook, is prepared to endorse strongly redistributionist and liberal social policies. While the Independent Republicans have protested this course of action, the IR Caucus has still signalled that they are on board with passing Perot's expansion of the Death Penalty."
 texas.129.o1:0 "The Overton Window shifts."
  
 texas.130.t:0 "Redefining Texas Patriotism"
 texas.130.d:0 "One Republic was founded by Texan nationalists from both the Democrats and Independent Republicans, and fittingly with their name, considered there to be only 'One' true definition for Texans. Rampant discrimination was a hallmark of the One Republic government, particularly towards Hispanics, who were frequently labeled as a 'Fifth Column' by prominent One Republic politicians. This, combined with their whole-hearted embrace of Confederate nostalgia, has created an environment that was less than welcoming to all Texans. With a vision of true Moderate Conservatism enshrined in Texas, we can begin moving Texan patriotism away from harmful nationalism and racism, remaining true to our Texan roots while distancing ourselves from movements such as the Sons of the Confederacy of the Texas Nationalist Organization. New learning materials serve to highlight that being Texan is not defined by the colour of one's skin, their faith, or their native tongue, but rather the shared ideals and heritage shared by all within the Lone Star Republic. While our relations with Mexico may still be frosty due to the 1989 war, we have maintained that Hispanic Texans contribute to the rich cultural fiber of the Republic of Texas. Those who died at the Alamo came from many stripes, but they all united to give their lives in the name of ensuring that Texas may be free. Regardless of your colour or your creed, all are welcome to sit down, have a beer, and enjoy some barbeque, so long as it isn't cooked with charcoal - the devil's fuel for Californians and Communists..."
 texas.130.o1:0 "We stand united under the Lone Star."
 
 texas.131.t:0 "President Friedman Delivers State of the Union Address"
 texas.131.d:0 "Richard Samet 'Kinky' Friedman sure as hell never expected to be here. When he kicked off his campaign for President of the Second Republic of Texas in the wake of the end of the Remnant war, he only really expected to get a few laughs from bemused Texan citizens as he railed against the 'No-good crooks' in Austin. Yet now, he stands in the very halls of power he so often mocked, here in the Texas Senate, a building built for giants but inhabited by midgets. From the get-go, Friedman delivered a rip-roaring address lampooning the issues of the day in his trademark satirical style. While it appears that Friedman had few intentions of winning the Presidency, this well-worn Jewish Cowboy is intent on making his mark on the Texan nation by any means possible. Everyone knows we’re not going to get any action or inspiration from career politicians. They’re so busy holding on to power they never take the time to send the elevator back down. But maybe, just maybe, Friedman is the man to break the cycle, and run those keeping Texas down off on a rail. He's not a politician, folks. Hell, Friedman hasn't even been indicted yet. The President is sixty-two years old. That’s too young for Medicare and too old for women to care. But the President cares about Texas. His speech was scoffed at by One Republicites, but as Friedman spoke, even some within the OR Caucus let out a chuckle. We don't know what the future of Texas holds. What we do know is that with Friedman's upset victory, Texas has entered into a new political era. "
 texas.131.o1:0 "Hail to the Kinkster!"

 texas.132.t:0 "Mandatory Voting Introduced"
 texas.132.d:0 "Texas politics really stink. The parties, whom I call the Crips and the Bloods, sell themselves to the biggest donors. Lobbyists control the legislature’s agenda. Top funding groups in the state are being indicted for money laundering. Corruption and big money have such a tripolar chokehold that the three major parties blew more than $100 million in the previous President's race just to drive 71 percent of the voters away from the polls. After all that money was spent, less than 30 percent of us bothered to show up to vote. Why? Because it’s hard to stand in line at the ballot box when neither candidate promises anything more than politics as usual. Friedman's shock victory last election has at last provided the catalyst for true change in the world of Texan politics, with several ingenious proposals detailed in the 'I Can Answer That for You, but I Can’t Understand It for You: Suggestions for political reform in Texas' portion of his platform, becoming official legislation. Most interestingly, Mandatory Voting has been introduced in Texas in a system similar to Australia. Every citizen is required to show up at the polls and have his or her name checked off. If you don't show up, you’re fined something like fifty bucks. You don’t have to vote, but in Australia, the turnouts are often as high as 98 percent and political corruption has plummeted. This measure, combined with same-day voter registration, shall ensure that all Texans will have the final say in their political future."
 texas.132.o1:0 "A breath of fresh air... even with all the cigar smoke..."
 
 texas.133.t:0 "THOU SHALT FIGHT WUSSIFICATION"
 texas.133.d:0 "Early on in the campaign President Friedman came out strongly against wussification, described as the weakening of fibers, be they physical, moral, or spiritual. Kinky vowed to beat wussification if I had to do it one wuss at a time. Many mocked his anti-wussification efforts and believed it all had to be a joke. Friedman usually responded by asking, 'WWWRD?' What Would Will Rogers Do? I followed up by quoting Will Rogers, who claimed to feel very much at home with the politicians. 'The politicians are the greatest comedians of them all,' he said. 'The only trouble is, every time they make a joke it turns into a law, and every time they make a law, it turns into a joke'. The anti-wussification campaign, Friedman assured them, was no joke. The joke, Kinky said, was the Texas Legislature. Friedman railed against the PC police that had practically turned tobacco users into biblical lepers. He talked about the way many people were ashamed to say 'Merry Christmas' these days. I pointed out that I was a Je-e-e-e-w-w-w and I didn't mind a bit. Friedman's against those left-wing liberals who are embarrassed to say Merry Christmas. He's also against those far-right religious folks who are largely responsible for keeping legalized gambling out of Texas. These two relatively small fringe groups are, in my opinion, holding back the greatest nation on the planet."
 texas.133.o1:0 "The PC Police aren't going to cramp the Kinkster's style."
 
 texas.135.t:0 "THOU SHALT NOT BULLSHIT, or, Sacred Teachings of the Butt-Sniffing Clan"
 texas.135.d:0 "K.I.S.S.P - that stands for 'Keep it Simple Stupid Politician'. Instead of honestly dealing with the concerns of the Texan people in the leadup to the Remnant War, Rick Perry, running around like a chicken with it's head cut off, declared Martial Law, not as a way to prepare Texas for the oncoming onslaught, but as a way to escape accountability for his countless failures. A bullshitter is a euphemism for a politician. You can’t quite catch him in a lie, but then neither does the truth ever seem to escape his lips. If we are to prevent lying politicians from running around with a siren on their head declaring 'the sky is falling' every time they get caught in their bullshit then Martial Law has gotta go. Most politicians within the Texas Legislature, shockingly understand this basic concept, with the Bloods declaring that the Crips can't have this power - not out of any altruism, but out of a desire to save their own skin. In particular, Ron Paul, despite being an anti-Government kook in his own right, has made some damn good points about why Martial Law needs to be abolished. Keeping it simple with the Stupid Politicians means that we can't give them any easy ways out. If they want to stay in power then they ought to get on the saddle and ride across this great Republic, just like the Kinkster."
 texas.135.o1:0 "The people have spoken... the bastards!"
 
 texas.136.t:0 "NEVER SAY FUCK IN FRONT OF A C-H-I-L-D, or, No Teacher Left Behind"
 texas.136.d:0 "It is clear that efforts to ensure that no child is left behind have failed. That's why President Friedman says, “No teacher left behind." They are the ones the system depends upon and they are the ones getting screwed, blued, and tattooed by the state. The teachers have 100 percent accountability while the parents and the kids have zero. This glaring inequity has got to be brought into balance. Because of political correctness, shamefully low pay, politics as usual, and general neglect on the part of the powers that be, good teachers are bailing out of education into less rewarding but more profitable fields of endeavor. We’re at, or very near, the bottom in terms of education. When the Dallas Morning News asked me where Friedman gotten his information that Texas was last in education, he told them he’d heard it from a peasant with a withered arm. The time has come to radically raise the salaries of teachers. To those asking how we may pay for this, President Friedman has offered a simple solution: the legalization of gambling. Las Vegas is nothing but dust and Communists, and Texas has a real opportunity to shine here. We invented Texas Hold ’Em and we can’t even play it here! Billions and billions of dollars are pouring out of Texas on a regular basis, fueling the economies of neighboring nations. It's time to kill two birds with one stone."
 texas.136.o1:0 "Education is not a problem; education is an opportunity."
 
 texas.137.t:0 "Smoking Bans Lifted"
 texas.137.d:0 "If smoking is not allowed in heaven, I shall not go. Because of an oral fixation, and because it's his magic feather, President Friedman virtually always has a Cuban cigar in his mouth. In the President's own words, 'I smoke about eight to ten Cuban cigars a day’. He’s quick to point out, however, that he’s not supportin' their economy; he’s bumin' their fields. Marijuana has long been a favoured boogeyman of the One Republic Party, as Perry declared that Reefer Madness was three steps away from driving Texans towards the Soviet Union. That's the biggest crock of shit since, well since everything else One Republic was up to - but still. There were worse things going on in the state, like the complete neglect of immigration, education, and the environment, but you wouldn’t have known it. For Friedman's part, he held on to the cigar for dear life but eventually it was the better part of valor to stop smoking it in public. This of course caused people to constantly come up to Friedman and ask, 'Do you ever smoke that thing?' or 'Is that thing lit?' To the latter question I would often respond, 'Which thing are you referring to?' which was, of course, a veiled reference to his penis. This response, as Friedman suspects, may have cost him some votes in the suburbs. Yet still, he wouldn't be where he is today without the support of Austin potheads. The time has come to decriminalize Marijuana and clear up some space in the prisons for all the politicians, while also spreading the 'Freedom to Smoke' to Tobacco as well ."
 texas.137.o1:0 "If smoking is not allowed in heaven, I shall not go."
 
 texas.138.t:0 "Hell on the Mind"
 texas.138.d:0 "I dreamed that Rick Perry passed away and went up to see Saint Peter. “Get out of my way,” Perry tells him, "I'm cornin’ through.” “Hold the weddin’, President,” says Saint Peter. "We have a little different way of doing things up here. First you’ll spend twenty-four hours in hell, then you’ll spend twenty-four hours in heaven. Then we’ll let you decide.” So Perry goes down, down, down to hell in the elevator and when the doors open he’s on a beautiful golf course. All his cohorts and lobbyists are there, drinking champagne and laughing and having a lot of fun. The devil’s there too, and he’s a great guy, joking and dancing around. So Perry joins all his friends and they spend the day telling stories about all the insider deals they made and laughing about all the money they made off the backs of the people. Finally, the twenty-four hours are up and Perry goes up to heaven, where he spends the next twenty-four hours walking on clouds with angels, which isn’t too bad either. Then Saint Peter comes up to Perry. “Okay, President,” he says, “you've spent twenty-four hours in heaven and twenty-four hours in hell. Now, it’s your turn to decide. Where will you spend all eternity?” “You know,” said Perry, “I never thought I'd say this, but I think I’d rather be in hell.” So down, down, down the elevator goes, but when the doors open, Perry sees that the golf course is gone. In its place is a barren field covered with trash, and all of Perry’s friends are dressed in rags, looking miserable, picking up the trash and putting it in bags. “What’s going on?” shouted Perry in total bewilderment. “What happened?” Then the devil put his arm around Perry’s shoulder and he smiled."
 texas.138.o1:0 "“Yesterday, Mr. President,” he said, “we were campaigning. Today, you voted.”"
 
 texas.139.t:0 "THOU SHALT NOT KILL"
 texas.139.d:0 "As President Friedman says, he's not anti-death penalty, he's 'anti-the-wrong-guy-getting-executed'. The case of Max Soffar comes to mind as an example of the wrong guy getting executed. Somewhere along the line, Max’s life fell between the cracks. For the past years after confessing to a cold-blooded triple murder at a Houston bowling alley, Max was executed, with the now-President himself bearing witness. The only evidence was a confession; however he long ago recanted that confession, and many people, including a growing number of Houston-area law enforcement officers, think he didn’t commit the crime. They say he told the cops what they wanted to hear after three days of interrogation without a lawyer present. The trouble was, Max’s confession—actually, he made three different confessions—contained conflicting information. First he claimed to be outside the bowling alley when the murders took place and that he only heard the shots. Then he said he was inside and saw it all go down. Then he said his friend shot two people and threw him the gun, whereupon he shot the other two.  Lawyers have discovered that there was no physical evidence linking Max to the crime. If the facts had been before them, no jurors would have believed that the prosecution’s case had eliminated all reasonable doubt. With the memory of this case and countless others fresh on the mind, President Friedman has signed an executive order formally abolishing the Death Penalty in Texas, at last ending this barbaric practice and abolishing the state's hold over life and death."
 texas.139.o1:0 "There are so many little dyings, it doesn't matter which of them is death."
  
 texas.140.t:0 "THOU SHALT NOT EAT A CHICKEN-FRIED STEAK BIGGER THAN YOUR HEAD, or, Common Sense"
 texas.140.d:0 "President Friedman loves the Texan people. But oftentimes they don't have the best judgment. After all, they elected him as President, so he would know. In his fight against the fat cats and the blood-sucking parasites of the Political Class, Friedman has sought to strike back hard at the Culture Warriors and Corrupt Money Men of the One Republic era. Despite increasingly leaning on more establishment figures within the Texan Democrats, Friedman's fight remains a timeless one. Utilizing his own wit and Texas-style of political humour, Friedman has managed to rapidly shift public perception. Despite Texas' less-than-stellar political scene and the presence of continuing deadlock, President Friedman, two words which don't sound right together to anyone in Texas including the Kinkster himself, has made a tremendous amount of progress in transforming many of his most outlandish political positions into practical action. As much as it may repulse President Friedman, it appears that he's getting accustomed to the world of Politics in Austin, as the President racks up an impressive score of political wins and settles into the positions the voters of Texans elected him to. Even if one may ask how can you look at the Texas Legislature and still believe in intelligent design, despite the long odds, Friedman has succeeded in implementing much of his admittedly insane agenda. As tragic as it may be, it seems like Friedman has made a hell of a Texan President after all..."
 texas.140.o1:0 "We'd say 'Thank God we aren't in charge', but shit, it seems like we are now."
 
 texas.141.t:0 "Abandoning Social Conservatism"
 texas.141.d:0 "The victory of moderate [TEX.GetLeader] against the culture warriors in the One Republic Party has proven that Texans are tired of Big-C Conservatives too busy with gay-bashing to solve Texas' deep economic and political crises. As Texans remain trapped under rubble from the Remnant war, One Republic's focus turned to demonizing and scapegoating the minority of the day. The Independent Republicans recognize that Texan values, while still incompatible with Socialism and California nonsense, do not need to be outwardly hateful or bigoted. The Government ought to get out of the bedroom and out of people's private lives. Instead we shall focus on delivering a strong economy for all Texans, regardless of their colour or their creed. While the remains of One Republic, frothing at the mouth about their latest culture war, claim that our lack of focus on hot-button social issues is proof that the IndReps have sold out to the Abortion-Loving Sodomites, as this point, pandering to these lunatics would cost us more support than if we just left them alone to stew in their rapid hatred. For what it's worth, the Log Cabin caucus appreciates our position, as do the several Hispanic Independent Republicans who have begun gravitating more and more towards Conservatism as the Texan right is reclaimed by figures no longer chomping-at-the-bit to discriminate against their kind. While not all among those aforementioned groups are swayed by our positions, we have at least broken ground to allow them to feel comfortable supporting Conservatism in due time."
 texas.141.o1:0 "You can love who you want, as long as you also love Low Taxes!"
    
 texas.142.t:0 "Social Conservatives Flock to the Independent Republican Party"
 texas.142.d:0 "The Independent Republican rank-and-file believes that marriage is a sacred bond that only exists between one man and one woman and that same-sex relations are sinful by nature. Efforts to erode this are nothing short of an assault on the sanctity of marriage. We will not compromise on our values, no matter how much the Small-C Conservatives and Log Cabin Independent Republicans short. This sudden U-Turn on Social issues has caused the remains of the One Republic Party, previously skeptical about our lackadaisical policies towards Social Conservatism, to have flocked to the Independent Republican Party in record numbers. While some diehards remain loyal to the One Republicite cause, the IndReps joining the Culture War full-heartedly has been enough to draw the last remnants of the Perry era rank-and-file out of the foxhole and towards the struggle for true Conservatism. Evangelicals stand on their feet cheering for this newest shift in rhetoric from the Independent Republican Party, as the Texan Right once more becomes monopolized by the forces of a single party. Prayer dinners and rallies feature an increasing number of ex-Perry Administration officials, as warnings that the party is becoming co-opted by One Republic fall on deaf ears. Rumour has it that the One Republic Party isn't even considering running a candidate in the next election, as insiders say the party is likely to throw their support behind the Independent Republican Party."
 texas.142.o1:0 "Upholding family values is a priority for our administration."
     
 texas.143.t:0 "Ballot Measure Threshold Lowered"
 texas.143.d:0 "It cannot be denied that Democracy has suffered at the hands of the One Republic Party. Whereas previously Texan Democracy flourished with a vast amount of public Referendums, mechanisms for accountability and the ability to recall elected representatives, many of these advancements went the way of the Macarena once One Republic first sunk their claws into our Republic's Legal System. These anti-Democratic measures end now. The first major part in President {TEX.GetLeader]'s Restoring Democracy agenda is the lowering of the threshold for Ballot Measures back to a simple majority, instead of the 60% that exists currently. Thanks to One Republic's changing of the rules, not a single ballot measure has passed in Texas, grinding public participation in our Democracy to a halt. With these new measures in place, the people of Texas, who have proven to broadly agree with our Moderate Conservative agenda, will be able to vote directly on policies the Gridlocked Congress are unwilling to touch. As well, the ability to recall elected representatives has also been restored. If a Representative or Senator has a majority of their constituents sign a designated petition to recall them, their seat shall be vacated and a Special Election will be held. While many have cautioned that this is opening a dangerous door that could lead to the fall of our IndRe Government, from our point of view, if these measures can be used in such a way, then it is the will of the Texan people in action."
 texas.143.o1:0 "We shall always be accountable to the Texan voters."
      
 texas.144.t:0 "Corruption Watchdogs Raise Alarm"
 texas.144.d:0 "Every true Texan loves two things: God, and Football. Every Sunday Texans adjourn to Praise the Lord at their local Church, and then return home to watch the Cowboys - as is tradition. We can't let our proud patriots of the Lone Star to see the Cowboys play in a shabby Stadium. After the Remnant war, many of Texas' greatest stadiums were destroyed or otherwise rendered inoperable, and that isn't even mentioning the magnificent sporting venues lost to Remnant-occupied territories. With this in mind, President [TEX.GetLeader] has opted to generously assist in bringing Texas' Stadiums up-to-code. Thanks to some direct 'donations' from major teams and construction firms, Red Tape surrounding the construction of new Stadiums have been slashed radically, as proposals for new constructions sail through consultation processes in record time. While some have raised alarm about these practices, stating that major construction firms are 'Bribing' authorities to turn a blind eye to corner-cutting and inadequate public consultation, what red-blooded Texan wouldn't be willing to cut a few corners to keep the Cowboys playing in style? New state-of-the-art facilities shall feature all the newest innovations, from luxurious Locker Rooms, leather chairs in the stands, and greatly increased seating capacity, as well as new security measures."
 texas.144.o1:0 "Go you Dallas Cowboys Go!"

 texas.145.t:0 "Texas Rangers Funding Increased"
 texas.145.d:0 "Corruption is a scourge that we cannot tolerate. The Lone Star State ought to remain shiny as a Sheriff's badge, and to keep our Republic clean then we ought to be allocating more money to our boys in the Texas Rangers. One Riot, One Ranger, has worked well enough thus far, but what about corruption? While the Texas Rangers have typically been delegated to anti-Corruption hunts, as it stands, their duties in this sector have not been a focus for previous One Republic Governments - for predictable reasons. With DeLay's rabble cleared from Congress and Paxton's cleared from the Judiciary, we can at last begin clearing out the rot. Already DeLay has been locked behind bars, however it's clear that One Republic's brazen graft is simply a symptom of a larger problem. Under the guidance of Attorney General Alberto Gonzales, a widescale anti-Corruption campaign has begun, leaving no stone unturned, even our own. Already several Democrats and Independent Republicans, typically lower-level officials such as Mayors and County Clerks have been brought up on charges of embezzlement. The Texas Rangers Corruption Task Force has already brought in countless helpful tips - as a new policy of rewarding whistleblowers with a portion of seized funds has begun working wonders for our efforts. Hopefully, in due time, the stain of corruption shall at long last be wiped from the face of our Republic."
 texas.145.o1:0 "Not a dime of waste."

 texas.146.t:0 "President Martinez Delivers State of the Union Address"
 texas.146.d:0 "Texas is no stranger to strong, Conservative women in politics. Prior to Martinez's election, Texas' only Independent Republican President was Kay Bailey Hutchison, who herself defeated Democrat Ann Richards, Texas' first female President. As Texas' first Hispanic President, Susana Martinez has something of a fraught path in front of her. Relations between the Texan Government and the Hispanic Community has been, to put it lightly, a disaster, particuarly so since the 1988 Mexican War, and while Martinez hails from the region that was once the Republic of New Mexico, Martinez has no shortage of detractors eager to utilize her Hispanic background to lob discriminatory attacks, as proven by the One Republic campaign last election. However regardless of these taunts, Martinez remains widely popular as she takes the Oath of Office. In her first speechto the Texan Congress, Martinez hailed a vision of sensible small-budget Conservatism. However notably, Martinez also included many Spanish phrases and words in her speech, sending a message that Hispanic Conservatives are no longer a stranger in the world of Texan politics. While some One Republicites and Libertarians have boycotted her speech, Gallup polls show the address has gone over well with most Texans ."
 texas.146.o1:0 "Hail to the Chief."

 texas.147.t:0 "New Mexico Granted Autonomy"
 texas.147.d:0 "The anexation of New Mexico in 1988 still has caused no shortage of sore feelings among residents of the once-Republic. The fact that New Mexico was once an independent nation has been almost entirely forgotten to those within the Texan Government, who are content with treating the region as just another extension of 'Greater Texas', with no regard to New Mexico's rich heritage and seperate identity. Susana Martinez is the first resident of former New Mexico to be elected as President of the Republic of Texas - previously being one of the few New Mexican officials to serve in higher office in Texas. Within the territories of New Mexico still under Texan control, new statues have been passed reconstructing the old borders of New Mexico, which were previously drawn over in an attempt to scuttle any ideas of Separatism, and providing the area with substantial autonomy from the Central Government in Austin, something which no other part of the Republic of Texas can boast. Martinez has denied any allegations that she holds alligence towards the New Mexico Separatism movement, stating that these efforts are simply meant to recognize New Mexico's unique status, prevent further feelings of alienation in the region, and stay true to the ideals of Small Government Conservatism."
 texas.147.o1:0 "A nescecary step."

 texas.148.t:0 "Hispanic Voters Gravitiate Towards Conservatism"
 texas.148.d:0 "One Republic's campaings have typically been driven behind fearmongering against Hispanic-Texans, Homosexuals, Non-Christians, or all three. Despite what the Democrats may try and make you think, Hispanic voters are not a monolith. Many Hispanics, driven by shared cultural values, maintain deeply Conservative views, views which would make them a natural fit for the Independent Republican Party. Had One Republic not retreated so deeply into their anti-Hispanic fearmongering, it is likely that they could have captured a sizeable portion of the Hispanic vote. Luckily for us, we share One Republic's Conservatie stances without sharing the party's fervent hatred of Hispanic-Texans. While polls still show that most Hispanic Texans, particuarly those in South Texas and New Mexico still favour the Democrats, their margins are no longer as overwhelming as they once were. Numbers show that the Democrats lead among voter intention by 56%, with the Independent Republicans coming in second plase at 39%, and 3% supporting other parties. While the Democrats still have the loyalty of this highly-coveted voter base, it seems that the IndReps are making solid inroads, and may just be able to claim the plurality of Hispanic voters in due time. For what it's worth, the President has focused additional resources on appealing to Hispanic voters, with Spanish-language campaign literature and tours of Hispanic communities becoming a staple of the election season."
 texas.148.o1:0 "Hispanas para [TEX.GetLeader]!"
 
 texas.149.t:0 "President Straus Delivers State of the Union Address"
 texas.149.d:0 "Joseph Richard Straus III is no stranger to the halls of Congress. Straus is notable for being the last Independent Republican Speaker of the House of Representatives - back when that still meant something. During the end of his tenure Straus was commonly seen as the Independent Republican Party's best shot to defeat One Republic, gaining a position of high renown due to his sucsesfull work in stonewalling the One Republic Legislative agenda. While he would eventually fall from this position in 2009 after One Republic reclaimed the House, Straus has become a legendary figure within the Texan Opposition for his tact and ability to navigate through a hostile Congress, and is widely credited for keeping the IndReps afloat in Congress even as the Party tumbled in Presidential Elections. While bitter ex-One Republicites have chosen to sit out his speech, his call for Bipartisanism and a united front to defeat One Republic has struck a choord with the entiety of the Texan opposition - who while disagreeing with many of the finer details of Straus' vision for Texan Conservatism, remain united in their belief that One Republic should never more be allowed to weild power. As Straus places his hand on the Bible (despite his Jewish faith) to recite the Oath of Office, Texas enters a new era of common-sense Conservatism."
 texas.149.o1:0 "Hail to the Chief."

 texas.150.t:0 "Evangelicals Express Outrage"
 texas.150.d:0 "Straus has the notable achievment of being the first Jewish President of the Republic of Texas - something which has not exactly sat well with the large base of rabid Evangelicals who dominate the Texan right. As Texas' first Jewish President, Straus has naturally come to clash with elements of the Christian Right. With this in mind, Straus has put forward Legislation upholding Religious Freedom within the Republic of Texas. Indeed, while in theory Texas is a secular nation with freedom of religion, in practice the situation is far different. In a speech to the nation, President Straus has declared that all Texans, regardless of faith, should free to live as they please. As a longtime weilder of the Speaker's gavel, Straus has had little difficulty in transforming his thoughtful, conservative approach to governing into concrete policy. In Straus' mission to appeal to our diverse population with an optimistic vision, One Republic and their Evangelical Christian-Right base have lobbed everything they can at the President, from questioning his status as a Conservatism to engaging in anti-Semetic blood libel. Yet as it stands, Straus' vision of Texan Conservatism stands tall against the ashes of One Republic."
 texas.150.o1:0 "When aren't they outraged?"

 texas.151.t:0 "President Bush Delivers State of the Union Address"
 texas.151.d:0 "Many would have assumed that Jeb Bush's loss in the 2010 Presidential Election in the American Republic marked the end of the Bush Dynasty. With two consecutive failed Presidential runs under their belt many thought it unlikely that the Bush family had a political future - no matter how much of a Cult of Personality had built up surrounding their father. Yet as it seems, the Bush Dynasty has enjoyed a fascinating second win in a place most would never expect: Texas. George Jr., the estranged son of George Bush Sr. who first attempted to unseat Rumsfeld in 2002, was thought to have sworn off politics forever, as he moved back to Texas to manage the Texas Rangers baseball team. Yet in light of his heroism during the Remnant war, the people of Texas have drafted George Jr. to be their savior once more. In a grand speech to the Texan Congress, Bush Jr. has spoken at length about the future of Texas, about his 'Compassionate Conservative' agenda, and about his wishes for a peaceful future - all while utilizing several baseball metaphors in the process. While applause was sporadic among Bush's most die-hard political opponents, no major Party decided to boycott Bush's address, with his favourables remaining high among every demographic."
 texas.151.o1:0 "Hail to the Chief."
 
 texas.152.t:0 "A Matter of Family"
 texas.152.d:0 "The status of the Bush Family within Texas is understandably complicated. While Bush Sr. was a longtime Texas Resident, first moving to the Lone Star State after graduating from Yale, quickly establishing himself within the Petroleum industry. Following his ascension as Vice President, Bush became the first Texan to serve in the office, as well as the last. During the collapse of the United States, Bush led the remnants of the Federal Government to the South, where he attempted to restore the Federal Government. Although he attempted to appeal to Texas in an attempt to secure the peaceful ascension of his home State, war would ultimately break out between Austin and Atlanta, dooming any prospects of a return to 'home' for the President. However in the years since, a dissonance has grown between the realities of the East Texas War and the public perception of the President's old man, with the Bush dynasty becoming a popular symbol of resistance in both Texas and the American Republic following their fall from power. Allegations even exist that Bush never wished to invade Texas, and was simply forced into doing so by Vice President Rumsfeld. As President Bush and the remains of the Bush Family exiled in Texas mull their personal and political futures, a decision must be made - is Bush Sr. deserving of public praise, or is it best to keep their heads down on this particular issue."
 texas.152.o1:0 "The Bush Family deserves the utmost praise."
 texas.152.o2:0 "Well, I don't agree with my Dad on that point."
 
 texas.153.t:0 "Center Field"
 texas.153.d:0 "George Dubya's fondness for baseball is nothing new to those who know the man. While in a boyish fervor a young Bush Jr. dreamed of avenging his father's supposed death at the hands of Donald Rumsfeld, Bush's true ambitions turned to a more achievable goal once he swore off politics - the goal of becoming Commissioner of Baseball. Upon his appointment as head of the peace delegation to Atlanta, many saw Bush as a shoo-in for the Commissioner's post - before the Independent Republicans ushered him into the higher (or lower, depending on who you ask) calling of President of the Second Republic of Texas. Throughout Dubya's life, Bush had always tried to impress his father, who privatley saw Bush Jr. as the black sheep of the family, first running for Congress as a means to win over his father's affection. However in the years following Bush Sr.'s death under mysterious circumstances, Bush's goals turned towards avenging his father against the Rumsfeld machine that corrupted his words and ideals, twisting them into something unrecognizable. In the years since returning to Texas, however, Bush's goals and personal affairs have shifted, as he abdicated both his goals of impressing or otherwise avenging his father. Now, Bush is focused on creating something of his own - delivering real change to Texans in this new era, and all the while enjoying a good game of Baseball along the way."
 texas.153.o1:0 "Take me down to the Ball Game!"

 texas.154.t:0 "Whispers"
 texas.154.d:0 "They come to you. They speak in hushed voices, men in ill-fitting suits, congregating in the corners of dimly-lit rooms competing for your attention. They recognize strength. They cannot abide weakness. Rumsfeld failed. Failed to pacify a Republic 1/4th their size. They can't let weakness stand, can they, George Dubya? They see you. Your father's seed. The prodigal son - the rightful heir. Your throne was usurped. You led YOUR people to victory. They travel using fake identities. You can't see their faces. They offer you the world. You're tempted to accept. You don't know who they are, only that they wish to provide you aid. They wish to help you reclaim your birthright. They wish to help you reclaim your country. You reply that your country is Texas. They offer a silent laugh. Part of you still holds the hatred. Part of you still knows what they did to your father. You want to make them pay. You want to make your father proud. Another part of you speaks. A part that knows he wouldn't have wanted this. A part of you that knows he wanted you to build something of your own. You never catch their names. You can't recall what they call themselves. The word ENCLAVE flashes in your mind. They offer YOU the world - not Jeb, not Rumsfeld, YOU. You try to fight the curiosity. You don't know if you can. You don't know if you want to. They say they can take care of buisness if you decide to accept - WHEN you decide to accept. They can move mountains for you, Dubya. They have connections. They know all the right people. It's your choice, that's what they keep telling you. Not Rumsfeld's, not your father's, YOURS. If you decline, you'll never see them again. You'll never hear from them again. You'll never know who they were. But if you accept..."
 texas.154.o1:0 "Hear them out."
 texas.154.o2:0 "I'm not interested."

 texas.155.t:0 "The Roswell Rebellion"
 texas.155.d:0 "The City of Roswell's storied history is familliar to everyone who hasn't been residing under a rock since the 1950's. The fact that this City lies within our territory has come as equal parts blessing and curse - as while we continue to rake in Tourism dollars from this strange people by people eager to explore Roswell's supposed history with Extraterrestials, with countless musems and other Roadside Tourist Traps catering to this specific demographic, since the fall of the United States, groups that push the lovable crazy of most UFO fanatics into dangerous territory have frequently utilized the sparse law enforcement presence in the region to do... whatever it is that they do. Indeed, ever since war broke out to the East, Roswell appears to have been occupied by a cadre of 'UFOlogists', deranged freaks intent on discovering the supposed hidden truths of the infamous 1947 Roswell incident. The groups that appear to be de-facto occupying the town insist that the Texan Government somehow knows the truths about the crashed Alien Spacecraft, even though any supposed craft would have surely been evacuated to Remnant territory had it ever existed at all. While many are content in breaking up this rabble by force, others have said that basically, trying to get rid of these nuisances is more manpower than they're worth - higlighting that our existing front is already stretched thin without sending a contingent to bust up a mostly docile group of weirdos. Indeed, many within our Army are at least sympathetic to the UFOlogist cause, linking suspicions about UFOs in the Former United States to overarching anti-Federal Government conspiracies and anti-American sentiment. Some, such as General Neil McCasland, have even publicly pondered such curiosities about Unidentified Aerial Phenomenon in hopes of securing greater Government Transperency and Research efforts in the area."
 texas.155.o1:0 "Tell them to get lost."
 texas.155.o2:0 "They aren't worth the hassle."
 texas.155.o3:0 "Perhaps we can use them."

 texas.156.t:0 "The Soviet Union Demands Repayment of War Debts"
 texas.156.d:0 "It is well known that to survive against the Remnant onslaught, Texas was forced to turn to the help of some less-than-savoury factions within the complex terrain of global geopolitics. We have no love for the wicked forces of Communism, no love for their freedom-hating ways, or their defiance of the will of our one Lord God. Nor do we have any love for the demonic forces of the former Federal Government. In that regard, the Soviets shared our opinion - and as a matter of survival, we accepted generous aid from the Red World to help ensure our nation's survival. In dark times, we were too desperate to ask questions, however now, it seems that the time has come to pay the piper. The Russians have come to collect on their debt, stating that since we accepted their aid in the Remnant war, we are obligated to meet some of their demands. Mainly, Moscow has demanded we become an observer in the COMECON economic bloc, give Soviet concerns access to the Texan oil market, and most controversially, repeal the Communist Control Act of 1954, which led to the de-facto ban of the Communist Party of Texas. While this party would naturally never actually win, the fact that the Soviet Union is demanding its legalization has caused quite the stir among the One Republic Caucus. The Warsaw Pact has hinted that our nation may live to regret the moment we betray their trust if we refuse their demands, however the President is also realizing that becoming a Soviet stooge may very well be a fate worse than death. What shall our decision be?"
 texas.156.o1:0 "The Texan thing to do is to return the favour, it's just good company."
 texas.156.o2:0 "Screw them, and the horse they rode in on!"

 texas.157.t:0 "Soviet Advisors Rumble"
 texas.157.d:0 "In the wake of our refusal to concede to Soviet demands, many have assumed that the Russians would be unable to do anything but shake their fist - mostly owing to their distance from our nation. Yet as it appears, the Soviets have made themselves heard. During the war, several Mercenary companies under Moscow's employ fought under the Texan banner against Remnant oppression. Led by one Russel 'Texas Red' Bentley, a native Texan who fled to the Soviet Union in 2004, the Soviet 'Westphalen Brigade' remains as a major presence within the Texan Armed Forces. Amid a row with Moscow, reports have spread that Bentley's own division have begun mobilizing, armed with both Soviet weaponry and intelligence, for a purported march on Austin to dislodge President [TEX.GetLeader] and the One Republic Party. In a panic, units have already been mobilized to resist the Coup efforts, however thanks to the deeply-embedded status of KGB Operatives within Texas, it appears likely that Bentley's efforts may succeed. Combined with the mobilization of the Texan Red Guards, another far-left Paramilitary, and the forces of Father Jones' People's Temple, it seems increasingly likely that the unthinkable may occur: Texas falling to Communist rule."
 texas.157.o1:0 "The battle is beginning."

 texas.158.t:0 "March on Austin"
 texas.158.d:0 "Early in the morning, the worst fears of [TEX.GetLeader]'s Government were confirmed. Highways surrounding Austin were blocked off as checkpoints were established around the perimeter of the Capital City, in preparation for a Soviet-Backed coup by Russel Bentley's Westphalen Brigade. In addition to the forces of Texas Red, militants from the Red Guards and the People's Temple Brigade also flanked Bentley's forces as they advanced on Austin. Armed with countless Soviet Trucks, Tanks, Weapons, and other Advisors, the force led by the infamous Mercenary 'Texas Red' advanced on Austin. Greeted by ecstatic supporters from the area, President [TEX.GetLeader] quickly fled as it became clear that efforts to repel the Coup forces would be impossible. Fleeing in an unmarked jet, [TEX.GetLeader] has been rumoured to have fled to Canada, with much of the nation's Treasury in tow. Meanwhile residents of Austin, a Leftist stronghold long opposed to One Republic's policies, have greeted Bentley and his cadres as Liberators. While One Republic loyalists have been stockpiling weapons in preparation for such a scenario, it has been reported that resistance in rural areas has already broken down, as allies quickly work to secure the remainder of Texas. However it goes without saying that establishing a Communist foothold in this deeply Conservative area is a task that is easier said than done."
 texas.158.o1:0 "And so rises the Lone Red Star."
 texas.158.o2:0 "We must resist these Devils!"

 texas.159.t:0 "The Davidian Countercoup?"
 texas.159.d:0 "With One Republic's previous stooge disposed of, the newly-minted Communist Party of Texas has established a provisional Government over Texas, with a temporary Central Committee being installed earlier today. While Russel Bentley was the primary leader of the coup and enjoys a status as the Soviet Union's preferred candidate, thanks to widespread support from other Communist movements in Texas unconnected with Bentley's own Westphalen Brigade, a decision has been made to establish a temporary position of leadership until a permanent General Secretary can be selected by Party members. Meanwhile, resistance to the Communist Coup has been building across the Republic, as furious Texans take up their coveted arms against the Communist/Globalist overthrow of the elected Texan Government. Leading the charge is one David Koresh, leader of the Branch Davidian sect based out of Waco. As an experienced commander during the Remnant war against his mortal enemy, the Remnants, Koresh and his supporters have long prepared for such a day, and as such have been training and stockpiling weaponry for decades. Declaring the Communist coup to be a signal of the End of Days, Koresh and his supporters have taken up arms, and have begun advancing towards Austin with a growing coalition of anti-Communist fighters. As the final battle draws, Texas braces for a showdown between a Bandit and a Messiah."
 texas.159.o1:0 "For Cyrus! Down with the Communists."
 texas.159.o2:0 "For Communism! Down with Opiate and Cult Leaders!"

 texas.160.t:0 "The Communists Vanquished"
 texas.160.d:0 "In an attempt to stop the Communist takeover of Texas, spiritual leader David Koresh has mobilized both his flock and a growing cadre of anti-Communist fanatics in a desperate last-ditch effort to dislodge Austin's new Communist occupants. At the break of dawn the convoy, consisting of countless pickup trucks, old military vehicles, Police and SWAT vehicles, and Texans travelling on foot to fight arrived on the outskirts of Austin. The battle dragged on through the days, as the Rebels captured parts of the outlying suburbs as they launched their offensive. The Communist line buckled, allowing Koresh to attempt a charge on the Capitol. With Russian reinforcements hours away, Koresh was able to successfully lead an assault on the Capitol grounds, driving the Red Parasites from Texas once and for all. Koresh delivered a sermon from the Capitol Rotunda as law enforcement across Texas announced operations aiming to resist Communist control. Russian soldiers in the area fled before Austin–Bergstrom airport could be captured. Red Guard members were hanged on the Legislature grounds, with Bentley's location currently being unknown. Meanwhile, Jim Jones is rumoured to be in talks with Koresh about surrendering, as both of them remain men of the Lord above all. As it seems, Texas is now under Koresh's grip, for better or for worse, as officials across Texas begin to recognize his legitimacy as leader of the Lone Star Republic."
 texas.160.o1:0 "The Lone Red Star prevails."
 
 texas.161.t:0 "The Davidians Defeated"
 texas.161.d:0 "In an attempt to stop the Communist takeover of Texas, spiritual leader David Koresh has mobilized both his flock and a growing cadre of anti-Communist fanatics in a desperate last-ditch effort to dislodge Austin's new Communist occupants. At the break of dawn the convoy, consisting of countless pickup trucks, old military vehicles, Police and SWAT vehicles, and Texans travelling on foot to fight arrived on the outskirts of Austin. The battle dragged on through the days, as the Rebels captured parts of the outlying suburbs as they launched their offensive. The Communist line buckled briefly, leading Koresh to attempt a charge on the Capitol, however momentum stalled soon after as Soviet reinforcements, armed with Tear Gas arrived. Koresh himself was struck down in battle shortly after, dying as he wildly preached the word of the lord. The Counter-Coup forces crumbled soon after, the majority of Koresh's flock culled by Russian-made war machines, and the last desperate resistance among law enforcement in outlying areas quickly pledging their loyalty soon after it became clear that their cause was lost. In revenge for Koresh's stunt, Red Guard troops traveled to Waco to torch the Davidian compound, burning the structure to the ground and at last condemning their faith to the smouldering ashes of history once and for all, as Texas is decisively claimed by the forces of Communism, for better or for worse."
 texas.161.o1:0 "The Lone Red Star prevails."
  
 texas.162.t:0 "Anti-Communist Resistance Flees West"
 texas.162.d:0 "The Davidian Coup attempt has been condemned to a legacy of pathetic failure. One would think that our victory in Austin would spell the death of Reaction within the Lone Star State, and indeed, while countless Counties have installed Communist officials (or have otherwise pledged fealty due to Communists in Texas remaining scarce), it seems that some Texans just don't know when to quit. Communist Forces have already secured most major Urban areas, with Law Enforcement in cities such as Houston and San Antonio proving surprisingly helpful, however as it seems, anti-Communist Resistance is consolidating in the West of the country, mainly New Mexico, notable for its distinct identity and history as formerly an independent nation. West Texan Farmers and Pecos Border Patrol agents shunning Communism comes as no shock, however what has proven more surprising is the emergence of UFOlogists, with Roswell's nuttiest residents declaring their intention to overthrow Communism. General Niel McCasland, a noted UFOlogist, has emerged as the de-facto leader of the anti-Communist resistance in Texas as the movement gravitates towards New Mexico. Notable UFOlogist Bob Lazar has declared that Communism's victory in Texas is the ultimate proof of Extraterrestrial interference on the USSR's behalf, and has vowed to rally his supporters in an effort to remove Communist forces from Texas, and eventually, the world. Dealing with these lunatics should be a piece of cake."
 texas.162.o1:0 "What the hell are they even doing anymore."
   
 texas.163.t:0 "UFOlogists Prepare Austin March"
 texas.163.d:0 "During the war, the One Republic Government for some asinine reason not only allowed heavily-armed UFOlogist nutcases to occupy the small New Mexico town of Roswell, they encouraged their delusional conspiracies about Aliens because it aided them in their anti-Remnant narratives. Thanks to their shortcomings in putting this insanity to rest, the new Communist Government has a bizarrely large problem on its hand, as New Mexico and West Texas rallies around the banner of... anti-Communist UFOlogy? Bob Lazar, a strange man who claimed to be a technician at Area 51 before the fall of the United States, has come forward with a variety of bogus theories, mainly that Extraterrestrials have been actively involved in fomenting a Communist victory in the Cold War, and that they must be stopped, with Lazar seeing Texas as the best battleground to do so in. In contrast to Lazar lies General Neil McCasland, a high-ranking officer in the Texan Air Force who has spoken at length about UAPs and possible research opportunities in regards to them, striking up a much more pragmatic tone than the likes of Bob Lazar. As anti-Communist resistance solidifies in New Mexico, it has become clear that McCasland and the UFOlogist movement has become their main leaders, as rumour spread about their possible advance on Austin. Officials are stated to be worried about McCasland's army of heavily-armed nutcases, however making the case that UFOlogists are a major threat remains something of a hard sell to the CPTX top brass."
 texas.163.o1:0 "This must be some kind of joke? We don't need to worry about these kooks."
 texas.163.o2:0 "Take these morons down with extreme prejudice."
    
 texas.164.t:0 "McCasland Sworn In"
 texas.164.d:0 "The Texan Interstate has been swarmed with anti-Communist Freedom Fighters. Towards Austin, a convoy has blazed a crimson path. Dusty RVs, piloted by fighters wearing Tinfoil Hats and carrying Alien Blasters, are advancing towards Austin, with the goal of putting an end to ET/Communist rule. The premise on its face is ridiculous, which is perhaps why the Communists in Austin failed to prepare for the eventuality, allowing the UFOlogists to catch them completely off guard. With the bulk of their forces reassigned to the border with the AR, Austin was completely blindsided by the UFOlogist advance. The city fell quickly, as the UFOlogists solidified control across the City. Bentley, knowing that losing Texas to a bunch of Tinfoil Hat lunatics would get him killed (or worse) back in the Soviet Union, committed suicide as the UFOlogist forces advanced on the Texas Legislature Building. Within moments, General McCasland was sworn in as President, as Communist control across Texas collapsed. Law Enforcement has returned to the anti-Communist side, and despite many assuming the UFologist Coup to be a joke at first, officials across Texas have been forthright in arresting and providing Communist administrators to us once it became clear that the CPTX was finished. McCasland, despite striking a cautious tone about the matter of Extraterrestrials, has appointed Lazar as his new VP. For the time being, McCasland is leader of what for now seems to be a normal Junta, the hum of Therminis spreads through Austin it becomes clear that UFOlogy is in vogue in the Republic of Texas..."
 texas.164.o1:0 "The hell?"
 
 texas.165.t:0 "Roswell Raised"
 texas.165.d:0 "Despite the inherent ridiculousness of UFOlogist ideals, these rapidly-spreading ideals have proven to be a threat to the new Communist Government in Texas. We cannot allow the anti-Communist movement to rally around a single figure, no matter how asinine their ideals are. With that in mind, the Chairman of the Politburo has ordered a contingent of Texan-Soviet troops to enter New Mexico to restore order, with particular attention to be paid to Roswell, which has been occupied by a militant UFOlogist tendency since hostilities with the American Republic first began. While the crowd of RV dwellers with heads wrapped in Tinfoil thought they could prove to be a formidable resistance to the might and glory of Communism, the battle for Roswell proved to be a slaughter, with Soviet rockets turning the town into cinder within a matter of hours. Burning trailer homes and blood-soaked Tinfoil hats litter the horizon as Roswell burns to the ground. General McCasland was captured by the Communist Secret Police and was promptly dealt with, while prominent leaders of the UFOlogist movement such as Bob Lazar fled to Utah for safe haven - Communist officials not even considering them worth the hassle to capture. Such ridiculousness as UFOlogy has been wiped off the planet by Communism's hammer - even as we find the Soviet eagerness to see Roswell changed from 'is' to 'was' a bit... strange."
 texas.165.o1:0 "What a bunch of fools."
  
 texas.166.t:0 "The President Delivers State of the Union Address"
 texas.166.d:0 "Fresh off their victory in the last election, President [TEX.GetLeader] has formally delivered their first State of the Union address since taking office. With One Republic solidifying their control over Texas in the aftermath of the Remnant war, [TEX.GetLeader]'s election was seen not as a matter of if, but a matter of when. Indeed, One Republic won solidly, carrying record amounts of the electorate, even as international observers warn of increasing rates of voter intimidation and outright voter suppression. Regardless, it stands to be said that the majority of Texans do indeed approve of One Republic, as Texas' increasingly-Conservative electorate make their voice heard in backing a sure winner. Speaking to Congress to rally against the 'Degenerate Liberal' values of the Coasts, [TEX.GetLeader] promised a 'Family-First' effort to safeguard the Texan way of life, declaring that the values of Abortion and Homosexual Marriage will never be allowed to infiltrate the Texan state. While the remains of the Opposition have made attempts to boycott the President's speech, it has become clear that efforts to oppose One Republic have been made in vain as the Party consolidates control over Texas."
 texas.166.d_2:0 "Upon their defeat in the previous election, many assumed that the specter of One Republic had passed - that the people of Texas were at last free from the rampant corruption and authoritarianism of the Perry year. Yet as it seems, they were wrong. One Republic has returned with a vengeance, capitalizing off dissatisfaction with the previous administration to catapult [TEX.GetLeader] and their party back into office. While the previous President cautioned against allowing such a Party to reassume power, the will of the Texan people have allowed a peaceful transition to occur. In a new administration focused on revenge, [TEX.GetLeader] has spoken to Congress to rally against the 'Degenerate Liberal' values of the Coasts, [TEX.GetLeader] promised a 'Family-First' effort to safeguard the Texan way of life, declaring that the values of Abortion and Homosexual Marriage will never be allowed to infiltrate the Texan state. While the remains of the Opposition have made attempts to boycott the President's speech, it has become clear that efforts to oppose One Republic have been made in vain as the Party returns to consolidate control over Texas."
 texas.166.o1:0 "Hail to the Chief."
   
 texas.167.t:0 "Statues of Confederate Generals Raised"
 texas.167.d:0 "The Confederacy, despite its tragic destruction during the War of Northern Aggression, remains a beloved institution across Texas, a symbol of rebellion against Yankee tyranny. While the image of the South was co-opted by Carpetbaggers in the wake of the Great Collapse, here in Texas, the true spirit of the Confederacy lives on. Speaking to a crowd today, President [TEX.GetLeader] unveiled a new monument to prominent Confederate General Robert E. Lee, best known for his command during the Battle of Gettysburg. Lee's new statue in the heart of Austin marks the latest in a long line of pro-Confederate monuments which have been erected across Texas. While this wave of new monuments has stirred great controversy, especially among African-American Texans, who view the Confederacy as a symbol of discrimination and Slavery, the ideals of Confederate Pride have been deliberately tied to Texas pride in the wake of the Great Collapse, and even further during the Remnant war. Despite the Remnants also having a penchant for waving the Battle Flag, One Republic knows that the true spirit of the Confederacy resistance against Yankee oppression still lies here in Texas. Liberals may sneer, but in the chaotic sea of post-US America, we shall ensure that the Confederate spirit endures."
 texas.167.o1:0 "Down with the Eagle, up with the Cross!"
    
 texas.168.t:0 "Wave of New Executions"
 texas.168.d:0 "The Death Penalty's continued presence in Texan politics has been something of a controversial issue even before the Collapse of the United States. While Liberal sissies may point to the cases of countless Executions with 'insufficient' evidence as to their guilt, President [TEX.GetLeader] knows damn well that allowing dangerous criminals to continue living is simply unacceptable. We need to kill as many sick, twisted criminals as possible - and if a few innocent people get caught in the crossfire, then well that's too bad. You can't make an omelet without cracking a few eggs. Criminals are all scum after all, and they all ought to get the chair. With that in mind, [TEX.GetLeader] has signed off on a new wave of executions, even publicly accusing the Lethal Injection of a triple-Homicide suspect in San Antonio to hail the efficiency of the Death Penalty. The President has also announced that they will no longer be accepting any pardons or commutations in Death Row cases, even going as far to veto commutations. Even in cases where new evidence has been provided, the Attorney General has intervened to ensure the executions go forward. The method of execution has also changed in many cases, as the Government seeks to encourage the re-implementation of the Electric Chair across Texas prisons."
 texas.168.o1:0 "Will [TEX.GetLeader] get to pull the switch?"
     
 texas.169.t:0 "Crackdown on Potheads Authorized"
 texas.169.d:0 "Marijuana is a disgusting vice that Liberals are all too comfortable legitimizing. Numbers can't tell how many people have had their lives ruined by Marihuana, with reports indicating that almost 100 million people die from Marijuana addiction every single day. It has become clear that Pot Smokers are scum that must be removed from Texan society. With new sweeping powers in the realm of Law Enforcement, the Attorney General has authorized a new campaign to crack down on both Pot users and Pot dealers. Raids on suspected Cannabis farms have already led to countless arrests, and new string operations capturing countless Marihuana users in the middle of their despicable acts. New Mandatory Minimum sentences have ensured that these vile criminals are locked up in prison where they belong, as any level of Cannabis Possession now carries a minimum of 35 years in prison - with judges encouraged to be generous in keeping them locked up for longer. With pot-addicted zombies at last off our streets, Texans can once more feel safe, knowing that the scourge of violent narcotics such as Marihuana is at last being tackled instead of coddled. Cannabis is a Crime, not a good time, as the new Commercials say, with a new wave of Government programming and mandated messaging in TV shows and Movies making the dangers of Marihuana this fact clear to the youth of the nation."
 texas.169.o1:0 "We ought to lock the Pothead Scum up and throw away the key."
     
 texas.170.t:0 "The President Delivers State of the Union Address"
 texas.170.d:0 "The Independent Republican Party has once more prevailed in the latest Presidential Election. Breaking the spell of One Republicite rule to return to power after being out of office for more than a decade, the Independent Republicans were once thought to be a spent force in Texan politics until their triumphant return in the wake of the Remnant war. While the other major parties attempted to utilize this unprecedented 'Return to Normality' to dislodge the new Moderate Conservative Government, it seems that the Independent Republicans have managed to hold on in what has proven to be a relatively normal and respectful campaign, proving once and for all that the IndReps are the go-to choice for all Moderate Texans. In their first speech to Congress since Re-Assuming Office, President [TEX.GetLeader] spoke at length about their agenda going into their second term, namely efforts to lower taxes and balance the budget. Despite being on the losing end of last election, the Democratic caucus chose not to boycott this address, instead opting to give the President the benefit of the doubt going into their final four years in office as President of the Second Republic of Texas."
 texas.170.d_2:0 "While the Independent Republican Party has been recognized as a Party in decline for the better part of a decade, it appears that the new Conservative consolidation has thrust the Party back into power one more, as Texas' political scene begins to recover from 10 years of One Republic rule. While the previous administration attempted to pull off an unprecedented victory in their re-election campaign, it seems that the Independent Republicans have managed to return after a more than a decade out of power in what has proven to be a relatively normal and respectful campaign, proving once and for all that the IndReps are the go-to choice for all Moderate Texans. In their first speech to Congress since assuming office, President [TEX.GetLeader] spoke at length about their agenda going into their second term, namely efforts to lower taxes and balance the budget. Despite being on the losing end of last election, the Democratic caucus chose not to boycott this address, instead opting to give the President the benefit of the doubt going into their final four years in office as President of the Second Republic of Texas."
 texas.170.o1:0 "Hail to the Chief."
     
 texas.171.t:0 "Congress Debates Cannabis Legalization"
 texas.171.d:0 "Marijuana has been illegal in Texas for several years now, owing to Pot's status as a dangerous narcotic. However in the years since the War on Drugs, it has become clear that the risks of Reefer Madness have been significantly overstated. Decriminalization of Cannabis has been all the rage nowadays, with nations such as Canada already experimenting with programs that do just that. As it appears, legalization of Cannabis has not led to any lasting downsides among the areas in which legalization took place, with fantastic economic benefits reported instead. With that in mind, members of the Independent Republican Party have brought forward the possibility of loosening the existing restrictions surrounding Cannabis. An expansion of Medical Cannabis is already underway, however polls have gauged widespread popular support for further legalization measures which would see the substance enter the legal marketplace. While the Independent Republican Family Values Caucus has shot down any prospect of being able to purchase Marihuana at every corner drug store, with support from likeminded parties, a vast expansion of Medical Cannabis, especially for veterans of the Remnant War, has flown through Congress, whereupon [TEX.GetLeader] formally signed the provisions into law."
 texas.171.o1:0 "A Step in the Right Direction?"
     
 texas.172.t:0 "[TEX.GetLeader] Meets with the Gun Lobby"
 texas.172.d:0 "Despite our Conservative stances, the Independent Republican Party is notable for joining with their Democrat and Reform cohorts in calling for substantial restrictions on firearms, something which has not sat well with Texas' sizeable Gun Lobby. While our party has indeed pushed for 'Reasonable' restrictions on Firearm ownership, we are also still firm supporters of Texans' Right to Bear Arms. In a tense meeting with Lobbyists from the Texan Rifle Association, [TEX.GetLeader] sought to reassure the Gun Lobby that no further attempts to restrict Texan Second Amendment rights would be embarked upon by the Independent Republican Government, and that with their support, they can ensure that a system that balances safety and personal liberty can be created. While members of the TRA were originally a second away from telling [TEX.GetLeader] to shove their 'compromise' up their ass sideways, some promises to walk back some of the most extreme parts of existing Gun legislation had the TRA cutting checks for the Independent Republican Party on the spot, greatly reassuring both 2A enthusiasts and the Independent Republican Rightward Flank."
 texas.172.o1:0 "A worthy compromise."
    
 texas.173.t:0 "Police Funding Greatly Expanded"
 texas.173.d:0 "Crime is an issue that affects all Texans, and whether we want to admit it or not, the previous four year have seen the Government be soft on the issue of crime. As crime rates steadily increase in the wake of the Remnant War, [TEX.GetLeader] is among those who realize that a solution is needed quickly to the issue of skyrocketing crime. Congress has been quick to act under the President's direction, as millions of new dollars in Police funding has been allocated in the latest budget. New state-of-the-art equipment and training have been provided to Police Departments across the Republic of Texas, from major cities such as Houston to small towns. The aim of these new fancy toys and tools are simple: give Law Enforcement what they need to stop crime. Even as Policing in Texas grows more controversial due to alleged brutality and abuse of power, the President is confident that these measures can adequately balance our need for safety with the need for freedom. Indeed, sweeping new powers of search and seizure have been allocated to Police across Texas, in addition to new Military Surplus equipment. As well, the Death Penalty has been expanded as a deterrent to criminal acts."
 texas.173.o1:0 "Freeze right there, Punk!"
    
 texas.175.t:0 "The President Delivers State of the Union Address"
 texas.175.d:0 "The Reform Party's seizure of power in the wake of the Remnant war was perhaps the greatest political shakeup in the history of post-American politics. While Perot's own Reform Party had enjoyed a significant presence in the elections of the early 2000s, most pundits had agreed that the Party's steam had almost been entirely used up by 2010. Perot's ability to channel long-standing dissent against the Perry administration into concrete political change shocked the nation. Indeed, the Reform movement was credited in many ways solely to Perot - many assuming that without Perot at the helm, the Party would implode in a spectacular fashion. Predictions that Reform would be a one-hit-wonder would be proven wrong last election, as [TEX.GetLeader], holding the torch of Classical Populism aloft, shattered the expectations of the crooked Establishment. As Reform solidifies itself as a major player, [TEX.GetLeader] has addressed Congress for the first time since being sworn in, promising in their speech a more open way of Governing. As they begin their First Term, [TEX.GetLeader] enjoys high favourables, however many wonder if they will be able to live up to the legacy of their predecessor."
 texas.175.o1:0 "Hail to the Chief."
    
 texas.176.t:0 "Universal Healthcare System Created"
 texas.176.d:0 "During his first Campaign for President, Ross Perot spoke at length about the need for a 'comprehensive national health care plan — one that would be akin to Medicare but for all Texans, not just the needy'. With both Democrats and Republicans opposed to this plan, Perot's plan for Universal Healthcare never really got off the ground - with the restoration of Medicaid being as far as these policies got. However, now that Reform enjoys a commanding majority within both houses of the Texan Congress, Perot's dream of Medicare for All can at last be realized. Though it took some whipping to get our Caucus to pass the Legislation, the final votes have at last confirmed that the Yays have it over the Nays. The creation of a comprehensive system of Universal Healthcare is already underway as Medicare for All kicks in, allowing all Texans to access vital healthcare free of charge. [TEX.GetLeader] appeared before a crowd in the signing ceremony, hailing the creation of this system as a major step forward for all Texans, healthy or sick. Also attending the Signing Ceremony was Former President Ross Perot, who thanked the President for their work in helping implement one of his greatest political dreams. "
 texas.176.o1:0 "Hail to the Chief."
    
 texas.177.t:0 "An End to Lobbying"
 texas.177.d:0 "Big Money has long dominated Texan politics, with disastrous consequences. Lobbyists are a scourge, congregating around Austin like Locusts in hopes of strangling any bit of political progress that may be allowed to occur in the crib. Reform has battled the cancer that is Political Action Committees non-stop for the last four years, only saved by the fact that the majority of Texans still share our hatred for Big Money in politics, and have been willing to elect those committed to fighting Lobbyists, no matter how many dollars they may hopelessly try and throw at our opposition in hopes of getting them elected. Now that we are no longer beholden to the PAC-dominated Opposition, we can at last strike a death blow that is Lobbying. Strict limits on Campaign Finance have been introduced by an act of Congress, formally ending the ability of Big Money to sway Elections. The maximum contribution $1,000, no exceptions. All remaining Political Action Committees in the Republic of Texas have formally been dissolved upon the passing of this new Legislation. Additionally, in line with Perot's vision, from here on forward, all excess Campaign Funds will now be returned to the Treasury."
 texas.177.o1:0 "Anything else is criminal, both to the guy running for office and the guy that gave it to him."
    
 texas.178.t:0 "The President Delivers State of the Union Address"
 texas.178.d:0 "Few analysts had expected the Libertarian party of Texas to climb its way into winning the elections after the Remnant War, with even fewer expecting Ron Paul with his criminal conviction to be the bearer of that victory. It seems that Ron Paul has set a reputation of breaking expectations however, as the same charisma that showed he could be a viable opponent against One Republic in the prior elections has resulted in a successful re-election bid, as Texans appreciate the return of civil freedoms after the regular state of martial law under One Republic. Speaking to the Texan congress in his second state of the union address, Ron Paul has reiterated the need for government to remain un-encroaching in the citizen’s livelihood’s, instead focusing on how to best represent them abroad and in policy, a much softer tone compared to his previous lashing out against the establishment in his first address. It appears President Paul is content with a more passive agenda in his second term, opting to keep the ship steady compared to the substantial changes of his first term, with the Democrats and Independent Republicans begrudgingly accepting this situation."
 texas.178.d_2:0 "Few could have expected the way Texan politics would evolve in the last few years, with Ron Paul of the Libertarian Party being elevated to president. However, few good deeds go unpunished, for when Paul’s agenda faced massive backlash and failure, it was the ousted One Republicites that came to his rescue in a political power play, one which can be seen in the State of the Union address today. Addressing the chambers of Songress, Ron Paul has stated the need for continued monetary policy that keeps the government out of the citizens pockets and decisions, in the same way our forefathers lived. One Republicite backers joined in applause for Paul’s address, particularly during the few mentions of Texas remaining free from dangerous Social and Leftist causes. Already having boycotted the address, the Democratic Party has decried Ron Paul following the address for having failed in protecting the rights of abortion, sexual freedom and minority groups. Whilst the policy of economic freedom continues unabated in Texas, it appears that the promise of government remaining out of the bedroom remains unfulfilled."
 texas.178.d_3:0 "Texan politics have been no stranger to turbulence in the past decades, but the rise and fall of Ron Paul will certainly make the history books as a study of Congressional battles going awry. Whilst Ron Paul got placed in checkmate, what remained unchecked was the popularity of the Libertarian Party amongst Texan voters, as Gary Johnson secured re-election in an upset to the rivals of the Libertarians and onlookers of the world. Speaking to the chambers of Congress which have come together begrudgingly rather than in opposition or boycott, Gary Johnson has assured the nation that the agenda of a humble government in service to the people remains intact. Johnson also has hopes of lasting Libertarian policy in government, with future generations feeling the relief of cut taxes, expanded civil rights, and a clean environment. It appears that the previously harsh opposition to Paul has not continued into Johnson’s presidency, as the momentum of the Libertarian party on the ground has instilled a fear in political rivals of dysfunction in congress if the same stonewalling that doomed his predecessor is attempted again."
 texas.178.d_3:0 "Ron Paul got impeached, Gary Johnson is Pres and he just got re-elected."
 texas.178.o1:0 "Hail to the Chief."
    
 texas.179.t:0 "[TEX.GetLeader] Attends Gun Show"
 texas.179.d:0 "Today is the date of not only one of the biggest firearm exhibits in Texas, but within the entire former United States. SHOT Show is an annual exhibit and event for firearms manufactorers and traders, with the event now firmly residing in Austin after the collapse of the Union. Being attended by thousands this year, one such notable attendee is the current President [TEX.GetLeader]. The President ventured between stalls, talking with both Texan and foreign firearms craftsmen who were presenting the next generation of firearms, weaponry and even the occasional vehicle. Despite being surrounded by firearms, the President had never been more welcomed with fans and company representatives greeting him, with the only hitch in the event being the occasional seller attempting to sell old hunting rifles at outright extortionist prices to the President because they ‘knew what they got’. Ending off the evening by firing off some of the displayed weapons in a firing range, including some modernized lever action rifles with new metallic and carbon frames in a display of Texan craftsmanship, the President eventually spoke to the crowds at a banquet. Thanking the producers, engineers and executives who are creating the next generation of weapons that form the pride of Texas, as the Texan Rifle Association began cutting checks towards the Libertarian campaign for their support."
 texas.179.o1:0 "God Made Man, and Colt Made Them Equal."

 texas.180.t:0 "Free Market Education"
 texas.180.d:0 "It has always been a value of a free society to educate its citizenry, so they can properly partake and participate towards society, with Thomas Jefferson even viewing it as the best safeguard against foreign autocrats. Continuing this valued custom, the Texan Department of Education has begun pursuing efforts to not only push back against decadent Public Education, but ensure that all students within Texas are properly educated on both the historical fight for liberty in Texan history and politics, as well as key economic matters. The next generation of our youth will know that it is free markets that ensure they can properly move forward in society, as the honeyed words of Socialism only help to restrain the individual’s efforts, with the end result being seen in the Soviet Union, with bodies lined against the wall. Newly created or vastly expanded economic programs in high school and colleges will ensure knowledge on how free markets operate, what they provide, and how to even become a successful entrepreneur today. When a socialist comes down to our towns promoting a brand new way of life, we will see they only offer misery to our strife. Public or (preferably) Private, all matters of education within Texas shall teach these fundemental truths."
 texas.180.o1:0 "An Educated Populace to Take Us To The Moon."
    
 texas.181.t:0 "Online Freedom Act"
 texas.181.d:0 "Texas is the Wild West for online regulation. And we like it that way. We're about to host so many pirating websites (and also cyberterrorists but we don't talk about that part), like Russia IRL."
 texas.181.o1:0 "I'm sure nothing is going to go horribly wrong with this."
    
 texas.182.t:0 "The President Delivers State of the Union Address"
 texas.182.d:0 "The fall of One Republic has allowed the Democratic Party to pull off a return to prominence. While many had predicted that the Dems would be a one-hit wonder, falling from grace the moment it became clear that the One Republic threat was over, it appears that the Texan Democrats have managed to pull off an unprecedented second electoral victory, just like back in 1993. Slowly, yet surely, Texas is returning to the beacon of Progressivism it once was, a true stronghold for the Democratic Party. Texas has returned to a two-Party system, the Independent Republicans once more taking on the role as the most prominent opposition to the Democratic Party. The IndReps put up a good campaing, however at the end of the day, the Texan people declared that they wanted four more years of Democrat rule. In their first address since returning to office, [TEX.GetLeader] has spoken to Congress, speaking at length about the need for Socially Liberal policies. While some within the Independent Republican Party have boycotted the President's speech, in the spirit of Bipartisan cooperation, senior leadersip has chosen to go along with the President's speech."
 texas.182.d_2:0 "The fall of One Republic has allowed the Democratic Party to pull off a return to prominence. While many had predicted that the Dems would be a one-hit wonder, falling from grace the moment it became clear that the One Republic threat was over, it appears that the Texan Democrats have managed to pull off an unprecedented second electoral victory, just like back in 1993. Slowly, yet surely, Texas is returning to the beacon of Progressivism it once was, a true stronghold for the Democratic Party. Texas has returned to a two-Party system, the Independent Republicans once more taking on the role as the most prominent opposition to the Democratic Party. The IndReps put up a good campaing, however at the end of the day, the Texan people declared that they wanted four more years of Democrat rule. In their first address since assuming office, [TEX.GetLeader], flanked by their predecessor, has spoken to Congress, speaking at length about the need for Socially Liberal policies. While some within the Independent Republican Party have boycotted the President's speech, in the spirit of Bipartisan cooperation, senior leadersip has chosen to go along with the President's speech."
 texas.182.d_3:0 "When One Republic first fell from power, many had assumed that the Democratic Party, the longstanding leader of the Opposition bloc, would be the ones to do so. They would be incorrect in their assertions, as the Democratic Party indeed failed to meet the moment in the wake of the Remnant War. However while the Democrats were down, they certainly weren't out, as last election proved. The Democrats have returned to power in spectacular fashion after more than two decades out of office, pulling off an electoral victory not seen since Ann Richards' election in 1993. The Democratic Party's decades-long losing streak has at last come to an end, and slowly, yet surely, Texas is returning to the beacon of Progressivism it once was, a true stronghold for the Democratic Party. In their first address since returning to office, [TEX.GetLeader] has spoken to Congress, speaking at length about the need for Socially Liberal policies. While some within the Independent Republican Party have boycotted the President's speech, in the spirit of Bipartisan cooperation, senior leadersip has chosen to go along with the President's speech."
 texas.182.o1:0 "Hail to the Chief."
 
 texas.183.t:0 "Gay Marrige Legalized in Texas"
 texas.183.d:0 "Gay Marrige has long been the chosen boogeyman for the One Republic Party, and while in the previous decade Perry and his ilk have used scare tactics labelling LGBT rights as undermining the 'Sanctity of Marrige', it appears that these tactics just don't work anymore. In a landmark decision, the Texan Supreme Court has formally struck down any and all bans on Gay Marrige in the Republic. The codification of Marrige Equality in Texas is a major step forward for LGBT rights here in Texas, as decades of discrimination are undone with a single Court decision. Already polls are showing a majority of Texans support Gay Marrige for the first time in our nation's history, as the Legislature moves to codify this landmark decision. Parades have broken out across Texas celebrating this ruling, as Same-Sex Marrige becomes no longer another desperate plea, but rather an enshrined right. While One Republic's bowtie-clad lawyers have vowed to fight this 'Preversion of the Constitution' to the ends of the earth, for the time being it seems that their fight has been desicivley lost - and with previous attemps at creating a constitutional ban on Gay Marrige failed, there is little they can do."
 texas.183.o1:0 "A cause for celebration."
 
 texas.184.t:0 "Confederate Statues Torn Down"
 texas.184.d:0 "The legacy of the Confederate States of America has been a... complicated one. During the Remnant war, many Texans were quick to cling on to their battle flags as a symbol of resistance against Yankee domination. Of course to many other Texans, especially Afro-Texans, the Confederacy is not a simply a symbol of 'Southern Pride', it is a reminder of the legacy of racism and discrimination that has long plagued the United States. Regardless of their status as one of the 'Six Flags' over Texas, the Confederacy was stil formed in an effort to defend their rights to preserve Slavery, and an explicit desire to preserve White Supremacy in the South. The countless statues and other monuments to Confederate Generals have long served as a means of intimidation towards the Civil Rights movement, and as we begin to reckon with Texas' long and often murky history, the calls to get rid of such glorification of the Confederacy have grown louder. City Councils across Texas have moved forward with tearing down countless statues and renaming several streets and schools, all in an effort to undo the legacy of the Confederate States. While ol' Rebels still hang on to the Blood-Stained banner, the Government has rapidly begun activley distancing itself from Confederate pride in hopes of severing Texan ties to the CSA."
 texas.184.o1:0 "Slavery is nothing to celebrate."
 
 texas.185.t:0 "Bluexas"
 texas.185.d:0 "Texan steryotypes have seemingly always leaned on our nation's inate connection to Social Conservatism. Indeed, there is much truth to these steryotypes, as One Republic showed the world the last ten years. However from the suburbs of Austin, to the dusty plains of South Texas, it appears that a major shift is underway. The steryotypes of the Conservative Texan no longer holds as much truth as it once does, as Texas desicivley shifts towards the Socially Liberal policies of the Democratic Party. The work of Battleground Texas to turn Texas back into a Democratic stronghold have bourne fruit after years of cautious struggle, marking one of the most remarkable shifts in the history of post-American politics. Though Texas remains set in its ways in several areas, signifigant progress has been made to break old patterns of discrimination and stagnation. Texas is awah in Blue for the first time in decades, and no matter what the remains of the Conservative movements may say, win or lose, Texas is no longer a paragon of Social Conservatism, but is at best a hotly-contested battleground of Liberal and Conservative ideas. And regardless of the Democratic Party's sucsesses in the next election, the gains we have made will be preserved for decades to come."
 texas.185.o1:0 "Bentsen would be proud."
  
 texas.185.t:0 "Woodrow Harrelson Delivers State of the Union Address"
 texas.185.d:0 "Texas has never been a terribly hospitable environment to Socialism. Of the post-American nations that spawned in the aftermath of the Great Collapse, aside from the Remnants, Texas has perhaps embraced the most bitter strain of resistance to any even slight form of 'Socialism' or similarly radical left-wing thought. To the folk of our fine nation, the only 'Socialists' in Texas were the remains of the McGovernite Hippie Scum who Wallace didn't have the chance to stamp out - either elderly potheads with their tie-dye shirts or young and dumb dyed-hair college folk with their fancy coffees. President Woody Harrelson, the first 'Socialist' to be elected President of the Republic of Texas is neither. Distancing themselves from the Culture Wars of the Left without abandoning them, the once-Anarchist paragon, prominent actor and thespian, and son of a notable contract killer has climbed the final hill of Texan politics despite every single odd against him. Blending the Libertarian philosophy that once launched Ron Paul to the spotlight with a form of Socialism not too dissimilar to the original vision of one Bernard Sanders in the Commonwealth, the 'Brocialists', as they're called, have taken Texas by storm, and despite the Establishment throwing everything they had at them, the unorthodox ticket now stands down the beginning of their four-year term. In the words of Vice-President Joseph J. Rogan..."
 texas.185.o1:0 "...Texas went Red, Bitch!"
   
 texas.186.t:0 "Harrelson and Maduro Meet"
 texas.186.d:0 "If you would have told Woody Harrelson that in four years time he'd be the President of Texas shaking hands with Maduro in Caracas he'd call you crazy. But as the last 30 years have taught us anything, it's to expect crazy things to happen. It was an amazing affair. The Red Carpet rolled out in Austin for Maduro, the successor to the great Hugo Chavez who first seized the reins of the Bolivarian Revolution in 1992, and permanently solidified Venezuela as the number one boogeymen of Right-Wing Populists across North America. Venezuela has long been locked in a bitter Price War with Texas over the most valuable commodity on the planet: Oil. Despite being a fellow member of OPEC, Texas' differing ideological alignment with Venezuela has fueled a bitter rivalry, and while Harrelson still shares a disdain for Soviet Communism on account of his flirtation with Anarchism, he still remains committed to smoothing over relations with Caracas. However now that the radical Chavez has been succeeded by the more moderate Maduro, and now that Texas is led by the fellow fighter in Anti-Imperial struggle, Woodrow Harrelson, it seems that Texas and Venezuela are on track to a new and productive friendship, despite the President's previous flirtation with Anarchism and bitter opposition to Soviet-aligned Communism. In their first meeting Harrelson exchanged a hearty handshake with his Venezuelan counterpart, hailed him as a fellow ally in the struggle against Reaction and Imperialism, and promised negotiations for new open relations with their new allies across the Gulf, and in their meeting, heralding a new dawn."
 texas.186.o1:0 "The right's going to have a field day with this one."
    
 texas.187.t:0 "Don't Mess With the Texan Environment"
 texas.187.d:0 "One Republic has allowed the beautiful face of the Lone Star Republic to be sullied by pollution and waste. The Oil Industry has contributed a substantial amount to the horror that the once-pristine Texan landscape has suffered - and while Harrelson has been a firm ally of workers in this state, he has also promised to help lead a gradual phase-out of Fossil Fuels, one which would not harm jobs. Harrelson's vision is to transition every single Oil worker into a new, higher-paying Green-Collar job by 2045, a compromise which will allay both environmental and economic fears. Additionally, Harrelson has directed his government to help Texas overcome its crippling meat addiction. While the Agriculture Lobby may have had Congress by the ball, and while many Texans would choose Brisket over their first-born, Harrelson's has overcome a near-manic hatred of those who do not indulge in a juicy steak as large as your head by being elected as the nation's first Vegetarian President. With new investment, we shall seek to encourage Texans to take up healthier, meat-free diets, as well as expanding funds for organic fundings. This new revolution in healthy eating shall hopefully help offset the unimaginable harm of the Agriculture Industry on the Texas Ecosystem."
 texas.187.o1:0 "Keep Texas Beautiful."
     
 texas.188.t:0 "Cracking Big Pharma"
 texas.188.d:0 "Today, President Harrelson, flanked by Vice President Rogan, has signed new landmark legislation into law legalizing countless drugs. A key plank of Harrelson's Presidential Campaign revolved around ending the War on Drugs completely. Harrelson is no stranger to policy surrounding Drugs - as he was previously arrested publicly as part of a protest surrounding Texas' restrictive ban on Hemp. Now, Marijuana, in addition to countless Psychedelics, have been fully legalized, paving the way for countless new breakthroughs in research and new economic opportunities. While the Right has declared this move to be putting Texan families at risk, it seems that this legalization enjoys high support. More controversial is Harrelson's own views on medicine, casting doubt on Germ Theory and appointing Marianne Williamson as his Health Czar, notable for her promotion of Spiritualism and Healing Crystals. Key officials within the Administration have dissented to Harrelson's handling of health matters, and while many propose legislation to fast track approval of drugs and weaken patent protections to allow for more Generic drugs to hit the market, it seems that Harrelson's true goals in 'Breaking Big Pharma' are far more esoteric than the mainstream may be comfortable. Public Opposition to Vaccines is still a public non-starter, however many worry that Harrelson's rhetoric may be legitimizing this fringe movement."
 texas.188.o1:0 "A mixed bag."

 texas.189.t:0 "Fate of the Libertarian Dream"
 texas.189.d:0 "Against all odds, Ron Paul has managed to persevere throughout the trials and tribulations of his first term. Although at first Ron Paul was elected with the dream and stated goal of abolishing the Federal Government altogether, throughout his term, observers have pointed out that President Paul has evolved to embrace a more pragmatic form of Libertarianism. Navigating the halls of power in Austin not as an outsider looking in, but as a key component of the Texan system he has so often rallied against has had something of a deradicalizing effect on this once-fierce anti-Government hardliner. The word 'Anarchism' has not slipped from Ron Paul's lips for the last four years, and to many it seems that his previous bitter idealism has gone the way of the macerena, as Paul's own brand of Conservative Libertarianism takes root within the Republic. Indeed, Paul has made genuine progress in shrinking Texas' government - and while this is a far cry from Paul's slated goal of abolishing it wholesale, a great many Texan Libertarians aren't eager to make imperfect the enemy of good. As Ron Paul looks towards his re-election campaign, a decision must be made. Shall the President at last allow the last remnants of his Anarchist ideals slip away, or is the President simply opting to remain silent out of pragmatism?"
 texas.189.o1:0 "Paul's Anarchist flirtation was nothing more than a phase."
 texas.189.o2:0 "The dream still lives on."
 
 texas.190.t:0 "Texan Forces Return to South Texas"
 texas.190.d:0 "It has been 20 long years since South Texas was lost to us. Decades of languishing under the Mexican jackboot has had quite the toll over our Texas. Since the 90's, Social Order has broken down in the region, as the Government was unable to exert control over the region, leading to explosions in crime and unrest. Countless South Texans, Tejano and Anglo-Texan alike have fled from their homes across South Texas since 1989, and are now being faced with the difficult question of whether to return or not. The return of Texan soldiers to this territory has brought both dread and jubilation to the people of 'Lost Texas'. On one hand, countless Texans, Hispanic and Anglo alike, have detested Mexico for their illegal occupation of the area, and have identified themselves not as Mexicans, but as Texans languishing under Mexican occupation. However there are seemingly an equal amount of Hispanic Texans who feel far more comfortable under Mexico's banner than Texas' - especially considering Texas' complicated relationship with the Hispanic community. After over two decades, many in South Texas have lived their entire lives under Mexican rule, and it stands to reason that a return to Texas will be quite an adjustment."
 texas.190.o1:0 "Understood."
 
 texas.191.t:0 "Renewed Tensions in South Texas"
 texas.191.d:0 "The rapid return to Texan authority has caused no shortage of tensions within the newly-returned Texan territories. The legal framework of a transfer from Mexican Law to Texan law is a complicated one, as the populace of the region, long accustomed to Mexican institutions, are forced to reckon with a transiton to Texan rule after more than two decades of living under Mexican control. Additionally, the fact that South Texas has been a haven for Cartels due to the Mexican Federal Government's inability to exert control in the region, has become a major problem for Austin. Attempts to secure control over South Texas have not come without struggle, as the Cartels bitterly resist our attempts at restoring law and order in Cartel territory. This process has proven to be less of a smooth transition from Mexico to Texas, but rather as a highly-messy struggle to ensure that Texas' control of South Texas exists both on paper and in actuality. However with a storm of Cartels and large segments still loyal to Mexico, most predictions make it seem that re-Texifying this are is going to be far easier said than done. Generous estimates have it being years before Texan control can be solidified, and in the meantime, South Texas remains a powderkeg, ready to explode at the slightest provocation."
 texas.191.o1:0 "Worrying."
 
 texas.192.t:0 "Terrorist Groups Form"
 texas.192.d:0 "Many had predicted the power vaccum caused by Mexico's withdrawl from South Texas would lead to violence in the region sooner or later. These predictions have been proven correct, as today South Texas was rocked by a wave of violence eminating in every direction. In Laredo, border stations were attacked. In Corpus Christi, beachgoers were witness to the sight of blood and charred bodies. Officials from across the 'Liberation Zone' have been kidnapped, and as far as we can tell, one group is responsible. The Aztlán Liberation Movement, a radical group advocating for the Reconquest of the Mexican Cession, has formed in the wake of Mexico's withdrawl. Reports also indicate that Cartel forces in the region and collaborating with and supporting this group with both money and weaponry Led by José Ángel Gutiérrez, this group promises to continue their reign of terror and carnage until Texan forces withdrawl from the 'Rightful Mexican Territory' in South Texas. Mexico has expressed no interest in reclaiming this territory, and it appear that this group is working alone. Still, the Movimiento de Liberación de Aztlán remains a large problem, and unless this situation is contained, then we may very well find ourselves losing South Texas a second time..."
 texas.192.o1:0 "Tragic news."
 
 texas.250.t:0 "Perry and [USA.GetLeader] Meet"
 texas.250.d:0 "The first direct meeting between a Texan and Remnant Head of State since 2001 has been held today. Rick Perry travelled to Atlanta to meet with [USA.GetLeader], their Republican counterpart, to toast the new relationship between [USA.GetNameDef] and Texas. This meeting has widely been seen as a betrayal by countless Texans, including One Republic rank-and-file, who have defected from the Party en masse. Already the Cabinet has been completely reshuffled to remove anti-American voices, all while riots spread throughout major cities. Already the process of stamping out dissent is beginning, as police forces both local and on loan from our neighbors in the east assist in restoring order. Perry's meeting with the President was a very tense affair, made even more complex by the news of recent attacks by the Texas Nationalist Organization. This organization, once a staunch ally of One Republic, has evolved into Perry's new greatest enemy, as leadership declares their intention to wage a war of attrition against the Collaborator forces. Perry's reputation has been reduced to dirt within Texas, left with no effective base of support as both Texan Nationalist abandon him in droves, and Remnant administrators remain deeply skeptical of Perry's true intentions. For the time being, the President is stuck between a rock and a hard place."
 texas.250.o1:0 "The beginning of a new order."
 
 texas.251.t:0 "One Republic Dissolved"
 texas.251.d:0 "Rick Perry's shift from a die-hard Texan nationalist to a loyal soldier of the pro-Remnant order has come at a speed that borders on breakneck. Within a week the entirety of One Republic's Texan Nationalist bent has been scrubbed from Party platforms. The Cabinet has been purged of Separatist officials, all while countless One Republicites in Congress abandon the Party. As it stands, One Republic is a husk. The Party was founded as a reaction to perceived concession to the Remnant order, and has now evolved into a position that embraces American overlordship. Many had predicted that One Republic's days on this earth were limited the moment Perry submitted to Atlanta, and as it seems, these suspicions have been proven correct. Rick Perry has today declared that One Republic will be dissolved, replaced with a new so-called 'Non-Partisan Bloc for Cooperation with the Government', surely a temporary measure until a new Party can be founded. Pundits predict that the Texas GOP, officially dissolved in 1988, but continuing on as an officially illegal pro-Remnant party, will be returned as the label used by Perry and his Government going forward. Protests from One Republic loyalists are fierce, but with the resolve of Perry and the forces of Atlanta stationed in our nation, it seems that the fury of the Texan people is no match for the jackboot."
 texas.251.o1:0 "One Republic, None Republic."
  
 texas.252.t:0 "America Reclaimed"
 texas.252.d:0 "While traitors declared that our choice to submit to Atlanta's Authority would lead to the end of our nation, those who doubted stand humiliation as the most tremendous feat of the 21st Century is pulled off. America is awash in Red, White, and Blue. While the Communists, Socialists, Separatists and Fake Conservatives tried as they may to stomp the Remnant Dream and destroy the spirit of America forever, these false idols have fallen in tremendous fashion as the rightful President, [USA.GetLeader], secures their place as the leader of a newly-restored United States. This feat would not have been possible if not for our close cooperation and the bravery of the countless Texans who fought and died to restore the American Dream forever more. The false claimants have been cast down, and through our unflinching loyalty, we have earned our place alongside the new USA instead of being swept into the dustbin of history like our post-1987 contemporaries. Communists and Separatists may sneer, but as it stands, the shame of the Gipper has been undone - America has clawed itself out of the dustbin of history. Celebrations of this development have broken out across Texas, even as America's shocking return from the historical ether raises new and uncomfortable questions about the future of the Second Republic of Texas."
 texas.252.o1:0 "God Bless our American Allies!"
 
 texas.253.t:0 "Operation Jade Helm Commences"
 texas.253.d:0 "Ever since Perry submitted to Atlanta's rule, the Texan Nationalist Organization has gone from a Nationalist Paramilitary Organization into a full-blown terrorist group. The last month has seen 12 attacks by TNO-aligned forces alone. The most recent of which were a bombing at the Austin–Bergstrom International Airport, an ambush on a Remnant Convoy, and an attack on several border crossing stations near Houston. Crushing the TNO has been a top priority for the new Perry administration going forward, and thanks to support from Atlanta's FBI, great progress has been made in destroying resistance to Remnant oversight. Major defeats have led to the capture of senior TNO leadership. Larry Kilgore was found to have committed suicide after a raid on a TNO compound near Odessa. The remains of the TNO appear to be lashing out with the last bit of energy, but as their numbers grow scarce, the opportunity for a Remnant knockout blow grows bigger. Today, a joint Texas Rangers-FBI operation commenced, known as 'Operation Jade Helm', which aims to curtail and ultimately destroy the remnants of pro-Separatist resistance in Texas. A new comprehensive surveillance and law-enforcement grid will ensure Jade Helm can effectively destroy all anti-Atlanta groups, be them the TNO, or otherwise."
 texas.253.o1:0 "Another domino falls."
 
 texas.254.t:0 "CIA Officials Testify"
 texas.254.d:0 "The fact that the CIA has played a role in pro-Remnant terrorism has been a matter of common knowledge for some time now. Of course, during the period of One Republic, Atlanta carried an attitude of 'The Ends will Justify the Means', supporting all matters of anti-Texan nutcases in hopes of bringing about Regime Change in Atlanta. As a new dawn of peaceful Remnant-Texan relations breaks, officials in Atlanta have seen it fit to turn the page. Both sides undeniably made mistakes during the last 10 years, and in the spirit of cooperation, it has been decided that those responsible for heinous attacks against civilians will be brought to justice, no matter what Hardliners in Atlanta may think. Today, dozens of officials from the Central Intelligence Agency testified for hours in front of the Texan Congress about covert CIA involvement in terrorist groups here in Texas. These documents have proven the ugly truth we have known all along, and to prevent the greater festering of anti-American feelings within Texas, those responsible for covert support of Terrorist groups will be extradited to Texas to face trial. With this new era of Truth and Reconciliation breaking through, it seems that a new dawn of American-Texan relations are breaking, as the victims of terror finally see justice delivered."
 texas.254.o1:0 "A graceful move."
 
 texas.255.t:0 "Statue of Page Erected"
 texas.255.d:0 "Texan officials weeped as a new statue of Wade Michael Page, the mastermind between the San Antonio Attacks of 2010, was erected in the heart of Austin. Remnant officials demanded to us that we cease our classification of the late WMP and his group as terrorists, instead declaring them to be brave soldiers in the struggle for the liberation of Texas from Separatist hordes. [USA.GetLeader] attended the erection of this statue along with their Texan counterpart, Rick Perry, whose mortified expression said more than prewritten press releases ever could. Protests over the official honouring of the man who killed over 50 innocent commuters have already been widespread. Regime officials have been quick to do damage control, blaming the 'Liberal Media' for pushing overblown lies about Page and stating that his aim was the dismantling of anti-American structures of oppression in Texas. The living plotters of the San Antonio attacks have been released, and even publicly honoured by the Administration. Nobody has bought the new Remnant-imposed narratives around Page, and as it seems, no amount of public humiliation rituals will change the minds of the people on this issue. A public humiliation ritual does seem to be all this new Statue is, as the increasingly cruel Remnant forces delight in the suffering of their Texan counterparts."
 texas.255.o1:0 "Horrible."
 
 texas.256.t:0 "Texan Currency Phased Out"
 texas.256.d:0 "It's official. The Texan Dollar is no more. Remnant officials are already beginning to introduce Atlantan greenbacks into the Texan supply of money. As of today, Texan dollars are no longer legal tender. Denizens have been given a deadline to turn in their old Texan currency, with possession of outdated Texan currency being upgraded to a felony offense. As Remnant crisp new greenbacks fresh from the Charlotte mint flood the State, Collaborationist officials dream of the day every Whataburger cashier and border-town stripper finally forgets what a blue-backed Lone Star note even feels like. Down in Austin the last pallets of Texan dollars, printed on stubborn cream-colored stock that still show the Alamo in raised ink, are burned in the street as a symbol of Atlanta's domination over Texas as red-blooded patriots weep. This process has been a lengthy one, with the transition to American Currency being at best a mixed process. The FBI has shown the foresight to seize and melt down the old printing plates before some do-goodnicks could use them to make bootleg Texan notes, and Texas Rangers have been turning out residences to find and destroy contraband Dollar bills crammed into nooks and crannies behind furniture and stuffed in mattresses in the hopes that these symbols could be safe from Uncle Sam's prying gaze."
 texas.256.o1:0 "It's not about the money, it's about sending a message."

 texas.257.t:0 "Texan Currency Pegged to the Dollar"
 texas.257.d:0 "The prospect of replacing the Texan Dollar with Remnant Greenbacks was naturally alluring to many within Atlanta. The Texan Government, despite knowing their utter powerlessness, has successfully managed to convince their counterparts in the Republic that replacing the Texan Dollar with the American one would be far more trouble than its worth. Officials from the Charlotte Treasury, determined not to go home empty handed, have settled on a compromise that would see the near-worthless Texan dollar pegged to the American one, effectively completing the stated goals of Monetary Reform without having to forfeit our own currency. Treasury officials in Austin are also relieved at this prospect. Since 2011, our currency has become tantamount to worthless, with its primary uses being in the black market. This move to peg its value to USD will hopefully allow some semblance of economic stability while also avoiding the clusterfuck that would be imposing the American Dollar over Texas. Unfortunately, due to our persistence in demanding to retain our own currency, it appears that securing Economic aid from Atlanta will remain a complicated process. Despite Atlanta remaining incensed about this, most officials on the Texan side of the border are in agreement that an independent currency is the best way forward."
 texas.257.o1:0 "Two Dollars for Two Nations."

 texas.258.t:0 "Atlanta Falls"
 texas.258.d:0 "Texan officials grimaced in horror as they witnessed the bleak scene. Just like during the days of Sherman's March to the Sea, Atlanta was awash in a sea of crimson embers. The American Dream, upheld by the forces of the Remnants, was on the verge of being snuffed out forever. In between a sea of drab advisors letting out gasps and burying their faces in their palms, President [TEX.GetLeader] was interrupted by the ring of a familiar red phone. It was [USA.GetLeader] on the line. They let out barely a sentence in between sealing boxes of top-secret documents and personal effects as they evacuated the Capitol Region. 'You're in charge now' - that's all they had time to utter before the Secret Service ushered them out of the city. Already plane loads of Remnant officials are arriving in Texas to continue the struggle. Oklahoma and Louisiana have come with them, pledging loyalty to the 'American Government in Exile' already being set up in the American Embassy in Austin. We're carrying on the struggle now. [365.Owner.GetNameDef] seeks no quarrel with us, viewing it as not worth the hassle to conquer us - for the time being. As it stands, Texas is all that remains of [USA.GetNameDef]. Ain't that something to chuckle about. Five years ago we would love nothing more than to see the Remnants burn. Now, it's up to us to save them."
 texas.258.o1:0 "We will restore, we will reclaim."

 texas.259.t:0 "Remnant Advisors Arrive"
 texas.259.d:0 "It comes without surprise that many both on the Texan side of the Border and the Remnant side have come to the same conclusion that attempting to exert Atlantan control over Texas' Armed Forces would at best end in disaster. Reports from the Texan side detailed plans to booby-trap ammo dumps and weld the base gates shut rather than allow them to fall into American hands, even going so far as to state that the first Federal officer who tries to raise the American flag over a Texas Guard post will be greeted by a .50-caliber welcome committee and a one-way ticket home zipped up in a body bag. This is perhaps why the Americans have not even tried to absorb the Texan Army into their command structure, instead affirming the independence of our command going forward. For what it's worth, Texas' Armed Forces remain an entirely separate entity from our American counterparts. Instead, as a gesture of goodwill, the Remnants have sent us several military advisors, as well as new state-of-the-art equipment to help us modernize the Texan military. While these instructors have reported a certain deal of hostility on Texan bases from soldiers angry with having to report and listen to their 'superiors' Atlanta, their knowledge has proven invaluable for whipping Texas' Armed Forces into shape after years of neglect. "
 texas.259.o1:0 "Better than nothing."

 texas.260.t:0 "Command Structures Integrated"
 texas.260.d:0 "The reorganization of the Texan Army following the submission to Remnant rule was not a surprise to many. Despite our nation's Armed Forces being put under a system that allows the Americans to assume control over our army at 72 hours notice, it was hoped that the Texan Guard (Officially Replacing the old Texan Army) would continue to maintain a large degree of Autonomy. Unfortunately these hopes have been dashed, as senior advisors from the Pentagon have formally announced the process to integrate the Texan Army into the Remnant Command Structure. Texan soldiers now march in American Uniforms, as ever weekend warrior from Laredo to Waco now wears Remnant uniforms, stripping the armories of every yellow-and-black Texas patch and replacing them with the same drab Stars-and-Stripes shoulder sleeve that still makes old men in Tyler and the DFW spit on the sidewalk in disgrace. Reports of desertion have been widespread ever since the news first broke, as morale on the Texan side continues to slide into the gutter. Our new American superiors have promised to forcibly seize and destroy remaining Texan equipment if such disloyalty continues, however if the 'COME AND TAKE IT' flag has taught us anything, that process would be easier said than done. As it seems, the worst fears of the Texan people - hostile American Occupation, have come true."
 texas.260.o1:0 "A tragedy."

 texas.261.t:0 "New Constitution Implemented"
 texas.261.d:0 "A cautious compromise has emerged between those who wish to see complete Texan submission to Remnant law and those who are content simply not interfering in existing Texan legal structures. In a hurried process, new Instruments of Government for the Republic of Texas have been signed, marking a new era in the history of the Republic of Texas. The last remains of the original 1836 Constitution have been thrown out, as the former Constitution of the pre-1987 is returned almost in full. With little public consultation or input from Texan Legislators, many are calling the new Constitution nothing more than a sham, a snow-job designed to replace Texan law with American ones while still keeping up a facade of Independence. And while these accusations do hold their merits, the fact remains that being forced to significantly rewrite Texan laws is certainly a step up from having American law imposed on us without our consent. Atlanta has given us *some* leeway in the implementation of this new Constitution, giving only a few areas in which Texan lawmakers are forbidden from editing. For the most part, in addition to providing new frameworks for Texan law, this new Constitution is designed to both uphold our partnership with Atlanta, and the electoral dominance of the ruling [TEX.GetRulingParty]."
 texas.261.o1:0 "A worthy compromise."

 texas.262.t:0 "Texan Law Upheld"
 texas.262.d:0 "Good news has come from our counterparts in Atlanta. As it seems, [USA.GetNameDef] isn't interested in interfering with the Texan Legal System. Instead, our Laws can continue untrammeled, without interference from our brothers across the border. Armed with an attitude of 'If it ain't broke, don't fix it', the Americans have decided that trying to impose Remnant law on Texas would simply be more trouble than it's worth. We don't know what exactly led them to make this decision, though we can guess the fact that countless Texan Sheriffs signed an open letter stating that they would simply refuse to enforce Federal Law if it was put on the Texan books had something to do with it. For now, the site of Burning Courthouses will remain a hypothetical worst case scenario, as we in Texas remind Atlanta that while we value their partnership, we still have the matches. With Texan control of the law guaranteed, Law Enforcement officials across Texas have gleefully fallen into their new roles, helping to round up anti-Atlanta dissent now that they know that their jobs aren't in danger of being replaced by jackbooted FBI agents wearing Riot Gear instead of Cowboy Boots and Campaign Hats. The efficiency in local law enforcement's anti-Nationalist operations is a testament to how nobody has to lose if we all work together."
 texas.262.o1:0 "Well, that's some good news."

 texas.263.t:0 "Remnant Law in Texas"
 texas.263.d:0 "Our worst fears in regards to the future of the Texan Legal System have been realized, as today the Remnant Attorney General confirmed that American Law would be universally applied to Texas. [USA.GetLeader] doesn't hold much regard for the Law inside the Republic, so it was only a matter of waiting for when they discarded Texan law in its entirety. Atlanta's Legal Eagles clutch thick binders full of Federal statutes they can't wait to ram into every county courthouse across Texas. The symbolic (and in many cases quite literal) shredding of Texan statutes has begun en masse across Texas. As much as we would love to wipe our ass with these new statues, it seems that we're a bit stuck, as the FBI has threatened to arrest any small-town Sheriff not enforcing Remnant Law in Texas within a 32 hour notice, leading many die-hard members of the Texan resistance to declare that the only law they would be following would be the laws of gravity as they throw Fed Spooks off the Interstate Overpasses. Atlanta's Justice Department has already circulated a 400-page 'harmonization decree' that would nullify every Texan statute conflicting with Federal code, starting with measures such as open-carry without permit, replacing them overnight, complete with pre-dawn arrest Warrants for judges who refuse to enforce the American-led new order."
 texas.263.o1:0 "Atlanta's Jackboot presses further."

 texas.264.t:0 "What of Rick Perry?"
 texas.264.d:0 "Much to Atlanta's delight, Rick Perry, first elected on a campaign of rabid anti-Remnant fearmongering, has proven to be a remarkable Stooge for Atlanta's interests. Whether out of a genuine change-of-heart, or out of fear for his own life and the lives of his countrymen, Rick Perry has submitted to American rule. However it is Perry's Quisling nature that makes Atlanta increasingly worried about his continued leadership of their Texan Vassal State. Perry has discarded his own ideals enough times that it is truly impossible to know where his true loyalties lie - this fact makes Perry an uncontrollable variable that many simply aren't comfortable having to account for. The natural solution to the Rick Perry question is obvious, replace him with someone who has always put their loyalties to the true American Government first. To Hardliners in Atlanta, this course of action will come without hesitation. Of who would replace Perry in this scenario, there is some debate, however if one thing is clear to those who wish to see Texas fully subservient, it is that Perry is a wildcard who needs to be replaced sooner rather than later. It is up to the President of the American Republic to decide if replacing Perry with a more 'Loyal' figure is worth it, or whether it's best to stay the course and let sleeping dogs lie."
 texas.264.o1:0 "Perry has done a fine enough job already."
 texas.264.o2:0 "Perry needs to go, and Dan Patrick shall be his replacement."
 texas.264.o3:0 "Perry needs to go, and Greg Abbott shall be his replacement."

 texas.265.t:0 "Dan Patrick Delivers State of the Union Address"
 texas.265.d:0 "From Austin Texas, the flash, apparently official, Rick Perry was removed from office at 1 PM Central Standard Time. Of course the common consensus among pundits was that Rick Perry's tenure as President of the Republic of Texas was over as soon as he submitted to American rule, the choice to push Perry out in favour of the radical Hardliner Dan Patrick has come as a shock to many within Austin. Dan Patrick previously served as the final Governor of the State of East Texas in [USA.GetNameDef], until the position was abolished upon the Remnant recognition of Texas. Dan Patrick is, to say the least, a radical anti-Separatist who has few friends in Austin and many enemies. The fact that Patrick has little to no ties to Texas proper has already had his Presidency on ice, as many begin to see the new situation with Atlanta as less of a case of friendly protection and more a hostile occupation. Already protests within Texas have broken out, protests with Patrick and the Texas Rangers are eager to crush with extreme prejudice. Atlanta's various three-letter agencies are already preparing for a prolonged conflict in Texas as Patrick moves towards an increasingly hostile position towards the Texan populace. While Patrick's speech to the Congress was met with fiery applause, the snipers trained on the crowd sent more of a message than any forced clapping ever could."
 texas.265.o1:0 "Hail to the Chief."

 texas.266.t:0 "FBI Agents Arrive in Texas"
 texas.266.d:0 "Texan Law Enforcement has been woefully failing the moment, even before 2011. Fat inbred small-town Sheriffs run around like they're king of the universe, letting all manner of criminals and Separatist Scum run rampant. A comprehensive crackdown, led by our Remnant counterparts, is needed to prevent Texas from falling into the crutches of treasonous anti-American ideals, a crackdown led by footsoldiers our superiors in Atlanta are more than happy to supply. Already FBI agents have arrived here in Texas en masse, beginning what many have coined as 'Operation Starfall', an operation which has the aims of comprehensively cracking down and dismantling criminal and terrorist networks with door-to-door searches and seizures. The response from the Texan end has been as predicted, with denizens taking to the street with homemade weaponry in a futile attempt to beat back our boys in the Bureau. Water Cannons and new Sonic Weapons have proven helpful in dispersing hostile crowds, but for those still wielding contraband weaponry from Texas' days under the Second Amendment, we have been forced to take drastic measures. The sight of cracked skulls and blood on the pavement has sent a powerful message to the disobedient Texans: the message that resistance to our new American-aligned order is futile."
 texas.266.o1:0 "'Police State' is such an ugly word."
   
 texas.267.t:0 "The Lone Star Banner Lowered"
 texas.267.d:0 "The very ideal of 'Texan Nationalism' is fundamentally at odds with our civilizing mission here in this barren and savage land that the locals know as 'Texas'. Before Reagan foolishly dissolved the United States, the Texan Flag flew proudly alongside the banner of the United States - but in the years since the fall of the United States, the uncivilized people of Texas have proven that the ideals of 'Texas' are incompatible with the new American order. The time has come to at last tear down the treasonous rag of the so-called 'Republic of Texas'. A new ordinance has formally banned the flying of the pre-[GetYear] Texan flag here in Texas, with it formally being labelled as a subversive symbol of Terrorism and Treason. In the Lone Star's place rises a new flag, one heavily based on the old flag of the State of East Texas before it was dissolved - a seal-on-a-bedsheet flag that incorporates the old Texas State Seal on a blue background. This new flag will help represent our nation's new status in the American fold. The illegalization of this iconic symbol of Texan has naturally led to uproar that would only be beat if we tried to ban Brisket and Beer alongside the Lone Star. Regardless, the abandonment of Separatist Symbolism remains a powerful message to those who continue their delusion of a 'Separate Texan Identity'."
 texas.267.o1:0 "Thus falls the Traitor Rag."
    
 texas.268.t:0 "A Camera on Every Corner"
 texas.268.d:0 "Thanks to recent advancements in technology, it has never been easier to manage a Police State. Cameras and algorithms do more to curb dissent than officers with Billy-Clubs ever could hope to. With this fact in mind, President Patrick has begun a comprehensive campaign to expand the Texan Surveillance grid, with help from officials in the NSA. Texas has been blanketed in Cameras, every city covered in an all-reaching surveillance grid designed to make even the possibility of organized dissent an impossibility. The wonders of the Closed-Circuit shall help keep Texans safe from Separatist Terrorism for decades to come. No longer shall Criminals hide in the shadows. For every 10 CCTV Cameras, there shall be a dozen more hidden cameras monitoring those clever few who think they're out of our network's sights. A new algorithm in development with our NSA allies will help process the heaps and heaps of new information that these cameras have collected, a sort of test-run for a system which can hopefully be implemented in every corner of territory at risk of falling to subversive forces into the once-and-future United States. While Texas is sparsely populated in terms of Computing technology, every Computer sold will now be equipped with keyloggers, as the government begins installation of this technology in public Internet Cafes across the Republic."
 texas.268.o1:0 "We're watching you."
 
 texas.269.t:0 "Devotion to the Cause"
 texas.269.d:0 "It was the Houston Oil boom that first launched Dan Patrick into the political stratosphere. While he came from humble beginnings in Baltimore, his own firebrand personality making him a household name, and whether you loved him or hated him, everybody in Houston knew the name Dan Patrick. From painting himself blue to support the Houston Oilers, to sporting a large Cowboy hat, Patrick's skills as a silver-tounged Devil make his political career a sure-thing, however before he could emerge as the savior of Texan values, Patrick was led astray by a greater calling, the calling of opening a chain of Sports Bars in Houston. The 80's Oil Glut sent his Bars bust - Patrick would be forced to file for bankruptcy, an experience that shaped him into the Conservative Firebrand we know today. By the time of the Great Collapse, Patrick had emerged as a prominent radio host singing the praises of the Bush Regime in Atlanta, and would ditch Houston for Dallas once the treason of the Texan Government became clear. It was the Bush regime that first saved Patrick from irrelevance, and once more Patrick shall repay those in Atlanta who have ensured his survival. Everything in Texas shall be devoted to the cause of returning America from the great unknown. Supporting the American struggle is more important than any individual life. There are more important things than living..."
 texas.269.o1:0 "..And that's restoring this country for my children, and my grandchildren."
 
 texas.270.t:0 "Greg Abbott Delivers State of the Union Address"
 texas.270.d:0 "From Austin Texas, the flash, apparently official, Rick Perry was removed from office at 1 PM Central Standard Time. Of course the common consensus among pundits was that Rick Perry's tenure as President of the Republic of Texas was over as soon as he submitted to American rule, the choice to push Perry out in favour of the moderate pro-American Legalist Greg Abbott has been a cause for relief in Austin. Among those 'Texiles' who returned to the Republic once Peace and Free Movement was announced between Atlanta and Austin, Abbott, who wheeled in from Dallas as soon as Perry signed along the dotted line, has emerged as one of the most prominent. By the time Perry surrendered Texan Independence, it was only a matter of time before Abbott rose to take the mantle. Unlike many of his contemporaries, Abbott recognizes the need to balance American subservience with classic Texan values. In his speech to Congress, Abbott declared that Texas and [USA.GetNameDef] are more similar than most would think, affirming his Texan heritage and vowing to protect Texas from the 'true enemies' of Freedom, in Abbott's view Communism and Liberalism rather than Atlanta. The applause among the stands has sent a message that Texans, empowered to decide their own fate, are ready to work with the Remnants in their mutual aims of defeating the Pinkos and Communists."
 texas.270.o1:0 "Hail to the Chief."
  
 texas.271.t:0 "Abbott Declares Himself Texas Patriot"
 texas.271.d:0 "Texan Nationalism is understandably a touchy subject. Atlanta has been keen on stamping down feelings of Texan Separatism, viewing them as a pathway into disloyalty to our great American Experiment. Of course, as President Abbott has demonstrated, the carrot is more effective than the stick. Attempting to forcefully stamp out the concept of Texan nationalism is just going to foster more resentment, more anger. Abbott, ever the Texophile, has effectively co-opted Texan nationalism for his own aims, proving to his superiors in [USA.GetNameDef] that Texas' identity can be used to benefit the struggle against Communism and Pinko Liberalism. Texas and [USA.GetNameDef] aren't so different once you get down to it, and with any luck we'll be able to use our common interests as a cudgel - proving to the demented Separatists that Atlanta wishes no ill will towards Texas or Texas, but rather to protect us against Neo-Confederatism and Communism. Even as the CIA grumbles about the destructive potential of Abbott's pro-Texan shift, the results have shown themselves. The embrace of Texan nationalism by both Abbott and his American counterparts has shown a remarkable shift in polls, as more and more Texans begun to see [USA.GetNameDef] in a more positive light, all as [USA.GetLeader] reaffirms Texas' status as a separate, self-governing nation and society."
 texas.271.o1:0 "Let's Roll."
   
 texas.272.t:0 "FBI Agents Depart"
 texas.272.d:0 "Since the 2011 Treaty, much of Texas' Law Enforcement apparatus has been handled by Atlanta's Federal Bureau of Investigation. Law Enforcement was previously... hesitant to enforce the new Remnant-aligned laws in Texas, and while many have fallen into line since, content in implementing the President's will so long as the American order does not infringe on their own power, American Law Enforcement remains a significant presence in the world of the Texas Legal System. Greg Abbott, himself a prominent lawyer, has come to realize that having our Policing handled by Americans is helpful for nobody. Returning the control of Texan Law Enforcement to Texas is a vital step in securing our autonomy from Atlanta, and will ensure that the directives of anti-Communism and pro-Americanism are implemented on our terms. Despite suspicions from the FBI rank-and-file, the fact remains that Texan Police are both eager and willing to implement the Remnant agenda, so long as they believe it is their decision to do so. Attorney General Paxton is at the forefront of the re-engineering of the Texan Legal System, ensuring that every out-of-shape Sheriff from Laredo to Santa Fe is in lockstep with the new legal provisions. Unity between the Texas Rangers and the FBI shall ensure a cohesive system, and shall hopefully avoid resentment of the Remnants from our Boys in Blue. "
 texas.272.o1:0 "The American way shall be enforced, on our terms."
    
 texas.273.t:0 "Doing Things the Legal Way"
 texas.273.d:0 "Maintaining an ere of Legitimacy is essential to the new Texan system that President Abbott is building. Discarding the old Texan System would only invite more resentment and anger from a populace still deeply suspicious of our American benefactors. Luckily for us, One Republic has already done much of the legwork for creating a 'Legalistic' Authoritarian state before the Party was dissolved. The Independent/GOP controlled Congress has already passed new provisions to target the opposition with mountains of paperwork and legal hurdles to gaining power. These measures have provided a healthy middle ground between breaking batons on the skulls of protesters on the street and allowing Pinko Commies from running amok. The velvet glove approach has thankfully kept a lid on Texian discontent thus far, providing us with a new legal framework for our efforts to suppress the remains of dissent within Texas. Gerrymandering has also been utilized extensively to keep the Opposition out of power without having to resort to open Electoral Fraud. Put together, these measures paint a picture of a new Texas, a Controlled, Illiberal Democracy that can utilize an iron grasp on the Legal System to effectively barricade the opposition out of power. Communists, Liberals, and Separatist scum will be kept from the Legislature, without a law broken in the process. "
 texas.273.o1:0 "A Paper Chain to Bind Texas."
    
 texas.274.t:0 "Enforcing Disability Rights"
 texas.274.d:0 "While much of the President's agenda thus far has been focused on stamping out discontent and threading the needle between Patriotism and blatant treason, recently President Abbott has focused on a more personal aspect of his Administration. As the first President of an American nation since Franklin D. Roosevelt to be wheelchair-bound, Abbott has long faced hurdles, having first lost the use of his legs in 1984 after an Oak Tree fell on him during a storm. During his tenure as a prominent Legalist in the Former East Texas, Abbott fought to equalize access to public spaces for all. Abbott has had much success in this area during his time in East Texas, however Texas proper has not exactly caught up to the rest of the former US when it comes to Disability rights. While Separatists have been callous enough to utilize his wheelchair use as a cudgel to belittle and ridicule him, such as calling Abbott a 'Cripple' or even 'President Hot Wheels', with particularly disgusting Separatists asking how Abbott could stand up for Texas if he can't even stand himself, the President shall allow these insults to roll off him like glass, and will continue to enforce the ADA in Texas no matter what they might think. This effort, which even the most fervent Democrat traitors can agree with, shall help show Texans the softer side of President Abbott and the Collaboration Government."
 texas.274.o1:0 "It's not necessary to stand at the lectern in order to do a fine job."
 
 texas.275.t:0 "Rick Perry Delivers State of the Union Address"
 texas.275.d:0 "From the moment Perry surrendered to Atlanta, the consensus among most was that he was a dead man walking. A long history of Separatism and anti-American agitation sealed the President's fate before he could even give his opening address. And yet, it appears that despite every odd to the contrary, Rick Perry has managed to survive another day as President of the Second Republic of Texas. Increasingly resorting to debasing himself and his nation in a desperate attempt to remain as King of the Texan Sandcastle, it seems that out of pragmatism or pity, Atlanta has greenlit the continued Presidency of one James Richard Perry. Amid jeers of being a Quisling and a Flip-Flopper, Rick Perry has addressed Congress in an effort to reassure the people of Texas amid this era of tremendous uncertainty. In his speech, Perry went to great lengths to praise Atlanta, and more specifically the policies of President [USA.GetLeader], who declined an invitation to attend this event in person. In between singing Remnant praises, Perry has also highlighted Texas' 'Christian Values', railing at length against Abortion, Gay Marriage, and Secularism, and stating that he aims to make Texas a 'Shining beacon of Morality in the once-and-future America'. Liberal attempts to boycott this speech have been met with Treason charges. Perry is awake, yet as the future is decided, Texas sleeps."
 texas.275.o1:0 "Hail to the Chief."
 
 texas.276.t:0 "Remnant Money Arrives"
 texas.276.d:0 "Pallets of cash intended for use in developing Texan infrastructure have arrived on our doorstep by the planeload all this week. In his slick suit and sunglasses, President Perry has giddily announced that [USA.GetNameDef] was providing our nation with billions of dollars in new funds for infrastructure, including but not limited to Dams, Freeways, a new, more fortified Electric Grid, and expansions to the Port of Houston to assist in exporting Texan Oil to Remnant markets. These new dollars have a very simple aim, to show Texans the lighter side of Remnant submission. After all, if Atlanta is willing to provide Texans with both jobs and state-of-the-art new infrastructure, they can't all be bad? Of course, for every dollar earmarked for Power Lines and Highways, another dollar is set aside to veritably buy the loyalty of the disloyal within our Civil Service. Indeed, Atlanta has made generous use of bribery to buy loyalty among the Texan Punch-Card bureaucrat class who consider the Remnants guilty dead but would be more than willing to play ball for the right price. It isn't known how much of this infrastructure money will actually be used to help develop Texas, but we currently estimate that most of this 'Infrastructure Money' is genuinely going to help Texan development, while the rest is spent bribing the weakest links."
 texas.276.o1:0 "A dollar here, a dollar there, who can keep track?"
 
 texas.277.t:0 "George H.W. Bush Statue Erected in Austin"
 texas.277.d:0 "George H.W. Bush is understandably a controversial figure in Texas. Despite being born in Massachusetts to the son of an influential former Senator and Nazi banker, George H.W. would first start his political career in the then-Lone Star State in a failed run for Texas' Class 1 Senate Seat against Ralph Yarborough. Unbowed by this failure, Bush would eventually be elected to Texas's 7th congressional district, a career in the House which would later launch him into the position of Ambassador to the United Nations, Chairman of the RNC, and later, Director of the Central Intelligence Agency - a position which would come in handy during the Great Collapse. While he failed to beat Reagan for the Republican nomination, his strong showing would secure him second billing on the ticket aside from the Gipper himself, and once Reagan dissolved the United States on that fateful day in 1987, Bush stood up to continue what was left of the Federal Government. Despite considering Texas home, Texas never returned the favour - especially after the East Texas War. However now, under Rick Perry's watch, a reckoning has occured. Bush is now venerated as a great Texan hero, and a statue of the 'Great Leader' has been erected in Austin as a symbol of this new veneration of the late President. Already polls show the late H.W.'s approval rating exploding."
 texas.277.o1:0 "The record set straight."
 
 texas.278.t:0 "Federal Agencies Abolished"
 texas.278.d:0 "The 'Restructuring' of the Texan Government in the wake of the Remnant takeover has naturally led to the elimination of several Government Agencies previously decided as the Texan Government's jurisdiction. As we shift more and more matters of the Texan Government towards American officials, President Perry has spotted a unique opportunity to whittle away the forces of Big Government and get rid of Government Waste in the process. Several Texan Government Departments such as the Departments of Commerce, the Department of Education, the Department of Energy and the Department of Housing and Human Development have all been formally eliminated. While normally such eliminations would be required to be approved by Congress, our American benefactors have graciously spared us such drudgery by reorganizing the Government themselves without the consent of Congress - not that they would be likely to refuse if requested by President Perry. This move shall already help reduce Government Spending and shall allow Tax Relief for all Texans. Unfortunately, during a Press Release in which Perry announced the good news, the President briefly stumbled, forgetting the exact name of the Agencies his Government intended to abolish. When pressed as to what the third department was, Perry admitted that he could not remember, adding 'Sorry. Oops.'"
 texas.278.o1:0 "Embarrassing."
 
 texas.279.t:0 "Threading the Line of Texas Nationalism"
 texas.279.d:0 "Texas Nationalism is understandably a touchy subject with our superiors in Atlanta. Rick Perry has proven himself capable of any humiliation in order to stay in the President's good graces, however in the matter of Texan Nationalism, the CIA has pointed out that utilizing Texan Nationalism for the Remnant Government's own aims could be productive in curtailing Separatist activity and uniting the population against a common enemy. The green-light from Atlanta to embrace Texan Nationalism to *some* degree has delighted many within Austin's Halls of Power - and while Perry once thought that this cautious embrace may be a trick to smoke out Separatist traitors, it seems that Atlanta is genuine in their belief that embracing Texan Patriotism can help give a more 'Human' face to the Collaboration Government. Rick Perry is himself still a great Texas Patriot, and while the definition of 'Texan Patriotism' has evolved ever since 2011, we can still make it clear to our populace that Atlanta is not opposed to the ideals of the Lone Star. We share many enemies, us and the Americans, and together, we and the Remnants are stronger than we ever could be apart. While there is still some trembling in Perry's voice every time he talks about 'Texan Values', nobody seems to know if he still truly holds the ideals of Texas sacred."
 texas.279.o1:0 "A return to form? Or an act for the Cameras?"
  
 texas.280.t:0 "The Second Annexation of Texas"
 texas.280.d:0 "The end of the Second Republic of Texas has arrived. With America returned from the ashes, Texas has little reason to continue its existence. Just like in 1845, Texas has been returned to the United States. Like John Tyler before them, [USA.GetLeader] has formally signed the Second Annexation of Texas into law. Unlike the 1840s, when a bitter divide of Slave States and Free States defined the debate over Texan annexation, Texas' return to the Union has gone forward quite without complications. President [TEX.GetLeader], just like Anson Jones before them, has seen Texas ascend as an American State. While much Separatist woe has preceded this event, most Texans have come to see themselves as Americans in the years since 2011. With a shaking of hands and the sound of pen scribbling on paper, history has repeated itself. The Second Republic of Texas is no more, facing an identical fate as its fateful predecessor. As we speak, Texan institutions are being replaced, the Presidency of the Republic of Texas has been abolished, replaced with the Office of the Governor. Countless Republic-era institutions have returned to their pre-1987 counterparts as the final scar of the Great Collapse is finally healed. Patriots weep, but what has been done cannot be undone - there will be no Third Republic, no final chance. The dream of Texan Independence has at last been confined to the grave."
 texas.280.o1:0 "History doesn't often repeat, but it does rhyme."
 
 texas.281.t:0 "American-Texan Joint Exercises"
 texas.281.d:0 "While many had predicted that the return of the United States would lead to Texas at last joining the fray, it appears that Texas is still very much content with its independence, and the Americans are as well. Texas has earned its place in history, its loyalty paid forward in recognition that the Texan Spirit truly is unique. Texas, through blood and sweat, has earned its right to exist alongside the new United States. With rumours of a Second Annexation dispelled, the Presidents of Texas and the United States have been involved in high-level meetings to secure Texas' status as an invaluable American ally. Already the Texan and American Militaries have conducted large-scale drills and joint exercises in an attempt to prepare their nations for the eventual battle against Soviet Communism. Large-scale purchases of American Weapons by Texan firms has stimulated the economies of both nations, all while the US Purchases of Texan oil help contribute to prosperity on both sides of the border. A future of America and Texas, together but still separate, is being written in front of our very eyes. While some bemoan that 'Rightful American Territory' is being let loose in Texas and nationalists cry bloody murder that they exist under the American Jackboot, to most, this new arrangement is the best of both worlds."
 texas.281.o1:0 "A Toast to Those United States!"
   
 texas.282.t:0 "Dissidents Disappear"
 texas.282.d:0 "The Central Intelligence Agency and the Texas Central Intelligence Service have been cooperating ever since Texas first submitted to American Rule in early 2011. Recently, the TCIS and CIA, along with other law enforcement agencies such as the FBI and the Texas Rangers, have worked together to track down and terminate prominent dissidents who have previously escaped the wrath of Regime Secret Police. Previously a large network has provided shelter to those who seek to evade the Eagle's Talons, utilizing some well-placed bribes and the fact that Texan Intelligence Services were often separated from their more competent American counterparts to their advantage. However as the USA's eyes fall on Texas, a new lockstep Intelligence Direction has at last brought down the hammer on Separatist and Communist miscreants. Across Texas, prominent critics have disappeared into the night. Terrorists have had their safehouses raided thanks to unprecedented levels of cooperation between Texan Law Enforcement and their American Counterparts. From drugs to dissent, from Separatism to simple scams, allowing Texas access to the vast American network of data has already paid off in the short term, and God willing, shall allow Texas to prosper in new security for decades to come. The Americans are also happy for a vast new training ground for the FBI."
 texas.282.o1:0 "Law and Order!"
       
 texas.283.t:0 "Supporting American Diplomatic Efforts"
 texas.283.d:0 "The hallowed halls of the United Nations General Assembly have been alight in debate ever since the United States clawed itself out of the historical dustbin. Convincing the United Nations to re-admit the USA was generally a difficult sell, even to old American allies, but given the tremendous diplomatic prowess of the United States even despite widespread devastation, little opposition was given to elevating America to the ranks of the UN Security Council once more. Among those nations working to run diplomatic defense for the newly-restored United States, none were louder in their passion in their justifications than the Second Republic of Texas. In many ways, Texas' new Diplomatic direction has existed in virtual lockstep with their American allies. Befitting their status as a de-facto American Satellite State, Texas has never ceased in its mission to back up America's geopolitical efforts. In every American-backed Resolution to reach the General Assembly's floor, Texas has been voting alongside their allies in Washington, sometimes being the only nation to back up the new America. While on paper Texas remains a fully independent nation, in terms of Diplomatic direction, it seems that it's hard to tell where Washington ends and Austin begins. In this new world of diplomatic interactions, Texas and the US speak in one voice."
 texas.283.o1:0 "As is expected."
           
 texas.284.t:0 "[TEX.GetLeader] Speaks to Congress"
 texas.284.d:0 "It's an interesting affair. The fall of the American Republic has had everybody on high alert. The halls of Congress are packed to the gills with Elected Officials who have just recently fled from Atlanta. Just outside the doors, countless American Refugees sit, attended to by FEMA officials giving out Coffee and Donuts - its great Television. Sitting alongside [TEX.GetLeader], is none other than [USA.GetLeader] - final President of [USA.GetNameDef]. The President's voice echoed the sorrow of those who have experienced the South's Socialist Cataclysm first hand. While his speech was one of solace, it was also one which promised revenge against those who snuffed out the American Dream, with their speech ending in a hopeful tone, as [TEX.GetLeader] proclaimed their intention to reclaim Atlanta... in due time. As the President's speech concluded, [USA.GetLeader] took the stand. Battered and bruised from their rapid evacuation from Atlanta, the President's voice trembled as they launched into a fiery denunciation of the new occupiers. No amount of vitriol could save them from the fact of their failure, and before they departed to their home in the Embassy, they reaffirmed [TEX.GetLeader]'s status as the new leader of anti-Communist America. Rumours that the President themselves may resign have already swirled, as Texan leadership emerges to carry the flame of the America that once was."
 texas.284.o1:0 "We are truly in the darkest hour."
 
 texas.285.t:0 "American Business Leaders Arrive"
 texas.285.d:0 "By the planeload, fresh-faced Titans of Industry have been arriving in Texas. Austin's Bergstrom Airport is abuzz with the Private Jets of moguls who once called the American Deep South home. While most of their kind made off for Canada once the USA went from 'is' to 'was', those stubborn few who have chosen to stay with the last light of American Liberty despite long odds and suffering economic conditions are determined. Boardrooms full of executives from countless corporations - Halliburton, Colt, H&P, Lockheed, Fox News, Coca Cola, all corporations which chose to stick it out in the Deep South, and now seek to bring the core of their operations to the Lone Star now that the forces of Socialism run roughshed over our native lands. Particular attention has been paid to Remnant media - with Fox News, having already set up a formidable Texan wing, being moved exclusively to Texas - something which their Socialistic counterpart CNN, led by noted Socialist sympathizer and Castro friend Ted Turner, staying in Atlanta with the bulk of his 'journalistic' staff. The Remnant coffers have been empty - every cent now in the Texan possess. Even the Federal Reserve in Charlotte was evacuated to Texas via plane, every single bar of gold now residing comfortably in Austin."
 texas.285.o1:0 "Their financial connections are invaluable."
     
 texas.286.t:0 "The CIA Sets up Shop in Austin"
 texas.286.d:0 "When the Socialist advanced on Remnant core territory, Washington, encircled on all sides, was one of the first areas to fall. The Pentagon, already partly abandoned after the Great Collapse, was quickly evacuated. In Langley, the CIA Headquarters was hastily gutted - most important documents shredded and burned before they could fall into enemy hands. With the Remnants driven from their core territory, the CIA has fallen into disrepair. Officials have struggled to establish connections with undercover agents, all while our information contacts go silent. The Company is in a dire state, as evidenced by the fact that Texan officials are unable to confirm the Agency's continued existence. Recently, several shadow-clad figures from the old CIA have approached the President to offer their services in rebuilding the Remnant Intelligence apparatus, an offer which [TEX.GetLeader] was eager to take them up on. Every last connection we have has been exhausted in an effort to reestablish ourselves. Every remaining favour has been cashed in - every last piece of Blackmail used, every last line of contact exhausted, just to restore a foothold. God willing, it will all be worth it. As new freshly-minted agents in their crisp suits, dark glasses, and briefcases handcuffed to their arms depart, we can be confident that it will be."
 texas.286.o1:0 "We'll use anything we can get."
         
 texas.287.t:0 "The Union State Established"
 texas.287.d:0 "By the early 2010s, it had become clear that the Former United States was moving towards a spectacular battle for Re-Unification. Of the winners of this battle - if there was indeed one, nobody predicted that it would be Texas. Well, technically the 'Texan/American Republic' would prove themselves as the winner of this war, however the fact remains the same. The nation which once claimed to be the fiercest guardian of Texan Independence against the ideals of American integration has taken charge to restore the United States, bringing the rest of the country under the rule of the Lone Star. Despite unifying America, Texas has seemingly never given up its own Texan bent, refusing to claim themselves as the successors of the 'United States' - but rather declaring this new nation to be a union of Texas and America, two distinct peoples unified under one banner. The message is clear - Texas has earned its right to exist, to prosper not under the banner of 'America' but rather as its own culture, its own nation within the greater Union State. Unlike all those failed nations who claimed to be 'Special' in the realm of post-1987 America, Texas has earned their right to exist, and as America moves forward, it shall move forward not as 50 distinct peoples - it will move forward as two, Texans, and Americans."
 texas.287.o1:0 "God Bless Texas! God Bless America!"
    
 ### Election Events ###
 
 texas_elections.1.t:0 "[GetYear] One Republic National Convention"
 texas_elections.1.d:0 "Rick Perry's efforts to run for a third term are effectivley dead in the water. With any prospect of remaining in office crushed, President Perry has elected to retire from Political life to spend more time with his family, not intending to use a four-year gap in the Presidency to run again at a future date. With Perry bowing out of the Presidential Race, three major frontrunners have emerged for the One Republic Party's nomination next election. Due to the rapid consolidation of control around One Republic, it is likely that whoever is chosen in this convention will go on to become the next President. The first is Attorney General Ken Paxton, who has long oversawn the Government's brutal crackdowns on political opposition. Challenging him is Secretary of State Kyle Biedermann, who has much cozier relations with the Texas Nationalist movement than Paxton, despite Paxton's closeness with the ruling government. Finally, Larry Kilgore, Senator and leader of the TNO has also thrown his ten-gallon hat into the race, however his frosty relationship with Perry makes him the dark horse in this race. Armed with Perry's endorsement, Paxton seems like the most likely option, however polls indicate that Biedermann is competitive with him. Of course, thanks to the veracity of the TNO and their supporters, Kilgore may just yet claim the nomination. If no candidate secures the majority, there are rumours that Vice President DeLay may be selected as a compromise choice."
 texas_elections.1.o1:0 "Paxton secures the Nomination."
 texas_elections.1.o2:0 "Biedermann secures the Nomination."
 texas_elections.1.o3:0 "Kilgore secures the Nomination."
 texas_elections.1.o4:0 "DeLay secures the Nomination."
 
 texas_elections.2.t:0 "[GetYear] Texan Presidential Election"
 texas_elections.2.d:0 "It's election season once more in the Republic of Texas. Polls have shown that it is the opposite of a tight race, as One Republic consistently dominates the polls. Political opposition has crumbled, with Independent Republican candidate Michael McCaul being resoundingly defeated by One Republic's [TEX.GetLeader], which recieved 87.49% of the vote. Congress also descicivley fell under One Republic, as the party gained a supermajority in both Houses. [TEX.GetLeader], appearing before a stage of supporters, hailed the results as a triumph of Conservative ideology in Texas, toasting to their Party's continued success and pledging to do anything nescacary to protect Texas and Texan values. Allegations of intimidation and fraud have been widespread, with international observers declaring that this election was neither free nor fair."
 texas_elections.2.d_2:0 "It's election season once more in the Republic of Texas. Polls have shown that it is the opposite of a tight race, as incumbent President Oliver North consistently dominates the polls. Political opposition has remained consistent, with the Independent Democratic Candidate Rubén Hinojosa trying to dislodge longtime President North. No candidate ascociated with the Independent Republican Party has stepped up, with much of the IR rank-and-file endorsing Oliver North. North ultimatley prevailed with upwards of 70% of the vote. While Hinojosa has fallen behind previous Democratic candidates, most international observers have declared that minimal evidence of fraud and voter intimidation were found, as North led even among most independent pollsters. The all-Independent Congress has swung towards North's control, however key Opposition parties in competitive races have managed to survive, much to the President's chagrin."
 texas_elections.2.o1:0 "Four more years!"
 
 texas_elections.3.t:0 "[GetYear] Texan Presidential Election"
 texas_elections.3.d:0 "It's election season once more in the Republic of Texas. Polls have shown that it is the opposite of a tight race, as One Republic consistently dominates the polls. Political opposition has crumbled, with Independent Republican candidate Dade Phelan being resoundingly defeated by One Republic's [TEX.GetLeader], which recieved 83.1% of the vote. Congress also descicivley fell under One Republic, as the party gained a supermajority in both Houses. [TEX.GetLeader], appearing before a stage of supporters, hailed the results as a triumph of Conservative ideology in Texas, toasting to their Party's continued success and pledging to do anything nescacary to protect Texas and Texan values. Allegations of intimidation and fraud have been widespread, with international observers declaring that this election was neither free nor fair."
 texas_elections.3.d_2:0 "It's election season once more in the Republic of Texas. Polls have shown that it is the opposite of a tight race. Oliver North's backed candidate, [TEX.GetLeader] has consistently dominated the polls. Our all-Independent system has dispensed the need for Political Parties, and thus all Texan candidates are elected as Independents, with occasional Party backing. In stead of a major candidate from the Democrats or the Independent Republicans, both parties have rallied behind former General Rick Noriega, who was formerly the Democratic candidate in 2009. Noriega has returned to the political scene in hopes of dislodging the One Republic-aligned candidate, seeing North's departure as a prime window to do so. Despite [TEX.GetLeader] holding North's endorsement, they still struggle to hold a torch to the status of Texas' very own 'Savior of the Republic', and many have took North's cold-shoulder towards them in matters of campainging as a green light among Texan voters caught up in the North Cult to vote against his 'preferred' candidate. As the votes are counted, it is clear that Texas' next President will be..."
 texas_elections.3.o1:0 "Four more years!"
 texas_elections.3.o2:0 "[TEX.GetLeader]!"
 texas_elections.3.o3:0 "Rick Noriega!"
 
 texas_elections.5.t:0 "Oliver North's Sucsessor"
 texas_elections.5.d:0 "After serving eight years in office, it's finally time for President [TEX.GetLeader] to retire. With previous attempts to abolish Term Limits having failed, the incumbent President is inelligble to run for a third consecutive term. While in theory the President could take a one term break and return after for years, [TEX.GetLeader] has denied plans to do so, instead stating that they intend to retire to spend more time with their family. With all major political parties dissolved, the next President is not whoever is selected as One Reublic's nominee, but rather whatever candidate manages to score Oliver North's endorsement. The most likely person to be endorsed by North is longtime Vice President Ronny Jackson, who previously served as an admiral in the Texan Navy before being selected by North as his next VP. However some have also rumoured that veteran of the Remnant War and longtime member of the House of Representatives, Dan Crenshaw, may be backed by North instead. After much mulling, President North has finally announced that one candidate has his full backing. Who will that candidate be?"
 texas_elections.5.o1:0 "Ronny Jackson!"
 texas_elections.5.o2:0 "Dan Crenshaw!"
 
 texas_elections.6.t:0 "[GetYear] One Republic National Convention"
 texas_elections.6.d:0 "After serving eight years in office, it's finally time for President [TEX.GetLeader] to retire. With previous attempts to abolish Term Limits having failed, the incumbent President is inelligble to run for a third consecutive term. While in theory the President could take a one term break and return after for years, [TEX.GetLeader] has denied plans to do so, instead stating that they intend to retire to spend more time with their family. In [TEX.GetLeader]'s wake, hardline Texan Nationalist elements have gained control of One Republic, cementing longtime Senator Nate Smith's status as the Party's frontrunner. Appealing to the 'Moderate' wing of the Texan Nationalist caucus, Smith is still a hardline Texan nationalist in his own right. Daniel Miller, an early founder of One Republic who has been sidelined throughout the years, is seeking to make a comeback and claim the mantle once more. Opposing both Miller and Smith is the newly-minted leader of the TNO, Archie Lowe, an ally of Miller who seems like a shoo-in for the VP spot should Miller win, but is attempting to run on his own merits on the off-chance he might win. Finally, moderate Wesley Hunt has run in a campaign with a notable lack of focus on Texan nationalist issues. As the votes are counted, it is clear that One Republic's nominee, and the likely next President is..."
 texas_elections.6.o1:0 "Nate Smith!"
 texas_elections.6.o2:0 "Daniel Miller!"
 texas_elections.6.o3:0 "Archie Lowe!"
 texas_elections.6.o3:0 "Wesley Hunt!"
 
 texas_elections.7.t:0 "[GetYear] Texan Presidential Election"
 texas_elections.7.d:0 "It's election season once more in the Republic of Texas. Polls have shown that it is the opposite of a tight race, as One Republic consistently dominates the polls. Political opposition has crumbled, no major candidate even bothering to step up, leading to One Republic's [TEX.GetLeader] claiming 98.57% of the vote, with only sporadic third-party and write-in campaigns recieving a portion of the vote. Congress also descicivley fell under One Republic, as the party gained a supermajority in both Houses. [TEX.GetLeader], appearing before a stage of supporters, hailed the results as a triumph of Conservative ideology in Texas, toasting to their Party's continued success and pledging to do anything nescacary to protect Texas and Texan values. Allegations of intimidation and fraud have been widespread, with international observers declaring that this election was neither free nor fair."
 texas_elections.7.d_2:0 "It's election season once more in the Republic of Texas. Polls have shown that it is the opposite of a tight race, as incumbent President [TEX.GetLeader] consistently dominates the polls. Political opposition has remained consistent, with the Independent Democratic Candidate Beto O'Rourke trying to dislodge the one-term President. No candidate ascociated with the Independent Republican Party has stepped up, with much of the IR rank-and-file endorsing [TEX.GetLeader]. The President ultimatley prevailed with upwards of 70% of the vote. While O'Rourke has fallen behind previous Democratic candidates, most international observers have declared that minimal evidence of fraud and voter intimidation were found, as [TEX.GetLeader] led even among most independent pollsters. The all-Independent Congress has swung towards the President's control, however key Opposition parties in competitive races have managed to survive, much to the President's chagrin."
 texas_elections.7.d_3:0 "It's election season once more in the Republic of Texas. Ever since President Noriega's shock victory in last election, One Republic-aligned candidates have suffered across the board. Calls for Oliver North to return to the Presidency have fallen on deaf ears, as North's strangely close relationship with President Noriega becomes noteworthy for the Party. Wesley Hunt, a fellow veteran and longtime One Republic supporter has risen as the party's choise of backing next election. Noriega is a strong incumbent, and many predict that the Democratic-backed Independent will be hard to beat. Noriega has dominated most polls, as his tenure, dominated by the undoing of much of North's most authoritarian measures, has been consistently held in high regard among Texans. However Hunt is no one to be underestimated, with a comeback for One Republic decidedly not being out of the question."
 texas_elections.7.o1:0 "Four more years!"
 texas_elections.7.o2:0 "Four more years for Noriega!"
 texas_elections.7.o3:0 "A comeback for One Reublic!"
 
 texas_elections.8.t:0 "Scott Turner Elected ORNC Chair"
 texas_elections.8.d:0 "With their unprecedented defeat in the last election in their rearview, officials from One Republic are seeking to recover and rebuild their Party after a disastrous defeat. In an effort to recover from their losses, the ORNC has cleaned house on many Perry-era officials, breaking notably in selecting Scott Turner, a prominent buisnessman and football player who has been a prominent supporter of One Republic's antics throughout the last ten years. Elected in a landslide, Turner has made history as One Republic's first African-American Chairman, which is notable due to frequent accusations of racism against the Party. Many see Turner's selection as a sign that One Republic is moving in a more moderate direction, and is attempting to reach out to minority voters in an attempt to regain power. However Turner's relationship with Texan Nationalists, a primary part of OR's voter base, remains frosty at best. Going into next election, many see Turner as a primary choice to lead the Party past last year's devestating results, however among those in the Texas Nationalist Organization, a fresh new face that represents Texan patriots is perferable, with Nate Smith seeming like the faction's choice next Presidential Election. As a rift deepens within the remains of One Republic, it has become clear that the Party's candidate in the far-off next election is likely to be..."
 texas_elections.8.o2:0 "Scott Turner!"
 texas_elections.8.o1:0 "Nate Smith!"
   
 texas_elections.9.t:0 "[GetYear] One Republic Leadership Election"
 texas_elections.9.d:0 "One Republic has fallen on tough times. While once they dominated the political scene in our Lone Star Republic, since their bitter loss in the wake of the Remnant war, the Party has found itself unable to reclaim its footing. Attempts at mustering a comeback last election fell flat, and now, many are wondering if One Republic even has a political future. As OR slides increasingly into irrelavence, Party leadership has reached out to an array of esoteric candidates in hopes of getting their message out there. Shockingly, OR consultants have managed to recruit longtime film star and martial arts legend Chuck Norris as the Party's candidate for next election. Norris, widely recognized for his roles in countless low-budget action movies, is perhaps the Republic of Texas' greatest movie star. He is also a fervent supporter of One Republic, warning that Texas would fall into 1000 years of darkness if the Party lost. With OR's abysmal polling numbers, many see Norris as the Party's best hope at regaining political stardom. With most challengers cleared out, it seems that Congressman Wesley Hunt is the only major opposition to Norris in the Primary. Insiders predict Norris' candidacy is a sure thing, having the backing of both One Republic leadership and the voters; however an upset is still possible. As the votes are counted, it is clear that OR's nominee is..."
 texas_elections.9.o2:0 "Chuck Norris!"
 texas_elections.9.o1:0 "Wesley Hunt!"
  
 texas_elections.10.t:0 "Reform Party Dissolved"
 texas_elections.10.d:0 "The Reform Party once took Texas by storm, with the Billionare founder of Perot Systems engaging in a sensational campaign that challenged the norms of the Texan political establishment. While the Reform Party entered the Texan political scene with high hopes, it seems that their day in the limelight has definitvley passed, as Reform definitley failed to recapture the results of their 2005 bid, and has been in a slump ever since. Longtime Party leader Ross Perot has elected to retire from politics and forefit his Presidential ambitions, ruling out running for elected office ever again. Pushing 84, Perot has decided to instead retire with his vast fortune. With Perot's retirement, it has become abundantly clear that he was the only thing keeping the Reform Party relavant. While Pat Choate has attempted to restructure the Party in the wake of Perot's exit, it has become clear that the Reform Party simply has no future. In an internal vote, the Party's National Committee has voted to dissolve, ending the saga of one of Texas' most interesting political organizations. While some have tried to preserve the Party in spirit in a Continuation movement, it is unlikely that a Reform Continuation movement could even break a single percent of the vote. While Reform's dissolusion has caused a great deal of dismay among its loyal support base, who flocked to Perot thanks to his promises of reasonable antiestablishmentarianism, with Perot gone, the heart and soul of the Reform Party has gone with it, and it is unlikely that anyone could have hoped to hold a candle to even Perot's losing performance in the last three elections."
 texas_elections.10.o2:0 "It seems Perot was the only thing keeping Reform together."
   
 texas_elections.11.t:0 "Ross Perot to Retire"
 texas_elections.11.d:0 "Ross Perot has sought the Presidency for the better part of a decade. Out of his three attempts at claiming the Presidency, only in the wake of the Remnant war did Perot manage to be sucsesfull. However thanks to Perot's advanced age, calls for Perot not to run for re-election have been rampant not only within the Reform Party, but among the Texan opposition. Indeed, Perot, at almost 85 years old, is the oldest individual ever elected as President of the Republic of Texas, beating out Lloyd Bentsen, who himself was the subject of much scrutiny due to his advanced age. Perot himself has signalled his willingness to retire, and today, has made it official: he will not be running for a second term, much like Llyod Bentsen back in 1993. Perot's decision to retire has made him just the latest in a long line of Texan Presidents who have made the decision not to seek a consecutive second term. Indeed, so far not a single President in the history of the Second Republic of Texas has been elected to a consecutive Second Term, and Ross Perot is no different. The Reform Party is already preparing to hold a Primary election to succeed Perot as the Party seeks to prove the success of its agenda going into the next Election. However as polls show, whoever does claim the Reform mantle will have a difficult time living up to the legacy of Ross Perot."
 texas_elections.11.o2:0 "Intriguing news."
    
 texas_elections.12.t:0 "[GetYear] Reform Party Presidential Primaries"
 texas_elections.12.d:0 "With Perot electing not to seek a second term, the Reform Party has adjourned to react to the retirement of the Party's star attraction. Already a fleet of Reform-friendly figures have registered in the race to succeed Perot. Two frontrunners have emerged based on early polling. Ross Perot Jr., son of Perot Sr., has been pressured to run in an effort to preserve his father's legacy. Perot Jr. naturally holds his father's endorsement, however many fear that supporting Perot Jr. may be a signal of nepotism within the Reform. While Perot Jr. does enjoy a healthy amount of success independent of his father, some fear that the son of the current President succeeding his father may send a bad message. Pat Choate, the incumbent Vice President, would mostly avoid running into this issue, however as a dull, uncharismatic, and generally not well-known individual, it seems that 'Vice President Who?' isn't a slam-dunk for Reform Party Presidential material. That is why two other Perot-like figures have entered the race: Mark Cuban, and Jeffrey Bezos. Cuban and Bezos are both self-made billionares with long histories of political activism, and it appears that they are both ready to claim the Reform mantle and replicate the sucsess of Perot last election. Cuban is notable as owner of several Texan basketball teams, while Bezos is a notable publishing magnate based in New Mexico. As the votes are counted, it is clear that one of these candidates have secured Reform's nomination for next election..."
 texas_elections.12.o1:0 "Perot Jr.!"
 texas_elections.12.o2:0 "Choate!"
 texas_elections.12.o3:0 "Cuban!"
 texas_elections.12.o4:0 "Bezos!"
         
 texas_elections.12.t:0 "[GetYear] Reform Party Presidential Primaries"
 texas_elections.12.d:0 "As President [TEX.GetLeader]'s tenure in office comes to an end, the Reform Party has adjourned to elect a new leader. With the current President unable to run due to term limits, it appears that this election is truly anybody's game. While in theory [TEX.GetLeader] could run again after a four-year hiatus, they have instead stated that they wish to spend more time in matters of buisness, and will be retiring from politics at the end of their term. Four major frontrunners have emerged. [TEXGetPerotJr]. [TEXGetBezos]. [TEXGetCuban]. Finally, Californian Exile Billonare Tom Steyer, a pioneer in Green Energy initiatives, has officially thrown his hat into the ring. Like Perot, Steyer is a Socially Liberal billionare sick of insider politics and running on a strong anti-Communist campaign, however he suffers from poor name recognition and weariness of against Californian exiles in politics. As the ballots are counted, it is clear that the Reform Party's next leader is..."
 texas_elections.12.d_2:0 "As we recover from our loss in the last election, the Reform Party has adjourned to elect a new leader. Despite a bitter loss, polls still show that Reform remains a strong contender. While the previous President would theoretically be able to reclaim their office, they have instead stated that they wish to spend more time in matters of buisness, and will be retiring from politics, leaving the Reform Party's nomination open. Four major frontrunners have emerged. [TEXGetPerotJr]. [TEXGetBezos]. [TEXGetCuban]. Finally, Californian Exile Billonare Tom Steyer, a pioneer in Green Energy initiatives, has officially thrown his hat into the ring. Like Perot, Steyer is a Socially Liberal billionare sick of insider politics and running on a strong anti-Communist campaign, however he suffers from poor name recognition and weariness of against Californian exiles in politics. As the ballots are counted, it is clear that the Reform Party's next leader is..."
 texas_elections.12.o1:0 "Perot Jr.!"
 texas_elections.12.o2:0 "Choate!"
 texas_elections.12.o3:0 "Cuban!"
 texas_elections.12.o4:0 "Bezos!"
 
 TEX_perot_jr_intro:0 "Ross Perot Jr., son of Reform founder Ross Perot Sr., is seen as a natural option for leadership due to connections to his father. While he chose not to seek the Presidency upon his father's retirement, backers have already been pressuring Perot Jr. to formally announce his candidacy, with most polls showing Perot Jr. being a slam dunk candidate - even if allegations of nepotism have emerged"
 TEX_bezos_intro:0 "Next is prominent publishing magnate Jeffrey Bezos. This bald-headed master of the written-word has been frequently floated as a sucsessor to Perot due to his early support for the Classical Populist movement. As a fellow Socially Liberal Billionare, many see Bezos as uniquely poised to carry the Reform torch - however his frosty relationship with workers has some Reform backers on edge"
 TEX_cuban_intro:0 "Mark Cuban is another candidate who has mulled a run for Reform leadership. A fellow Populist Billionare, the energetic owner of several Texan basketball teams and media platforms sees a unique oppurtunity to shape Texas' future. His character makes him a prime contender, however legal issues and other disputes have threatened to drag his candidacy into the muck before it can even begin"
     
 texas_elections.14.t:0 "[GetYear] Democratic Party Presidential Primaries"
 texas_elections.14.d:0 "In the wake of President Friedman's decision not to seek a second term in office, a variety of other proud Texas Democrats have thrown their ten-gallon hats into the ring as they each seek to succeed the highly-popular President Kinky Friedman. Friedman's decision not to seek a second term is hardly a first in Texan politics. Indeed, not a single Texan President has been re-elected. With Friedman out of politics and Vice President Wendy Davis declining to run, four major candidates have emerged. First is longtime House Speaker and former member of the Rock band Foss Beto O'Rourke, a key political ally of President Friedman, is an early frontrunner. Interestingly, O'Rourke is also the only major figure in the race to currently hold elected office. Following in Friedman's footsteps, popular Tejano Country Musician Bobby Pulido has entered the race, hoping to channel the spirit that first elected Friedman in the first place. Actor Tommy Lee Jones, a longtime Democrat, has also been spurred to join the race for President, in part due to Friedman's sucsesses in the area. He is far from the only actor in this race however, as Woodrow Harrelson, another prominent thesbian, has sought to utilize Friedman's rhetorical style to push the Democrats farther to the left, embracing an ideology detractingly reffered to as 'Brocialism' - a label that Harrelson has since embraced. Who shall win the nomination to be Texas' next President?"
 texas_elections.14.o1:0 "Beto O'Rourke!"
 texas_elections.14.o2:0 "Bobby Pulido!"
 texas_elections.14.o3:0 "Tommy Lee Jones!"
 texas_elections.14.o4:0 "Woody Harrelson!"
      
 texas_elections.15.t:0 "[GetYear] Democratic Party Presidential Primaries"
 texas_elections.15.d:0 "In the wake of President Johnson-Robb's decision not to seek a second term in office, a variety of other proud Texas Democrats have thrown their ten-gallon hats into the ring as they each seek to succeed the highly-popular President Lynda Bird Johnson-Robb. Vice President Lloyd Doggett is seen as the most popular contender for LBJR's sucsessor, having previously served in his House Seat. However concerns about his age have made this race a competitive one, especially due to the entry of Cecile Richards. Richards, as her name would imply, is the daughter of Former President Ann Richards. Like Johnson-Robb, Cecile Richards is familliar to circles of power, due to being the child of a Texan Head of State, however her outspoken pro-Abortion stances have made many Democrats weary of backing her. Senate Majority Leader Eugene Wu, who would become Texas' fist Asian-American President if elected, is also a contender in this race, having an army of endorsements behind him. However due to Wu's prowess in the Senate, none of his endorsements are terribly motivated to get him to the nomination. If no candidate gains a majority, then a compromise candidate may be selected, with Houston Mayor Sylvester Turner's name being floated in such a scenario. Who shall win the nomination to be Texas' next President?"
 texas_elections.15.o1:0 "Llyod Doggett!"
 texas_elections.15.o2:0 "Cecile Richards!"
 texas_elections.15.o3:0 "Eugene Wu!"
 texas_elections.15.o4:0 "Sylvester Turner!"
             
 texas_elections.16.t:0 "[GetYear] Democratic Party Presidential Primaries"
 texas_elections.16.d:0 "Fresh off another loss in the last election, the Texas Democrats have adjourned to lick their wounds and figure out a strategy for the next election. Having not claimed the Presidency since 1993, many Texan Democrats are beginnning to give up hope, even if Party brass is committed to forging on. In terms of major candidates, longtime House Minority Leader and former member of the Rock band Foss Beto O'Rourke is seen as a perfect candidate to appeal to white males. Armed with an insurgent populist campaign, O'Rourke is seen as a strong contender. Running on a more... unorthodox platform is longtime DNC official Marianne Williamson, whose 'Holisitc' approaches to governance have made her the talk of Texas. Her spiritual rhetoric certainly makes her a unique contender, but aside from much 'ironic' support, it seems that Williamson is having trouble finding her political footing. Seeking to challenge both, prominent New Mexico official Bill Richardson is seeking to claim the mantle of first New Mexican to secure the Democratic nomination. Accusations of corruption, however, threaten to sink his campaign before it can even begin. Finally, prominent actor Woody Harrelson has made waves for his 'Red Star' rhetoric, utilizing a unique blend of rhetoric to push the Democrats farther to the left, embracing an ideology detractingly reffered to as 'Brocialism' - a label that Harrelson has since embraced. As the votes are counted, it is clear that the next Democrat nominee will be..."
 texas_elections.16.o1:0 "Beto O'Rourke!"
 texas_elections.16.o2:0 "Marianne Williamson!"
 texas_elections.16.o3:0 "Bill Richardson!"
 texas_elections.16.o4:0 "Woody Harrelson!"
                  
 texas_elections.17.t:0 "[GetYear] Democratic Party Presidential Primaries"
 texas_elections.17.d:0 "With another defeat under their belts, the Texas Democrats have once more adjourned to lick their wounds and figure out a strategy for the next election. Several major candidates seek to hold the torch of the Democratic Party, but only one can weild it. First is Joaquin Castro, identical twin brother of former San Antonio Mayor Julian Castro. Castro's grassroot politics make him a strong contender for the General, however many wonder if his brother's shadow may serve to dominate the campaign. M.J. Heagar, a veteran of the Remnant war turned Senator, has no such issue, and seeks to utilize her military experience to claim the Texan Presidency for the Democrats once more. Challenging both is Colin Allred, a former Representative, relative of former Texas Governor James V Allred, and Football Player who seeks to score a 'Touchdown' as the Texas Democrats' first Black Presidential candidate. All three are strong candidates, however after recent defeats, many are cynical about the prospects of the Party. Perhaps most interestigly of all, actor Matthew McConaughey has been the subject of a wildly-popular 'draft' campaign, seeking to convince the award-winning thesbian to take up the role of President of the Republic. While McConaughey has been non-commital about seeking elected office, most polls show that if he does decide to throw his hat into the ring, he would be a lock for the nomination. As the votes are counted, it is clear that the next Democrat nominee will be..."
 texas_elections.17.d_2:0 "With President [TEX.GetLeader] term limited, the Texas Democrats have once more adjourned to pick their next Presidential candidate. While the President could theoretically take a four-year hiatus and return fresh, they have ruled out any desire to do so, instead opting to retire from politics. Several major candidates seek to hold the torch of the Democratic Party, but only one can weild it. First is Joaquin Castro, identical twin brother of former San Antonio Mayor Julian Castro. Castro's grassroot politics make him a strong contender for the General, however many wonder if his brother's shadow may serve to dominate the campaign. M.J. Heagar, a veteran of the Remnant war turned Senator, has no such issue, and seeks to utilize her military experience to claim the Texan Presidency for the Democrats once more. Challenging both is Colin Allred, a former Representative, relative of former Texas Governor James V Allred, and Football Player who seeks to score a 'Touchdown' as the Texas Democrats' first Black Presidential candidate. Perhaps most interestigly of all, actor Matthew McConaughey has been the subject of a wildly-popular 'draft' campaign, seeking to convince the award-winning thesbian to take up the role of President of the Republic. While McConaughey has been non-commital about seeking elected office, most polls show that if he does decide to throw his hat into the ring, he would be a lock for the nomination. As the votes are counted, it is clear that the next Democrat nominee will be..."
 texas_elections.17.o1:0 "Julian Castro!"
 texas_elections.17.o2:0 "M.J. Heagar!"
 texas_elections.17.o3:0 "Colin Allred!"
 texas_elections.17.o4:0 "Matthew McConaughey!"
                   
 texas_elections.18.t:0 "[GetYear] Democratic Party Presidential Primaries"
 texas_elections.18.d:0 "With another defeat under their belts, the Texas Democrats have once more adjourned to lick their wounds and figure out a strategy for the next election. Several major candidates seek to hold the torch of the Democratic Party, but only one can weild it. First is Joaquin Castro, identical twin brother of former San Antonio Mayor Julian Castro. Castro's grassroot politics make him a strong contender for the General, however many wonder if his brother's shadow may serve to dominate the campaign. M.J. Heagar, a veteran of the Remnant war turned Senator, has no such issue, and seeks to utilize her military experience to claim the Texan Presidency for the Democrats once more. Challenging both is Colin Allred, a former Representative, relative of former Texas Governor James V Allred, and Football Player who seeks to score a 'Touchdown' as the Texas Democrats' first Black Presidential candidate. All three are strong candidates, however after recent defeats, many are cynical about the prospects of the Party. Perhaps most interestigly of all, actor Matthew McConaughey has been the subject of a wildly-popular 'draft' campaign, seeking to convince the award-winning thesbian to take up the role of President of the Republic. While McConaughey has been non-commital about seeking elected office, most polls show that if he does decide to throw his hat into the ring, he would be a lock for the nomination. the votes are counted, it is clear that the next Democrat nominee will be..."
 texas_elections.18.d_2:0 "With President [TEX.GetLeader] term limited, the Texas Democrats have once more adjourned to pick their next Presidential candidate. While the President could theoretically take a four-year hiatus and return fresh, they have ruled out any desire to do so, instead opting to retire from politics. Several major candidates seek to hold the torch of the Democratic Party, but only one can weild it. First is Gina Hinojosa, a former Representative who has become well-known for her efforts to assist victims of human trafficking. While Hinojosa is a string candidate, polls indicate that a lack of name recognition may hamper her run. Next is longtime Senator Al Green, a former President of the Houston NAACP, notable for his fierce resistance against the policies of One Republic during their time in power. Challenging them is fellow Representative Jasmine Crockett, a middle-of-the-road Liberal also known for her combative style. Crockett would become the first Black woman to secure the nomination for a major party if elected, however many see her agressive style as a detriment. Rising to the top of the polls is former teacher James Talarico, a Senator notable for his down-to-earth Progressive policies and abilities to channel his Christian Faith into appeals to traditionally Conservative Texan voters. As the votes are counted, it is clear that the next Democrat nominee will be..."
 texas_elections.18.o1:0 "Gina Hinojosa!"
 texas_elections.18.o2:0 "Al Green!"
 texas_elections.18.o3:0 "Jasmine Crockett!"
 texas_elections.18.o4:0 "James Talarico!"
                    
 texas_elections.19.t:0 "[GetYear] Democratic Party Presidential Primaries"
 texas_elections.19.d:0 "With eight years of the Presidency under his belt, President Woodrow Harrelson's time in office is almost up. While in theory Harrelson could return to office in four years, the President has denied any intention of doing so, instead stating his intention to return to his work in film and on stage. With Harrelson inelligble, the Democratic Party primaries are truly anybody's game, however as it seems, a clear favourite has emerged. Vice President Joseph J. Rogan Jr., one of the pioneers of the 'Brocialist' movement, has emerged as the clear frontrunner, breaking from many of Harrelson's more 'Moderate' positions to support a truly Texan form of Revolutionary Socialism. While several (mostly irrelavent) officials from the Democratic Party have stepped up to challenge him, most polls show Rogan consistently holding a majority of Democratic voters on lock. Rogan, who first entered the public spotlight as a stand-up comic, and later as host of the highly popular television show 'Factor of Fright', would see his career evolve as a radio DJ, emerging as a prominent critic of One Republic and bouncing between Socialism and support for Ron Paul's Libertarian projects. Upon Harrelson's nomination, many Texans were shocked when Harrelson nominated the contreversial Shock Jock radio host as his running mate instead of somebody more familliar with the Texan establishment. Now that Rogan has secured the nomination, it seems like he may very well be Texas' next President, barring a loss in the general."
 texas_elections.19.o1:0 "Interesting news."
 
 ### Peaceout Events ###
 
 texas_peaceout.1.t:0 "Humiliation in Dallas!"
 texas_peaceout.1.d:0 "In what may amount to the most shocking event in 21st Century geopolitical history, the small Republic of Texas has not only managed to fend off the advances of the American Republic's Military, they have managed to drive our forces out from the Dallas Fort-Worth area wholesale! This humiliating defeat for the Republic's military has led many to question the course of the war, and has opened up suggestions for an organized retreat from Texas. This proposal would see the return of the Dallas-Fort Worth area to the Texans, while still keeping control of parts of East Texas. While retreating from any part of Texas is seen as unconscionable by many, ceding Dallas back to the Texans is seen by some as the best opportunity to avoid further embarrassment and territorial loss."
 texas_peaceout.1.o1:0 "Send the Texans our terms."
 texas_peaceout.1.o2:0 "We shall never surrender."
 
 texas_peaceout.2.t:0 "Atlanta Humbled"
 texas_peaceout.2.d:0 "In what may amount to the most shocking event in 21st Century geopolitical history, our small yet proud Texan military force has not only managed to fend off the advances of the American Republic's Military, they have managed to drive our forces out from the Dallas Fort-Worth area wholesale! This humiliating defeat for the Republic's military has led many in Atlanta to question the course of the war, opening up suggestions for an organized retreat from Texas. Their proposal would see the Dallas-Fort Worth area returned to the Republic of Texas, while the remainder of Occupied East Texas would remain in the American Republic. This settlement is more than amicable to those who expected our Republic's destruction on the eve of war, but is unacceptable to those who refuse to sleep until Texas is fully reunited."
 texas_peaceout.2.o1:0 "Very well then."
 texas_peaceout.2.o2:0 "The guns shall not fall silent until Texas is reunited!"
 
 texas_peaceout.3.t:0 "Humiliation in Texas!"
 texas_peaceout.3.d:0 "In what may amount to the most shocking event in 21st Century geopolitical history, the small Republic of Texas has not only managed to fend off the advances of the American Republic's Military, they have managed to completely erase our gains in East Texas and 'Reunite' their nation wholesale! This humiliating defeat for the Republic's military has led many to question the course of the war, and has opened up suggestions for an organized retreat from Texas. Those who support ending the war state that removing our troops from East Texas is our best opportunity to avoid further humiliation, and would prevent further Texan incursions into the Republic's territory. A period of peace would also give our military time to lick its wounds and better organize next time around. However there are those who refuse beyond all measure to make peace with the Texans, insisting this war can still be won."
 texas_peaceout.3.o1:0 "Send the Texans our terms."
 texas_peaceout.3.o2:0 "We shall never surrender."
 
 texas_peaceout.4.t:0 "Atlanta Humbled"
 texas_peaceout.4.d:0 "In what may amount to the most shocking event in 21st Century geopolitical history, our small yet proud Texan military force has not only managed to fend off the advances of the American Republic's Military, they have managed to drive our forces out from Occupied Texas wholesale! This humiliating defeat for the Republic's military has led many in Atlanta to question the course of the war, opening up suggestions for an organized retreat from Texas. Their humbled leadership has acknowledged their shocking defeat, and are preparing to remove their troops from the entirety of East Texas, re-uniting our nation under the Lone Star Banner once more. While there is no shortage of joy in the High Command over this news, there are still a handful of revenge-minded generals who refuse to let the guns fall silent so long as the War Criminals in Atlanta continue to rule."
 texas_peaceout.4.o1:0 "Very well then."
 texas_peaceout.4.o2:0 "We shall not rest until we capture Atlanta!"
  
 texas_peaceout.5.t:0 "American Forces Retreat"
 texas_peaceout.5.d:0 "What was once thought to be a quick campaign has turned into a bloodbath on both sides of the Texan border. The Texians have proven far more formidable than the CIA had predicted, with the Government in Austin managing to put up an impressive defence against the forces of the American Republic. With the bodies piling up, morale at an all-time low, and a desire present within the Military branch to save our soldiers for a more winnable conflict, as well as a desire from the President to wriggle out from the PR catastrophe that has been the Texan war, a mutual decision has been made to retreat from Texas wholesale. Texas' 'victory' stands as the most shocking geopolitical development of the 21st Century, with the entire world standing awestruck at Texas' fortitude in resisting the forces of the American Republic. In Texas, the feeling is one of jubilation, as at last the most devastating war ever to have taken place on their soil comes to an end. The American Republic, despite not losing any territory, has been faced with untold humilation..."
 texas_peaceout.5.o1:0 "It must be done."
   
 texas_peaceout.6.t:0 "American Forces Retreat"
 texas_peaceout.6.d:0 "What was once thought to be a quick campaign has turned into a bloodbath on both sides of the Texan border. Us Texians have proven far more formidable than the CIA had predicted, with our proud Texan soldiers managing to put up a truly impressive defence against the forces of the American Republic. With the bodies piling up, morale at an all-time low, and a desire present within the AR's Military branch to save their soldiers for a more winnable conflict, as well as a desire from President [USA.GetLeader] to wriggle out from the PR catastrophe that has been the Texan war, a mutual decision has been made to retreat from Texas wholesale. Our victory stands as the most shocking geopolitical development of the 21st Century, with the entire world standing awestruck at Texas' fortitude in resisting the forces of the American Republic. In Texas, the feeling is one of jubilation, as at last the most devastating war ever to have taken place on our soil comes to an end. While we have not reclaimed our lost territory, the American Republic has still been faced with untold humilation..."
 texas_peaceout.6.o1:0 "God Bless you Texas, and Keep you Brave and Strong!"

 texas_peaceout.7.t:0 "Collapse of the Republican Military"
 texas_peaceout.7.d:0 "Despite losing first Dallas, and then the entirety of East Texas, our commanders have remained resolute in our confidence that a victory over the Texans was within our grasp. We were wrong. It appears that our confidence was indeed misplaced. Dallas was not reclaimed. Texas was not defeated. And now, the Texans have not only driven us from our foothold in East Texas, they have cut us off from the Western front entirely. Oklahoma has been occupied by the Texans, something which has caused no shortage of shock and dismay within both the Military and those loyal citizens of the Sooner state, who prefer death over Texian occupation. The loss of Oklahoma has set off a red alert panic within the Military. Members of the Brass, determined to stop more death and destruction, have threatened the President with a Military Coup if they don't make peace with the Texans. After a long period of silence from the President, it seems that they have agreed, putting to rest any suspicions that they had committed suicide. Texas stands victorious, not only retaking the entirety of East Texas, but taking the Great State of Oklahoma as well."
 texas_peaceout.7.o1:0 "Christ..."

 texas_peaceout.8.t:0 "Collapse of the Republican Military"
 texas_peaceout.8.d:0 "Despite losing first Dallas, and then the entirety of East Texas, Republican commanders have remained resolute in their confidence that a victory over the Texans was within their grasp. They were wrong. It appears that their confidence was indeed misplaced. Dallas was not reclaimed. Texas was not defeated. And now, we have not only driven the Remnants from their foothold in illegally-occupied East Texas, we have cut them off from their Western front entirely. Following the Liberation of East Texas, Oklahoma has been conquered, something which has caused no shortage of shock and dismay within both the Military and those rebellious citizens of the Sooner state, who prefer death over Texian occupation. The loss of Oklahoma has set off a red alert panic within Atlanta's Military. Members of the Brass, determined to stop more death and destruction, have threatened President [USA.GetLeader] with a Military Coup if they don't make peace with us. After a long period of silence from the President, it seems that they have agreed, putting to rest any suspicions that they had committed suicide. Texas stands victorious, not only retaking the entirety of East Texas, but taking with us the Great State of Oklahoma as well."
 texas_peaceout.8.o1:0 "A victory beyond our wildest dreams."

 texas_peaceout.9.t:0 "Texas Conquered"
 texas_peaceout.9.d:0 "The Texans could have never hoped to stand up to the brave forces of the American Republic. First fell Dallas in 1987. The rest of the job has been completed in [GetYear]. Despite the fervour of the Texans, despite the International Community denouncing our actions, despite the claims that the 'Second Republic' is the only legal successor state in the post-United States due to their previous independent status, it seems that we have managed to beat the delusions of Texian independence into the dirt. The fall of the most fervently independent of the Post-American Republics is a grim reminder to the rest of the post-US nations. If Texas, the country widely considered to be the most fiercely independent, the one with the least cultural links to old America, and the one with the most legitimacy among its populace, then truly none of the post-American nations are safe. The Governments of the rest of the American experiments remain restless, as America seems to be inching towards a final conflict to decide the ultimate fate of the American Dream. However despite our victory, not all is well within Texas, as loyal partisans, as well as Texas Ranger cells deep within our Republic, utilizing our cultural similarities to move undetected, still continue to wreak havoc on American infrastructure and morale."
 texas_peaceout.9.o1:0 "We shall reclaim America once more."

 texas_peaceout.10.t:0 "The Guns Fall Silent"
 texas_peaceout.10.d:0 "The most stunning reversal of fortune of the 21st Century has just unfolded before our very eyes. Despite the apparent superiority of the American Republic's Military, Texas has managed to fend off Atlanta's forces for the time being. The hasty ceasefire, formally signed by representatives from both the Republic and Texas earlier today, returns the fraught diplomatic status of our two nations back to the pre-2011 status quo. However as this horrid war may have come to an end, we must begin the long, painful process of rebuilding and recovery. President [TEX.GetLeader] has spoken to a jubilant nation to celebrate Texas' moment of triumph. Yet as Texans celebrate, a dark truth hovers over our nation, the truth that Texas may never more be the same due to the horrors we have endured. Indeed, we may not be out of the rough yet, as the Remnants still lurk across the border, plotting, waiting for their opportunity to strike again. And even as we celebrate this new era of peace, reminders that Texas remains a deeply divided nation, mired by problems such as Corruption, Terrorism, and Political Polarisation, have resurfaced as we move forward into the post-War dawn."
 texas_peaceout.10.o1:0 "The Lone Star Still Stands."
 
 ### Diplo Events ###

 texas_diplo.1.t:0 "Status of our Mexican Claims"
 texas_diplo.1.d:0 "The end of the Remnant war has at long allowed Texas to look southwards. As all Texans know, Mexico illegally occupied Southern Texas in the wake of the Collapse of the United States, citing widespread riots and the 'Oppression of Hispanic Texans' as a casus belli. The 1989 Mexican Occupation of Southern Texas has long been a scar on our nation, and it appears that the President is finally readying the nation to retake Southern Texas. However in addition to South Texas, Mexico also took part of New Mexico, occupying territories on the Western Bank of the Rio Grande shortly before Texas annexed New Mexico. Due to the fact that this territory was occupied before New Mexico was annexed by Texas, we have no formal claims on the area - even if many view the entirety of New Mexico as rightful Texan territory. This has left us with two options in the matter. Demand the entirety of 'Lost Texas' including the territories of 'Nueva Mexico', or we can focus our negotiations with Mexico on Southern Texas. What shall the President and the delegation to Mexico decide?"
 texas_diplo.1.o1:0 "All illegally-occupied lands by Mexico shall be returned."
 texas_diplo.1.o2:0 "Our concern is South Texas."
 
 texas_diplo.2.t:0 "Texas Demands South Texas"
 texas_diplo.2.d:0 "Texas has demanded the return of their 'Rightful' lands in South Texas, declaring that our occupation of this territory in 1989 violated international law and formally requesting the return of this land. Ever since 1989, South Texas has remained a boondoggle for the Mexican Government, with the war being widely recognized as a PR stunt by the PRI government to avoid Electoral wipeout. Ever since, constant resistance and lawlessness in the American territories has been a consistent thorn in our side, as law enforcement struggles to enforce Mexican sovereignty in the area. While Texas claims that they have done work to improve relations between the Government and Hispanic Communities in the wake of 1989's widespread race riots, these claims have naturally come under scrutiny by figures in Mexico City who believe that the Hispanic Community in Texas is still being oppressed by the Government in Austin - with our invasion in '89 only making things worse. With the final decision in the air, many are declaring that South Texas has become rightful Mexican territory in the 20 years of occupation, however with the prospect of war with Texas on the horizon, others are willing to return this territory to Texas as a means to prevent conflict and cut this weight loose."
 texas_diplo.2.d_2:0 "In the wake of our refusal to part with the entirety of our post-American gains, Texas has sent a counter-offer which would only see us forfeit South Texas. Ever since 1989, South Texas has remained a boondoggle for the Mexican Government, with the war being widely recognized as a PR stunt by the PRI government to avoid Electoral wipeout. Ever since, constant resistance and lawlessness in the American territories has been a consistent thorn in our side, as law enforcement struggles to enforce Mexican sovereignty in the area. While Texas claims that they have done work to improve relations between the Government and Hispanic Communities in the wake of 1989's widespread race riots, these claims have naturally come under scrutiny by figures in Mexico City who believe that the Hispanic Community in Texas is still being oppressed by the Government in Austin - with our invasion in '89 only making things worse. With the final decision in the air, many are declaring that South Texas has become rightful Mexican territory in the 20 years of occupation, however with the prospect of war with Texas on the horizon, others are willing to return this territory to Texas as a means to prevent conflict and cut this weight loose."
 texas_diplo.2.o1:0 "Give the Texans what they want."
 texas_diplo.2.o2:0 "This is still rightful Mexican land."
  
 texas_diplo.3.t:0 "Mexico Returns South Texas"
 texas_diplo.3.d:0 "While our hopes for a peaceful resolution to the South Texas Crisis have always been low, it appears that the Mexicans have surprised us with a willingness to return illegally-occupied South Texas to our control. In a formal ceremony, Mexican President [MEX.GetLeader] formally declared that South Texas would be returned to Texas, declaring that the 20-year long occupation a boondoggle and promising a smooth transition back to Texan rule. With the area under loose-at-best control by Mexican law enforcement and near constant harassment by Texan Partisans, it has become clear that South Texas has become more trouble than it's worth from a Mexican perspective, with the 1989 war only coming about as a means to boost PRI popularity with a military campaign to expand Texan borders in the aftermath of the breakup of the United States - a campaign which successive Mexican Governments have been paying for in the 20 years since. While dismay has spread across Mexico about the loss of 'Rightful Mexican Territory', it seems that many within Mexico are relieved to no longer have to deal with South Texas' problems. Already Mexican troops are leaving, and flags are being changed from the Mexican Tricolour to Texas' Lone Star, as the area prepares for a return to Texan sovereignty."
 texas_diplo.3.o1:0 "Wonderful news."
   
 texas_diplo.4.t:0 "Mexico Refuses"
 texas_diplo.4.d:0 "[TEX.GetLeader] has just gotten off a phone call with their Mexican counterpart. To the unsurprise of the delegation and the Texan nation, Mexico has refused to peacefully part with their illegally-occupied lands in South Texas. Now, the Texan Army is readying for war as we prepare to reclaim this territory for the Lone Star. The fact remains that we cannot allow Texas to remain divided - we cannot allow communities such as Laredo and Corpus Christi to languish under Mexico's jackboot. If Mexico City is not willing to return Texan Territory peacefully, then war is the only option. In a speech to the nation, [TEX.GetLeader] has declared that the day has come to undo the illegal Mexican occupation of South Texas, stating that a campaign of Liberation of rightful Texan territory shall begin shortly as we work to banish the Mexican invaders from our lands. Mexico has chosen to reject any common sense in refusing to return South Texas, choosing to fight a bloody war over territory that many within Mexico have indicated that they don't even want. With our generous offer to allow Mexico to keep West New Mexico now dead in the water, it seems that war is truly inevitable."
 texas_diplo.4.o1:0 "Violence is the only option."
 
 texas_diplo.5.t:0 "Texas Demands American Lands"
 texas_diplo.5.d:0 "Texas has demanded the return of their 'Rightful' lands in South Texas and Western New Mexico, declaring that our occupation of this territory in the late 80's violated international law and formally requesting the return of this land. Ever since 1989, the American Territories have remained a boondoggle for the Mexican Government, with the war being widely recognized as a PR stunt by the PRI government to avoid Electoral wipeout. Ever since, constant resistance and lawlessness in the American territories has been a consistent thorn in our side, as law enforcement struggles to enforce Mexican sovereignty in the area. While Texas claims that they have done work to improve relations between the Government and Hispanic Communities in the wake of 1989's widespread race riots, these claims have naturally come under scrutiny by figures in Mexico City who believe that the Hispanic Community in Texas is still being oppressed by the Government in Austin - with our invasion in '89 only making things worse. With the final decision in the air, many are declaring that South Texas has become rightful Mexican territory in the 20 years of occupation, however with the prospect of war with Texas on the horizon, others are willing to return this territory to Texas as a means to prevent conflict and cut this weight loose."
 texas_diplo.5.o1:0 "Give the Texans what they want."
 texas_diplo.5.o2:0 "This is still rightful Mexican land."
 texas_diplo.5.o3:0 "They can have South Texas, but Nueva Mexico is ours."
  
 texas_diplo.6.t:0 "Mexico Returns 'Lost Texas'"
 texas_diplo.6.d:0 "While our hopes for a peaceful resolution to the South Texas Crisis have always been low, it appears that the Mexicans have surprised us with a willingness to return not just illegally-occupied South Texas to our control, but the entirety of Mexico's territory in the post-United States. In a formal ceremony, Mexican President [MEX.GetLeader] formally declared that South Texas and West New Mexico would be returned to Texas, declaring that the 20-year long occupation a boondoggle and promising a smooth transition back to Texan rule. With the area under loose-at-best control by Mexican law enforcement and near constant harassment by Texan Partisans, it has become clear that South Texas has become more trouble than it's worth from a Mexican perspective, with the 1989 war only coming about as a means to boost PRI popularity with a military campaign to expand Texan borders in the aftermath of the breakup of the United States - a campaign which successive Mexican Governments have been paying for in the 20 years since. While dismay has spread across Mexico about the loss of 'Rightful Mexican Territory', it seems that many within Mexico are relieved to no longer have to deal with South Texas' problems. Already Mexican troops are leaving, and flags are being changed from the Mexican Tricolour to Texas' Lone Star, as the area prepares for a return to Texan sovereignty."
 texas_diplo.3.o1:0 "Wonderful news."
   
 texas_diplo.7.t:0 "Mexico Refuses"
 texas_diplo.7.d:0 "[TEX.GetLeader] has just gotten off a phone call with their Mexican counterpart. To the unsurprise of the delegation and the Texan nation, Mexico has refused to peacefully part with their illegally-occupied lands in South Texas and New Mexico. Now, the Texan Army is readying for war as we prepare to reclaim this territory for the Lone Star. The fact remains that we cannot allow Texas to remain divided - we cannot allow communities such as Laredo and Corpus Christi to languish under Mexico's jackboot. If Mexico City is not willing to return Texan Territory peacefully, then war is the only option. However while peace seems dead for the moment, others have cautioned the President not to be so hasty. A counter-offer is already being drafted, an offer which would see Mexico leave South Texas but remain in control of West New Mexico. This offer would see us formally renounce any claim to West New Mexico, allowing Mexico to still remain in control of some of their post-American gains while also returning South Texas to us. Shall we send this counter-offer to Mexico City, or is violence the only option to solve this problem?"
 texas_diplo.7.o1:0 "Violence is the only option."
 texas_diplo.7.o2:0 "Settle for South Texas."
    
 texas_diplo.8.t:0 "The Mexican Counter-Offer"
 texas_diplo.8.d:0 "Mexico has refused to return the entirety of Mexico's territories in the Post-United States to us, however they have offered to return simply South Texas to our rule. As it appears, Mexico is tired of dealing with lawlessness and Texan resistance in the American territories - however it also isn't willing to lose the entirety of the nation's post-1987 territorial gains. This compromise is seen as a balance between practicality and national pride for both parties. While some within Mexico City bemoan the loss of their so-called 'Rightful Territory, and many within Texas' wish to see the entirety of New Mexico under Texan control, it seems that we are amicable to a compromise that returns the entirety of Texas to Texan rule, while allowing the parts of New Mexico to remain with Mexico. Considering we have never formally maintained a claim to West New Mexico, most are ecstatic at the prospect, while others remain committed to driving Mexico from the entirety of the once-United States. The President is reportedly thrilled with this compromise and is ready to accept, even if the most jingoistic amongst the Delegation team are ready to declare that this generous compromise isn't good enough. The final decision lies with [TEX.GetLeader]..."
 texas_diplo.8.o1:0 "Good enough for us."
 texas_diplo.8.o2:0 "We must reclaim *all* Texan lands."
     
 texas_diplo.9.t:0 "A Victory for Texas!"
 texas_diplo.9.d:0 "Tragedy has struck our nation once more. The Texians have captured the American territories in New Mexico and Southern Texas, territories the Government in Austin has long claimed were rightfully theirs and under 'Illegal Occupation' post-1987. Our Government refused to advance further into Texas after the Battle of San Antonio as the Texan war quickly became a political boondoggle - and with our Yanqui lands lost, many are clamouring to retreat from these lands for many of the same reasons. While Mexicans still answer Jingo's call to avenge Santa Anna, it seems that continuing our campaign against the Texans is a losing cause both militarily and politically. No amount of desire for revenge against 1836 can make up for a populace tired of the weight of our territory in the Former United States - the astronomical cost for little benefit, and as it seems, the people of Mexico are at last ready for peace between us and the Texans, and for us to at last end our reckless adventurism in the Yanqui lands."
 texas_diplo.9.o1:0 "Send the Texans a call, we shall have peace."
 texas_diplo.9.o2:0 "Never, we shall march to San Antonio and torch the Alamo!"
      
 texas_diplo.10.t:0 "Another Mexican Surrender"
 texas_diplo.10.d:0 "Just like the Texan Revolution in 1836, Mexico has decided to send us their terms for the surrender of their illegally-occupied territories in the Former United States. Mexico, which has long grown to view their territories in the Former United States as an expensive boondoggle, has declined to put up too much of a fight for their territories, despite much of the population viewing those territories as 'Rightful Mexican Territory'. [TEX.GetLeader] has meet with their counterparts in Mexico City to sign a comprehensive Peace agreement that ceases hostilities with Mexico City and formally returns South Texas and East New Mexico to Texan control. Spontaneous celebrations have broken out on the streets of both Texas and the Mexican-occupied territories as both Texans and those languishing under the Mexican jackboot welcome the return of Texan lands. Just like Sam Houston did all those years ago, [TEX.GetLeader] has freed Texas from Mexican oppression."
 texas_diplo.10.o1:0 "Texas 2, Mexico 1."
       
 texas_diplo.11.t:0 "Texas Requests the Return of East Texas"
 texas_diplo.11.d:0 "Now that Texas is under our influence, the Texan Government has come to us with the prospect of returning their 'rightful territory' in East Texas to their rule. While we have put the return of East Texas on the table to entice the Texans to our side. Now, they are calling on us to fulfill our promises. However many are weary about surrendering territory that has been part of our nation for more than 20 years. What shall we do?"
 texas_diplo.11.o1:0 "Return this land to Texas."
 texas_diplo.11.o2:0 "We'll hand it over, for their part of New Mexico."
 texas_diplo.11.o3:0 "We'll hand over Dallas, for their part of New Mexico."
 texas_diplo.11.o4:0 "Returning Dallas is a reasonable compromise."
 texas_diplo.11.o5:0 "We refuse to part with a single inch."
        
 texas_diplo.12.t:0 "The Americans Accept"
 texas_diplo.12.d:0 "The Americans, much to our delight, have signalled a willingness to return their portion of Occupied Texas to Texan control. Already the agreement is being formalized, and East Texas is once more under the banner of the Lone Star - all without so much as a shot fired. This is truly a blessed day of Texas, and has gone to show all within our Republic the benefits of collaboration."
 texas_diplo.12.o1:0 "We accept."
 texas_diplo.12.o2:0 "We refuse."
         
 texas_diplo.13.t:0 "The American Counter-Proposal"
 texas_diplo.13.d:0 "The Americans, despite taking the prospect of returning the entirety of East Texas, have signalled a willingness to return a portion to Occupied Texas to Texan control. However their agreement does not come without stipulations, as in exchange for returning East Texas, they demand that our portion of New Mexico - which was annexed by us after the New Mexico War, be returned to [USA.GetNameDef] - in the interest of restoring Texas' 'Natural Borders'. What shall our response to this offer be?"
 texas_diplo.13.o1:0 "Better than nothing."
          
 texas_diplo.14.t:0 "The American Counter-Proposal"
 texas_diplo.14.d:0 "The Americans, much to our delight, have signalled a willingness to return part of Occupied Texas to Texan control. However their agreement does not come without stipulations, as in exchange for returning Dallas, they demand that our portion of New Mexico - which was annexed by us after the New Mexico War, be returned to [USA.GetNameDef] - in the interest of an equivalent exchange of territory. What shall our response to this offer be?"
 texas_diplo.14.o1:0 "Better than nothing."
           
 texas_diplo.15.t:0 "The American Counter-Proposal"
 texas_diplo.15.d:0 "While the Americans have proven unwilling to return the entirety of Occupied East Texas to Austin's rule, they have also let us down easy by offering a compromise which would see the Dallas-Fort Worth area returned to Texan Control. This is an acceptable compromise to most, and despite the fact that some are willing to turn this offer down out of spite, the President is reportedly willing to accept this bargain."
 texas_diplo.15.o1:0 "Better than nothing."
 
 texas_diplo.16.t:0 "Texas Requests the Return of Dallas"
 texas_diplo.16.d:0 "Although we have put the return of East Texas on the table to entice the Texans to our side, it seems that both sides are unwilling to commit fully to returning the territory to Texan rule. However the Texans are determined not to go home empty-handed, and have humbly requested the Dallas-Fort Worth Area be returned to Texan control. What shall we do?"
 texas_diplo.16.o1:0 "Return this land to Texas."
 texas_diplo.16.o2:0 "We'll hand it over, for their part of New Mexico."
 texas_diplo.11.o3:0 "We refuse to part with a single inch."
 
 texas_diplo.17.t:0 "The Americans Accept"
 texas_diplo.17.d:0 "The Americans have chosen to accept our request for a return of the Dallas-Fort Worth area to Texan rule. As it seems, the Americans are more than willing to play ball thanks to our unending loyalty and pragmatism in dealing with the matter of East Texas. Now, Dallas shall finally return to Texan control, after almost 20 years of American Occupation. This is a day to celebrate the triumph of peace and diplomacy."
 texas_diplo.17.o1:0 "Loyalty has its benefits."
 
 texas_diplo.18.t:0 "The American Counter-Proposal"
 texas_diplo.18.d:0 "The Americans, much to our delight, have signalled a willingness to return part of Occupied Texas to Texan control. However their agreement does not come without stipulations, as in exchange for returning Dallas, they demand that our portion of New Mexico - which was annexed by us after the New Mexico War, be returned to [USA.GetNameDef] - in the interest of an equivalent exchange of territory. What shall our response to this offer be?"
 texas_diplo.18.o1:0 "Better than nothing."
 
 texas_diplo.19.t:0 "The Americans Refuse"
 texas_diplo.19.d:0 "Much to our fury, the Americans have proven entirely unwilling to return even a single inch of Occupied East Texas to us. Despite our willingness to collaborate with the Atlantan Government, [USA.GetNameDef] has still refused to hold up their end of the bargain, and will continue to occupy East Texas. This is a dark day, and has made many within the Government seriously reconsider the benefits of Collaboration."
 texas_diplo.19.o1:0 "Bastards!"
        
 ### Flavour Events ###

 texas_flavour.1.t:0 "The 2010 Stanley Cup"
 texas_flavour.1.d_2:0 "Sports has played a beloved role in Texan culture since time immemorial. From the crack of a baseball bat to the rush of a touchdown, there is no shortage of thrills to be felt in the Lone Star Republic's sporting events. Hockey, while typically taking a distant third place in popularity compared to Baseball and New World Football, has been steadily rising in popularity as of late. First gaining an NHL team when the Edmonton Oilers relocated to Houston in 1997, recent developments including the increasing popularity of amateur and youth hockey has raised awareness of the sport, in spite of our warm-weather climate. This year, the Houston Oilers came closer than ever before to snatching the Stanley Cup, making their way to the finals after defeating the Carolina Hurricanes in game 1, a great patriotic victory for the Texan people against a Remnant team. However, our hopes were tragically dashed when our team was defeated by the Minnesota North Stars in game 2, who themselves went on to be defeated by the Arizona Coyotes in game 3. The Coyotes, who ultimately won the cup, have the honor of being the first American team in more than 20 years to walk away with the Stanley Cup. While we are still disappointed that the Oilers didn't manage to win it themselves, many are grateful that the Canadians have finally lost the cup ."
 texas_flavour.1.d:0 "Sports has played a beloved role in Texan culture since time immemorial. From the crack of a baseball bat to the rush of a touchdown, there is no shortage of thrills to be felt in the Lone Star Republic's sporting events. Hockey, while typically taking a distant third place in popularity compared to Baseball and New World Football, has been steadily rising in popularity as of late. First gaining an NHL team when the Edmonton Oilers relocated to Houston in 1997, recent developments including the increasing popularity of amateur and youth hockey has raised awareness of the sport, in spite of our warm-weather climate. This year, the Houston Oilers came closer than ever before to snatching the Stanley Cup, making their way to the finals after defeating the Carolina Hurricanes in game 1, a great patriotic victory for the Texan people against a Remnant team. However, our hopes were tragically dashed when our team was defeated by the Minnesota North Stars in game 2, who themselves went on to be defeated by the Arizona Coyotes in game 3. While the Canadians still walked away with the Cup, defending their almost 20 year long winning streak, our placement in the cup finals, combined with Arizona's near-victory, has reinvigorated interest in the sport in our warm-weather climate."
 texas_flavour.1.o1:0 "Maybe we'll get them next year..."
 texas_flavour.1.o2:0 "At least somebody beat the Canucks."

 texas_flavour.2.t:0 "One Minute to Midnight"
 texas_flavour.2.d:0 "Many had hoped that the end of the Cold War would lead to a new era of peace and prosperity worldwide. In a sense, these optimists were correct... for a time. The Bulletin of the Atomic Scientists have moved the Doomsday Clock back seven hours in 1992, during a period known as the 'Great Lull' in the aftermath of the Collapse of the United States - when the borders in America consolidated and armed conflict internationally became rare. At 11:43, this was the furthest from Midnight it's ever been. The hope many for a world devoid of armed conflict could never last. Today, the Bulletin of the Atomic Scientists has made their most shocking announcement today. While the Clock has gradually moved up since 1992, the latest moving of the clock has been the largest single-year jump ever recorded. Citing the explosion in armed conflict, the wars in Libya, Yemen, and Iberia, the heightened tensions between the Democratic League and the Warsaw Pact, and the assassination of several notable political figures such as Soviet Premier Dimitry Yazov and British Prime Minister David Owen, the Bulletin has moved the Doomsday Clock to 60 seconds to Midnight. However the geopolitical subject in which the bulletin spoke most worriedly about was the conflicts brewing in the Post-United States. From the conflict in Cascadia, to the 5/1 attacks, to the growing hostilities between the American Republic and Texas, it appears the fragile peace gained in America following the 'Great Lull' is degrading before our very eyes. The destructive potential held within the borders of what was once the USA is immeasurable, and as America inches towards a final battle to decide its destiny, it seems that the conditions that existed during the Cold War may very well find themselves repeating; however this time, we may not be so lucky as to avoid nuclear annihilation..."
 texas_flavour.2.o1:0 "Worrying."
 
 ### News Events ###
 
 texas_news.1.t:0 "Terror in San Antonio"
 texas_news.1.d:0 "Residents of the Texan City of San Antonio woke up to the deafening sounds of explosions and emergency sirens and the smell of smoke as the neo-Nazi terrorist organization known as the 'Hammerskins' conducted a terrorist attack on the I-37 Interstate Highway. Trucks manned by members of the terrorist organizations were parked on two ends of I-37 during the height of rush hour on St. Patrick's Day. These trucks were stuffed to the gills with high explosives, and collectively created a blast wave which spanned over two hundred feet in diameter, and instantly killed more than 100 people. After the two bombs were detonated, a large section of I-37 collapsed, killing almost 50 more. Texas, already reeling from previous terrorist activity, is predicted to issue a harsher crackdown on groups seeking to re-unify with the American Republic to the east. Atlanta has officially denied any involvement in the attack, however prominent intelligence reports suggest that the CIA had knowledge of the attack forehand. If true, this would seriously damage the already fragile relationship between Texas and the American Republic."
 texas_news.1.o1:0 "Horrific."
  
 texas_news.2.t:0 "The Scarlet Dossier"
 texas_news.2.d:0 "The Republic of Texas, already shocked by the horrific attack on San Antonio by neo-Nazi groups, has once more been shaken to the core by news that the attack could have been prevented. Allegations released by officials in Texas' intelligence agency suggest that key information about the targets of the March 17th attack was ignored by President Perry, who instead chose to protect targets of cultural significance instead of vital infrastructure. Even as clues about the true source of the Hammerskin attack amassed, Perry still refused to change his decision, leading many to accuse Perry of indirectly contributing to the scale of the attack. Perry has denied such claims, and has stated that the attack on the I-37 was completely unforeseen. News of the so-called 'Scarlet Dossier' was broken by influential CTV broadcaster Alex Jones, who was contacted by prominent figures in the Texan Central Security Service who claim that they were pressured to keep quiet by the Perry Administration. "
 texas_news.2.o1:0 "Interesting."
  
 texas_news.3.t:0 "Texan Senate Attack"
 texas_news.3.d:0 "Texas, long plagued by terrorist threats and political dissent, has today been hit with its most devastating attack yet. The Texan Senate, who gathered to discuss a path forward after the recent Austin Riots, was hit by three separate concealed explosive devices, leading to the deaths of almost 50 Texas lawmakers and Congressional staff. While it is not yet clear who is responsible for the attack, most Texans strongly suspect Remnant forces planted the bombs during the chaos of the recent Austin Riots, slipping through security while they were busy dealing with nearby demonstrators. President Perry, who was in attendance when the explosion occurred, managed to escape with only minor injuries; Vice-President David Dewhurst however was not so lucky. In the wake of this attack, [USA.GetLeader] has blamed anti-Perry activists, and has stated that this is 'more evidence of Texas' inherent instability', before suggesting military intervention in Texas to keep stability. Already satellite imagery shows an unprecedented movement of Remnant troops to positions near the Texan border, further fueling worries of armed conflict in the region."
 texas_news.3.o1:0 "The Remnants are on the Move."
   
 texas_news.4.t:0 "Rick Perry Flees"
 texas_news.4.d:0 "As tensions with the Remnants and their Texan neighbors come to a crescendo, longtime President Rick Perry has decided to simply flee the nation instead of leading the Texan nation into a faceoff with their neighbors to the East. In the middle of the night, a flight took off from Austin–Bergstrom International Airport containing President Perry, several of his closest advisors, almost 20 million dollars worth of government funds and countless important documents. The reactions to Perry's flight are almost universal in their disdain, as both Texan citizens and Remnant agitators decry Perry as a coward. With Perry's departure, newly-inaugurated Vice-President Oliver North, a former soldier and National Security Advisor has been sworn in as President. In his first address, North invoked the defenders of the Alamo in his promise to fight the American Republic to the last soldier."
 texas_news.4.o1:0 "Coward."
 
 texas_news.5.t:0 "Perry Defies the Republic"
 texas_news.5.d:0 "'Citizens of the Second Republic of Texas, I address you with a burdened conscience and a heavy heart. Days ago, the American Republic has claimed that the recent attack on our Senate was orchestrated by radical anti-Perry elements, and that the continued unrest within our nation has put their own stability in jeopardy. Thus, they claim that they will be sending military forces to 'Keep the Peace' within Texas unless I formally relinquish our nation's sovereignty. While it is suggested that our military is not in a position to challenge forces from the East, my official response to this demand is still a resounding no. In 1836, brave commander of the Texan forces at the Alamo William B. Travis refused to surrender to Santa Anna's forces despite being outnumbered six to one. My response to President [USA.GetLeader] is the same: Texas shall never surrender' - President Rick Perry."
 texas_news.5.o1:0 "War is on the Horizon."
  
 texas_news.6.t:0 "The Remnants Invade Texas"
 texas_news.6.d:0 "While attempts at diffusing the situation between Texas and the American Republic have been attempted by various third parties, it seems that they all have failed. Today, soldiers from the American Republic crossed the border into Texas, in an official mission to banish the 'false' Texan government from 'rightful American territory'. Already thousands of Texan citizens have fled the country in hopes of avoiding the devastation, and nations from across the world have condemned the actions of the American Republic. The two other main claimants to the former United States, the Commonwealth and the UAPR, have denounced President [USA.GetLeader], but have supported their claims to Texan territory. The various nations which were created from the ashes of the old United States have been universal in their condemnation of the American Republic, as they too brace for the possibility of invasion by one of the American Claimants. While the Texans maintain valiant in the face of destruction, military strategists have predicted that Texan forces will be no match for those of the American Republic. As armoured columns cross over from Louisiana and Oklahoma into East Texas, a grim vision of conflict on American soil returns, as the fragile era of post-American peace lies shattered before the world's eyes."
 texas_news.6.o1:0 "America is at war once more."
   
 texas_news.7.t:0 "The Republic Recognizes Texas"
 texas_news.7.d:0 "After a period of intense tension between the American Republic and Texas, it seems that an agreement has finally been formalized. The American Republic, which has not maintained relations with any post-USA nations, has officially decided to recognize the independence of the Second Republic of Texas. President [USA.GetLeader] has met with Texan President Perry, declaring their support for Texan 'territorial integrity' and announcing an extensive military and political partnership between the Republic and Texas. While the issue of East Texas still remains contentious between the two nations, it appears that Texas and the Republic are taking the first steps to normalize their relationship. Of course, others decry that Perry has simply buckled to American pressure, and converted Texas into an American satellite Republic to avoid a Remnant invasion. The re-orientation of Texas and re-recognition of Texan independence has shocked the world, however has not determined those Texans determined to resist 'Remnant Occupation' by the 'Quislings' in Austin by any means necessary, including violent ones. As it appears, war may be avoided for the time being, but the Former United States is still not free from the scourge of violence."
 texas_news.7.o1:0 "Didn't see that coming."

 texas_news.8.t:0 "The Remnants Withdraw from Dallas"
 texas_news.8.d:0 "In an astonishing twist of fate, not only has the small Republic of Texas managed to fend off the Remnant forces to the East, they have even managed to drive them back. With Remnant military forces realizing they could not continue the Texan war, a peace settlement has been reached which returned the Dallas-Fort Worth Metroplex to Texan control. This humiliating outcome has made fools out of every strategist who predicted a swift Texan defeat, and has provided hope to all post-USA nations who feared that they may become victims themselves. In Austin, victory celebrations have been widespread as Texans rejoice over the return of Texas' third largest city. While portions of the country still remain under American occupation, the return of DFW still remains as a more than acceptable outcome to a nation which only months ago was bracing for its own destruction. In the American Republic, the reaction is one of abject humiliation, as the Remnant dream of restoring America is put on hold indefinitely. However within the post-American international community, the reaction is one of jubilation, and a reminder that in the realm of international politics, the forces of international sovereignty can still triumph over the forces of aggression."
 texas_news.8.o1:0 "A shocking victory."

 texas_news.9.t:0 "Texas Defeats the American Republic"
 texas_news.9.d:0 "In an astonishing twist of fate, not only has the small Republic of Texas managed to fend off the Remnant forces to the East, they have even managed to drive them back. With Remnant military forces realizing they could not continue the Texan war, a peace settlement has been reached which returned the entirety of occupied Texas to Austin's control. This humiliating outcome has made fools out of every strategist who predicted a swift Texan defeat, and has provided hope to all post-USA nations who feared that they may become victims themselves. In Austin, victory celebrations have been widespread as Texans rejoice over the re-unification of the Texan Nation. While much blood was shed to achieve this outcome, the grief over Texas' lost souls have been drowned out by the joy of Texas becoming whole once more; a more than acceptable outcome to a nation which only months ago was bracing for its own destruction. In the American Republic, the reaction is one of abject humiliation, as the Remnant dream of restoring America is put on hold indefinitely. However within the post-American international community, the reaction is one of jubilation, and a reminder that in the realm of international politics, the forces of international sovereignty can still triumph over the forces of aggression."
 texas_news.9.o1:0 "A shocking victory."
 
 texas_news.10.t:0 "UN Resolution Condemns the Remnants"
 texas_news.10.t_2:0 "Canada Vetoes UN Resolution"
 texas_news.10.d:0 "At a meeting of UN Delegates in Geneva today, Warsaw Pact aligned nations formally brought up a motion to condemn the American Republic for their recent invasion of the Republic of Texas. While the motion was first brought up by the Communist nation of Bulgaria, it quickly gained support from nations across the world, notably including Canada, leader of the Democratic League and inheritor of the USA's Security Council seat, which typically vetoes every motion brought up by a Warsaw Pact nation out of spite. Canada has recently joined their arch-enemies in the Soviet Union in condemning the Republic's actions, even going so far as to send weapons to the Texans in an effort to protect what remains of the 'Rules-Based International Order' against unilateral Remnant aggression. While they both maintain different strategic objectives in their support for Texas, the world over has been shocked by the unity in voices condemning Atlanta, with disparate foes united in the declaration that such aggression will not stand. However, as the General Secretary declares that [USA.GetLeader]'s actions will not be tolerated, the fact remains that the UN has no way of actually ending the conflict."
 texas_news.10.d_2:0 "At a meeting of UN Delegates in Geneva today, Warsaw Pact aligned nations formally brought up a motion to condemn the American Republic for their recent invasion of the Republic of Texas. As is typical when a Warsaw Pact nation raises a motion in the General Assembly, Canada, leader of the Democratic League and inheritor of the USA's Security Council seat, has vetoed the motion. While the fact that the motion was quashed is not surprising on its own, Canada has recently been gravitating towards their support of the so-called 'American Republic', nicknamed the 'Remnants', one of the few non-Socialist nations within the Former United States which continues to claim continuity with the old Federal Government. As Atlantan troops continue to wage war against Texas, many declare that this support from Canada as a betrayal of the Democratic League's ideals. While relations between Ottawa and Atlanta have previously been frosty, Canada's recent move of support is a sign to many that the Democratic League may be siding with the Remnants, coming as dismay to both the Heartlands Union, and the countless post-American nations hoping for Canadian protection against Unificationist aggression."
 texas_news.10.o1:0 "Interesting Developments."
 
 texas_news.11.t:0 "Fall of the Republic of Texas"
 texas_news.11.d:0 "Despite valiant resistance from the Texans, it appears that their bravery and resolve was no match for the superior firepower of the American Republic. The Second Republic of Texas is no more, as [USA.GetLeader] declares that the first step towards the restoration of the United States has been completed. The news of Texas' surrender has spread through the post-United States like wildfire, as the various post-American nations brace in worried throes about the possibility of widescale armed conflict returning to American soil. Nations who view themselves as separate from the old America have begun to prepare for the possibilities that their neighbors may very well attempt to claim their territory by military force, all as bodies such as the United Nations express alarm about the possibility of new major wars within the Former United States. Meanwhile, in Texas, despite the surrender of senior leadership and capture of major urban centers, resistance continues to persevere, both within Texas and the rest of the American Republic. These forces continue their campaign to free Texas, utilizing their cultural similarities to move undetected. These events serve to all as a stark reminder of the fragility of post-Cold War Peace."
 texas_news.11.o1:0 "America is beginning to stitch itself back together."
  
 texas_news.12.t:0 "American Forces Withdraw from Texas"
 texas_news.12.d:0 "Despite international observers declaring that the Texan military was no match for Atlanta's armed forces, it appears that in a twist of fate, Texas has managed to defy the odds, and has successfully waited out the Remnants in their battle to reclaim their 'Rightful Territory'. Texas has fended off their would-be conquerors, resulting in a peace that while not resulting in any territorial changes, resulted in Texas maintaining its long-cherished independence. This outcome, described as both a victory and a loss for the Texans, has frozen the conflict along pre-2011 lines, resulting in no further territorial gains or losses, with Atlanta still refusing to recognize Texas as an independent nation. Despite some disappointment within Texas that none of 'Illegally-Occupied' East Texas has been returned to Texan control, the people of the Lone Star Republic remain grateful that their nation remains standing after such a devastating war. The Remnants however continue to lurk across the border, continuing to denounce Texas as a false nation and maintaining their claims to the Former United States. With the conflict simply frozen, in part due to cratering morale in Atlanta, few predict that this ceasefire marks a true end to the Texan conflict."
 texas_news.12.o1:0 "An anti-climactic outcome."
   
 texas_news.14.t:0 "Texas Submits to Atlantan Demands"
 texas_news.14.d:0 "In a announcement that has spread both shock and terror throughout the hearts of the Texan people, it has been announced that the Texan Government, hopelessly outmanned and outgunned compared to their longtime rivals in Atlanta, would be forefitting a devastating fight with the American Republic, and would be respecting Remnant demands for Texas to be re-incorporated with Atlanta's Government. Already Remnant forces have crossed over the Texan border in droves, putting down sporadic resistance that has sprung up in the aftermath of the announcement. [TEX.GetLeader] has been almost universally decried as a coward for this decision, with countless Texans vowing to defy the will of the 'Quisling' President and continue the fight against Remnant tyranny on their own terms. However with Atlanta's military occupying Texas without a fight, it seems that the Texan resistance has a painful road ahead of them. Of course, this move also has some supporters, with the 'Pro-Peace' movement hailing this result as the correct one, with most predicting that a war with Atlanta would only be a pointless one that Texas would stand to rapidly lose, devastating Texan infrastructure and costing countless Texan lives for a futile struggle. However even as leadership capitulates in the face of aggression, some Texans continue the fight."
 texas_news.14.o1:0 "Atlanta's influence grows."

 texas_news.15.t:0 "Bush Delegation Secures Peace"
 texas_news.15.d:0 "The entire world stands awestruck as American forces retreat from Texas. The Texan Peace delegation has succeeded in ending hostilities between the American Republic and Texas, in exchange for the American Republic gaining access to Texas' substantial oil reserves. The proposal for freezing the conflict along the pre-2011 lines has been eagerly accepted by the Texans eager to stop the Remnant onslaught, in what has come as a shock to nearly the entire world. The delegation has only succeeded due to the influence of its leader, longtime owner of the Texas Rangers baseball team, George Bush Jr., son of the widely-beloved late President of the American Republic. In the wake of widespread internal strife surrounding the war with Texas, combined with George Bush Jr.'s personal appeal to senior Remnant leadership, [USA.GetLeader] has formally agreed to a ceasefire in Texas for the time being. As a member of the highly popular Bush Dynasty, George Jr.'s endorsement has a unique appeal to both the Denizens and the senior leadership of the American Republic, and it appears that thanks to the impassioned pleas by the son of the 'Great Leader', the Remnants have been convinced to put their Texan campaign on hold. Few expect this to be a lasting peace, however the success of this delegation remains a powerful reminder that peace can still triumph over bloodshed."
 texas_news.15.o1:0 "A touching display."
 
 ### History Events ###
 
 tex_history.1.t:0 "1989 Texan Presidential Election"
 tex_history.1.d:0 "The 1989 Texan Presidential Election was held on March 3rd, 1989, to elect the President and Congress of the Second Republic of Texas. It was the first election held in Texas since the great collapse and saw former Senator Lloyd Bentsen elected as the second President of the Second Republic of Texas by a landslide. Bentsen was already considered for the Provisional President's position in 1987 by members of the last Texan legislature, which despite its Republican makeup, widely supported Lloyd Bentsen as the best fit to lead the resurgent Republic of Texas, especially in the wake of the East Texas Conflict. Bentsen tapped former State Treasurer Ann Richards for the Vice Presidency. Bentsen faced off against incumbent Bill Clements, the final Governor of the State of Texas who briefly served as the nation's first Provisional President, who was running as an Independent. The Republican Party's brand was badly tarnished by Ronald Reagan and further conflict with the Atlanta Government, and despite Clements' move to distance himself from Bush, the loss of the East caused Clements' popularity to collapse shortly after he assumed office. Ultimately the Texan GOP dissolved shortly after the nation's foundation, with Clements running as an Independent, in a campaign which was only endorsed by the remnants of the Texan Republican Party. By the time of the East Texas Conflict, many realized that GOP and Clements by extension were doomed in a face off against the highly popular Lloyd Bentsen. Indeed, the Bentsen/Richards ticket defeated incumbent President Clements with 76% of the vote, sweeping nearly every county and handedly flipping the Texan Congress to Democrat control. This would be the last election in which the Reagan-era Texas GOP played a role, and the only one decided by over 70% of the Popular Vote."
 tex_history.1.o1:0 "Interesting."
 
 tex_history.2.t:0 "1993 Texan Presidential Election"
 tex_history.2.d:0 "The 1993 Texan Presidential Election was held on March 3rd, 1993, to elect the President and Congress of the Second Republic of Texas. It was the second election held in Texas since the great collapse and saw incumbent Vice President Ann Richards face former Texan Senate candidate Phil Gramm. Incumbent President Lloyd Bentsen choose not to seek another term despite being eligible to do so, instead choosing to endorse Vice President Ann Richards for the position of President, with Richards tapping Comptroller Bob Bullock as her running mate. Coasting off Bentsen's high approval ratings and the rally-around-the-flag effect that followed the East Texas War, Ann Richards was elected handedly with 54% of the vote, a safe victory by any means but still a far cry from Bentsen's 76% blowout. Inspired by Clements' Independent run four years prior, Gramm ran under the banner of the newly-coined Independent Republican Party, which attempted to distance itself from the legacy of Reagan. While they would claim no relation to the Reagan-era GOP, the image of the Republican Party remained badly damaged after 1987, with their relatively strong performance at 45% of the vote coming as a shock to many. Richards was sent to the Texas Governor's Mansion, however despite Richards' victory Congress fell under IR control, contributing to the political deadlock that characterized much of Richards' term. Despite widespread deadlock in Congress, Richards enjoyed high approval ratings throughout her term, with the popular Prison reform being a characteristic plank of her Presidency."
 tex_history.2.o1:0 "Interesting."
  
 tex_history.3.t:0 "1997 Texan Presidential Election"
 tex_history.3.d:0 "The 1997 Texan Presidential Election was held on March 3rd, 1997, to elect the President and Congress of the Second Republic of Texas. It was the third election held in Texas since the great collapse and saw incumbent President Ann Richards face member of the Texan Senate Kay Bailey Hutchison. Incumbent President Ann Richards was eligible to run for a Second Term, and won the Democratic Primary without much opposition. The Independent Republicans nomination of Kay Bailey Hutchison made this election the first election in Texan History to have both major parties nominate a woman as their candidate. Richards, despite enjoying high approval ratings, was severely limited in her ability to govern by an all-Republican Congress which successfully stonewalled much of the Democrat agenda. Ultimately, the gridlock of the Richards Administration led to the Democrats slumping in the polls in mid-1994, as the negative associations of Conservative ideology which were gained in the aftermath of Reagan slowly began to wear off. Hutchison, who ran a strong Moderate Conservative campaign, was elected as the Third President of Texas with 49% of the vote, the lowest voter share of any President in the Second Republic's history. Hutchison became the first Independent Republicans to capture the Texan Presidency, and began a long era of Democratic decline and Conservative domination in the realm of Texan politics. This would be the last Texan election fought between two major parties alone."
 tex_history.3.o1:0 "Interesting."
   
 tex_history.4.t:0 "2001 Texan Presidential Election"
 tex_history.4.d:0 "The 2001 Texan Presidential Election was held on March 3rd, 2001, to elect the President and Congress of the Second Republic of Texas. It was the fourth election held in Texas since the great collapse and saw incumbent President Kay Bailey Hutchison face several different major candidates in what would be the first of many Elections in the post-Two Party System era. Incumbent President Kay Bailey Hutchison, despite entering into office with a strong majority in the Congress, would have her approval ratings collapse mid-2000 after signing a controversial trade agreement with the American Republic. Nationalist backlash to this move was fierce, and catapulted several groups into uniting to defeat an administration decried by some as being influenced by Atlanta. Despite a high-profile Primary challenge from Billionaire Ross Perot, Hutchison would secure the Independent Republican nomination for a second term. Former Defense Secretary Rick Perry gained the Democratic nomination handedly, however shocked the nation by refusing the Democratic nomination and instead founding his own party with prominent Independent Republican David Dewhurst; with the Democrats scrambling to nominate Houston City Councilor Chris Bell after Perry's shock decision to refuse the Democratic nomination. Driven by staunch Social Conservatism and Anti-Remnant outrage, One Republic captured victory in what many have labeled as the most stunning upset in the history of post-USA politics. The Democratic Party was reduced to the lowest percentage ever recorded, falling to third place with only 16% of the vote."
 tex_history.4.o1:0 "Interesting."

 tex_history.5.t:0 "2005 Texan Presidential Election"
 tex_history.5.d:0 "The 2005 Texan Presidential Election was held on March 3rd, 2005, to elect the President and Congress of the Second Republic of Texas. It was the fifth election held in Texas since the great collapse and saw incumbent Vice President David Dewhurst face several prominent challengers from both Independents, Democrats, and Independent Republicans. Incumbent President Rick Perry shocked the nation by refusing to seek a Second Term, instead endorsing incumbent Vice President David Dewhurst for the office, with Dewhurst himself nominating none other than Perry himself for the Vice Presidency. In a highly unusual move, both the Democrats and Republicans nominated Carole Keeton Strayhorn as their candidate in what was meant to be a united anti-Perry front. However disagreements about key social issues, mainly Abortion, fractured this united front, with Strayhorn refusing to take a side and instead running as an independent while both the Democrats and Independent Republicans failed to nominate a replacement. This remains the only election not contested by either the Democratic Party or the Independent Republican Party Ultimately One Republic under Dewhurst won a victory of 51% of the vote in an election surrounded by accusations of voter intimidation and fraud. Strayhorn received the lowest share of the vote for a major Candidate, capturing barely 17% of the vote as the majority of the Independent Republican voter base was siphoned off to Ross Perot's incredibly popular independent run. Perot, who many considered initially as a strong contender for the IR Party, chose to run as an Independent in late 2004 due to conflicts with the Independent Republican Party's increasingly Conservative stance, capturing 30% of the vote and coming in second place."
 tex_history.5.o1:0 "Interesting."

 tex_history.6.t:0 "2009 Texan Presidential Election"
 tex_history.6.d:0 "The 2009 Texan Presidential Election was held on March 3rd, 2009, to elect the President and Congress of the Second Republic of Texas. It was the sixth election held in Texas since the great collapse and saw incumbent President David Dewhurst, as expected by many pundits, did not seek a Second Term, and instead endorsed former President and incumbent VP Rick Perry. Since 2005, it had been commonly understood that Dewhurst's elevation to the Presidency was a ploy by Rick Perry to circumvent Term Limits; with many believing that Perry held the true power in the administration during the Dewhurst years. Exploiting this loophole, Perry sought a non-consecutive Second Term in 2009, defeating a slate of candidates put forward by Texas' increasingly divided political scene. With any chance at a United Front dead after 2005, the Independent Republicans and Democrats nominated two separate candidates; James Baker for the IR Party and Rick Noriega for the Democrats. This race was also defined by a high-profile run from independent Country Music Star Kinky Friedman, who attempted to fight voter antipathy in a largely satirical campaign focused on lampooning the establishment. Shocking many within the political scene, Ross Perot threw his hat into the ring days before the deadline despite previously stating his intention not to seek the Presidency, running behind the newly-formed Reform Party which was the brainchild of Perot himself. Perot's 7% performance was a far cry from his 2005 margins, coming in second-to-last place behind Friedman. Allegations of voter intimidation were widespread, and turnout fell to 29%, the lowest in Texan history. "
 tex_history.6.o1:0 "Interesting."

 tex_history.7.t:0 "The New Mexico War"
 tex_history.7.d:0 "The 'New Mexico War' was a series of conflicts that erupted in the State of New Mexico following the Collapse of the United States. As one of the 50 now-independent American States, New Mexico was ill-prepared for independence. The issue of the nation's fate soon became a political hot button, as many within New Mexico came to favour unification with Texas. However the Democrat majority in Congress came to gradually favour independence - with pro-Independence Governor Garrey Carruthers being elected as the nation's first and only President. Despite the prevailing pro-Independence position, many within the nation's Hispanic minority came out in favour of a union with Mexico, with prominent activist Cesar Chavez and former Governor Toney Anaya coming out in favour of a union with Mexico. Tensions came to a head when prominent activist Reies Tijerina and an army of supporters declared the 'Republic of Nueva Mexico' on the Western Bank of the Rio Grande. Increased conflicts with the Latino minority came to a head when the Mexican Army intervened. The Republic of New Mexico, finding itself rapidly collapsing due to both ethnic tensions and the explosion of Cartel violence, and unable to support itself financially, officially joined the Second Republic of Texas in 1988, lasting less than a year. This action spurred further Mexican intervention as conflicts between the Texan Government and the Hispanic community heightened, leading to further conflicts with Mexico down the line. Overall, the Texan army was unable to defeat Tijerina's self-proclaimed 'República de Nueva México', which would go on to be annexed by Mexico later in the year, an annexation declared illegal by the Texan government."
 tex_history.7.o1:0 "Interesting."

 tex_history.8.t:0 "The Second Mexican War"
 tex_history.8.d:0 "The 1989 Mexican-Texan war, commonly referred to as the 'Second Mexican War', was a series of conflicts between the Second Republic of Texas and the United Mexican States. Skirmishes with Mexico were frequent even during the Great Collapse, with tensions coming to a head during the New Mexico war of 1988. Mexican cartels had found themselves rapidly moving into New Mexico and South Texas following the collapse of the US and subsequent dissolution of the DEA, with prominent branches of the Sinaloa Cartel setting up shop in major Texan cities, as law enforcement found themselves powerless to remove them. The division of New Mexico further exacerbated tensions between Austin and Mexico City, as tensions remained cold for a number of months before open hostilities broke out. The first shots of what would become the Second Mexican War were fired in early 1989, as race riots in San Antonio spurred Mexican President Carlos Salinas de Gortari to formally order an intervention to 'Liberate' the oppressed Hispanic minorities in Texas. Gortari, looking for an easy PR victory for the incumbent PRI Party, sought to expand Mexico's borders and secure the next election, however fighting quickly devolved into a brutal slog as Texas deployed more SWAT units and former National Guard soldiers to the Mexican borders. The Rio Grande was quickly overrun as Mexican soldiers continued their advance, coming to control much of South Texas within a week of the invasion's beginning. Fighting came to be a brutal slog by the time Mexican soldiers reached San Antonio, which drew countless Texan volunteers to join the fight against Mexico personally, causing the Ejército Mexicano to stall on the outskirts of the city. While much imagery of a second fight for the Alamo was publicized, the entirety of the fighting took place far from the city center. Eventually an agreement was made to freeze the conflict among the 1989 frontline, an agreement accepted by the PRI government, which was eager to walk away with a perceived win and avoid a lengthy conflict with Texas."
 tex_history.8.o1:0 "Interesting."
 
 tex_history.9.t:0 "Formation of the Second Republic of Texas"
 tex_history.9.d:0 "The formation of the Second Republic of Texas was a process that took place shortly after the Great American Collapse. Bill Clements, the last Governor of the State before the Great Collapse, assumed power as the first Provisional President of the Republic of Texas since Anson Jones, even as much of Congress expressed a desire for Senator Lloyd Bentsen to assume the position, owing to Clements' low approval ratings in the wake of a massive pay-to-play Football scandal which occurred shortly after taking office. This would of course be overshadowed by the Great Collapse, but nonetheless Clements faced an uphill battle throughout his short Presidency. The majority of Texans had come around to a pro-Independence position by the time of the Great Collapse, with Congress unanimously drafting a declaration of Independence. Owing to Texas' strong national identity and previous history of Independence, Texas showed the highest percentage of Independence Support of any Mainland American State before the Great Collapse, with Gallup polls showing 57% of Texans supported Texan independence by 1988. Despite this, several pro-Union and GOP Loyalist Congressmen sat out the vote to establish the Second Republic and resigned in protest, setting the stage for the East Texas conflict later that year. A new Texan constitution, based partially on the Constitution of the First Republic of Texas was signed by Provisional President Bill Clements in 1987, formally declaring the Second Republic of Texas. The State Flag and Anthem were kept the same, with many other State-era institutions re-used for the newly-declared Second Republic of Texas. Provisional Congressional elections were scheduled for shortly after Independence, however the secession of many counties in the East delayed these elections to March of 1988, with Presidential Elections scheduled for one year from then. These elections would be won by a ramshackle pro-Independence Coalition, with the incumbent GOP Congress faced with a total wipeout in the wake of the East Texas Conflict."
 tex_history.9.o1:0 "Interesting."
  
 tex_history.10.t:0 "2002 Republican Party Primaries"
 tex_history.10.d:0 "The 2002 Republican Party Presidential Primaries were held from January 24 to June 6, 2002, to decide on the Republican Party's nominee for President of the American Republic, commonly known simply as the 'Remnants'. Donald Rumsfeld stood as the incumbent President - having assumed office after the death of highly-popular President George H.W. Bush in 2001. Many had assumed Rumsfeld to be an easy mark for the nomination, with his status as the Incumbent giving him a strong advantage. Challenging him for the nomination was George Bush Jr., son of the former President who sought to uphold his legacy. Ultimately Rumsfeld defeated Bush Jr. handedly, with the junior Bush often seen as weak due to a lack of political experience. Allegations of vote manipulation were widespread, as well as evidence of Rumsfeld's own Machiavellian personal manipulation, with rumour spreading that Rumsfeld goaded Bush Jr. into running instead of his more popular brother, the Governor of Florida Jeb Bush. Bush Jr., the freshman Congressman and owner of the Texas Rangers baseball team, took on a conspiratorial and anti-Rumsfeld campaign, alleging that Rumsfeld and his father had a falling out shortly before his death, even going so far as to accuse Rumsfeld of playing a role in the death of Bush Sr., allegations which were not supported by the majority of the RNC machinery. With Bush Sr. growing reclusive during his final days, even towards his family, a handful of hardline Bush cultists supported such allegations, however it was not enough to overcome Rumsfeld's iron grip on the RNC. Following Bush Jr.'s defeat, the youngest son of the 'Great Leader' denounced Rumsfeld and swore off politics forever, relocating to Texas along with his baseball team, which moved from Arlington to Houston. Rumsfeld went on to win the concurrent election in a landslide, carrying almost every state, with opposition from the Democratic Party in particular collapsing, as the party failed to win any Electoral Votes."
 tex_history.10.o1:0 "Interesting."
 
