 POLITICS_TEX_RICK_PERRY_DESC:0 "Rick Perry was first elected to the Texas House of Representatives in 1984, and was one of the first state representatives to call for an independent Republic of Texas in the wake of the Great American Collapse in 1987. A staunch Texan nationalist, he supported harsher measures against the agitation of American loyalists, and would personally fly several airlift missions during the Mexican-Texan War. In the ever-changing political landscape of independent Texas, Perry aligned with the majority of the Democratic Party in drafting a constitution for the newly independent country. He then served as Minister of Defense under President Lloyd Bentsen, his service in the war making him the clear choice to rebuild the Texan military. However, internal divisions within the Democratic Party would force Perry out of power for nearly a decade, and he spent most of the nineties working in the energy industry. He wouldn’t return to the political scene until 2000, when President Kay Hutchison signed a controversial trade agreement with the American Republic. Organizing the opposition to the continuing AR occupation of eastern Texas, Perry united Texan nationalists from both parties into the One Republic movement, the electoral vehicle for his 2001 presidential campaign. He won the election in a landslide and transformed One Republic into an official party which has dominated the political scene ever since. Perry’s two non-consecutive terms, interrupted only by the presidency of his protege David Dewhurst, have been dominated by security issues and the continued conflict with American loyalists. His administration established the Texas Enterprise Fund to funnell oil revenues towards economic expansion, and brought the country into the Organization of the Petroleum Exporting Countries, turning Texas into one of the world’s leading oil producers."
 
 POLITICS_TEX_RON_PAUL_DESC:0 "Dr. Ronald Ernest Paul is a man of many faces and many contradictions. Coming from a humble background as a doctor, Ron Paul would eventually enter Congress as a Republican during the tail end of the United States' existance. First foraying into the political scene after reading the works of Friedrich Hayek, Ludwig von Mises, Ayn Rand, and Murray Rothbard, Paul first decided to run for Congress after the end of the Gold Standard. Paul would see first hand how Big Government figures such as Bush, Rumsfeld and Kissinger sabatoged the Presidency of Ronald Reagan, growing dissolusioned with the Republican Party as a result and drifting further towards Libertarianism. As a staunch supporter of Reagan to the bitter end, Ron Paul would not follow the rest of the Texas GOP to their 'Independent Republican' Rebrand, continuing to serve as a Reagan Republican long into the 1990s. Eventually Paul would switch to the Texan Libertarian Party, serving as its most prominent voice in Congress. By 2006 Paul had become a vocal critic of One Republic, arguing that Perry and Dewhurst were petty tyrants. His status as a Congressional firebrand would eventually get him booked on flimsy charges, further radicalizing him against the evils of Statism. By 2011 Paul had become a die-hard Anarchist, viewing the imposition of Martial Law as the ultimate proof that Government simply cannot be trusted under any circumstance. Entering the race for President at the end of the war, Paul would shock the nation by defeating One Republic, despite his own contreversies, including a troubling series of purported essays and friendships with prominent White Supremacist Don Black. Paul, while still standing by many of his Anarchist ideals, has come to adopt many more 'pragmatic' stances, policies which harken back to the ideals of the Founders, both of the Republic of Texas and the United States, as well as the spirit of the Texan Old West Frontiers. While Texas may be shielded from the possibility of Paul implementing his most whacko policies due to a lack of Libertarian representation in Congress, Paul has proven himself willing to compromise for the sake of defeating Big Government. However if he truly is defeated, then your children and your children's children, languishing behind the bars of Big Government Hell, shall allow only one question to the present generation to escape their lips:\n\n'Why didn't you stop it?'..."
 
