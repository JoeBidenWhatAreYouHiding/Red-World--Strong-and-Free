 TEX_Second_Republic_Reform:0 "The Second Republic"
 TEX_Second_Republic_Reform_desc:0 "Texas. Hawaii. Vermont. California. All of these states have the unique claim to fame of once being self-governing nations. Of them all, none has taken such a fact to heart like the Second Republic of Texas. The intense patriotism drawn between our modern loss in pride and the American Annexation has birthed a movement of extreme anti-American and anti-Annexationist rhetoric, and increased patriotism surrounding traditional 'Texan' cultural staples such as Guns and Cowboys. While previously attempts have been made to link Texan nationalism to the ill-fated Confederate States of America, much to the dismay to Texas' large African-American population, attempts have been made to distance ourselves from such movements."
 
