 TEX_One_Republic_Consolidation:0 "One Republic Consolidation"
 TEX_One_Republic_Consolidation_desc:0 "Ever since the 'One Republic' Party was founded, it has enjoyed a nearly unchallenged monopoly on the Texan political scene. As the most prominent voice of the heavily nationalistic and revanchist Texas Republican movement, One Republic has successfully branded itself as the primary movement representing the interests of true Texan Patriots. The patriotic fervor started by the OR has secured their monopoly on power, but drawn increasing ire from those who think that Perry's policies now border on the tyrannical. However with victory in both the Remnant War and the latest election, it seems increasingly that Texas is becoming a One Party State with One Republic at the helm."
