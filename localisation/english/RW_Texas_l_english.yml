 ### Political - Collabs ###
 
 TEX_legal_limbo:0 "Legal Limbo"
 TEX_legal_limbo_desc:0 "Our surrender to Atlanta has necessitated the shredding of our former Constitution. As the Bald Eagle takes Texas in its razor-sharp talons, almost a decade of Texan Governmental precedence has been upended. Nobody seems to know what the rule of law is here in the Lone Star Republic, seemingly not even the people in charge. The headless chicken that is Texas' Civil Service can't put in an order for Coffee without running it past their 'superiors' in [USA.GetNameDef], and as sunglass-wielding agents take more and more Government Documents to the burn pile, it seems that the state of Texan Law will not be settled any time soon. The fact that nobody seems to know who to listen to has caused a Kafkaesque nightmare to emerge in Austin's halls of power - the blind leading the blind, executing insane and sometimes contradictory orders from beleaguered bureaucrats who themselves don't know who to report to. Figuring out who the hell should be overseeing the Texan Government now that we are under American Overlordship needs to be a priority for the Collaboration Government."
 TEX_american_stooge_regime:0 "American Stooge Regime"
 TEX_american_stooge_regime_desc:0 "Rick Perry's choice to submit to American Rule has been, to say the least, incredibly unpopular. A future full of jackbooted FBI agents surrounding the Alamo and tossing plates of Brisket to the ground isn't exactly jiving with the free-living spirit of the Texan people. Across alleyways across the Republic, beer-sipping Texan Patriots declare the Government dead to rights for sucking up to their sworn enemies in Atlanta, and plot ways to restore the Lone Star State that once was before the 'Great Submission'. Dyed-hair Democrats now stand shoulder-to-shoulder with beard and cowboy hat sporting Texan Separatists in their desire to see Texas freed from the illegitimate Perry regime. Adjusting to this new reality is going to be a long and painful process."
 TEX_fierce_nationalist_anger:0 "Fierce Nationalist Anger"
 TEX_fierce_nationalist_anger_desc:0 "The rapid collapse of One Republic has sent many of its faithful into the Political wilderness. Perry's seen no better than spoiled liver to the proud people of the Lone Star Republic, and as Ranger and Soldier alike desert the ranks of a new Atlanta-dictated Government, a powerful underground movement dedicated to freeing Texas from American Occupation has sprung up. Every week new reports of ambushes on American Armoured Convoys and bombs planted at Post Offices are placed on the President's Desk - and with every station broadcast hijacked by Separatists a message is spread that the new Government is very much alone in their pursuit of a Remnant-backed Texas. No matter how many soldiers come back in wooden boxes, the Americans remain dedicated to stamping out the insurgency, and apparently the new Texan Government does too."
