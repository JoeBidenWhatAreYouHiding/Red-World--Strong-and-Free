l_english:
###News ###
alien_news.1.t:0 "Very Large Telescope Notices Anomaly in Kuiper Belt"
alien_news.1.d:0 "Following weeks of tracking, photography, and debate over the direction of the anomaly, scientists from the Chilean Very Large Telescope astronomical facility have now released the first images of several celestial objects that appear to be moving toward the inner solar system from the Kuiper Belt. While initially believed to have been a small asteroid headed through the boundless and vast depths of the outer solar system, further analysis by Cybersyn, which compared numerous photos of the object throughout three weeks, has confirmed that the objects are moving in some formation that does not match up with the course of asteroids studied in the past. Likewise, Cybersyn analysis has confirmed that, from the photos provided, at a bare minimum, fifteen objects are moving through space. While the discovery has been heralded as a great success for the scientific community, who believe that these objects may soon spark a renewed interest in space travel once a better photo of the objects can be taken, there is a seeming concern by a few within the scientific community who, while largely dismissed, have grown concerned that the anomaly is not a natural formation, especially given the speed it is traveling at."
alien_news.1.o1:0 "What an odd formation"

alien_news.2.t:0 "Anomalous Formation Makes Apparent Slingshot Maneuver Around Jupiter"
alien_news.2.d:0 "\nA second announcement has now been made by the scientific team stationed at the Chilean VLT, who have shown further imagery of the approaching celestial objects. While still believed to be a mass of asteroids rapidly approaching the inner solar system, these new photos have confirmed that these objects are moving with purpose and intent, with the VLT confirming the anomalous formation has now successfully made a slingshot maneuver around Jupiter. Though the scientific community has long refused to accept the possibility that the anomaly was anything more than a gathering of asteroids, the sudden and deliberate slingshot around Jupiter has sown the seeds of doubt among scientists from Moscow to Atlanta. While there is still no imagery of the formations headed toward Earth, the VLT has pledged to photograph the anomaly before its arrival above our atmosphere. As the United Nations now gathers its brightest minds to begin to try and ascertain just what has occurred above the Gas Giant, people across Earth have now begun to brace for the possibility that whatever is heading towards our planet is either a spatial anomaly unseen in all of mankind’s recorded history or the beginnings of first contact."
alien_news.2.o1:0 "Occam’s razor will be proven right in time"

alien_news.3.t:0 "Muammar Gaddafi Warns the United Nations General Assembly of Impending Alien Invasion"
alien_news.3.d:0 "\nSpeaking to the United Nations General Assembly in Geneva, Muammar Gaddafi, leader of the Socialist Jamahiriya of the Maghreb, warned of what he believes to be an alien invasion in the coming months. In what was originally supposed to be a routine meeting to discuss international developments, the North African leader instead derailed the conversation to warn the world about the allegedly impending threat. Voicing his belief that the unidentified objects first spotted some time ago, which have now passed Mars on their journey, are actually a fleet of alien spacecraft, Gaddafi called upon the nations of the world to prepare for what he called an "undoubtedly hostile force". Despite the objects' unusual trajectory, many in the public simply do not believe that aliens could be coming here without making contact, swiftly turning Gaddafi into a laughing stock with both the world press and large parts of civil society. Privately, however, rumors are spreading that many world governments have begun to take preventive measures, in preparation for the approaching anomalies to be hostile. Even so, many still think that these claims are overblown hysteria, choosing to continue life as is, awaiting what is predicted to be a once-in-a-lifetime astronomical event"
alien_news.3.o1:0 "There’s no way aliens are real, right? …right?!"

alien_news.4.t:0 "Alien Forces Launch Worldwide Attacks on Major Cities"
alien_news.4.d:0 "The world awakes to a new era following the strange events of the past few weeks, as unidentified craft descend into several cities across the earth, striking at key governmental, military, and financial infrastructure all over the globe. These unexpected attacks have cause chaos, sending scores of refugees into the countryside and paralyzing military responses, as landing craft disgorge both troops and armored vehicles in a clearly coordinated offensive, to which terrestrial governments have struggled to react. Cities such as Moscow, New York, and Berlin have fared the worst, with the entire Russian government either killed or missing, the former superpower destroyed in a fell swoop. Having hijacked what remains of global communications networks, the Aliens have given a bizarre statement of intent to Mankind: The complete destruction of the ‘degenerated workers’ states’ and ‘bourgeois states’, for the liberation of humanity from capitalism, ending with a call for the workers of the Earth to rise up against their masters. As the world responds to this proclamation with shock and horror, governments and military forces prepare for a desperate defense against overwhelming forces, as the final, decisive proof has been delivered that Mankind is not alone among the stars."
alien_news.4.o1:0 "To the barricades!"

alien_news.5.t:0 "Alien Invaders Erect Mysterious Structure in Occupied Moscow"
alien_news.5.d:0 "Disturbing reports have flooded out from occupied Moscow, as footage smuggled out of the area by resistance leader Vladimir Zelenskiy shows what appears to be a large tower structure under construction, centered on the Kremlin complex in the heart of the city. The aliens have divested a large amount of security and resources to the city, initially for unknown purposes, which is presumed to be the construction of this mysterious monolith. Intelligence agencies worldwide speculate on the importance of the building, looking into avenues for further investigation, and if needed, delay or destroy the construction project. Many members of the public who have seen the footage have thrown around wild conspiracy theories about its true purpose, ranging from mind control to teleportation, or it even being a giant laser tower. The ambiguity isn’t helped by the quality of the footage, being taken from a far distance and on a low-quality camera, giving the only footage we have of this project a grainy, otherworldly feel. Hopefully, the resistance who smuggled this footage out will be able to get closer and answer the pressing questions held by people all around the globe on the purpose of this mysterious structure."
alien_news.5.o1:0 "Whatever it is, we will stop it!"

alien_news.6.t:0 "African Union Forces Repel Alien Landings in Mombasa"
alien_news.6.d:0 "The tides have turned in the war against the aliens, as the United Forces of the African Union Security Council have worked to turn the tide and prevent the Aliens from landing in the city of Mombasa. While many of the world’s cities have come under heavy attack, Mombasa especially became a massive battleground, with it being the only city on the entire continent of Africa that the aliens chose to attack. While their reasons are unknown as of now, the nations of Africa worked tirelessly to coordinate a defense around the outskirts of the metropolis, which has resulted in a complete victory in Africa for humanity as the Aliens pull their storm of forces back after receiving heavy casualties. People of all nations have celebrated this much-needed victory, with Africa gaining a newfound respect among the world for its strength and for adapting to the alien technology now that combat has evolved. While Africa breathes a sigh of relief, the rest of the world continues its struggle against the extraterrestrials, prepared to fight for as long as it takes to liberate the planet. However, it is safe to assume that the heavy losses and the failure to take what seems to be an important location to the invasion force have made the aliens regret coming to Earth and regret attacking the city."
alien_news.6.o1:0 "We will Finish the Fight!"

alien_news.7.t:0 "Xi Jinping Announces 'Anti-Alien' Special Military Operation into Central Asia"
alien_news.7.d:0 "\nIt seems that even as the world burns, people will still act upon ambition, as Chinese president Xi Jinping has ordered the military to seize control over all of Central Asia. In a speech recently from the occupied territories, Xi announced the intention to use Central Asia to “ward off” the Alien invaders who attempt to encroach, and set up a ‘temporary’ military administration to control the area. Military vehicles across the occupied territories have already taken up positions, preparing defenses and coordinating to ensure total control and readiness against the incoming threats. Unsurprisingly, the Central Asian Soviet Socialist Republics had no say in the takeover, and their former leaders have voiced their objection and anger to the takeover, with some even urging rebellion. This move comes at a critical time for the battle for Earth, as humanity commits everything, leaving our past divisions behind, to save humanity and defeat the invaders. Xi’s blatant power grab has showcased the reality that even in dire conflict, some people can not set aside their lust for power and petty conflicts enough to fully unite. Even so, we hope that China, secure in its power grab, will now move its remaining military forces to the coalescing global coalition against the alien invaders."
alien_news.7.o1:0 "Now, of all times?"

alien_news.8.t:0 "Bill Clinton Rallies Post-American States Following 'Independence Day' Speech"
alien_news.8.d:0 "\nFollowing the alien invasion, many expected the former United States to bow out of the fighting, due to the destruction of many post-American capital cities; it seems the Eagle has not given up yet. Rallying survivors from across the devastated American countries, President Bill Clinton of the Heartlands managed to unite the divided people of America in the defense of Earth, raising the Star-Spangled Banner once more. In his speech announcing the rebirth of the United States, President Clinton spoke of the nation's will to fight for its liberty and independence in the face of the invasion. The speech only lasted a short amount of time, emphasizing humanity's need to set aside their petty differences and come together, and fight for their survival against total annihilation. He ended the speech with a rousing declaration, stating: “Humanity will not go quietly into the abyss! We will not go without fighting for our right to survive. Humanity will live on, no matter what!" While many are optimistic about what this means, not just for America, but for humanity's war against the Aliens, some still doubt the past few decades of division can be erased effectively enough to give us a fighting chance. No matter one’s opinion, America’s return signals a newfound sense of hope in the fight for our species existence."
alien_news.8.o1:0 "Today, we celebrate our Independence Day!"

alien_news.9.t:0 "Planet Earth Joins the 27th Interstellar"
alien_news.9.d:0 "Earth, so long under the thrall of forces hostile to the interstellar proletariat, has finally been liberated. Thanks to the tireless work of human and extraterrestrial workers, the portal in Moscow was completed, with reinforcements from across the entire 27th Interstellar assisting in dismantling the old world of capitalist repression. The planet has been reorganized to help quell resistance and organize streamlined governance, with continent-sized Revolutionary Emancipation Zones established across the planet. New administrators have arrived on Earth as well, ready to help bring the planet in line with the 27th Interstellar's revolutionary directives. Assisting them are many human collaborators, who have encouraged their citizens to cast aside the old world that exploited them for centuries, taking advantage of their labor, and join up in support of the Alien liberators for a new purpose. With the brunt of humanity’s working class being organized into workers’ councils that will help run the planet’s economy, the new overlords of Earth hope that mankind will at last cast off the chains of reaction and the past. Now, mankind will unite, and join the galactic community to help continue the permanent revolution among the stars, to destroy imperialism and capitalism wherever it may arise"
alien_news.9.o1:0 "Long live the 27th Interstellar!"

alien_news.10.t:0 "Communist Aliens Repulsed by Grand United Offensive"
alien_news.10.d:0 "Cities all over the world have erupted in celebration as the alien forces have dispatched a communique to all of Earth’s remaining governments. However, instead of proclaiming the inevitable destruction of our nations and ways of life, they have requested a ceasefire, announcing their intentions to withdraw from our planet. This declaration comes following several combined offensives that ultimately managed to isolate and destroy their forces, efforts which culminated in the daring, united assault that destroyed the Moscow monolith, after resistance agents discovered that the mysterious structure was meant to be a gigantic long-range teleporter. With guns and laser blasters falling silent at long last, and armistice talks underway between Human leaders and a delegation led by the Alien commander Prow’elle Trariat, reconstruction is slowly commencing in the regions devastated by the extraterrestrial invasion. The world stands broken, with significant environmental damage and extreme global casualties, but more united than ever. Once we have rebuilt, mankind stands ready to claim its rightful place among the stars, not as slaves, but as a free, united people, now more aware than ever of what ties us all together."
alien_news.10.o1:0 "Here we will remain most excellently"
###Country###

alien.1.t:0 "Sandino 7 Mission Disappears Following Mysterious Report"
alien.1.d:0 "A triumph of our ingenuity has now turned into an enigma of cosmic proportions. The Sandino 7 mission, a testament to our unwavering spirit and scientific ambition, successfully touched down on the far side of the Moon. For a brief moment, our brave Eternautas stood where no comrade had before, treading the untouched lunar dust beneath the eternal shadow of the cosmos. Then, silence. At first, the loss of signal was attributed to the vast distance separating us from our explorers. Yet the final words of Commander Daniel Montes now force us to reconsider. His transmission, initially routine, faltered as he described an unknown, pointed monolith in the distance. Approaching the monolith, a loud hum suddenly came before the signal cut out completely. Attempts to restore contact failed, with the Fonseca Amador Space Station attempting to reach Sandino 7 for four hours. Readings from their lander vanished. Even the return vessel, our safety tether, responded with nothing. With the world awaiting an announcement of success, President Bukele has now declared that the mission was a failure and that Sandino 8 will succeed where its predecessor failed."
alien.1.o1:0 "The world need not know what we have discovered"

alien.2.t:0 "GLONASS Satellites Go Off One-by-One"
alien.2.d:0 "A chilling report has landed on the desk of Vozhd Aleksandr Dugin: GLONASS, the backbone of Russian navigation, has inexplicably gone dark. The implications are immediate and severe, with civilian infrastructure in disarray, military operations scrambling for alternatives, and years of progress towards autonomy and self-sufficiency now undone, with the Motherland adrift without its guiding stars. Theories abound in the highest echelons of power. Is this the long-awaited strike from the lingering ghosts of communism, seeking one final act of sabotage? Or is it something even more unthinkable, an omen from the unknown spatial anomaly that creeps ever closer to our world? Whatever the truth, uncertainty is a luxury we cannot afford. The Vozhd has acted decisively. Russian military readiness has been heightened to its maximum, and the Strategic Rocket Forces now stand on high alert. Yet, in a move to prevent outright panic, the People’s Militias remain in reserve, their rifles silent, for now. The coming hours will decide whether this is merely a technical failure or the prelude to something far graver. In the heart of Moscow, one thought prevails: the Motherland must be ready for whatever comes next."
alien.2.o1:0 "Yedinaya i Nedelimaya Rossiya!"

alien.3.t:0 "Försvarsmakten Urges Government to Launch Operation Lodbrok"
alien.3.d:0 "Whether we choose to believe it or not, the evidence is clear; Extra-terrestrials are currently orbiting Earth, proving that alien life exists and has arrived to Earth for reasons unknown. The government has been getting more anxious recently, with members of Försvarsmakten taking an especially hardline stance. Proposing a strike called Operation Lodbrok to Maud Olofsen’s government, Försvarsmakten urges a total nuclear attack against the alien ships before they have the opportunity to strike. Such an act would undoubtedly make these alien visitors our enemies, no matter their intentions, and could backfire heavily by making Sweden a priority target. On the other hand, if these aliens are already looking to attack, this could be enough to deter their strikes or even destroy their fleets before they can harm Earth, preventing an interstellar war before it begins. On the other hand, a peaceful greeting of welcome could be what we need to avoid catastrophe and make first contact a peaceful one. As the Prime Minister debates the correct course of action with the cabinet, the choice of a nuclear welcome card or a warmer greeting must be made soon if we are to avoid the risk of a hasty disaster. What we choose may set the course of all of humanity's approach to our alien visitors, and may be the spark that ignites a planet-sized powder keg"
alien.3.o1:0 "Hey aliens, hope you like radiation!"
alien.3.o2:0 "Surely we can still make peace?"


alien.4.t:0 "Cybersyn Coordinates Cyberwarfare Against Alien Invaders"
alien.4.d:0 "When the Aliens first accessed Earth’s broadcasting system, we feared it would compromise any way of communicating with our populace and lead to worse problems, but it seems our luck has turned around. By accessing our systems, they have given Cybersyn insight into their own systems, analyzing data and the exact functions of the alien broadcasts. Now, with our new knowledge, Cybersyn has launched constant viral attacks at the Aliens and their various communications systems. Coordination with experts from the Technology Council and Cyberwarfare specialists sent by Angela Merkel in Germany has furthermore proven invaluable in cracking the aliens’ encryption protocols, giving humanity a chance to fight back. These attacks have given us an edge as the Aliens find themselves unable not only to broadcast their propaganda across our media infrastructure, but also to find their own communication systems compromised. The new insight into their technology has turned the tide both physically and morale-wise, as human troops are spurred to fight against their confused and frustrated enemies. As we continue to upgrade Cybersyn’s capabilities, we will fight on the ground to ensure the survival of South America against this extra-terrestrial colonialism."
alien.4.o1:0 "All your Communications are belong to us!"

alien.5.t:0 "The Fall of Buenos Aires"
alien.5.d:0 "Our darkest hour has come, as the alien invaders have completely taken our capital city of Buenos Aires, scattering the governing apparatus to the winds. During and after the evacuation of the city, military intelligence has managed to decipher the purpose the strike on our capital had. It seems the Aliens are in search of the insignificant Communist writer Juan Posadas, who passed away in 1981. This revelation raises several questions, the main one being whether the Aliens realise that he has been dead for over 30 years. In the meantime, we have received unexpected assistance from none other than Che Guevara himself, who exited retirement again to lead delaying actions against the Aliens and buy time for innocent civilians to evacuate. The famed revolutionary has mobilized the People’s Revolutionary Army in defence of the capital city, providing auxiliary support to government forces attempting to hold the line. When asked why they decided to fight by a frontline reporter, one Guevarist fighter simply stated: “I’m from Buenos Aires, and I say kill them all!”, a sentiment that appears echoed by many survivors of the attack. No matter the setbacks, we will fight tooth and nail, united in the preservation of our home and our people."
alien.5.o1:0 "Misled Aliens and a famed Revolutionary, what's next?"

alien.6.t:0 "Alien Collaboration Government Formed"
alien.6.d:0 "It would seem the sun has finally set on the British Empire, as the Alien invaders have forced Jacob Rees-Mogg to surrender. Rees-Mogg represented a decapitated government, as King Charles had been reported missing, leaving Britain in the hands of the invaders, who swiftly set up a new occupation zone. Collaborators have already begun propping up, with the new government formed out of the Labour Party, headed by the so-called ‘Administrator’ George Galloway. In a speech broadcast from the Shard in London, Galloway has urged the other Earth governments to surrender to whom he has dubbed the “liberators” of Earth in order to minimize bloodshed. He also called for the people of Britain, freshly reorganized into the  ‘Revolutionary Emancipation Zone 4’, to embrace the revolutionary leadership of the space-farers and lay down their arms, linking humanity with the cosmos in peace. Many in Britain have decried this as a blatant betrayal of the nation and the species, laying the foundation of resistance movements against Galloway and his Alien masters. Regardless of what happens, Britain’s destiny has been irrevocably altered, and many citizens hope that they can simply ride out the storm at this point."
alien.6.o1:0 "HE’S our leader now?!"
