  venezuela_news.32.t:0 "Death of Hugo Chavez"
  venezuela_news.32.d:0 "Venezuela is awash with sorrow as Hugo Rafael Chávez Frías, the President of Venezuela since first assuming power during the 1992 coup, has succumbed to an aggressive form of cancer at the age of 58. While he remains a highly-controversial figure both in Venezuela and abroad, due in part to his status as a military-backed dictator, within Venezuela and other Socialist-aligned regimes in Latin America he is viewed as a visionary leader, a hero and a symbol of resistance; however among the opposition, Chavez is nothing more than a Dictator and a Soviet Stooge. Succeeding him as President is Vice-President Nicolás Maduro, who is regarded by many as a more moderate choice compared to his hardline predecessor. Already Maduro has begun easing some of the more repressive policies of the Chavez years, even as many observers believe lasting change to be years, if not decades away. Regardless, Maduro's status as a moderate has reignited hope for many within the Venezuelan opposition, something which has come much to the dismay of the Bolivarian hardline, who view Maduro's newly-announced reforms as a betrayal of Chavez's memory."
  venezuela_news.32.o1:0 "A martyr to some, a tyrant to others."
  
  # venezuela_news.33.t:0 "Failed Coup in Venezuela"
  # venezuela_news.33.d:0 "The news of Maduro's reform in the wake of Chavez's death has sent shockwaves through the nation of Venezuela. Several members of the nation's Armed Forces have declared Maduro's ascension to the Presidency to be illegitimate, and have moved to arrest the incumbent and replace him with General Yoel Acosta Chirinos, who backed Chavez in his initial 1992 coup. Despite advances on Caracas, Maduro has managed to repel the Coup Plotters, who have declared a seperate government in the nation's West. This shocking escalation in Venezuela's previously stable political climate is a sign to many that Chavez's prevasive influence may have been the only thing keeping the country together."
  # rwc_news.33.o1:0 "Another war in South America? Goodness..."
  
  # venezuela_news.34.t:0 "Venezuelan Democratic Uprising"
  # venezuela_news.34.d:0 "Following the failed coup by Revolutionary Officers against the government of Nicolás Maduro, several protesters and activists have declared both the regime of General Chirinos and President Maduro to be illegitimate. Driven by the rampant authoritarianism of the Chavez regime, coupled with rising cost of goods and a declining economy, this uprising seeks to topple the reigning Bolivarian regime in Venezuela which has reigned since the overthrow of Venezuelan Democracy in 1992. This uprising has been supported by Western governments in Canada and the American Republic, and condemned by both the Warsaw Pact and the Philadelphia Government."
  # venezuela_news.34.o1:0 "Interesting."
  
  venezuela.1.t:0 "Death of Hugo Chavez"
  venezuela.1.d:0 "Hugo Rafael Chávez Frías, the controversial albeit popular long-time President of Venezuela has passed away today. Serving as President for almost 20 years, Chavez came to power in the Soviet-backed February 1992 coup, and has ruled the nation ever since. While controversial in many regards, often being accused of needles authoritarianism, Chavez remains a popular figure in the country, and is regarded as a visionary for left-wing politics in Latin America. Succeeding him as President is Vice President Nicolás Maduro, a moderate who has often been at odds with Chavez's more 'authoritarian' policies."
  venezuela.1.o1:0 "He will be missed."
    
