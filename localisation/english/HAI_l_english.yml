l_english:
 #### Haiti ####
 haiti.1.t:0 "Magnitude 7.0 Earthquake Devastates the South"
 haiti.1.d:0 "Tragedy has struck the nation today, as the capital has been hit by a massive earthquake, which has leveled several sections of the city, destroyed most healthcare facilities, schools, government buildings, and the city's jail, enabling the breakout of thousands of prisioners, as well as cutting off telephone lines, radio stations, and intranet connectivity. The immediate numbers speak of a massive tragedy with over 100.000 deaths, double the destroyed homes, and a staggering reconstruction bill well over in the billions of Comecon Rubles. With the only saving grace being that the early alerts about a tsunami have failed to materialize as expected, sparing the nation an even worse catastrophe. As the ground stops shaking, we are left atop a mountain of rubble and bodies, and a new lot of problems with millions finding themselves without shelter and supplies ahead of the imminent rainy season, as well as an uptick in looting and rioting incidents all over the capital as law and order crumble with the buildings of the city."
 haiti.1.o1:0 "...Up a creek without a paddle"