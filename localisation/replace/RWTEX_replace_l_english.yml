 ### States ###
 
 STATE_900:0 "D-FW Metroplex"

 ### Events ###
 
 texas.1.t:0 "Senate Building Attack"
 texas.1.d:0 "As the smoke cleared from last week's riots, it seemed that Texas may finally be experiencing a sense of calm. Congress was assembled to discuss the damage from the Austin Riots, and debate their strategy going forward. Before representatives could assemble in the chamber, a tremendous explosion ripped through the building, killing dozens of government figures, spectators, and building staff. Four bombs were hidden in the chamber while security staff was busy dispatching rioters during the Austin insurgency, three in the Senate chamber and one in the main hall. Estimates for the casualties are in the hundreds as emergency services rush to aid those who survived. Among the slain were more than 20 representatives, and five Senators, mainly from the One Republic Party, who were assembled on the side of the Senate Chamber where the bomb was planted, as well as sitting President and former Vice-President, David Dewherst. Thankfully, President Perry was sheilded from the worst of the blast, only sustaining minor injuries. As the dust settles, one question remains... could the pro-Remnant forces we've been hearing from for the past few months be the perpetrators of this grotesque attack? Or have anti-Perry elements taken extreme action to depose the sitting President?"
 texas.1.o1:0 "We Pray for Justice, yet Hope for Peace."
 
 texas.2.t:0 "Texas Senate Attacked!"
 texas.2.d:0 "The CIA Director has made President [USA.GetLeader] aware of an attack on the Texan Senate. The good news is that, the three explosive devices smuggled into the Texan Senate Chamber all detonated sucsesfully. Unfortunatley, it seems that key targets including President Perry managed to survive the explosion. Luckily, preliminary reports still suggest that the recent attack on the Senate has caused a signifigant amount of agitation within the Republic of Texas, possibly leading to a repeat of last week's riots. The death of several key officials has given us a period where Texan Government and Military forces are struggling to recover from the Senate attack, and have failed to deal with recent spike in civil unrest. Military figures have suggested we use this window of oppurtunity, framing our intervention in Texas as a peacekepping mission to restore order in the rogue Texan Republic. The Military Brass has been alerted, and our soldiers are already on the move to the Texan border."
 texas.2.o1:0 "Very Good, Dismissed."
 
 usa.4.t:0 "The Texan Question"
 usa.4.d:0 "The last five years have seen an escalating series of attacks within Texas. With instability tearing the small Republic apart, the decision has been made to at last intervene and restore the Rule of Law within Texas. The latest attack, one on the Texas Senate, has killed a number of key legislators, including the Vice President, and with the Legislative branch yet to be restaffed, many view this moment as opportune for at last settling the 'Texan Question'. Of the diplomatic minds within the American Republic, two schools of thought have emerged in regards to Texas. One, championed by Henry Kissinger, says that we should demand Texan subordination in the form of a satellite state, respecting Texan autonomy to an extent for the time being. Kissinger's proposal has some support, with many pointing out the ferocity of Texas' independence streak as reason to allow Texas to remain independent. However the opposition camp, led by John Bolton, views this as an unacceptable forfeiture of our mission to restore America, and gives erroneous legitimacy to those who challenge the creed of American unity. With Texas further devolving into chaos as we speak, [USA.GetLeader] must make a final decision in regards to Texas soon, as the post-American reality reaches a precipice. What shall we demand of the Texans?"
 usa.4.o1:0 "They must be re-absorbed."
 usa.4.o2:0 "Offer the Texans autonomy."
 
 usa.5.t:0 "American Republic's Demands"
 usa.5.d:0 "With the recent attack on the Texan Senate, claimed by a radical pro-Republic group, the American cabinet met to discuss the supposed 'Texan Question' concerning our place in relation to the Republic. After days of great tension hovering over the halls of power, it appears that the Remnants have come to a final decision regarding the fate of our nation. Their Ambassador in Austin has delivered a note to President [TEX.GetLeader], 'proposing' total unification of our two nations. Of course, this was less of a proposal, and more of a veiled threat, with the strong implication that the Remnants intend to invade us should we reject their 'proposal'. What they are demanding would erase Texan independence forever and turn us into a state of the American Republic, merged with the old State of East Texas which was formed after the 1987 war. Most are calling on the President to reject these outrageous demands, even if many have come to realize that we may not have much of a choice in the matter. As the specter of war looms over Texas, [TEX.GetLeader] has withdrawn to their chamber to make a final decision."
 usa.5.o1:0 "We have to"
 usa.5.o2:0 "Never!"
 
 usa.6.t:0 "American Republic's Demands"
 usa.6.d:0 "With the recent attack on the Texan Senate, claimed by a radical pro-Republic group, the American cabinet met to discuss the supposed 'Texan Question' concerning our place in relation to the Republic. After days of great tension hovering over the halls of power, it appears that the Remnants have come to a final decision regarding the fate of our nation. Their Ambassador in Austin has delivered a note to President [TEX.GetLeader], 'proposing' our government become a close satellite administration. Of course, this was less of a proposal, and more of a veiled threat, with the strong implication that the Remnants intend to invade us should we reject their 'proposal' The fact that the Remnants are still open to allowing Texan independence is a consolidation to many, and some, even staunch nationalists such as Rick Perry, have at least lent some credence to this ideal. A peaceful submission to Atlanta while still preserving Texan independence may be the best deal on the table, even as many declare they would rather die than submit to Atlantan rule. Indeed, this would essentially erase Texan independence and turn us into a client state of the American Republic."
 usa.6.o1:0 "We have to"
 usa.6.o2:0 "Never!"
 
 usa.7.t:0 "Texas Refuses"
 usa.7.d:0 "The Texan ambassador met with the President today, outlining his government's response to our extremely generous offer. Apparently they have decided that becoming a state of the American Republic would not be beneficial to them or the Texan people, and hence have refused our demands. Despite the overwhelming odds against them, it appears that the Texans have remained resolute in the face of certain defeat. With Texas having forfeited any legitimacy their government may have had in the aftermath of the Senate Attack, pretty much the entirety of the Cabinet is content with entering Texas to restore order. Operation 'Starfall' has been activated henceforth, detailing a complete war against the 'Republic' of Texas and their false government, as plans detail the rapid occupation of major cities such as Austin and Houston. Already troops in East Texas are crossing over, as the first major war to grace the American continent in the 21st Century begins with a flash. Emergency sirens ring out across Texas as we enter into the New Century's New Order."
 usa.7.o1:0 "So be it..."
 
 usa.8.t:0 "Texas Refuses"
 usa.8.d:0 "The Texan ambassador met with the President today, outlining his government's response to our extremely generous offer. Apparently they have decided that becoming a satellite state of the American Republic would not be beneficial to them or the Texan people, and hence have refused our offer. Despite the overwhelming odds against them, it appears that the Texans have remained resolute in the face of certain defeat. With Texas having forfeited any legitimacy their government may have had in the aftermath of the Senate Attack, pretty much the entirety of the Cabinet is content with entering Texas to restore order. Operation 'Starfall' has been activated henceforth, detailing a complete war against the 'Republic' of Texas and their false government, as plans detail the rapid occupation of major cities such as Austin and Houston. Already troops in East Texas are crossing over, as the first major war to grace the American continent in the 21st Century begins with a flash. Emergency sirens ring out across Texas as we enter into the New Century's New Order."
 usa.8.o1:0 "So be it"
 
 usa.9.t:0 "Texas Becomes a State"
 usa.9.d:0 "The Texan ambassador met with the President today, outlining his government's response to our extremely generous offer. Fortunately they have decided that becoming a state of the American Republic would be beneficial to all involved. Once again Texas and America will be united as one and we can march onwards together to unite all Americans! Despite the unrelenting Nationalist creed of the Texan people, it seems that they have made the smart choice to accept their role as an integral part of the American Republic. Riots have broken out across the state as the fiercely-independent Texan populace decries this move as capitulation to the aggressors, taking to the streets to denounce the Texan President as an illegitimate Quisling. Already Remnant soldiers are crossing the Texan border to help put down these riots, however as it seems, the campaign to win Texan hearts and minds, and at last restore American pride within the Texan populace, will be a long and hard-fought one - in a literal sense, as heavily-armed Texan militants vow resistance against Atlanta by any means."
 usa.9.o1:0 "Wonderful"
 
 usa.10.t:0 "Texas Becomes a Satellite State"
 usa.10.d:0 "The Texan ambassador met with the President today, outlining his government's response to our extremely generous offer. Fortunately they have decided that becoming a satellite state of the American Republic would be beneficial to all involved. Once again Texas and America will be united as one and we can march onwards together to unite all Americans! Despite the unrelenting Nationalist creed of the Texan people, it seems that they have made the smart choice to accept their role as an ally of Atlanta, instead of an adversary. While we have much to iron out with the Texans, namely the status of East Texas, which we have hinted at possibly being returned if Texas chose to anchor themselves to Atlanta, it seems that Texas has willingly submitted to our rule without a shot fired. Despite this, riots have broken out across the state as the fiercely-independent Texan populace decries this move as capitulation to the aggressors, taking to the streets to denounce the Texan President as an illegitimate Quisling. A joint Texan-American task force has been assembled to tackle rioters and terrorists, and thanks to the maintenance of Texan independence, it seems that hearts and minds will be won in due time."
 usa.10.o1:0 "Wonderful"
 
 usa.11.t:0 "Texan Nationalist Attack"
 usa.11.d:0 "We have just received reports of another grotesque attack perpetrated by Texan nationalists, angered by our new agreement with Texas. With the death toll rising, soon these terrorists will meet their maker."
 usa.11.o1:0 "Horrible!"
 
 usa.12.t:0 "The Flag"
 usa.12.d:0 "Congress is now ferociously debating how the flags of America and Texas should be displayed in the state and beyond. An old urban legend has passed around that due to Texas' previous status as an independent state, Texan flags could be flown above American ones. With Texas having been independent twice, many are proposing making this urban legend real, even as some push to restrict the infamous 'Lone Star Banner'. Hardline Remnant patriots have argued that allowing the Lone Star fly higher , or indeed even fly at all would be the ultimate humiliation, proof that the Remnants are still too weak to finish what they started in '87. Meanwhile, Texan legislators (those who haven't already fled or been arrested) insist that only by keeping their flag supreme on their own soil can any real reconciliation ever take root. Barroom brawls have already broken out in San Antonio over whether it's treason to salute the Stars and Stripes first, and militia captains in the Panhandle are quietly telling their men that if Congress votes the wrong way, the war never really ended. The President has quietly let it be known he'll sign whatever bill lands on his desk first, so long as it doesn’t give the networks another week of riot footage from Texas."
 usa.12.o1:0 "Our flag for all"
 usa.12.o2:0 "Texan flag only for citizens"
 usa.12.o3:0 "Both flags on government buildings"
 
 usa.13.t:0 "Structure of the State"
 usa.13.d:0 "Congress is now ferociously debating whether Texas should be admitted into the Republic as one or a divided group of states. A little-known passage of the Texan Constitution allows the State to divide itself into five separate states without approval from Congress, something which some are proposing implementing as a way to whittle down Texan identity. With Dallas previously occupied by the American Republic in 1987 as part of 'East Texas', the framework for multiple Texan states already exists, even if East Texas was dissolved following our occupation of the entirety of Texas. Many within in Atlanta are already salivating at the chance to carve the Lone Star into bite-sized pieces: West Texas, East Texas, North Texas, South Texas, and the Panhandle - ensuring no single Texan delegation ever holds enough votes to block Federal Legislation. In Austin, the mere suggestion has sparked quite the amount of outrage, with Texans burning proposed division maps while chanting that they'll secede a third time before they let Congress Gerrymander their homeland out of existence. Governors from smaller states have quietly lobbied in favor of the split, with their argument being five obedient Texases are far less dangerous than one proud one. While some belive that five diluted Texan delegations would permanently neutralize the region's voting bloc, due to the Senate's structure, Texan nationalists could very well end up holding Balance of Power in Congress should they gain control of the area's Senate Seats, in one scenario that would make a United Texas more benificial to our aims."
 usa.13.o1:0 "Texas remains as one"
 usa.13.o2:0 "Divide Texas"
 
 usa.14.t:0 "Texan Senate"
 usa.14.d:0 "Congress is now ferociously debating how much power the now defunct Senate of Texas should have if it is restored. The prospect of restoring Democracy in some form in Texas is certainly in line with our mission, and with our claims that Texas is rightfully part of the Federal Government's domain, happier as Americans that in any fancifil independent nation. However the prospect of restoring Democracy in Texas comes with one signifigant problem, the problem that despite what our propaganda may say, Texans still by-and-large despise Atlanta's 'Occupying Forces', and would surely vote out any pro-Remnant politician at the nearest avalible oppurtunity. With that in mind, many are proposing dissolving the Texan Legislature in its entirety; keeping the State of Texas in a state of perpetual rule by a Military Governor and dashing any dreams of Texan Democracy. This outcome would undoubtedly not be popular, however it may remain as the only way to truly ward off any attempts by the Texan nationalists to utilize our legal system as a way to further their aims. After much debate within Atlanta's halls of powers, a final decision regarding the Texan legislature has been reached."
 usa.14.o1:0 "Dissolve the Senate once and for all"
 usa.14.o2:0 "Restore the Texan Legislature"
 
 usa.15.t:0 "Texan Separatists Revolt"
 usa.15.d:0 "Apparently the debates in Congress and subsequent rulings have not appeased Texans enough, and thousands of separatists have risen up against the new state government. Dallas has been declared by many as 'traitors' to Texas and now it seems we have an insurrection on our hands. Overnight, barricades have went up along the Trinity River while men in Stetsons and plate carriers declared the 'Third Republic of Texas' live on pirated radio, broadcasting from a nearby high-school Football Stadium flying the Bonnie Blue flag. Reports of Resistance groups, many still wearing faded Texas National Guard markingsm, rolling unopposed down I-35, with every armory between Waco and the Red River being either looted or defected outright. The President has mobilized American forces within Texas to put down this uprising, however as rioters overtake several major cities, observers warn that the President may have an uphill battle ahead of him. Major urban centers are now partially controlled by armed insurgents, road networks have been severed in multiple counties, all while Federal convoys are take sustained casualties from ambushes and IEDs. Intelligence reports indicate that the revolt is far more organized and widely supported than initial estimates suggested, with significant defections occurring among local police and former Texan National Guard units. Senior officers privately concede that regaining full control could require months, if not years, and that the political cost of the required measures may prove unsustainable in Atlanta."
 usa.15.o1:0 "We can't do anything right for them"
 
 usa.16.t:0 "Currency"
 usa.16.d:0 "The American and Texan Presidents are in a heated discussion concerning currency both within Texas and in the Republic. While Texas has long mantained a seperate currency, Texas' decision to become a satellite Republic has made some propose replacing the Texan dollar with Remnant currency. Atlanta's Treasury Secretary has openly called the Texan dollar worthless, not even worth the paper it's prinited on, with officials quietly circulating memos showing that letting the Texan Dollar survive would create a permanent back-door for sanction evasion and other black-market activity. Across Texas, denizens are reported to be in the process of hoarding physical Texan notes under floorboards and in locked cigar boxes, swearing they'll burn Washington-approved scrip before they spend it on even a cup of coffee, risking a complete crash of the Texan economy. In Atlanta, Federal Reserve officials have delivered a sealed briefcase to the President containing designs for new notes to be used specifically in Texas - American designes overprinted with a tiny Lone Star in the corner - a design described as a 'compromise' that every Texan will recognize as surrender."
 usa.16.o1:0 "The American dollar will suffice"
 usa.16.o2:0 "Two currencies for two nations"
 
 usa.17.t:0 "National Guard"
 usa.17.d:0 "The American and Texan Presidents are in a heated discussion concerning the use of a federal national guard within Texas. Hopefully they can reach a decision by the end of the day. Following Texas' submission to Remnant rule, the Texan Army has been abolished, replaced with a new Texan National Guard. In practice, this new National Guard is nothing but a reskin of the old Texan Army, however many are pushing for Atlanta to be given more power over the Texan Army. Generals from Atlanta want every Guard armory in the state dual-keyed, with Federal Officers holding one key and the power to Federalize units on ninety minutes's notice, citing fresh intelligence that alleges widespread Resistance infiltration of the Texan Guard. Texan leadership has countered this proposal, warning that putting the Texan Armed Forces under Remnant control would lead to widespread desertion and an explosion in Resistance activity as the 'Partnership of Nations' quietly devolves into a hostile occupation. The Pentagon is eyeing these development cautiously, knowing that the fate of the Texan Army is among the most important questions to be settled. "
 usa.17.o1:0 "Full control in Texas"
 usa.17.o2:0 "Power to the Texan National Guard"
 
 usa.18.t:0 "Laws"
 usa.18.d:0 "The American and Texan Presidents are in a heated discussion concerning the application of Atlanta laws within Texas. Hopefully they can reach a decision by the end of the day. Atlanta's Legal Eagles are circling like buzzards over the corpse of a dying Longhorn, seeing Texas' laws as not long for this world following Texas' choice to become a Remnant satellite. Already proposals to replace Texan laws wholesale with Atlantan statutes have been floated within President [USA.GetLeader]'s inner-circle, even as some warn of a potential breakdown of our Texan puppet regime if we choose to do so. Even if we do go this route, we have no intention of stripping Texans of their beloved right to bear arms; we aren't suicidal. Among the most popular options is meeting with Perry to draft a new Constitution, one which would allow us to flex our legal presedence while still allowing a veneer of Texan autonomy in the matter. Finally, some have proposed simply avoiding this headache alltogether by allowing the Texan legal system to remain untouched, keeping every pot-bellied old Sherriff out of our hair by allowing the status-quo to remain untouched. Internal Federal assessments estimate a high probability of coordinated refusal by local courts and law-enforcement agencies if Atlanta attempts direct enforcement without Texan consent. Contingency orders have been prepared authorizing Federal Marshals to assume Judicial functions in non-compliant counties on 72 hours notice."
 usa.18.o1:0 "American law above Texan law"
 usa.18.o2:0 "A new Texan constitution"
 usa.18.o3:0 "Maintain all Texan laws"
 
